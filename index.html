<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>GaviaCRM — Prototip</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --gv-deep:#020837; --gv-night:#141533; --gv-mint:#3FD5AD;
    --gv-on-dark:#E9EEF1; --gv-muted:#6B7280; --gv-border:#1F2740;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    background:var(--gv-deep); color:var(--gv-on-dark);
    font-family:"Manrope",system-ui,sans-serif;
    background-image:radial-gradient(rgba(63,213,173,.08) 1px,transparent 1px);
    background-size:24px 24px;
  }
  .card{
    text-align:center; padding:56px 48px; max-width:520px;
    background:var(--gv-night); border:1px solid var(--gv-border); border-radius:16px;
  }
  .mark{
    width:56px; height:56px; margin:0 auto 24px; border-radius:14px;
    background:rgba(63,213,173,.12); border:1px solid rgba(63,213,173,.3);
    display:flex; align-items:center; justify-content:center;
    color:var(--gv-mint); font-weight:800; font-size:22px; letter-spacing:-.02em;
  }
  .eyebrow{font-size:11px; font-weight:700; letter-spacing:.16em; text-transform:uppercase; color:var(--gv-mint); margin-bottom:12px}
  h1{font-size:26px; font-weight:800; letter-spacing:-.02em; margin-bottom:12px}
  p{font-size:14.5px; line-height:1.6; color:rgba(233,238,241,.6)}
</style>
</head>
<body>
  <main class="card">
    <div class="mark">G</div>
    <div class="eyebrow">Gaviaworks</div>
    <h1>GaviaCRM Prototip</h1>
    <p>İnşaat operasyonları için iş takip platformu arayüz çalışması.
       Tıklanabilir prototip hazırlanıyor — yakında bu adreste.</p>
  </main>
</body>
</html>
