/* ============ SAYFAYA ÖZEL — Tedarikçi Kartı (?tdr= çok-kayıt şablonu) ============ */
.ph-back{display:inline-flex;align-items:center;gap:7px;font-size:12.5px;font-weight:700;color:var(--muted);margin-bottom:10px;transition:.18s var(--ease)}
.ph-back i{font-size:11px}
.ph-back:hover{color:var(--acc-ink)}

.tdr-hero{display:grid;grid-template-columns:1.7fr 1fr;gap:30px;padding:26px 26px 24px;margin-bottom:16px}
.tdr-hero-id{display:flex;gap:18px}
.tdr-hero-mark{width:58px;height:58px;flex:none;border-radius:var(--r-md);display:grid;place-items:center;font-size:19px;font-weight:800;background:rgba(var(--acc-rgb),.12);color:var(--acc-ink)}
.tdr-hero-info{flex:1;min-width:0}
.tdr-hero-tags{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.tdr-hero-meta{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:13px 22px}
.tdr-hero-meta dt{font-size:10.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:3px}
.tdr-hero-meta dd{font-size:13px;font-weight:700;color:var(--ink)}
.hero-stats{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;align-content:start}
.hstat{background:var(--bg);border-radius:var(--r-md);padding:14px 16px;display:flex;flex-direction:column;gap:4px}
.hstat-num{font-size:17px;font-weight:800;color:var(--ink);letter-spacing:-.01em;font-variant-numeric:tabular-nums}
.hstat-lbl{font-size:11.5px;color:var(--muted);font-weight:600;line-height:1.3}
.hstat.danger .hstat-num{color:var(--danger)}
.hstat.warn .hstat-num{color:var(--warn)}
.hstat.ok .hstat-num{color:var(--ok)}
a.hstat{border:1px solid transparent;transition:.2s var(--ease)}
a.hstat:hover{border-color:var(--acc-ink);transform:translateY(-2px);box-shadow:var(--sh-sm)}
a.hstat .hstat-lbl i{font-size:10px;margin-left:3px;color:var(--acc-ink)}
@media(max-width:980px){.tdr-hero{grid-template-columns:minmax(0,1fr)}}
@media(max-width:640px){
  .tdr-hero{padding:20px 18px}
  .tdr-hero-id{flex-direction:column}
  .tdr-hero-meta{grid-template-columns:1fr}
}

.warn-band{margin:0 0 16px;padding:16px 20px;border-radius:var(--r-md);border:1px solid var(--danger);background:var(--danger-tint);display:flex;gap:12px;align-items:flex-start}
.warn-band i{color:var(--danger);font-size:16px;margin-top:2px;flex:none}
.warn-band p{font-size:13px;line-height:1.65;color:var(--ink-2)}

.gv-tabs{display:flex;border-bottom:1px solid var(--line);margin-bottom:22px;overflow-x:auto;scrollbar-width:none}
.gv-tabs::-webkit-scrollbar{display:none}
.gv-tab{display:inline-flex;align-items:center;gap:8px;padding:13px 4px;margin-right:26px;flex:none;
  font-family:inherit;font-size:13.5px;font-weight:700;color:var(--muted);background:none;border:none;
  border-bottom:2px solid transparent;white-space:nowrap;cursor:pointer;transition:.18s var(--ease)}
.gv-tab i{font-size:13px}
.gv-tab:hover{color:var(--ink)}
.gv-tab.is-active{color:var(--acc-ink);border-color:var(--acc-ink)}
.tab-panel{animation:tabIn .22s var(--ease)}
@keyframes tabIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

.ctx-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:10px 0;font-size:13px}
.ctx-row:not(:last-child){border-bottom:1px solid var(--line)}
.ctx-row .ctx-lbl{color:var(--muted)}
.ctx-row .ctx-val{color:var(--ink);font-weight:700;text-align:right}
.ctx-row .ctx-val a{color:var(--acc-ink)}

.gbar{display:flex;align-items:center;gap:10px}
.gbar-track{flex:1;height:8px;border-radius:var(--r-pill);background:var(--bg);border:1px solid var(--line);overflow:hidden}
.gbar-fill{height:100%;border-radius:var(--r-pill);background:var(--acc-ink)}
.gbar-fill.warn{background:var(--warn)}
.gbar-fill.danger{background:var(--danger)}
.gbar-val{font-size:14px;font-weight:800;color:var(--ink);font-variant-numeric:tabular-nums;flex:none}

.col-tut{width:150px}
.col-tst{width:170px}
.teklif-not{font-size:11.5px;color:var(--muted);display:block;margin-top:3px}

.gecikme-item{display:flex;gap:14px;padding:16px 22px;align-items:flex-start}
.gecikme-item:not(:last-child){border-bottom:1px solid var(--line)}
.gecikme-dot{width:34px;height:34px;flex:none;border-radius:var(--r-circle);background:var(--danger-tint);color:var(--danger);display:grid;place-items:center;font-size:13px;font-weight:800}
.gecikme-body b{display:block;font-size:13px;font-weight:700;color:var(--ink)}
.gecikme-body span{font-size:12px;color:var(--muted)}
</style>

        {tarih:'14 Nisan 2026', gun:'5 gün', aciklama:'Elektrik malzeme teslimatında gecikme (arşiv kaydı).'}
      ],
      perfNot:'İki gecikme kaydı da performans skorunu %71\'e düşürdü; tedarikçi ağının en düşük skoruna sahip.',
      cari:{bakiye:null, yon:null, not:'SIP-2026-04 siparişi henüz teslim edilmediği için fatura kesilmedi; cari hesapta açık bakiye bulunmuyor.', satirlar:[]}
    },
    'TDR-06':{
      no:'TDR-06', ad:'Anadolu Hırdavat', kat:'Hırdavat & Sarf',
      yetkili:'Fatih Coşkun', tel:'0216 349 82 17', adres:'Dudullu OSB, İstanbul',
      vade:'15 gün', baslangic:'Nisan 2023',
      skor:97,
      stats:[
        {val:'%97', lbl:'Performans skoru — en yüksek'},
        {val:'Yok', lbl:'Aktif sipariş — SIP-2026-02 kapandı'},
        {val:tl(9850), lbl:'Cari bakiye — alacaklı', cls:'ok'},
        {val:'0', lbl:'Gecikme kaydı'}
      ],
      teklifler:[
        {no:'SIP-2026-02', aciklama:'Kaynak teli + sarf paketi (Liman Lojistik Merkezi)', tutar:96400, durum:{cls:'ok',lbl:'Kapandı'}, href:'crm-satinalma-siparis-detay.html?sip=SIP-2026-02', not:'FTR-2026-04 ödendi.'}
      ],
      gecikme:[],
      perfNot:'Şirketin en güvenilir tedarikçilerinden biri; teslimatlar sürekli zamanında yapılıyor. Performans skoru %97 ile ağın en yükseği.',
      cari:{bakiye:9850, yon:'alacaklı', not:null, satirlar:[{tarih:'29 Haz 2026', aciklama:'Hırdavat malzeme alımı', val:'+₺9.850'}]}
    }
  };

  var q = new URLSearchParams(location.search);
  var rawTdr = q.get('tdr');
  var key = rawTdr;
  if(!TDR[key]) key = rawTdr ? null : 'TDR-01';
  var item = key && TDR[key];

  if(!item){
    gvNotFound({
      code: rawTdr ? rawTdr.toUpperCase() : null,
      tur: 'tedarikçi',
      listHref: 'crm-satinalma-tedarikciler.html', listLbl: 'Tedarikçilere dön',
      defHref: 'crm-satinalma-tedarikci-detay.html', defLbl: 'Varsayılan kaydı aç'
    });
    return;
  }

  function initials(name){
    var parts = name.split(/\s+/).filter(Boolean);
    return (parts[0][0] + (parts[1] ? parts[1][0] : parts[0][1] || '')).toUpperCase();
  }

  document.title = item.ad + ' — Tedarikçi Kartı — Gavia CRM';
  document.getElementById('gdEyebrow').textContent = 'Tedarik · ' + item.no;
  document.getElementById('gdTitle').textContent = item.ad;
  document.getElementById('tMark').textContent = initials(item.ad);

  var barCls = item.warn ? 'danger' : (item.skor < 90 ? 'warn' : '');
  document.getElementById('tTags').innerHTML =
      '<span class="gtag" style="border-color:transparent"><i class="fa-solid fa-tag"></i> ' + item.kat + '</span>'
    + '<span class="gstat ' + (item.warn ? 'warn' : 'ok') + '">%' + item.skor + ' performans</span>'
    + (item.warn ? '<span class="gstat danger"><i class="fa-solid fa-triangle-exclamation"></i> Gecikme Riski</span>' : '');

  document.getElementById('tYetkili').textContent = item.yetkili;
  document.getElementById('tTel').textContent = item.tel;
  document.getElementById('tAdres').textContent = item.adres;
  document.getElementById('tVade').textContent = item.vade;
  document.getElementById('tBaslangic').textContent = item.baslangic;
  document.getElementById('tKategori').textContent = item.kat;

  document.getElementById('tStats').innerHTML = item.stats.map(function(s){
    var tag = s.href ? 'a' : 'div';
    var hrefAttr = s.href ? (' href="' + s.href + '"') : '';
    var clsAttr = s.cls ? (' hstat ' + s.cls) : ' hstat';
    var arrow = s.href ? ' <i class="fa-solid fa-arrow-right"></i>' : '';
    return '<' + tag + ' class="' + clsAttr.trim() + '"' + hrefAttr + '><span class="hstat-num">' + s.val + '</span><span class="hstat-lbl">' + s.lbl + arrow + '</span></' + tag + '>';
  }).join('');

  if(item.warnBanner){
    document.getElementById('warnBand').innerHTML = '<div class="warn-band"><i class="fa-solid fa-triangle-exclamation"></i><p>' + item.warnBanner + '</p></div>';
  }

  /* Künye */
  document.getElementById('kunyeBody').innerHTML =
      '<div class="ctx-row"><span class="ctx-lbl">Unvan</span><span class="ctx-val">' + item.ad + '</span></div>'
    + '<div class="ctx-row"><span class="ctx-lbl">Kategori</span><span class="ctx-val">' + item.kat + '</span></div>'
    + '<div class="ctx-row"><span class="ctx-lbl">Yetkili Kişi</span><span class="ctx-val">' + item.yetkili + '</span></div>'
    + '<div class="ctx-row"><span class="ctx-lbl">Telefon</span><span class="ctx-val">' + item.tel + '</span></div>'
    + '<div class="ctx-row"><span class="ctx-lbl">Adres</span><span class="ctx-val">' + item.adres + '</span></div>'
    + '<div class="ctx-row"><span class="ctx-lbl">Ödeme Vadesi</span><span class="ctx-val">' + item.vade + '</span></div>'
    + '<div class="ctx-row" style="border-bottom:none"><span class="ctx-lbl">Tedarik Başlangıcı</span><span class="ctx-val">' + item.baslangic + '</span></div>';

  /* Teklifler */
  document.getElementById('teklifBody').innerHTML = item.teklifler.map(function(t){
    var noCell = t.href ? '<a href="' + t.href + '" style="color:var(--ink);font-weight:700">' + t.no + '</a>' : '<span class="muted">' + t.no + '</span>';
    return '<tr><td>' + noCell + '</td>'
      + '<td>' + t.aciklama + (t.not ? '<span class="teklif-not">' + t.not + '</span>' : '') + '</td>'
      + '<td class="num">' + tl(t.tutar) + '</td>'
      + '<td><span class="gstat ' + t.durum.cls + '">' + t.durum.lbl + '</span></td></tr>';
  }).join('') || '<tr><td colspan="4" style="color:var(--muted);text-align:center;padding:26px">Bu tedarikçi için henüz teklif/sipariş kaydı yok.</td></tr>';

  /* Performans */
  var perfFill = document.getElementById('perfFill');
  perfFill.style.width = item.skor + '%';
  if(barCls) perfFill.classList.add(barCls);
  document.getElementById('perfVal').textContent = '%' + item.skor;
  document.getElementById('perfNot').textContent = item.perfNot;

  if(item.gecikme.length){
    document.getElementById('gecikmeList').innerHTML = item.gecikme.map(function(g){
      return '<div class="gecikme-item"><div class="gecikme-dot">' + g.gun + '</div>'
        + '<div class="gecikme-body"><b>' + g.tarih + '</b><span>' + g.aciklama + '</span></div></div>';
    }).join('');
  } else {
    document.getElementById('gecikmeCard').hidden = true;
  }

  /* Cari Hesap */
  var cariHtml = '';
  if(item.cari.bakiye !== null){
    cariHtml += '<div class="ctx-row"><span class="ctx-lbl">Bakiye</span><span class="ctx-val" style="color:' + (item.cari.bakiye > 0 ? 'var(--ok)' : 'var(--muted)') + '">' + tl(item.cari.bakiye) + ' ' + item.cari.yon + '</span></div>';
  } else {
    cariHtml += '<div class="ctx-row"><span class="ctx-lbl">Bakiye</span><span class="ctx-val muted">—</span></div>';
  }
  if(item.cari.not){
    cariHtml += '<p style="font-size:12.5px;color:var(--ink-2);line-height:1.7;margin:12px 0">' + item.cari.not + '</p>';
  }
  item.cari.satirlar.forEach(function(s){
    cariHtml += '<div class="ctx-row"><span class="ctx-lbl">' + s.tarih + ' — ' + s.aciklama + '</span><span class="ctx-val">' + s.val + '</span></div>';
  });
  cariHtml += '<div class="ctx-row" style="border-bottom:none;margin-top:6px"><span class="ctx-lbl">&nbsp;</span><span class="ctx-val"><a href="crm-cari-durum.html" style="color:var(--acc-ink)">Cari Durum ekranında gör <i class="fa-solid fa-arrow-right"></i></a></span></div>';
  document.getElementById('cariBody').innerHTML = cariHtml;

  /* sekme motoru */
  var tabs = Array.prototype.slice.call(document.querySelectorAll('.gv-tab'));
  var panels = Array.prototype.slice.call(document.querySelectorAll('.tab-panel'));
  function activate(id){
    tabs.forEach(function(t){
      var on = t.getAttribute('data-tab') === id;
      t.classList.toggle('is-active', on);
      t.setAttribute('aria-selected', on ? 'true' : 'false');
    });
    panels.forEach(function(p){ p.hidden = p.getAttribute('data-tab-panel') !== id; });
  }
  tabs.forEach(function(t){
    t.addEventListener('click', function(){
      var id = t.getAttribute('data-tab');
      activate(id);
      history.replaceState(null, '', '#' + id);
    });
  });
  var initial = (location.hash || '').replace('#', '');
  var valid = tabs.some(function(t){ return t.getAttribute('data-tab') === initial; });
  activate(valid ? initial : 'kunye');
})();
</script>
</body>
</html>
