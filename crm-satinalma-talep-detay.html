<style>
/* sayfaya özel: malzeme talebi detay kompozisyonu (kasa/izin/sipariş detayıyla aynı iskelet dili,
   D17 Y2 — ?mlz= param-driven 17 kayıt map'i, bkz. shell.js DALGA 17 bloğu) */
.gv-crumb{display:flex;align-items:center;gap:9px;font-size:12.5px;font-weight:600;color:var(--muted);margin-bottom:14px}
.gv-crumb a{color:var(--acc-ink);font-weight:700}
.gv-crumb a:hover{color:var(--acc-deep)}
.gv-crumb i{font-size:9px;color:var(--line-2)}
.gv-crumb span{color:var(--ink-2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:340px}

.gd-head{display:flex;align-items:flex-start;justify-content:space-between;gap:20px;margin-bottom:22px;flex-wrap:wrap}
.gd-head h1{font-size:22px;letter-spacing:-.015em;margin-bottom:9px;max-width:640px}
.gd-badges{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.gd-eyebrow{font-size:11.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--acc-ink);margin-bottom:8px}

.gd-grid{display:grid;grid-template-columns:1fr 340px;gap:18px;align-items:start}
@media(max-width:980px){.gd-grid{grid-template-columns:minmax(0,1fr)}}

.gd-block{padding:22px}
.gd-block + .gd-block{border-top:1px solid var(--line)}
.gd-label{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
.gd-desc{font-size:13.5px;line-height:1.7;color:var(--ink-2)}

/* kalem dökümü mini tablo */
.kal-table{width:100%;border-collapse:collapse}
.kal-table td{padding:10px 0;font-size:13.5px;border-bottom:1px solid var(--line);vertical-align:top}
.kal-table tr:last-child td{border-bottom:none}
.kal-name{display:flex;flex-direction:column;align-items:flex-start;gap:5px}
.kal-table .kal-ad{color:var(--ink);font-weight:600}
.kal-table .kal-miktar{text-align:right;font-weight:700;color:var(--ink);font-variant-numeric:tabular-nums;white-space:nowrap}

/* belge ekleri */
.file-row{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--line)}
.file-row:last-child{border-bottom:none}
.file-ico{width:36px;height:36px;flex:none;border-radius:9px;display:grid;place-items:center;font-size:14px;background:var(--info-tint);color:var(--info)}
.file-ico.xls{background:var(--ok-tint);color:var(--ok)}
.file-info{flex:1;min-width:0;line-height:1.35}
.file-info b{display:block;font-size:13px;font-weight:700;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.file-info span{font-size:11.5px;color:var(--muted)}

/* bağlam satırları */
.ctx-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:9px 0;font-size:13px}
.ctx-row .ctx-lbl{color:var(--muted)}
.ctx-row .ctx-val{color:var(--ink);font-weight:700;text-align:right}
.ctx-link{display:flex;align-items:center;gap:11px;padding:6px 0}
.ctx-link .who-mark{width:36px;height:36px;flex:none;border-radius:var(--r-sm);display:grid;place-items:center;font-size:13px;font-weight:800}
.ctx-link a{font-size:13.5px;font-weight:700;color:var(--ink)}
.ctx-link a:hover{color:var(--acc-ink)}
.ctx-link span{display:block;font-size:11.5px;color:var(--muted)}
.ctx-plain{font-size:13.5px;font-weight:700;color:var(--ink-2)}

/* öncelik rozetleri — talepler.html ile birebir (durumdan bağımsız anlamsal renk) */
.pri{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:700;padding:3px 9px;border-radius:var(--r-sm);white-space:nowrap}
.pri::before{content:"";width:6px;height:6px;border-radius:var(--r-circle);background:currentColor}
.pri.acil{background:var(--danger-tint);color:var(--danger)}
.pri.normal{background:var(--info-tint);color:var(--info)}
.pri.planli{background:var(--bg);color:var(--muted);border:1px solid var(--line)}

/* ilişkili SA formu / sipariş kartı */
.rel-form{display:flex;align-items:center;gap:13px;padding:6px 0}
.rel-ico{width:40px;height:40px;flex:none;border-radius:var(--r-md);display:grid;place-items:center;font-size:15px;background:rgba(var(--acc-rgb),.1);color:var(--acc-ink)}
.rel-info{flex:1;min-width:0;line-height:1.4}
.rel-info a,.rel-info span.rel-plain{font-size:13.5px;font-weight:700;color:var(--ink)}
.rel-info a:hover{color:var(--acc-ink)}
.rel-info span:not(.rel-plain){display:block;font-size:12px;color:var(--muted)}
.rel-note{font-size:12px;color:var(--muted);line-height:1.6;margin-top:10px;padding-top:10px;border-top:1px dashed var(--line)}

/* onay zinciri kart altı — aksiyonlar */
.chain-acts{display:flex;flex-direction:column;gap:8px;padding:18px 22px 22px;border-top:1px solid var(--line)}
.chain-acts .btn{justify-content:flex-start}
.no-action{font-size:12.5px;color:var(--muted);line-height:1.6;padding:0 22px 20px}

.gv-side-stack{display:flex;flex-direction:column;gap:16px}
</style>
</head>
