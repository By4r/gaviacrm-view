/* sayfaya özel: satış sonrası talep detay kompozisyonu (görev-detay yorum akışı +
   demirbaş ?param şablonu idiyomlarının birleşimi) */
.gv-crumb{display:flex;align-items:center;gap:9px;font-size:12.5px;font-weight:600;color:var(--muted);margin-bottom:14px}
.gv-crumb a{color:var(--acc-ink);font-weight:700}
.gv-crumb a:hover{color:var(--acc-deep)}
.gv-crumb i{font-size:9px;color:var(--line-2)}

.gd-head{display:flex;align-items:flex-start;justify-content:space-between;gap:20px;margin-bottom:22px;flex-wrap:wrap}
.gd-head h1{font-size:21px;letter-spacing:-.015em;margin-bottom:9px;max-width:640px}
.gd-badges{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.gd-eyebrow{font-size:11.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--acc-ink);margin-bottom:8px}

.gtag.tur-eksik{background:var(--warn-tint);color:var(--warn);border-color:transparent}
.gtag.tur-garanti{background:var(--info-tint);color:var(--info);border-color:transparent}
.gtag.tur-bakim{background:var(--bg);color:var(--ink-2);border-color:var(--line)}
.gtag.tur-sikayet{background:var(--danger-tint);color:var(--danger);border-color:transparent}
.gtag.tur-bilgi{background:rgba(var(--acc-rgb),.1);color:var(--acc-ink);border-color:rgba(var(--acc-rgb),.25)}
.gtag.tur-teslimat{background:var(--danger-tint);color:var(--danger);border-color:transparent}

.gd-grid{display:grid;grid-template-columns:1fr 320px;gap:18px;align-items:start}
@media(max-width:980px){.gd-grid{grid-template-columns:minmax(0,1fr)}}

.gd-block{padding:22px}
.gd-block + .gd-block{border-top:1px solid var(--line)}
.gd-label{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
.gd-desc{font-size:13.5px;line-height:1.7;color:var(--ink-2)}

.ctx-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:9px 0;font-size:13px}
.ctx-row:not(:last-child){border-bottom:1px solid var(--line)}
.ctx-row .ctx-lbl{color:var(--muted)}
.ctx-row .ctx-val{color:var(--ink);font-weight:700;text-align:right}
.ctx-link{display:flex;align-items:center;gap:11px;padding:6px 0}
.ctx-link .who-mark{width:36px;height:36px;flex:none;border-radius:var(--r-sm);display:grid;place-items:center;font-size:13px;font-weight:800}
.ctx-link a{font-size:13.5px;font-weight:700;color:var(--ink)}
.ctx-link a:hover{color:var(--acc-ink)}
.ctx-link span{display:block;font-size:11.5px;color:var(--muted)}

/* yorum akışı — görev-detay ile aynı dil, Portal rozeti eklenmiş */
.cmt-row{display:flex;gap:12px;padding:14px 0}
.cmt-row:first-child{padding-top:0}
.cmt-ava{width:34px;height:34px;flex:none;border-radius:50%;display:grid;place-items:center;font-size:11.5px;font-weight:800;background:rgba(var(--acc-rgb),.14);color:var(--acc-ink)}
.cmt-ava.portal{background:var(--info-tint);color:var(--info)}
.cmt-body{flex:1;min-width:0;background:var(--bg);border-radius:var(--r-md);padding:11px 14px}
.cmt-head{display:flex;align-items:baseline;gap:9px;margin-bottom:4px;flex-wrap:wrap}
.cmt-head b{font-size:12.5px;font-weight:700;color:var(--ink)}
.cmt-head span{font-size:11px;color:var(--muted)}
.cmt-head .cmt-portal-tag{font-size:9.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--info);background:var(--info-tint);padding:1px 7px;border-radius:6px}
.cmt-text{font-size:13px;color:var(--ink-2);line-height:1.55}
.cmt-text a{color:var(--acc-ink);font-weight:700}
.cmt-compose{display:flex;gap:12px;padding-top:16px;margin-top:6px;border-top:1px solid var(--line)}
.cmt-compose .cmt-ava{background:var(--bg);color:var(--muted)}
.cmt-compose-field{flex:1;display:flex;gap:10px}
.cmt-compose-field input{flex:1}

.sla-pri{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:700;padding:4px 10px;border-radius:7px;white-space:nowrap}
.sla-pri::before{content:"";width:6px;height:6px;border-radius:50%;background:currentColor}
.sla-pri.high{background:var(--danger-tint);color:var(--danger)}
.sla-pri.med{background:var(--warn-tint);color:var(--warn)}
.sla-pri.low{background:var(--bg);color:var(--muted);border:1px solid var(--line)}

.gv-side-stack{display:flex;flex-direction:column;gap:16px}
.kanal-portal{background:var(--info-tint);color:var(--info);border-color:transparent}
</style>
</head>

  var q = new URLSearchParams(location.search);
  var key = q.get('sst');
  if(!ITEMS[key]) key = '007';
  var item = ITEMS[key];

  function renderComments(){
    var wrap = document.getElementById('cmtList');
    wrap.innerHTML = '';
    item.comments.forEach(function(c){
      var row = document.createElement('div');
      row.className = 'cmt-row';
      var portalTag = c.portal ? '<span class="cmt-portal-tag">Portal</span>' : '';
      row.innerHTML =
          '<div class="cmt-ava'+(c.portal ? ' portal' : '')+'">'+c.ini+'</div>'
        + '<div class="cmt-body"><div class="cmt-head"><b>'+c.name+'</b>'+portalTag+'<span>'+c.tarih+'</span></div>'
        + '<div class="cmt-text">'+c.text+'</div></div>';
      wrap.appendChild(row);
    });
  }

  function render(){
    document.title = item.no + ' — Satış Sonrası Talep Detayı — Gavia CRM';
    document.getElementById('crumbNo').textContent = item.no;

    var T = TUR[item.tur], D = DURUM[item.durum];
    document.getElementById('gdEyebrow').innerHTML = (item.musteri.name === 'Site Yönetimi' ? 'Kule Ofis B Blok' : item.musteri.name) + ' · Satış Sonrası Talep #' + item.no;
    document.getElementById('gdTitle').textContent = item.title;

    var badges = '<span class="gtag '+T.cls+'">'+T.lbl+'</span><span class="gstat '+D.cls+'">'+D.lbl+'</span>';
    if(item.portal) badges += '<span class="gstat info kanal-portal"><i class="fa-solid fa-globe"></i> Portal</span>';
    document.getElementById('gdBadges').innerHTML = badges;

    document.getElementById('aciklamaText').textContent = item.aciklama;
    renderComments();

    gvChain(document.getElementById('chainEl'), {steps:item.chain});

    var m = item.musteri;
    document.getElementById('musteriBlock').innerHTML =
        '<div class="who-mark" style="background:var(--info-tint);color:var(--info)">'+m.ini+'</div>'
      + '<div>'+(m.href ? '<a href="'+m.href+'">'+m.name+'</a>' : '<b style="font-size:13.5px;color:var(--ink)">'+m.name+'</b>')+'<span>'+m.tur+'</span></div>';

    var b = item.birim;
    document.getElementById('birimBlock').innerHTML =
        '<div class="who-mark" style="background:rgba(var(--acc-rgb),.12);color:var(--acc-ink)"><i class="fa-solid fa-door-closed"></i></div>'
      + '<div>'+(b.href ? '<a href="'+b.href+'">'+b.lbl+'</a>' : '<b style="font-size:13.5px;color:var(--ink)">'+b.lbl+'</b>')+'<span>'+b.not+'</span></div>';

    var kaynakEl = document.getElementById('kaynakRow');
    if(item.kaynak){
      kaynakEl.innerHTML = '<div class="ctx-row" style="border-top:1px dashed var(--line);margin-top:8px;padding-top:12px">'
        + '<span class="ctx-lbl">'+item.kaynak.lbl+'</span>'
        + '<span class="ctx-val">'+(item.kaynak.href ? '<a href="'+item.kaynak.href+'" style="color:var(--acc-ink)">'+item.kaynak.sub+'</a>' : item.kaynak.sub)+'</span></div>';
    } else {
      kaynakEl.innerHTML = '';
    }

    var priMap = {high:{cls:'high', lbl:'Yüksek'}, med:{cls:'med', lbl:'Orta'}, low:{cls:'low', lbl:'Düşük'}};
    var pri = priMap[item.oncelik];
    document.getElementById('slaOncelik').innerHTML = '<span class="sla-pri '+pri.cls+'">'+pri.lbl+'</span>';

    if(item.kapanis){
      document.getElementById('slaTarihLbl').textContent = 'Açılış → Kapanış';
      document.getElementById('slaTarih').textContent = item.acilis + ' → ' + item.kapanis;
    } else {
      document.getElementById('slaTarihLbl').textContent = 'Açılış tarihi';
      document.getElementById('slaTarih').textContent = item.acilis;
    }

    if(item.garantiBitis){
      document.getElementById('slaEkRow').hidden = false;
      document.getElementById('slaEkLbl').textContent = 'Garanti bitiş';
      document.getElementById('slaEkVal').textContent = item.garantiBitis;
    }
  }

  render();

  var meAva = document.getElementById('cmtMeAva');
  if(meAva) meAva.textContent = GV.R.ini;
  var send = document.getElementById('cmtSend'), inp = document.getElementById('cmtInput');
  if(send && inp){
    send.addEventListener('click', function(){
      if(!inp.value.trim()) return;
      gvToast('Yorumunuz eklendi.');
      inp.value = '';
    });
  }
})();
</script>
