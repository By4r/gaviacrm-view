<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>Makine Puantajı — Gavia CRM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
      integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A=="
      crossorigin="anonymous" referrerpolicy="no-referrer">
<link rel="stylesheet" href="assets/css/tokens.css">
<link rel="stylesheet" href="assets/css/shell.css">
<link rel="stylesheet" href="assets/css/ui.css">
<style>
/* ============ SAYFAYA ÖZEL — Makine Puantajı ============ */
#tblMakine{min-width:980px}
.col-santiye{width:170px}
.col-op{width:150px}
.col-saat{width:96px}
.col-durum{width:130px}

.mk-cell{display:flex;align-items:center;gap:12px;min-width:0}
.mk-mark{width:38px;height:38px;flex:none;border-radius:var(--r-sm);display:grid;place-items:center;font-size:14px}
.mk-info{min-width:0;line-height:1.35}
.mk-info b{display:block;font-size:13.5px;font-weight:700;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mk-info .mk-no{font-size:11.5px;color:var(--muted)}

/* mülkiyet etiketi — makine adının altında küçük gtag */
.own{display:inline-flex;align-items:center;gap:5px;font-size:10.5px;font-weight:700;padding:2px 8px 2px 7px;border-radius:6px;margin-top:3px;white-space:nowrap}
.own i{font-size:9px}
.own.kiralik{background:var(--info-tint);color:var(--info)}
.own.ozmal{background:var(--bg);color:var(--ink-2);border:1px solid var(--line)}
.own.hizmet{background:rgba(var(--acc-rgb),.1);color:var(--acc-ink)}

.mk-not{max-width:260px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block;color:var(--ink-2)}
.mk-saat{font-weight:800;color:var(--ink);font-variant-numeric:tabular-nums}
.mk-saat span{display:block;font-size:10.5px;font-weight:600;color:var(--muted);margin-top:1px}

@media(max-width:640px){
  .mk-not{max-width:150px}
}
</style>
</head>
<body data-sec="operasyon" data-screen="makine">
<div class="gv-app">
  <aside class="gv-rail" id="gvRail"></aside>
  <nav class="gv-menu" id="gvMenu"></nav>
  <div class="gv-divider" id="gvDivider" role="separator" aria-label="Menüyü daralt/genişlet"><span class="gv-grip"></span></div>
  <div class="gv-overlay" id="gvOverlay"></div>

  <header class="gv-top">
    <button class="gv-burger" id="gvBurger" aria-label="Menü"><i class="fa-solid fa-bars"></i></button>
    <div class="gv-search"><i class="fa-solid fa-magnifying-glass"></i><input type="text" placeholder="Ara"></div>
    <div class="gv-top-tools">
      <button class="gv-iconbtn" data-tip="Bildirimler" aria-label="Bildirimler"><i class="fa-regular fa-bell"></i><span class="gb-dot"></span></button>
      <div class="gv-me">
        <div class="me-ava" id="gvAva">·</div>
        <div class="me-id"><div class="me-name" id="gvName">—</div><div class="me-role" id="gvRole">—</div></div>
        <i class="fa-solid fa-chevron-down"></i>
      </div>
    </div>
  </header>

  <main class="gv-main">
    <div class="gv-page-head">
      <div>
        <div class="ph-eyebrow">Günlük Kayıt</div>
        <h1>Makine Puantajı</h1>
        <div class="ph-sub" id="mkSub">Yükleniyor…</div>
      </div>
      <div class="ph-actions">
        <a class="btn btn-ghost btn-sm" href="#" data-wip="1"><i class="fa-solid fa-download"></i> Dışa Aktar</a>
      </div>
    </div>

    <div class="kpi-grid">
      <div class="kpi-card">
        <div class="kpi-ico" style="background:var(--ok-tint);color:var(--ok)"><i class="fa-solid fa-play"></i></div>
        <div><div class="kpi-num num" id="kpiCalisan">—</div><div class="kpi-lbl">Çalışan makine</div>
        <div class="kpi-delta flat"><i class="fa-solid fa-truck-pickup"></i> Bugün sahada</div></div>
      </div>
      <div class="kpi-card">
        <div class="kpi-ico" style="background:var(--info-tint);color:var(--info)"><i class="fa-solid fa-clock"></i></div>
        <div><div class="kpi-num num" id="kpiSaat">—</div><div class="kpi-lbl">Toplam çalışma saati</div>
        <div class="kpi-delta flat"><i class="fa-solid fa-calendar-day"></i> 2 Temmuz 2026</div></div>
      </div>
      <div class="kpi-card">
        <div class="kpi-ico"><i class="fa-solid fa-pause"></i></div>
        <div><div class="kpi-num num" id="kpiBosta">—</div><div class="kpi-lbl">Boşta</div>
        <div class="kpi-delta flat"><i class="fa-solid fa-hourglass-half"></i> Göreve hazır</div></div>
      </div>
      <div class="kpi-card danger">
        <div class="kpi-ico"><i class="fa-solid fa-triangle-exclamation"></i></div>
        <div><div class="kpi-num num" id="kpiArizali">—</div><div class="kpi-lbl">Arızalı</div>
        <div class="kpi-delta down"><i class="fa-solid fa-screwdriver-wrench"></i> Serviste</div></div>
      </div>
    </div>

    <div class="gv-card">
      <div class="filter-bar">
        <div class="fb-search">
          <i class="fa-solid fa-magnifying-glass"></i>
          <input type="text" placeholder="Makine, MKN no veya operatör ara" data-table-search="#tblMakine">
        </div>
        <div class="chips" data-target="#tblMakine">
          <button class="chip is-on" data-filter="hepsi">Tümü <span class="ch-cnt">6</span></button>
          <button class="chip" data-filter="calisti">Çalışıyor <span class="ch-cnt">4</span></button>
          <button class="chip" data-filter="bosta">Boşta <span class="ch-cnt">1</span></button>
          <button class="chip" data-filter="arizali">Arızalı <span class="ch-cnt">1</span></button>
        </div>
      </div>
      <div class="gc-body flush">
        <table class="gtable" id="tblMakine">
          <thead>
            <tr>
              <th>Makine</th>
              <th class="col-santiye">Şantiye</th>
              <th class="col-op">Operatör</th>
              <th class="col-saat num">Bugün</th>
              <th>Not</th>
              <th class="col-durum">Durum</th>
            </tr>
          </thead>
          <tbody id="mkBody"></tbody>
        </table>
        <div class="gv-empty" data-table-empty hidden>
          <div class="ge-ico"><i class="fa-solid fa-truck-pickup"></i></div>
          <h4>Eşleşen makine yok</h4>
          <p>Aramayı temizleyin veya farklı bir durum filtresi seçin.</p>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="assets/js/shell.js"></script>
<script src="assets/js/ui.js"></script>
<script>
(function(){
  if(!window.GV) return;

  /* ---- mock makine parkı — shell.js kanonik listesinden (Dalga 3'te doğdu, bkz. üst yorum bloğu).
     Operatör adları şantiye kadrosundan kanonikleşmiş isimlerle eşleştirildi; MKN-03 hizmet alımı
     olduğundan (Ege Hazır Beton) firma içi operatör atanmadı. ---- */
  var SANTIYE_ADI = {vadi:'Vadi Konakları', liman:'Liman Lojistik Merkezi', merkez:'Merkez Şantiye'};
  var SANTIYE_TINT = {
    vadi:  {bg:'rgba(var(--acc-rgb),.12)', fg:'var(--acc-ink)'},
    liman: {bg:'var(--info-tint)', fg:'var(--info)'},
    merkez:{bg:'var(--warn-tint)', fg:'var(--warn)'}
  };
  var DURUM = {
    calisti: {cls:'ok',     lbl:'Çalışıyor'},
    bosta:   {cls:'off',    lbl:'Boşta'},
    arizali: {cls:'danger', lbl:'Arızalı'}
  };
  var OWN = {
    kiralik:{cls:'kiralik', ic:'fa-key',            lbl:'Kiralık'},
    ozmal:  {cls:'ozmal',   ic:'fa-house-chimney',  lbl:'Öz Mal'},
    hizmet: {cls:'hizmet',  ic:'fa-handshake',      lbl:'Hizmet Alımı'}
  };
  var MAKINE = [
    {no:'MKN-01', ad:'Ekskavatör CAT 320',              santiye:'vadi',   own:'kiralik', operator:'Musa Erdem',    saat:8,   not:'Motorin dolu, sabah vardiyasıyla başladı', durum:'calisti'},
    {no:'MKN-02', ad:'Kule Vinç Potain MC-85',           santiye:'vadi',   own:'ozmal',   operator:'İbrahim Sönmez',saat:6.5, not:'Öğleden sonra rüzgar nedeniyle ara verildi', durum:'calisti'},
    {no:'MKN-03', ad:'Beton Pompası Putzmeister M42',    santiye:'vadi',   own:'hizmet',  operator:'Ege Hazır Beton ekibi', saat:0, not:'Yarın sabah C30 dökümü için sahada bekliyor', durum:'bosta'},
    {no:'MKN-04', ad:'Mobil Vinç Liebherr LTM 1050',     santiye:'liman',  own:'kiralik', operator:'Halil Güneş',   saat:7,   not:'Çelik konstrüksiyon montajı sorunsuz sürüyor', durum:'calisti'},
    {no:'MKN-05', ad:'Forklift Toyota 8FD25',            santiye:'liman',  own:'ozmal',   operator:'Osman Polat',   saat:8,   not:'Sevkiyat elleçleme, sorunsuz', durum:'calisti'},
    {no:'MKN-06', ad:'Beko Loder JCB 3CX',               santiye:'merkez', own:'ozmal',   operator:'Sadık Öz',      saat:0,   not:'Hidrolik arıza — servis çağrıldı, parça bekleniyor', durum:'arizali'}
  ];

  function fmtSaat(n){ return (n % 1 === 0 ? n : n.toString().replace('.', ',')); }

  var body = document.getElementById('mkBody');
  var html = '';
  MAKINE.forEach(function(m){
    var tint = SANTIYE_TINT[m.santiye];
    var own = OWN[m.own];
    var d = DURUM[m.durum];
    html += '<tr data-f="'+m.durum+'" data-santiye="'+m.santiye+'">';
    html += '<td><div class="mk-cell"><div class="mk-mark" style="background:'+tint.bg+';color:'+tint.fg+'"><i class="fa-solid fa-truck-pickup"></i></div>'
          + '<div class="mk-info"><b>'+m.ad+'</b><span class="mk-no">'+m.no+'</span><br>'
          + '<span class="own '+own.cls+'"><i class="fa-solid '+own.ic+'"></i>'+own.lbl+'</span></div></div></td>';
    html += '<td>'+SANTIYE_ADI[m.santiye]+'</td>';
    html += '<td>'+m.operator+'</td>';
    html += '<td class="num"><div class="mk-saat">'+fmtSaat(m.saat)+' sa</div></td>';
    html += '<td><span class="mk-not">'+m.not+'</span></td>';
    html += '<td><span class="gstat '+d.cls+'">'+d.lbl+'</span></td>';
    html += '</tr>';
  });
  body.innerHTML = html;

  function refreshCounts(){
    var rows = document.querySelectorAll('#tblMakine tbody tr');
    var c = {hepsi:0, calisti:0, bosta:0, arizali:0};
    var toplamSaat = 0, santiyeler = {};
    rows.forEach(function(tr){
      c.hepsi++;
      var f = tr.getAttribute('data-f'); if(c[f] !== undefined) c[f]++;
      santiyeler[tr.getAttribute('data-santiye')] = true;
    });
    document.querySelectorAll('.chips .chip[data-filter]').forEach(function(ch){
      var cnt = ch.querySelector('.ch-cnt');
      if(cnt) cnt.textContent = c[ch.getAttribute('data-filter')] || 0;
    });
    document.getElementById('kpiCalisan').textContent = c.calisti;
    document.getElementById('kpiBosta').textContent = c.bosta;
    document.getElementById('kpiArizali').textContent = c.arizali;
    var santiyeSayi = Object.keys(santiyeler).length;
    document.getElementById('mkSub').textContent = c.hepsi + ' makine · ' + santiyeSayi + ' şantiyede · 2 Temmuz 2026, Perşembe';
  }

  /* şef tek şantiye görür — diğer satırlar kalıcı kaldırılır (tr.hidden DEĞİL) */
  if(GV.role === 'sef'){
    document.querySelectorAll('#tblMakine tbody tr').forEach(function(tr){
      if(tr.getAttribute('data-santiye') !== 'vadi') tr.remove();
    });
  }

  /* toplam saat — MAKINE dizisinden filtrelenmiş şantiyeye göre yeniden hesapla */
  var visibleNos = Array.prototype.map.call(document.querySelectorAll('#tblMakine tbody tr .mk-info .mk-no'), function(el){ return el.textContent; });
  var toplamSaat = MAKINE.filter(function(m){ return visibleNos.indexOf(m.no) !== -1; }).reduce(function(a,m){ return a + m.saat; }, 0);
  document.getElementById('kpiSaat').textContent = fmtSaat(toplamSaat) + ' sa';

  refreshCounts();
})();
</script>
</body>
</html>
