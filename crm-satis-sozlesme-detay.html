<style>
/* sayfaya özel: satış sözleşme detay kompozisyonu (finans sözleşme-detay ile aynı iskelet dili,
   demirbaş ?param şablonu gibi ?ssz= ile JS'ten render edilir) */
.gv-crumb{display:flex;align-items:center;gap:9px;font-size:12.5px;font-weight:600;color:var(--muted);margin-bottom:14px}
.gv-crumb a{color:var(--acc-ink);font-weight:700}
.gv-crumb a:hover{color:var(--acc-deep)}
.gv-crumb i{font-size:9px;color:var(--line-2)}
.gv-crumb span{color:var(--ink-2)}

.gd-head{display:flex;align-items:flex-start;justify-content:space-between;gap:20px;margin-bottom:22px;flex-wrap:wrap}
.gd-head h1{font-size:21px;letter-spacing:-.015em;margin-bottom:9px;max-width:640px}
.gd-badges{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.gd-eyebrow{font-size:11.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--acc-ink);margin-bottom:8px}

.gd-grid{display:grid;grid-template-columns:1fr 340px;gap:18px;align-items:start}
@media(max-width:980px){.gd-grid{grid-template-columns:minmax(0,1fr)}}

.gd-block{padding:22px}
.gd-block + .gd-block{border-top:1px solid var(--line)}
.gd-label{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin-bottom:12px}
.gd-desc{font-size:13.5px;line-height:1.7;color:var(--ink-2)}

.ctx-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:9px 0;font-size:13px}
.ctx-row:not(:last-child){border-bottom:1px solid var(--line)}
.ctx-row .ctx-lbl{color:var(--muted)}
.ctx-row .ctx-val{color:var(--ink);font-weight:700;text-align:right}
.ctx-link{display:flex;align-items:center;gap:11px;padding:6px 0}
.ctx-link .who-mark{width:36px;height:36px;flex:none;border-radius:var(--r-sm);display:grid;place-items:center;font-size:13px;font-weight:800}
.ctx-link a{font-size:13.5px;font-weight:700;color:var(--ink)}
.ctx-link a:hover{color:var(--acc-ink)}
.ctx-link span{display:block;font-size:11.5px;color:var(--muted)}

/* taraflar */
.party-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--line)}
.party-row:last-child{border-bottom:none}
.party-mark{width:38px;height:38px;flex:none;border-radius:var(--r-sm);display:grid;place-items:center;font-size:13px;font-weight:800}
.party-info{min-width:0;line-height:1.35}
.party-info b{display:block;font-size:13.5px;font-weight:700;color:var(--ink)}
.party-info span{font-size:11.5px;color:var(--muted)}
.party-role{margin-left:auto;flex:none;font-size:10.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--muted)}

/* ödeme planı tablosu */
.pay-table{width:100%;border-collapse:collapse}
.pay-table th{text-align:left;font-size:10.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);padding:0 0 9px;border-bottom:1px solid var(--line)}
.pay-table th.num,.pay-table td.num{text-align:right}
.pay-table th:not(:first-child),.pay-table td:not(:first-child){padding-left:14px}
.pay-table td{padding:11px 0;font-size:13px;border-bottom:1px solid var(--line);vertical-align:middle}
.pay-table tr:last-child td{border-bottom:none}
.pay-table td.num{font-variant-numeric:tabular-nums;font-weight:700}
.pay-table td.no-col{color:var(--muted);font-size:11.5px;white-space:nowrap}
.tbl-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
.kalan-banner{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:16px 18px;margin-top:16px;border-radius:var(--r-md);background:var(--danger-tint);flex-wrap:wrap}
.kalan-banner.zero{background:var(--ok-tint)}
.kalan-banner .kb-lbl{font-size:12.5px;font-weight:700;color:var(--danger);text-transform:uppercase;letter-spacing:.04em}
.kalan-banner.zero .kb-lbl{color:var(--ok)}
.kalan-banner .kb-val{font-size:20px;font-weight:800;color:var(--danger);letter-spacing:-.01em}
.kalan-banner.zero .kb-val{color:var(--ok)}

/* kapora bilgisi (imza bekleyen sözleşme) */
.kapora-box{display:flex;align-items:center;gap:16px;padding:18px;border-radius:var(--r-md);background:var(--warn-tint)}
.kapora-box .kp-ico{width:44px;height:44px;flex:none;border-radius:var(--r-md);background:rgba(255,255,255,.5);display:grid;place-items:center;font-size:17px;color:var(--warn)}
.kapora-box .kp-body b{display:block;font-size:16px;font-weight:800;color:var(--ink)}
.kapora-box .kp-body span{font-size:12.5px;color:var(--ink-2)}

/* teslim checklist */
.chk-list{display:flex;flex-direction:column}
.chk-item{display:flex;align-items:flex-start;gap:12px;padding:11px 0;border-bottom:1px solid var(--line);cursor:pointer;background:none;border-left:none;border-right:none;border-top:none;text-align:left;width:100%;font-family:inherit}
.chk-item:last-child{border-bottom:none}
.chk-item:hover{background:var(--bg)}
.chk-mark{width:21px;height:21px;flex:none;border-radius:50%;display:grid;place-items:center;font-size:9px;margin-top:1px}
.chk-item.done .chk-mark{background:var(--ok);color:#fff}
.chk-item.warn .chk-mark{background:var(--danger);color:#fff}
.chk-item.wait .chk-mark{background:var(--bg);border:2px solid var(--line-2);color:var(--muted)}
.chk-text{flex:1;min-width:0}
.chk-text b{display:block;font-size:13px;font-weight:600;color:var(--ink)}
.chk-item.warn .chk-text b{color:var(--danger)}
.chk-text span{font-size:11.5px;color:var(--muted)}
.chk-text a{color:var(--acc-ink);font-weight:700}

/* belge */
.file-row{display:flex;align-items:center;gap:12px;padding:6px 0}
.file-ico{width:36px;height:36px;flex:none;border-radius:9px;display:grid;place-items:center;font-size:14px;background:var(--danger-tint);color:var(--danger)}
.file-info{flex:1;min-width:0;line-height:1.35}
.file-info b{display:block;font-size:13px;font-weight:700;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.file-info span{font-size:11.5px;color:var(--muted)}

.rel-card{display:flex;align-items:center;gap:13px}
.rel-ico{width:40px;height:40px;flex:none;border-radius:var(--r-md);display:grid;place-items:center;font-size:15px;background:rgba(var(--acc-rgb),.1);color:var(--acc-ink)}
.rel-info{flex:1;min-width:0;line-height:1.4}
.rel-info a{font-size:13.5px;font-weight:700;color:var(--ink)}
.rel-info a:hover{color:var(--acc-ink)}
.rel-info span{display:block;font-size:12px;color:var(--muted)}

.deliv-note{display:flex;align-items:flex-start;gap:12px;padding:16px 18px;border-radius:var(--r-md);background:var(--warn-tint)}
.deliv-note i{color:var(--warn);font-size:15px;margin-top:2px;flex:none}
.deliv-note p{font-size:13px;line-height:1.6;color:var(--ink-2);margin:0}
.deliv-note a{color:var(--acc-ink);font-weight:700}

.gv-side-stack{display:flex;flex-direction:column;gap:16px}
.extra-tag{background:var(--info-tint);color:var(--info);border-color:transparent}
</style>

  var q = new URLSearchParams(location.search);
  var key = q.get('ssz');
  if(!ITEMS[key]) key = '2026-003';
  var item = ITEMS[key];

  function payRow(no, aciklama, tutar, vade, durum, durumLbl){
    return '<tr><td class="no-col">'+no+'</td><td>'+aciklama+'</td><td class="num">'+tl(tutar)+'</td><td>'+vade+'</td>'
      + '<td><span class="gstat '+durum+'">'+durumLbl+'</span></td></tr>';
  }

  function renderOdeme(){
    var o = item.odeme;
    var body = document.getElementById('odemeBody');
    var label = document.getElementById('odemeLabel');

    if(o.tip === 'closed'){
      label.textContent = 'Ödeme Durumu';
      body.innerHTML =
          '<div class="kapora-box" style="background:var(--ok-tint)">'
        + '  <div class="kp-ico" style="color:var(--ok)"><i class="fa-solid fa-circle-check"></i></div>'
        + '  <div class="kp-body"><b>'+tl(o.tutar)+' tahsil edildi</b><span>Bedelin tamamı teslim öncesinde ödendi · '+o.tutanak.no+' ile teslim edildi ('+o.teslimTarihi+')</span></div>'
        + '</div>';
      return;
    }

    if(o.tip === 'kapora'){
      label.textContent = 'Kapora / Rezervasyon Bilgisi';
      body.innerHTML =
          '<div class="kapora-box">'
        + '  <div class="kp-ico"><i class="fa-solid fa-hand-holding-dollar"></i></div>'
        + '  <div class="kp-body"><b>'+tl(o.tutar)+' kapora alındı</b><span>Bedelin %'+o.oran+'’i · '+o.tarih+'</span></div>'
        + '</div>'
        + '<p class="gd-desc" style="margin-top:14px">'+o.not+'</p>';
      return;
    }

    /* tip === 'plan' — peşinat + taksit + (varsa) teslimde satırları, KALAN vurgulu */
    label.textContent = 'Ödeme Planı';
    var rows = [];
    rows.push(payRow('—', 'Peşinat (%'+o.pesin.oran+')', o.pesin.tutar, 'İmza günü', 'ok', 'Ödendi'));
    var nextIdx = 1;
    if(o.taksit.odenen > 0){
      rows.push(payRow('1–'+o.taksit.odenen, 'Taksit (ödenen)', o.taksit.odenen*o.taksit.tutar, 'Aylık', 'ok', 'Ödendi'));
      nextIdx = o.taksit.odenen + 1;
    }
    if(o.taksit.gecikme){
      rows.push(payRow(nextIdx, 'Taksit (gecikmede)', o.taksit.tutar, o.taksit.gecikme.vade, 'danger', o.taksit.gecikme.gun+' gün gecikme'));
      nextIdx++;
    }
    var kalanSayi = o.taksit.adet - o.taksit.odenen - (o.taksit.gecikme ? 1 : 0);
    if(kalanSayi > 0){
      var sonNo = nextIdx === o.taksit.adet ? (''+o.taksit.adet) : (nextIdx+'–'+o.taksit.adet);
      rows.push(payRow(sonNo, 'Taksit (bekleyen)', kalanSayi*o.taksit.tutar, 'Aylık', 'wait', 'Bekliyor'));
    }
    if(o.teslimde){
      rows.push(payRow('—', 'Teslim bedeli', o.teslimde.tutar, 'Teslimde', o.teslimde.durum, o.teslimde.lbl));
    }
    var kalanZero = !o.kalan;
    body.innerHTML =
        '<div class="tbl-scroll"><table class="pay-table"><thead><tr><th>#</th><th>Açıklama</th><th class="num">Tutar</th><th>Vade</th><th>Durum</th></tr></thead>'
      + '<tbody>' + rows.join('') + '</tbody></table></div>'
      + '<div class="kalan-banner'+(kalanZero ? ' zero' : '')+'"><span class="kb-lbl">Kalan Bakiye</span><span class="kb-val">'+tl(o.kalan)+'</span></div>';
  }

  function renderChecklist(){
    if(!item.checklist) return;
    var done = item.checklist.filter(function(c){ return c.status === 'done'; }).length;
    document.getElementById('checklistCard').hidden = false;
    document.getElementById('checklistCnt').textContent = done + '/' + item.checklist.length;
    var wrap = document.getElementById('chkList');
    wrap.innerHTML = '';
    item.checklist.forEach(function(c, i){
      var btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'chk-item ' + c.status;
      var icon = c.status === 'done' ? '<i class="fa-solid fa-check"></i>' : (c.status === 'warn' ? '<i class="fa-solid fa-xmark"></i>' : '');
      var sub = c.status === 'done' ? 'Kontrol edildi' : (c.sub || '');
      var link = c.href ? (' — <a href="'+c.href+'">'+c.hrefLbl+'</a>') : '';
      btn.innerHTML = '<span class="chk-mark">'+icon+'</span><div class="chk-text"><b>'+(i+1)+'. '+c.text+'</b><span>'+sub+link+'</span></div>';
      btn.addEventListener('click', function(e){
        if(e.target.closest('a')) return;
        gvToast(c.status === 'done' ? (c.text + ' zaten kontrol edilmiş.') : (c.text + ' — durum kaydedildi. [MOCK-SİM]'), {type: c.status === 'warn' ? 'danger' : 'info'});
      });
      wrap.appendChild(btn);
    });
  }

  function render(){
    document.title = item.no + ' — Sözleşme Detayı — Gavia CRM';
    document.getElementById('crumbNo').textContent = item.no;
    document.getElementById('gdEyebrow').innerHTML = item.eyebrow;
    document.getElementById('gdTitle').textContent = item.title;

    var badges = '<span class="gstat '+item.durum.cls+'">'+item.durum.lbl+'</span>';
    if(item.extraTag) badges += '<span class="gtag extra-tag">'+item.extraTag+'</span>';
    document.getElementById('gdBadges').innerHTML = badges;

    document.getElementById('aciklamaText').textContent = item.aciklama;

    var m = item.musteri;
    document.getElementById('musteriRow').innerHTML =
        '<div class="party-mark" style="background:var(--info-tint);color:var(--info)">'+m.ini+'</div>'
      + '<div class="party-info">'+(m.href ? '<b><a href="'+m.href+'" style="color:inherit">'+m.name+'</a></b>' : '<b>'+m.name+'</b>')+'<span>'+m.tur+'</span></div>'
      + '<span class="party-role">Taraf B</span>';

    var birimHtml = item.birim.map(function(b){ return b.href ? '<a href="'+b.href+'">'+b.lbl+'</a>' : b.lbl; }).join(' · ');
    document.getElementById('ctxBirim').innerHTML = birimHtml + '<br><span class="muted" style="font-weight:500;font-size:11.5px">'+item.birimNot+'</span>';
    document.getElementById('ctxBedel').textContent = tl(item.bedel);
    document.getElementById('ctxImza').textContent = item.imzaTarihi;
    document.getElementById('ctxTeslim').textContent = item.teslimHedefi;
    document.getElementById('ctxTemsilci').textContent = item.temsilci;

    renderOdeme();
    renderChecklist();

    if(item.chain){
      document.getElementById('chainCard').hidden = false;
      gvChain(document.getElementById('chainEl'), {steps:item.chain});
    }

    if(item.deliveryNote){
      document.getElementById('noteCard').hidden = false;
      document.getElementById('noteBody').innerHTML = '<i class="fa-solid '+item.deliveryNote.ico+'"></i><p>'+item.deliveryNote.html+'</p>';
    }

    if(item.teklif){
      document.getElementById('teklifCard').hidden = false;
      document.getElementById('teklifLink').href = item.teklif.href;
      document.getElementById('teklifLink').textContent = item.teklif.no;
      document.getElementById('teklifSub').textContent = item.teklif.sub;
    }

    if(item.cari){
      document.getElementById('cariCard').hidden = false;
      document.getElementById('cariLink').href = item.cari.href;
      document.getElementById('cariLink').textContent = item.cari.no;
      document.getElementById('cariSub').textContent = item.cari.sub;
    }

    document.getElementById('belgeName').textContent = item.belge.name;
    document.getElementById('belgeMeta').textContent = item.belge.meta;
  }

  render();
})();
</script>
