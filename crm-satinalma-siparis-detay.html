<style>
/* sayfaya özel: sipariş detay kompozisyonu (malzeme-talebi/SA-formu detayıyla aynı iskelet dili) */
.gv-crumb{display:flex;align-items:center;gap:9px;font-size:12.5px;font-weight:600;color:var(--muted);margin-bottom:14px}
.gv-crumb a{color:var(--acc-ink);font-weight:700}
.gv-crumb a:hover{color:var(--acc-deep)}
.gv-crumb i{font-size:9px;color:var(--line-2)}
.gv-crumb span{color:var(--ink-2)}

.gd-head{display:flex;align-items:flex-start;justify-content:space-between;gap:20px;margin-bottom:22px;flex-wrap:wrap}
.gd-head h1{font-size:22px;letter-spacing:-.015em;margin-bottom:9px;max-width:620px}
.gd-badges{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.gd-eyebrow{font-size:11.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--acc-ink);margin-bottom:8px}

.gd-grid{display:grid;grid-template-columns:1fr 340px;gap:18px;align-items:start}
@media(max-width:980px){.gd-grid{grid-template-columns:minmax(0,1fr)}}

.gd-block{padding:22px}
.gd-block + .gd-block{border-top:1px solid var(--line)}
.gd-label{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.gd-desc{font-size:13.5px;line-height:1.7;color:var(--ink-2)}
.gv-side-stack{display:flex;flex-direction:column;gap:16px;min-width:0}

/* kalem dökümü — basit (Kalem/Miktar/Tutar) ve zincir (Kalem/Sipariş/Teslim/Fark/Tutar) modu */
.kal-table{width:100%;border-collapse:collapse}
.kal-table td,.kal-table th{padding:10px 8px;font-size:13px;border-bottom:1px solid var(--line);vertical-align:top}
.kal-table th{font-size:10px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;color:var(--muted);text-align:right}
.kal-table th:first-child,.kal-table td:first-child{text-align:left;padding-left:0}
.kal-table tr:last-child td{border-bottom:none}
.kal-table td{text-align:right;font-variant-numeric:tabular-nums}
.kal-table .kal-ad{display:block;text-align:left;color:var(--ink);font-weight:600}
.kal-table .kal-sub{display:block;text-align:left;font-size:11px;color:var(--muted);margin-top:2px}
.kal-table td.fark-eksik{color:var(--danger);font-weight:800}
.kal-table td.fark-tam{color:var(--muted)}
.kal-table tr.kal-tot td{border-top:2px solid var(--line-2);border-bottom:none;padding-top:14px;font-weight:800;color:var(--ink);font-size:13.5px}
.kal-table tr.kal-tot td:first-child{text-align:left}
.kal-table tr.kal-tot .kal-tutar{color:var(--acc-ink)}

/* miktar uyuşmazlığı / gecikme banner */
.danger-banner{display:flex;align-items:flex-start;gap:11px;font-size:12.5px;color:var(--danger);background:var(--danger-tint);border-radius:var(--r-sm);padding:14px 16px;line-height:1.65;margin:0 22px 22px}
.danger-banner i{margin-top:2px;flex:none}

/* irsaliye kartları */
.irs-row{display:flex;align-items:flex-start;gap:13px;padding:12px 0;border-bottom:1px solid var(--line)}
.irs-row:last-child{border-bottom:none}
.irs-ico{width:40px;height:40px;flex:none;border-radius:var(--r-md);display:grid;place-items:center;font-size:15px;background:var(--info-tint);color:var(--info)}
.irs-ico.mismatch{background:var(--danger-tint);color:var(--danger)}
.irs-info{flex:1;min-width:0;line-height:1.4}
.irs-info b{font-size:13.5px;font-weight:700;color:var(--ink)}
.irs-info .irs-date{font-size:11.5px;color:var(--muted);font-weight:600;margin-left:8px}
.irs-info p{font-size:12.5px;color:var(--ink-2);margin-top:4px;line-height:1.55}
.irs-info .irs-stok{font-size:11.5px;color:var(--muted);margin-top:4px}

/* bağlam satırları */
.ctx-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:9px 0;font-size:13px}
.ctx-row:not(:last-child){border-bottom:1px solid var(--line)}
.ctx-row .ctx-lbl{color:var(--muted)}
.ctx-row .ctx-val{color:var(--ink);font-weight:700;text-align:right}
.ctx-link{display:flex;align-items:center;gap:11px;padding:6px 0}
.ctx-link .who-mark{width:36px;height:36px;flex:none;border-radius:var(--r-sm);display:grid;place-items:center;font-size:13px;font-weight:800}
.ctx-link a{font-size:13.5px;font-weight:700;color:var(--ink)}
.ctx-link a:hover{color:var(--acc-ink)}
.ctx-link span{display:block;font-size:11.5px;color:var(--muted)}
.ctx-plain{font-size:13.5px;font-weight:700;color:var(--ink-2)}

/* ilgili bağlantılar */
.rel-form{display:flex;align-items:center;gap:13px;padding:8px 0}
.rel-ico{width:38px;height:38px;flex:none;border-radius:var(--r-md);display:grid;place-items:center;font-size:14px;background:rgba(var(--acc-rgb),.1);color:var(--acc-ink)}
.rel-info{flex:1;min-width:0;line-height:1.4}
.rel-info a,.rel-info span.rel-plain{font-size:13.5px;font-weight:700;color:var(--ink)}
.rel-info a:hover{color:var(--acc-ink)}
.rel-info small{display:block;font-size:11.5px;color:var(--muted);margin-top:2px}

.gtag.danger{background:var(--danger-tint);color:var(--danger);border-color:transparent}
.gtag.warn{background:var(--warn-tint);color:var(--warn);border-color:transparent}
</style>
</head>

  var q = new URLSearchParams(location.search);
  var key = (q.get('sip') || '').replace('SIP-2026-', '');
  if(!ITEMS[key]) key = '05';
  var item = ITEMS[key];

  function tl(n){ return '₺' + n.toLocaleString('tr-TR'); }

  function renderKalem(){
    var zincir = item.kalemler.some(function(k){ return k.teslim !== undefined; });
    var toplamTutar = 0; item.kalemler.forEach(function(k){ toplamTutar += k.tutar; });
    document.getElementById('kalemTag').textContent = item.kalemler.length + ' kalem';
    var h = '<thead><tr><th>Kalem</th>';
    if(zincir) h += '<th>Sipariş</th><th>Teslim Edilen</th><th>Fark</th>';
    else h += '<th>Miktar</th>';
    h += '<th>Tutar</th></tr></thead><tbody>';
    item.kalemler.forEach(function(k){
      h += '<tr><td><span class="kal-ad">' + k.ad + '</span></td>';
      if(zincir){
        var farkTxt = k.fark ? (k.fark).toLocaleString('tr-TR', {minimumFractionDigits:1}) + ' t' : '—';
        var farkCls = k.fark ? 'fark-eksik' : 'fark-tam';
        h += '<td>' + k.miktar + '</td><td>' + k.teslim + '</td><td class="' + farkCls + '">' + farkTxt + '</td>';
      } else {
        h += '<td>' + k.miktar + '</td>';
      }
      h += '<td class="kal-tutar">' + tl(k.tutar) + '</td></tr>';
    });
    h += '<tr class="kal-tot"><td>TOPLAM</td>';
    if(zincir){
      var sipT = 0, teslimT = 0;
      item.kalemler.forEach(function(k){ sipT += parseFloat(k.miktar); teslimT += parseFloat(String(k.teslim).replace(',', '.')); });
      h += '<td>' + sipT.toLocaleString('tr-TR') + ' t</td><td>' + teslimT.toLocaleString('tr-TR', {minimumFractionDigits:1}) + ' t</td><td class="fark-eksik">-0,4 t</td>';
    } else {
      h += '<td></td>';
    }
    h += '<td class="kal-tutar">' + tl(toplamTutar) + '</td></tr>';
    h += '</tbody>';
    document.getElementById('kalemTbl').innerHTML = h;
  }

  function renderUyari(){
    var wrap = document.getElementById('uyariWrap');
    var msg = item.uyari || item.gecikmeNotu;
    if(!msg){ wrap.innerHTML = ''; return; }
    wrap.innerHTML = '<div class="danger-banner"><i class="fa-solid fa-triangle-exclamation"></i><span>' + msg + '</span></div>';
  }

  function renderIrsaliye(){
    if(!item.irsaliyeler || !item.irsaliyeler.length) return;
    document.getElementById('irsaliyeCard').hidden = false;
    var h = '';
    item.irsaliyeler.forEach(function(i){
      h += '<div class="irs-row"><div class="irs-ico' + (i.mismatch ? ' mismatch' : '') + '"><i class="fa-solid ' + (i.mismatch ? 'fa-triangle-exclamation' : 'fa-truck-ramp-box') + '"></i></div>'
         + '<div class="irs-info"><b>' + i.no + '</b><span class="irs-date">' + i.tarih + '</span>'
         + '<p>' + i.icerik + '</p><span class="irs-stok">' + i.stok + '</span></div></div>';
    });
    document.getElementById('irsaliyeBody').innerHTML = h;
  }

  function renderTedarikci(){
    var t = TDR[item.tdr];
    var el = document.getElementById('tedarikciBlock');
    if(GV.role === 'sef' || GV.role === 'personel'){
      el.innerHTML = '<div class="gd-label">Tedarikçi</div><span class="ctx-plain">' + t.ad + '</span>';
    } else {
      el.innerHTML = '<div class="gd-label">Tedarikçi</div><div class="ctx-link">'
        + '<div class="who-mark" style="background:rgba(var(--acc-rgb),.12);color:var(--acc-ink)">' + t.ini + '</div>'
        + '<div><a href="crm-satinalma-tedarikci-detay.html?tdr=' + item.tdr + '">' + t.ad + '</a><span>Tedarikçi kartı</span></div></div>';
    }
  }

  function renderKaynak(){
    if(!item.kaynak) return;
    document.getElementById('kaynakCard').hidden = false;
    var k = item.kaynak;
    var mlzHref = 'crm-satinalma-talep-detay.html?mlz=' + k.no.slice(-3);
    var h = '';
    if(k.archived){
      h += '<p class="gd-desc"><a href="' + mlzHref + '" title="Arşiv talep">' + k.no + '</a> — ' + k.desc + '</p>';
    } else {
      h += '<div class="rel-form"><div class="rel-ico"><i class="fa-solid fa-boxes-stacked"></i></div>'
         + '<div class="rel-info"><a href="' + mlzHref + '">' + k.no + '</a><small>' + k.desc + '</small></div></div>';
      if(k.form){
        h += '<div class="rel-form"><div class="rel-ico"><i class="fa-solid fa-file-invoice"></i></div>'
           + '<div class="rel-info"><a href="' + k.form.href + '">' + k.form.no + '</a><small>Satın alma formu / teklif icmali</small></div></div>';
      }
    }
    document.getElementById('kaynakBody').innerHTML = h;
  }

  function renderBaglanti(){
    if(!item.baglantilar || !item.baglantilar.length) return;
    document.getElementById('baglantiCard').hidden = false;
    var h = '';
    item.baglantilar.forEach(function(b){
      var isTedarikci = b.href.indexOf('tedarikci-detay') !== -1;
      var hideLink = isTedarikci && (GV.role === 'sef' || GV.role === 'personel');
      h += '<div class="rel-form"><div class="rel-ico"><i class="fa-solid ' + b.ic + '"></i></div><div class="rel-info">'
         + (hideLink ? '<span class="rel-plain">' + b.lbl + '</span>' : '<a href="' + b.href + '">' + b.lbl + '</a>')
         + '</div></div>';
    });
    document.getElementById('baglantiBody').innerHTML = h;
  }

  function render(){
    document.title = item.no + ' — Sipariş Detayı — Gavia CRM';
    document.getElementById('crumbNo').textContent = item.no;
    document.getElementById('gdEyebrow').textContent = item.eyebrow;
    document.getElementById('gdTitle').textContent = item.title;
    document.getElementById('gdBadge').innerHTML = '<span class="gstat ' + item.badge.cls + '">' + item.badge.lbl + '</span>'
      + (item.badge.cls === 'danger' ? '<span class="gtag danger">' : (item.badge.cls === 'warn' ? '<span class="gtag warn">' : '<span class="gtag">'))
      + item.extraTag + '</span>';

    renderKalem();
    renderUyari();
    if(item.aciklama){ document.getElementById('aciklamaBlock').hidden = false; document.getElementById('aciklamaText').textContent = item.aciklama; }
    renderIrsaliye();
    renderTedarikci();
    document.getElementById('ctxSantiye').textContent = item.santiye;
    document.getElementById('ctxTarih').textContent = item.tarih;
    document.getElementById('ctxTermin').textContent = item.termin;
    document.getElementById('ctxOdeme').textContent = item.odeme;
    renderKaynak();
    renderBaglanti();

    gvChain(document.getElementById('chainEl'), {steps:item.chain});
  }

  render();
})();
</script>
