<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>İzin Talebi Detayı — Gavia CRM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
      integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A=="
      crossorigin="anonymous" referrerpolicy="no-referrer">
<link rel="stylesheet" href="assets/css/tokens.css">
<link rel="stylesheet" href="assets/css/shell.css">
<link rel="stylesheet" href="assets/css/ui.css">
<style>
/* sayfaya özel: izin talebi detay kompozisyonu (görev/İSG detayıyla aynı iskelet dili) */
.gd-head{display:flex;align-items:flex-start;justify-content:space-between;gap:20px;margin-bottom:22px;flex-wrap:wrap}
.gd-head h1{font-size:22px;letter-spacing:-.015em;margin-bottom:9px;max-width:600px}
.gd-badges{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.gd-eyebrow{font-size:11.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--acc-ink);margin-bottom:8px}

.gd-grid{display:grid;grid-template-columns:1fr 320px;gap:18px;align-items:start}
@media(max-width:980px){.gd-grid{grid-template-columns:minmax(0,1fr)}}

.gd-block{padding:22px}
.gd-block + .gd-block{border-top:1px solid var(--line)}
.gd-label{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
.gd-desc{font-size:13.5px;line-height:1.7;color:var(--ink-2)}

/* özet şeridi — tarih aralığı + gün + tür tek bakışta */
.izd-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:0}
.izd-summary div{padding:18px 22px;border-right:1px solid var(--line)}
.izd-summary div:last-child{border-right:none}
.izd-summary .izd-lbl{font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.izd-summary .izd-val{font-size:15.5px;font-weight:800;color:var(--ink);letter-spacing:-.01em}
@media(max-width:640px){.izd-summary{grid-template-columns:1fr}.izd-summary div{border-right:none;border-bottom:1px solid var(--line)}.izd-summary div:last-child{border-bottom:none}}

/* kural notu */
.izd-note{display:flex;gap:12px;padding:16px 22px;background:rgba(var(--acc-rgb),.05);border-top:1px solid var(--line)}
.izd-note i{color:var(--acc-ink);font-size:14px;margin-top:1px}
.izd-note p{font-size:12.5px;color:var(--ink-2);line-height:1.6}
.izd-note b{color:var(--ink)}

/* rapor eki satırı */
.file-row{display:flex;align-items:center;gap:12px;padding:11px 0}
.file-ico{width:36px;height:36px;flex:none;border-radius:9px;display:grid;place-items:center;font-size:14px;background:var(--danger-tint);color:var(--danger)}
.file-info{flex:1;min-width:0;line-height:1.35}
.file-info b{display:block;font-size:13px;font-weight:700;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.file-info span{font-size:11.5px;color:var(--muted)}

/* bağlam satırları */
.ctx-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:9px 0;font-size:13px}
.ctx-row .ctx-lbl{color:var(--muted)}
.ctx-row .ctx-val{color:var(--ink);font-weight:700;text-align:right}
.ctx-link{display:flex;align-items:center;gap:11px;padding:6px 0}
.ctx-link .who-mark{width:38px;height:38px;flex:none;border-radius:var(--r-sm);display:grid;place-items:center;font-size:13px;font-weight:800}
.ctx-link a{font-size:13.5px;font-weight:700;color:var(--ink)}
.ctx-link a:hover{color:var(--acc-ink)}
.ctx-link span{display:block;font-size:11.5px;color:var(--muted)}

.status-acts{display:flex;flex-direction:column;gap:8px}
.status-acts .btn{justify-content:flex-start}
.no-action{font-size:12.5px;color:var(--muted);line-height:1.6}

.gv-side-stack{display:flex;flex-direction:column;gap:16px}
</style>
</head>
<body data-sec="personel" data-screen="izin">
<div class="gv-app">
  <aside class="gv-rail" id="gvRail"></aside>
  <nav class="gv-menu" id="gvMenu"></nav>
  <div class="gv-divider" id="gvDivider" role="separator" aria-label="Menüyü daralt/genişlet"><span class="gv-grip"></span></div>
  <div class="gv-overlay" id="gvOverlay"></div>

  <header class="gv-top">
    <button class="gv-burger" id="gvBurger" aria-label="Menü"><i class="fa-solid fa-bars"></i></button>
    <div class="gv-search"><i class="fa-solid fa-magnifying-glass"></i><input type="text" placeholder="Ara"></div>
    <div class="gv-top-tools">
      <button class="gv-iconbtn" data-tip="Bildirimler" aria-label="Bildirimler"><i class="fa-regular fa-bell"></i><span class="gb-dot"></span></button>
      <div class="gv-me">
        <div class="me-ava" id="gvAva">·</div>
        <div class="me-id"><div class="me-name" id="gvName">—</div><div class="me-role" id="gvRole">—</div></div>
        <i class="fa-solid fa-chevron-down"></i>
      </div>
    </div>
  </header>

  <main class="gv-main" id="gvMain">
    <!-- D18 Y16: lokal .gv-crumb kaldırıldı — kırıntı shell'den (GV.crumb ile kayıt segmenti) -->
    <div id="izdRoot"></div>
  </main>
</div>

<script src="assets/js/shell.js"></script>
<script src="assets/js/ui.js"></script>
<script>
(function(){
  /* Kayıt kaynağı: crm-personel-izin.html IZIN{} map'i — personel/tür/tarih/gün/durum/zincir
     BİREBİR alındı (D17 DK1). Kişi bağlamı (pozisyon/şantiye) crm-personel.html kadrosundan. */
  var IZIN = {
    'izn-031':{ no:'İZN-2026-031', personel:'Ali Vural', ini:'AV', pozisyon:'Saha Personeli', santiye:'Vadi Konakları',
      tur:'Yıllık İzin', turKod:'yillik', tarih:'6 – 10 Temmuz 2026', gun:5, status:'bekliyor', approverRole:'sef',
      steps:[
        {rol:'Saha Personeli', kisi:'Ali Vural', durum:'olusturdu', tarih:'1 Temmuz 2026 09:20'},
        {rol:'Şantiye Şefi', kisi:'Hasan Demirci', durum:'bekliyor'},
        {rol:'İK Uzmanı', kisi:'Seda Karaca', durum:'sirada'}
      ] },
    'izn-030':{ no:'İZN-2026-030', personel:'Aylin Koç', ini:'AK', pozisyon:'Şantiye Şefi', santiye:'Liman Lojistik Merkezi',
      tur:'Yıllık İzin', turKod:'yillik', tarih:'1 – 3 Temmuz 2026', gun:3, status:'onaylandi', approverRole:null,
      steps:[
        {rol:'Şantiye Şefi', kisi:'Aylin Koç', durum:'olusturdu', tarih:'24 Haziran 2026 11:40'},
        {rol:'Genel Müdür', kisi:'Murat Denizli', durum:'onaylandi', tarih:'25 Haziran 2026 09:10', not:'Liman Lojistik teslim programını etkilemiyor, uygundur.'},
        {rol:'İK Uzmanı', kisi:'Seda Karaca', durum:'onaylandi', tarih:'25 Haziran 2026 14:05', not:'Puantaj ve izin bakiyesine işlendi.'}
      ] },
    'izn-029':{ no:'İZN-2026-029', personel:'Ramazan Kılıç', ini:'RK', pozisyon:'Kalıpçı', santiye:'Vadi Konakları',
      tur:'Raporlu', turKod:'raporlu', tarih:'28 Haziran 2026', gun:1, status:'onaylandi', approverRole:null, rapor:true,
      steps:[
        {rol:'Kalıpçı', kisi:'Ramazan Kılıç', durum:'olusturdu', tarih:'26 Haziran 2026 08:15'},
        {rol:'Şantiye Şefi', kisi:'Hasan Demirci', durum:'onaylandi', tarih:'26 Haziran 2026 10:02'},
        {rol:'İK Uzmanı', kisi:'Seda Karaca', durum:'onaylandi', tarih:'26 Haziran 2026 15:30'}
      ] },
    'izn-028':{ no:'İZN-2026-028', personel:'Nesrin Aydın', ini:'NA', pozisyon:'Muhasebe', santiye:'Merkez Ofis',
      tur:'Yıllık İzin', turKod:'yillik', tarih:'15 – 18 Haziran 2026', gun:4, status:'reddedildi', approverRole:null,
      steps:[
        {rol:'Muhasebe', kisi:'Nesrin Aydın', durum:'olusturdu', tarih:'8 Haziran 2026 09:00'},
        {rol:'Genel Müdür', kisi:'Murat Denizli', durum:'reddedildi', tarih:'9 Haziran 2026 13:20', not:'Haziran ayı kasa mutabakatı döneminde muhasebede personel eksikliği yaratır; Temmuz ortasına ertelenmesi rica olunur.'}
      ] },
    'izn-027':{ no:'İZN-2026-027', personel:'Ömer Taşkın', ini:'ÖT', pozisyon:'Şantiye Şefi', santiye:'Merkez Şantiye',
      tur:'Babalık İzni', turKod:'babalik', tarih:'20 – 24 Haziran 2026', gun:5, status:'revize', approverRole:null,
      steps:[
        {rol:'Şantiye Şefi', kisi:'Ömer Taşkın', durum:'olusturdu', tarih:'10 Haziran 2026 10:30'},
        {rol:'Genel Müdür', kisi:'Murat Denizli', durum:'revize', tarih:'11 Haziran 2026 09:45', not:'Merkez Şantiye’de aynı haftada planlı beton dökümü var; tarih çakışmasını gidermek için yeni tarih önerin.'}
      ] }
  };
  var DEFAULT_ID = 'izn-031';

  /* izin türü kural notu (shell.js DALGA 4A kanoniği — [MOCK-SİM] statik harita) */
  var TUR_NOT = {
    yillik:  'Yıllık İzin serbest süreli talep edilir; onaylandığında personelin yıllık izin bakiyesinden talep edilen gün kadar düşülür.',
    babalik: 'Babalık İzni mevzuata göre 5 gün olarak otomatik uygulanır; bu süre üzerinde kısaltma/uzatma yapılamaz.',
    raporlu: 'Raporlu izin süresi doktor raporuyla belirlenir ve gün alanı otomatik doldurulur; onay için rapor eki gereklidir.'
  };

  function normalize(raw){
    if(!raw) return null;
    var m = String(raw).toLowerCase().match(/(\d{3})\s*$/);
    return m ? 'izn-' + m[1] : null;
  }

  var q = new URLSearchParams(location.search);
  var rawParam = q.get('izn');
  var id = rawParam === null ? DEFAULT_ID : normalize(rawParam);
  var rec = id ? IZIN[id] : null;

  if(!rec){
    GV.crumb('Kayıt bulunamadı');
    gvNotFound({
      mount: '#izdRoot',
      code: rawParam ? rawParam.toUpperCase() : null,
      tur: 'izin talebi',
      listHref: 'crm-personel-izin.html', listLbl: 'İzinlere dön',
      defHref: 'crm-personel-izin-detay.html', defLbl: 'Varsayılan kaydı aç'
    });
    return;
  }

  GV.crumb(rec.no);
  document.title = rec.no + ' — İzin Talebi Detayı — Gavia CRM';

  var raporHtml = rec.rapor
    ? '<div class="gd-block"><div class="gd-label">Rapor Eki</div>'
      + '<div class="file-row"><div class="file-ico"><i class="fa-solid fa-file-medical"></i></div>'
      + '<div class="file-info"><b>saglik-raporu-' + rec.no.toLowerCase() + '.pdf</b><span>rapor süresi: ' + rec.gun + ' gün · ' + rec.personel + ' tarafından eklendi</span></div>'
      + '<button class="ia-btn" data-demo="İndirme hazırlanıyor (demo)" data-no-confirm aria-label="İndir"><i class="fa-solid fa-download"></i></button></div></div>'
    : '';

  var root = document.getElementById('izdRoot');
  var html = ''
    + '<div class="gd-head">'
    +   '<div>'
    +     '<div class="gd-eyebrow">' + rec.santiye + ' · İzin Talebi #' + rec.no + '</div>'
    +     '<h1>' + rec.personel + ' — ' + rec.tur + '</h1>'
    +     '<div class="gd-badges"><span id="izdBadge"></span></div>'
    +   '</div>'
    +   '<div class="ph-actions">'
    +     '<a class="btn btn-ghost btn-sm" href="crm-personel-izin.html"><i class="fa-solid fa-arrow-left"></i> Listeye Dön</a>'
    +   '</div>'
    + '</div>'
    + '<div class="gv-card" style="margin-bottom:18px">'
    +   '<div class="izd-summary">'
    +     '<div><div class="izd-lbl">Tarih Aralığı</div><div class="izd-val">' + rec.tarih + '</div></div>'
    +     '<div><div class="izd-lbl">Süre</div><div class="izd-val">' + rec.gun + (rec.gun === 1 ? ' gün' : ' gün') + '</div></div>'
    +     '<div><div class="izd-lbl">İzin Türü</div><div class="izd-val">' + rec.tur + '</div></div>'
    +   '</div>'
    +   (TUR_NOT[rec.turKod] ? '<div class="izd-note"><i class="fa-solid fa-circle-info"></i><p>' + TUR_NOT[rec.turKod] + '</p></div>' : '')
    + '</div>'
    + '<div class="gd-grid">'
    +   '<div class="gv-side-stack">'
    +     '<div class="gv-card">'
    +       '<div class="gc-head"><div class="gc-title"><i class="fa-solid fa-stamp"></i> Onay Akışı</div></div>'
    +       '<div class="gd-block" id="izdChain"></div>'
    +       raporHtml
    +       '<div class="gd-block" id="izdActsBlock" hidden><div class="gd-label">Aksiyon</div><div class="status-acts" id="izdActs"></div></div>'
    +       '<div class="gd-block" id="izdNoteBlock" hidden><p class="no-action">Bu kayıtta sıradaki onay adımı sizde değil.</p></div>'
    +     '</div>'
    +   '</div>'
    +   '<div class="gv-side-stack">'
    +     '<div class="gv-card">'
    +       '<div class="gd-block">'
    +         '<div class="gd-label">Personel</div>'
    +         '<div class="ctx-link">'
    +           '<div class="who-mark" style="background:rgba(var(--acc-rgb),.14);color:var(--acc-ink)">' + rec.ini + '</div>'
    +           '<div><a href="crm-personel-detay.html">' + rec.personel + '</a><span>' + rec.pozisyon + ' · ' + rec.santiye + '</span></div>'
    +         '</div>'
    +       '</div>'
    +       '<div class="gd-block">'
    +         '<div class="ctx-row"><span class="ctx-lbl">Talep Tarihi</span><span class="ctx-val">' + rec.steps[0].tarih + '</span></div>'
    +         '<div class="ctx-row"><span class="ctx-lbl">Şantiye</span><span class="ctx-val">' + rec.santiye + '</span></div>'
    +       '</div>'
    +     '</div>'
    +   '</div>'
    + '</div>';
  root.innerHTML = html;

  document.getElementById('izdBadge').innerHTML = gvChainBadge(rec.status);
  gvChain(document.getElementById('izdChain'), {steps: rec.steps});

  var role = window.GV ? GV.role : null;
  var canAct = rec.status === 'bekliyor' && (role === rec.approverRole || role === 'superadmin' || role === 'sahip');
  if(canAct){
    document.getElementById('izdActsBlock').hidden = false;
    document.getElementById('izdActs').innerHTML =
      '<button class="btn btn-sm btn-acc" data-chain-act="onayla" data-chain-name="' + rec.no + '"><i class="fa-solid fa-check"></i> Onayla</button>' +
      '<button class="btn btn-sm btn-ghost" data-chain-act="revize" data-chain-name="' + rec.no + '"><i class="fa-solid fa-rotate-left"></i> Revize İste</button>' +
      '<button class="btn btn-sm btn-danger" data-chain-act="reddet" data-chain-name="' + rec.no + '"><i class="fa-solid fa-xmark"></i> Reddet</button>';
  } else if(rec.status === 'bekliyor'){
    document.getElementById('izdNoteBlock').hidden = false;
  }
})();
</script>
</body>
</html>
