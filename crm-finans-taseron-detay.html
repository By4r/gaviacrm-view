<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">

      crossorigin="anonymous" referrerpolicy="no-referrer">
<link rel="stylesheet" href="assets/css/tokens.css">
<link rel="stylesheet" href="assets/css/shell.css">
<link rel="stylesheet" href="assets/css/ui.css">
<style>
/* ============ SAYFAYA ÖZEL — Taşeron Kartı Detayı (?tas= param şablonu) ============ */
.gd-head{display:flex;align-items:flex-start;justify-content:space-between;gap:20px;margin-bottom:22px;flex-wrap:wrap}
.gd-head h1{font-size:21px;letter-spacing:-.015em;margin-bottom:9px;max-width:640px}
.gd-badges{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.gd-eyebrow{font-size:11.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--acc-ink);margin-bottom:8px}

.gd-grid{display:grid;grid-template-columns:minmax(0,1fr) 340px;gap:18px;align-items:start}
@media(max-width:980px){.gd-grid{grid-template-columns:minmax(0,1fr)}}
.gv-side-stack{display:flex;flex-direction:column;gap:16px}

.gd-block{padding:22px}
.gd-block + .gd-block{border-top:1px solid var(--line)}
.gd-label{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin-bottom:12px}
.gd-desc{font-size:13.5px;line-height:1.7;color:var(--ink-2)}

.ctx-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:9px 0;font-size:13px}
.ctx-row:not(:last-child){border-bottom:1px solid var(--line)}
.ctx-row .ctx-lbl{color:var(--muted)}
.ctx-row .ctx-val{color:var(--ink);font-weight:700;text-align:right}
.ctx-row .ctx-val a{color:var(--acc-ink)}

.crit-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
@media(max-width:520px){.crit-grid{grid-template-columns:repeat(2,1fr)}}
.crit-box{display:flex;flex-direction:column;align-items:center;gap:7px;padding:14px 8px;border-radius:var(--r-md);background:var(--bg);text-align:center}
.crit-box.is-warn{background:var(--warn-tint)}
.crit-box.is-hi{background:var(--ok-tint)}
.crit-box i{font-size:15px;color:var(--ok)}
.crit-box.is-warn i{color:var(--warn)}
.crit-box.is-hi i{color:var(--ok)}
.crit-box b{font-size:11.5px;font-weight:700;color:var(--ink)}
.crit-box span{font-size:10px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.03em}
.crit-box.is-warn span{color:var(--warn)}

.tw-badge{display:flex;align-items:flex-start;gap:10px;padding:13px 15px;border-radius:var(--r-md);background:var(--warn-tint);font-size:12.5px;color:var(--ink-2);line-height:1.6;margin-bottom:10px}
.tw-badge:last-child{margin-bottom:0}
.tw-badge i{color:var(--warn);font-size:13px;margin-top:2px;flex:none}
.tw-badge a{color:var(--acc-ink);font-weight:700}
.tw-badge b{color:var(--ink)}

.party-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--line)}
.party-row:last-child{border-bottom:none}
.party-mark{width:38px;height:38px;flex:none;border-radius:var(--r-sm);display:grid;place-items:center;font-size:13px;font-weight:800}
.party-info{min-width:0;line-height:1.35}
.party-info b{display:block;font-size:13.5px;font-weight:700;color:var(--ink)}
.party-info span{font-size:11.5px;color:var(--muted)}

.rel-card{display:flex;align-items:center;gap:13px}
.rel-ico{width:40px;height:40px;flex:none;border-radius:var(--r-md);display:grid;place-items:center;font-size:15px;background:rgba(var(--acc-rgb),.1);color:var(--acc-ink)}
.rel-info{flex:1;min-width:0;line-height:1.4}
.rel-info a{font-size:13.5px;font-weight:700;color:var(--ink)}
.rel-info a:hover{color:var(--acc-ink)}
.rel-info span{display:block;font-size:12px;color:var(--muted)}

#tblHakedis td.num,#tblHakedis th.num{text-align:right}
</style>
</head>
<body data-sec="finans" data-screen="taseronlar">
<div class="gv-app">
  <aside class="gv-rail" id="gvRail"></aside>
  <nav class="gv-menu" id="gvMenu"></nav>
  <div class="gv-divider" id="gvDivider" role="separator" aria-label="Menüyü daralt/genişlet"><span class="gv-grip"></span></div>
  <div class="gv-overlay" id="gvOverlay"></div>

  <header class="gv-top">
    <button class="gv-burger" id="gvBurger" aria-label="Menü"><i class="fa-solid fa-bars"></i></button>
    <div class="gv-search"><i class="fa-solid fa-magnifying-glass"></i><input type="text" placeholder="Ara"></div>
    <div class="gv-top-tools">
      <button class="gv-iconbtn" data-tip="Bildirimler" aria-label="Bildirimler"><i class="fa-regular fa-bell"></i><span class="gb-dot"></span></button>
      <div class="gv-me">
        <div class="me-ava" id="gvAva">·</div>
        <div class="me-id"><div class="me-name" id="gvName">—</div><div class="me-role" id="gvRole">—</div></div>
        <i class="fa-solid fa-chevron-down"></i>
      </div>
    </div>
  </header>

  <main class="gv-main">
    <!-- D18 Y16: lokal .gv-crumb kaldırıldı — kırıntı shell'den (GV.crumb ile kayıt segmenti) -->
    <div id="tasMain">
    <div class="gd-head">
      <div>
        <div class="gd-eyebrow" id="gdEyebrow">—</div>
        <h1 id="gdTitle">—</h1>
        <div class="gd-badges" id="gdBadges"></div>
      </div>
      <div class="ph-actions">
        <a class="btn btn-ghost btn-sm" href="crm-finans-taseronlar.html"><i class="fa-solid fa-arrow-left"></i> Listeye Dön</a>
      </div>
    </div>

    <div class="gd-grid">
      <!-- ============ SOL: içerik ============ -->
      <div class="gv-side-stack">
        <div class="gv-card">
          <div class="gd-block">
            <div class="gd-label">İş Kapsamı</div>
            <p class="gd-desc" id="kapsamText">—</p>
          </div>
        </div>

        <div class="gv-card">
          <div class="gd-block">
            <div class="gd-label">Performans Değerlendirmesi — 6 Kriter</div>
            <div class="crit-grid" id="critGrid"></div>
          </div>
        </div>

        <div class="gv-card" id="warnCard">
          <div class="gd-block">
            <div class="gd-label">Uyarılar</div>
            <div id="warnBody"></div>
          </div>
        </div>

        <div class="gv-card">
          <div class="gd-block">
            <div class="gd-label">Hakediş Geçmişi</div>
          </div>
          <div class="gc-body flush">
            <table class="gtable" id="tblHakedis">
              <thead><tr><th>Hakediş</th><th>Dönem</th><th class="num">Net Tutar</th><th>Durum</th></tr></thead>
              <tbody id="tblHakedisBody"></tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- ============ SAĞ: bağlam ============ -->
      <div class="gv-side-stack">
        <div class="gv-card">
          <div class="gd-block">
            <div class="gd-label">Künye</div>
            <div class="party-row">
              <div class="party-mark" id="cardMark" style="background:rgba(var(--acc-rgb),.12);color:var(--acc-ink)">—</div>
              <div class="party-info"><b id="cardAd">—</b><span id="cardKisi">—</span></div>
            </div>
          </div>
          <div class="gd-block">
            <div class="ctx-row"><span class="ctx-lbl">Şantiye</span><span class="ctx-val" id="ctxSantiye">—</span></div>
            <div class="ctx-row"><span class="ctx-lbl">Sözleşme</span><span class="ctx-val" id="ctxSzl">—</span></div>
            <div class="ctx-row"><span class="ctx-lbl">Personel</span><span class="ctx-val" id="ctxPersonel">—</span></div>
            <div class="ctx-row"><span class="ctx-lbl">Yemekhane Kaydı</span><span class="ctx-val" id="ctxYemekhane">—</span></div>
            <div class="ctx-row"><span class="ctx-lbl">Ekipman</span><span class="ctx-val" id="ctxEkipman">—</span></div>
            <div class="ctx-row"><span class="ctx-lbl">Telefon</span><span class="ctx-val" id="ctxTel">—</span></div>
          </div>
        </div>

        <div class="gv-card">
          <div class="gd-block">
            <div class="gd-label">Sözleşme</div>
            <div class="rel-card">
              <div class="rel-ico"><i class="fa-solid fa-file-contract"></i></div>
              <div class="rel-info"><a id="szlLink" href="#">—</a><span id="szlSub">—</span></div>
            </div>
          </div>
        </div>

        <div class="gv-card">
          <div class="gd-block">
            <div class="gd-label">Cari Hesap</div>
            <div class="rel-card">
              <div class="rel-ico" style="background:var(--info-tint);color:var(--info)"><i class="fa-solid fa-scale-balanced"></i></div>
              <div class="rel-info"><a id="cariLink" href="#">—</a><span id="cariSub">—</span></div>
            </div>
          </div>
        </div>
      </div>
    </div>
    </div>
  </main>
</div>

<script src="assets/js/shell.js"></script>
<script src="assets/js/ui.js"></script>
<script>
(function(){
  if(!window.GV) return;

  var DATA = {
    'TAS-01':{
      ad:'Demir-Beton İnş. Ltd.', ini:'DB', kisi:'Yusuf Ergin · Taşeron Sorumlusu', tel:'0532 411 27 63',
      santiye:'Vadi Konakları', tip:'Betonarme kalıp + demir işçiliği',
      kapsam:'Vadi Konakları A ve B Blok kaba inşaat imalatları kapsamında kalıp işçiliği, demir montajı ve C30 beton dökümü işleri Demir-Beton İnş. Ltd.\'ye taşeron olarak verilmiştir. İşin süresi 6 ay olup metraj bazlı aylık hakediş usulüyle faturalandırılır. Malzeme (demir, beton) Yapıtaş İnşaat A.Ş. tarafından temin edilir; taşeron yalnız işçilik ve uygulamadan sorumludur.',
      szl:'SZL-2025-T05', szlHref:'crm-finans-sozlesme-detay.html?szl=t05',
      personel:10, yemekhane:10, ekipman:'Kalıp-iskele sistemi + 2 kırıcı-delici',
      kriter:[
        {ad:'Süre', ic:'fa-hourglass-half', st:'ok', not:'Programa uygun'},
        {ad:'Kalite', ic:'fa-star', st:'ok', not:'Kabul standardında'},
        {ad:'Hakediş', ic:'fa-file-invoice-dollar', st:'warn', not:'İhtilaf — TH-2026-014'},
        {ad:'İSG', ic:'fa-shield-halved', st:'warn', not:'ISG-2026-008 açık'},
        {ad:'Gecikme', ic:'fa-truck-ramp-box', st:'ok', not:'Gecikme yok'},
        {ad:'Teslim', ic:'fa-circle-check', st:'ok', not:'Zamanında'}
      ],
      uyarilar:[
        {ic:'fa-shield-halved', html:'<b>İSG uyarısı</b> — <a href="crm-santiye-isg-detay.html">ISG-2026-008</a> iskele korkuluk eksikliği, B Blok. Aksiyon bekliyor; korkuluk montajı tamamlanana kadar yükseklik çalışması sınırlandırıldı.'},
        {ic:'fa-file-invoice-dollar', html:'<b>Hakediş ihtilafı</b> — <a href="crm-finans-hakedis-detay.html?th=014">TH-2026-014</a> ₺90.000 tutarında Haziran hakedişinde metraj itirazı (gönderildi 28 Haz, bekliyor); anlaşmazlık çözülene kadar ödeme bloke.'}
      ],
      hakedis:[
        {no:'TH-2026-014', href:'crm-finans-hakedis-detay.html?th=014', donem:'Haziran 2026', tutar:90000, st:'bekliyor'},
        {no:'TH-2026-013', href:'crm-finans-hakedis-detay.html?th=013', donem:'Mayıs 2026', tutar:210000, st:'onaylandi'},
        {no:'TH-2026-005', href:'crm-finans-hakedis-detay.html?th=005', donem:'Nisan 2026', tutar:185000, st:'odendi'}
      ],
      cari:{href:'crm-cari-detay.html', label:'Demir-Beton İnş. Ltd. — Cari Kartı', sub:'₺342.000 açık bakiye — bizim borcumuz'}
    },
    'TAS-02':{
      ad:'ElektroMek Taahhüt', ini:'EM', kisi:'Tolga Şener · Taşeron Sorumlusu', tel:'0533 765 42 08',
      santiye:'Vadi Konakları', tip:'Elektrik tesisat taahhüdü',
      kapsam:'Vadi Konakları A ve B Blok elektrik tesisatı (şaft montajı, kablo çekimi, pano bağlantıları) ElektroMek Taahhüt\'e taşeron olarak verilmiştir. Metraj bazlı aylık hakediş usulüyle faturalandırılır; malzeme Yapıtaş İnşaat A.Ş. tarafından temin edilir.',
      szl:'SZL-2025-T07', szlHref:'crm-finans-sozlesme-detay.html?szl=t07',
      personel:6, yemekhane:6, ekipman:'Pano montaj + kablo çekim ekipmanı',
      kriter:[
        {ad:'Süre', ic:'fa-hourglass-half', st:'ok', not:'Programa uygun'},
        {ad:'Kalite', ic:'fa-star', st:'ok', not:'Kabul standardında'},
        {ad:'Hakediş', ic:'fa-file-invoice-dollar', st:'ok', not:'Sorunsuz'},
        {ad:'İSG', ic:'fa-shield-halved', st:'ok', not:'Açık tutanak yok'},
        {ad:'Gecikme', ic:'fa-truck-ramp-box', st:'ok', not:'Gecikme yok'},
        {ad:'Teslim', ic:'fa-circle-check', st:'ok', not:'Zamanında'}
      ],
      uyarilar:[],
      hakedis:[
        {no:'TH-2026-009', href:'crm-finans-hakedis-detay.html?th=009', donem:'Haziran 2026', tutar:76200, st:'bekliyor'},
        {no:'TH-2026-002', href:'crm-finans-hakedis-detay.html?th=002', donem:'Mart 2026', tutar:54000, st:'odendi'}
      ],
      cari:{href:'crm-cari-durum.html?cari=elektromek', label:'ElektroMek Taahhüt — Cari Durum', sub:'₺76.200 alacaklı'}
    },
    'TAS-03':{
      ad:'Yalıtım Kardeşler', ini:'YK', kisi:'Cemal Boz · Taşeron Sorumlusu', tel:'0505 322 90 14',
      santiye:'Liman Lojistik Merkezi', tip:'Isı/su yalıtımı + çatı kaplama',
      kapsam:'Liman Lojistik Merkezi depo hangarları çatı ve cephe yalıtımı ile çatı kaplama imalatları Yalıtım Kardeşler\'e taşeron olarak verilmiştir. Kimi kalemlerde malzeme taşeron tarafından temin edilip hakedişten mahsup edilir.',
      /* D18 Y9 DK10: crm-finans-sozlesme-detay.html artık ?szl= map'i (k01-k03/t05-t07);
         T06/T07 kendi kayıtlarına kimlikli linklenir (eski tek-link kısıtı kalkar). */
      szl:'SZL-2025-T06', szlHref:'crm-finans-sozlesme-detay.html?szl=t06',
      personel:8, yemekhane:8, ekipman:'İzolasyon püskürtme + çatı kaplama ekipmanı',
      kriter:[
        {ad:'Süre', ic:'fa-hourglass-half', st:'ok', not:'Programa uygun'},
        {ad:'Kalite', ic:'fa-star', st:'hi', not:'Yüksek — referans seviye'},
        {ad:'Hakediş', ic:'fa-file-invoice-dollar', st:'ok', not:'Sorunsuz'},
        {ad:'İSG', ic:'fa-shield-halved', st:'ok', not:'Açık tutanak yok'},
        {ad:'Gecikme', ic:'fa-truck-ramp-box', st:'ok', not:'Gecikme yok'},
        {ad:'Teslim', ic:'fa-circle-check', st:'ok', not:'Zamanında'}
      ],
      uyarilar:[],
      hakedis:[
        {no:'TH-2026-008', href:'crm-finans-hakedis-detay.html?th=008', donem:'Haziran 2026', tutar:128500, st:'onaylandi'}
      ],
      cari:{href:'crm-cari-durum.html?cari=yalitim-kardesler', label:'Yalıtım Kardeşler — Cari Durum', sub:'₺128.500 alacaklı'}
    }
  };

  function tl(n){ return '₺' + n.toLocaleString('tr-TR'); }

  var q = new URLSearchParams(location.search);
  var rawTas = q.get('tas');
  var tasKey = rawTas === null ? 'TAS-01' : rawTas;
  var D = DATA[tasKey];

  if(!D){
    /* D18 Y7 — tanınmayan ?tas= → gvNotFound */
    GV.crumb('Kayıt bulunamadı');
    gvNotFound({
      mount: '#tasMain',
      code: rawTas ? rawTas.toUpperCase() : null,
      tur: 'taşeron kartı',
      listHref: 'crm-finans-taseronlar.html', listLbl: 'Taşeron kartlarına dön',
      defHref: 'crm-finans-taseron-detay.html', defLbl: 'Varsayılan kaydı aç'
    });
    return;
  }

  GV.crumb(D.ad);
  document.title = D.ad + ' — Taşeron Kartı — Gavia CRM';
  document.getElementById('gdEyebrow').textContent = 'Finans · Taşeron Kartı #' + tasKey;
  document.getElementById('gdTitle').textContent = D.ad;
  document.getElementById('gdBadges').innerHTML =
      '<span class="gtag mint">' + D.tip + '</span>'
    + '<span class="gtag"><i class="fa-solid fa-helmet-safety"></i> ' + D.santiye + '</span>'
    + (D.uyarilar.length ? '<span class="gstat warn">' + D.uyarilar.length + ' uyarı</span>' : '<span class="gstat ok">Uyarı yok</span>');

  document.getElementById('kapsamText').textContent = D.kapsam;

  document.getElementById('cardMark').textContent = D.ini;
  document.getElementById('cardAd').textContent = D.ad;
  document.getElementById('cardKisi').textContent = D.kisi;
  document.getElementById('ctxSantiye').textContent = D.santiye;
  document.getElementById('ctxSzl').innerHTML = D.szlHref ? '<a href="'+D.szlHref+'">'+D.szl+'</a>' : D.szl;
  document.getElementById('ctxPersonel').textContent = D.personel + ' kişi';
  document.getElementById('ctxYemekhane').textContent = D.yemekhane + ' kişi';
  document.getElementById('ctxEkipman').textContent = D.ekipman;
  document.getElementById('ctxTel').textContent = D.tel;

  var szlA = document.getElementById('szlLink');
  if(D.szlHref){ szlA.href = D.szlHref; } else { szlA.removeAttribute('href'); }
  szlA.textContent = D.szl;
  document.getElementById('szlSub').textContent = D.ad + ' taşeron sözleşmesi';

  document.getElementById('cariLink').href = D.cari.href;
  document.getElementById('cariLink').textContent = D.cari.label;
  document.getElementById('cariSub').textContent = D.cari.sub;

  var critCls = {ok:'', warn:'is-warn', hi:'is-hi'};
  var critLbl = {ok:'Uygun', warn:'Uyarı', hi:'Yüksek'};
  var ch = '';
  D.kriter.forEach(function(k){
    ch += '<div class="crit-box '+critCls[k.st]+'"><i class="fa-solid '+k.ic+'"></i><b>'+k.ad+'</b><span>'+critLbl[k.st]+'</span></div>';
  });
  document.getElementById('critGrid').innerHTML = ch;

  var warnCard = document.getElementById('warnCard');
  if(!D.uyarilar.length){
    warnCard.hidden = true;
  } else {
    var wh = '';
    D.uyarilar.forEach(function(w){ wh += '<div class="tw-badge"><i class="fa-solid '+w.ic+'"></i><span>'+w.html+'</span></div>'; });
    document.getElementById('warnBody').innerHTML = wh;
  }

  var STATUS_LBL = {bekliyor:'Onay Bekliyor', onaylandi:'Onaylandı', odendi:'Ödendi'};
  var STATUS_CLS = {bekliyor:'warn', onaylandi:'info', odendi:'ok'};
  var hh = '';
  D.hakedis.forEach(function(h){
    hh += '<tr><td class="t-strong"><a href="'+h.href+'" style="color:inherit">'+h.no+'</a></td><td>'+h.donem+'</td><td class="num">'+tl(h.tutar)+'</td><td><span class="gstat '+STATUS_CLS[h.st]+'">'+STATUS_LBL[h.st]+'</span></td></tr>';
  });
  document.getElementById('tblHakedisBody').innerHTML = hh;

  /* sef yalnız Vadi Konakları taşeronlarını (TAS-01/02) görebilir — Liman kartı (TAS-03) budanır */
  if(GV.role === 'sef' && tasKey === 'TAS-03'){
    location.replace('crm-finans-taseron-detay.html?tas=TAS-01');
  }
})();
</script>
</body>
</html>
