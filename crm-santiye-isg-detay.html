<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>İSG Tutanağı Detayı — Gavia CRM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
      integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A=="
      crossorigin="anonymous" referrerpolicy="no-referrer">
<link rel="stylesheet" href="assets/css/tokens.css">
<link rel="stylesheet" href="assets/css/shell.css">
<link rel="stylesheet" href="assets/css/ui.css">
<style>
/* sayfaya özel: İSG tutanağı detay kompozisyonu (demirbaş/malzeme-talebi detayıyla aynı iskelet dili)
   D18 Y9: JS-render ?isg= map'ine dönüştürüldü (kaynak: crm-santiye-isg.html KAYITLAR dizisi
   BİREBİR). DEFAULT ISG-2026-008 içeriği (aksiyon maddeleri/ek dosyalar) AYNEN korunur; diğer
   10 kayıt temsili-derinlik kuralına tabi sade şablon kullanır (bkz. script). */
.gd-head{display:flex;align-items:flex-start;justify-content:space-between;gap:20px;margin-bottom:22px;flex-wrap:wrap}
.gd-head h1{font-size:22px;letter-spacing:-.015em;margin-bottom:9px;max-width:600px}
.gd-badges{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.gd-eyebrow{font-size:11.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--acc-ink);margin-bottom:8px}

.gd-grid{display:grid;grid-template-columns:1fr 320px;gap:18px;align-items:start}
@media(max-width:980px){.gd-grid{grid-template-columns:minmax(0,1fr)}}

.gd-block{padding:22px}
.gd-block + .gd-block{border-top:1px solid var(--line)}
.gd-label{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.gd-desc{font-size:13.5px;line-height:1.7;color:var(--ink-2)}

.gd-danger-card{border-color:var(--warn-tint)}
.gd-danger-card .gd-block{display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap}
.gd-danger-txt .dt-label{display:block;font-size:13px;font-weight:700;color:var(--ink);margin-bottom:3px}
.gd-danger-txt span{font-size:12px;color:var(--muted)}

/* aksiyon maddeleri — sıralı zaman çizelgesi değil, paralel görev listesi olduğu için
   ml-timeline yerine bağımsız onay-kutucuklu satır deseni kullanıldı */
.aks-list{display:flex;flex-direction:column}
.aks-item{display:flex;align-items:flex-start;gap:12px;padding:15px 0;border-bottom:1px solid var(--line)}
.aks-item:last-child{border-bottom:none}
.aks-chk{width:22px;height:22px;flex:none;border-radius:var(--r-circle);border:2px solid var(--line-2);display:grid;place-items:center;font-size:10px;color:transparent;margin-top:1px}
.aks-item.done .aks-chk{background:var(--ok);border-color:var(--ok);color:#fff}
.aks-item.wait .aks-chk{border-color:var(--warn)}
.aks-body{flex:1;min-width:0}
.aks-body b{display:block;font-size:13.5px;font-weight:700;color:var(--ink);line-height:1.45}
.aks-item.done .aks-body b{color:var(--muted);text-decoration:line-through}
.aks-meta{display:flex;flex-wrap:wrap;align-items:center;gap:12px;margin-top:7px;font-size:11.5px;color:var(--muted)}
.aks-meta span{display:inline-flex;align-items:center;gap:5px}
.aks-meta i{font-size:10px;width:11px;text-align:center}
.aks-meta .late{color:var(--danger);font-weight:700}
.aks-summary{font-size:12.5px;color:var(--muted);font-weight:600}

/* dosya ekleri */
.file-row{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--line)}
.file-row:last-child{border-bottom:none}
.file-ico{width:36px;height:36px;flex:none;border-radius:9px;display:grid;place-items:center;font-size:14px;background:var(--info-tint);color:var(--info)}
.file-ico.img{background:var(--ok-tint);color:var(--ok)}
.file-ico.pdf{background:var(--danger-tint);color:var(--danger)}
.file-info{flex:1;min-width:0;line-height:1.35}
.file-info b{display:block;font-size:13px;font-weight:700;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.file-info span{font-size:11.5px;color:var(--muted)}

/* belge ekleme alanı — crm-satinalma-form-detay.html ile ortak idiyom (5D attach-zone) */
.attach-zone{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;text-align:center;padding:20px 16px;margin-top:14px;border:1.5px dashed var(--line-2);border-radius:var(--r-sm);color:var(--muted);cursor:pointer;transition:.18s var(--ease)}
.attach-zone i{font-size:19px;color:var(--acc-ink)}
.attach-zone b{font-size:13px;color:var(--ink);font-weight:700}
.attach-zone span{font-size:11.5px;color:var(--muted)}
.attach-zone:hover,.attach-zone:focus-visible{border-color:var(--acc);background:rgba(var(--acc-rgb),.05)}
.attach-zone:focus-visible{outline:2px solid var(--acc);outline-offset:2px}

/* bağlam satırları */
.ctx-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:9px 0;font-size:13px}
.ctx-row .ctx-lbl{color:var(--muted)}
.ctx-row .ctx-val{color:var(--ink);font-weight:700;text-align:right}
.ctx-link{display:flex;align-items:center;gap:11px;padding:6px 0}
.ctx-link .who-mark{width:36px;height:36px;flex:none;border-radius:var(--r-sm);display:grid;place-items:center;font-size:13px;font-weight:800}
.ctx-link a{font-size:13.5px;font-weight:700;color:var(--ink)}
.ctx-link a:hover{color:var(--acc-ink)}
.ctx-link span{display:block;font-size:11.5px;color:var(--muted)}

.gv-side-stack{display:flex;flex-direction:column;gap:16px}
</style>
</head>
<body data-sec="santiye" data-screen="isg">
<div class="gv-app">
  <aside class="gv-rail" id="gvRail"></aside>
  <nav class="gv-menu" id="gvMenu"></nav>
  <div class="gv-divider" id="gvDivider" role="separator" aria-label="Menüyü daralt/genişlet"><span class="gv-grip"></span></div>
  <div class="gv-overlay" id="gvOverlay"></div>

  <header class="gv-top">
    <button class="gv-burger" id="gvBurger" aria-label="Menü"><i class="fa-solid fa-bars"></i></button>
    <div class="gv-search"><i class="fa-solid fa-magnifying-glass"></i><input type="text" placeholder="Ara"></div>
    <div class="gv-top-tools">
      <button class="gv-iconbtn" data-tip="Bildirimler" aria-label="Bildirimler"><i class="fa-regular fa-bell"></i><span class="gb-dot"></span></button>
      <div class="gv-me">
        <div class="me-ava" id="gvAva">·</div>
        <div class="me-id"><div class="me-name" id="gvName">—</div><div class="me-role" id="gvRole">—</div></div>
        <i class="fa-solid fa-chevron-down"></i>
      </div>
    </div>
  </header>

  <main class="gv-main" id="gvMain">
    <!-- D18 Y16: lokal .gv-crumb kaldırıldı — kırıntı shell'den (GV.crumb ile kayıt segmenti) -->
    <div id="isgRoot"></div>
  </main>
</div>

<script src="assets/js/shell.js"></script>
<script src="assets/js/ui.js"></script>
<script>
(function(){
  if(!window.GV) return;

  /* ---- D18 Y9 — ?isg= KAYIT MAP ----
     Kayıt kaynağı: crm-santiye-isg.html KAYITLAR dizisi :171-183 BİREBİR (no/santiye/tur/
     tarih/konu/sorumlu/durum/st). TEMSİLİ DERİNLİK KURALI: yalnız ISG-2026-008 zengin
     içerik taşır (aksiyon maddeleri/ek dosyalar/genişletilmiş açıklama — mevcut hardcode
     İÇERİK AYNEN korunur, bkz. RICH['008']); diğer 10 kayıt sade şablon kullanır, uydurma
     aksiyon/dosya ÜRETİLMEZ. */
  var SANTIYE_ADI = {vadi:'Vadi Konakları', liman:'Liman Lojistik Merkezi', merkez:'Merkez Şantiye'};
  var TUR = {
    toolbox:    {ic:'fa-chalkboard-user',      lbl:'Toolbox Eğitimi'},
    ramakkala:  {ic:'fa-triangle-exclamation',  lbl:'Ramak Kala'},
    denetim:    {ic:'fa-clipboard-check',       lbl:'Denetim'},
    uygunsuzluk:{ic:'fa-circle-exclamation',    lbl:'Uygunsuzluk'},
    kaza:       {ic:'fa-kit-medical',           lbl:'Kaza Raporu'}
  };
  /* sorumlu → ?per= — DALGA 18 ?per= MAP numaralarıyla BİREBİR (shell.js kanonik blok) */
  var PER = {
    'Hasan Demirci':'004', 'Aylin Koç':'005', 'Ömer Taşkın':'006', 'İbrahim Sönmez':'011',
    'Şükrü Aslan':'016', 'Recep Yaman':'020', 'Veli Şimşek':'015'
  };
  var KAYITLAR = {
    '011':{no:'ISG-2026-011', santiye:'vadi',   tur:'toolbox',     tarih:'2 Tem 2026',  konu:'Yüksekte çalışma ve düşme önleme', sorumlu:'Hasan Demirci', durum:'Tamamlandı', st:'ok'},
    '010':{no:'ISG-2026-010', santiye:'liman',  tur:'ramakkala',   tarih:'1 Tem 2026',  konu:'Vinç yükü altından geçiş',          sorumlu:'Şükrü Aslan',   durum:'İnceleniyor', st:'warn'},
    '009':{no:'ISG-2026-009', santiye:'merkez', tur:'denetim',     tarih:'30 Haz 2026', konu:'Aylık İSG iç denetimi',             sorumlu:'Ömer Taşkın',   durum:'Bulgu Var — Takipte', st:'warn'},
    '008':{no:'ISG-2026-008', santiye:'vadi',   tur:'uygunsuzluk', tarih:'29 Haz 2026', konu:'İskele korkuluk eksikliği — B Blok', sorumlu:'İbrahim Sönmez',durum:'Aksiyon Bekliyor', st:'warn'},
    '007':{no:'ISG-2026-007', santiye:'liman',  tur:'kaza',        tarih:'27 Haz 2026', konu:'Forklift çarpması — hafif yaralanma', sorumlu:'Aylin Koç',   durum:'İnceleniyor', st:'danger'},
    '006':{no:'ISG-2026-006', santiye:'vadi',   tur:'toolbox',     tarih:'25 Haz 2026', konu:'Elektrik güvenliği ve KKD kullanımı', sorumlu:'Veli Şimşek', durum:'Tamamlandı', st:'ok'},
    '005':{no:'ISG-2026-005', santiye:'merkez', tur:'ramakkala',   tarih:'22 Haz 2026', konu:'Forklift-yaya güzergah kesişimi',   sorumlu:'Recep Yaman',   durum:'Kapatıldı', st:'ok'},
    '004':{no:'ISG-2026-004', santiye:'liman',  tur:'denetim',     tarih:'18 Haz 2026', konu:'Aliağa Liman İşletmeleri saha denetimi', sorumlu:'Aylin Koç', durum:'Bulgu Yok', st:'ok'},
    '003':{no:'ISG-2026-003', santiye:'vadi',   tur:'uygunsuzluk', tarih:'15 Haz 2026', konu:'Kişisel koruyucu donanım eksik kullanımı', sorumlu:'Hasan Demirci', durum:'Kapatıldı', st:'ok'},
    '002':{no:'ISG-2026-002', santiye:'merkez', tur:'toolbox',     tarih:'10 Haz 2026', konu:'Yangın güvenliği ve tahliye tatbikatı', sorumlu:'Ömer Taşkın', durum:'Tamamlandı', st:'ok'},
    '001':{no:'ISG-2026-001', santiye:'vadi',   tur:'kaza',        tarih:'3 Haz 2026',  konu:'Malzeme düşmesi — yaralanma yok',   sorumlu:'Hasan Demirci', durum:'Kapatıldı', st:'ok'}
  };
  var DEFAULT_KEY = '008';

  /* zengin içerik — yalnız 008 (mevcut hardcode BİREBİR taşındı) */
  var RICH = {
    '008':{
      whoBg:'var(--warn-tint)', whoFg:'var(--warn)', sorumluAlt:'Formen · Vadi Konakları',
      aciklama:'Rutin denetim sırasında B Blok 3. kat iskelesinin doğu cephesinde korkuluk elemanlarının bir bölümünün sökülüp yerine takılmadığı tespit edildi. Bölge derhal şerit ile çevrilip çalışma durduruldu. Formen İbrahim Sönmez tarafından tutanağa geçirildi; kalıcı çözüm için korkuluk montajının tamamlanması ve tüm iskele hatlarının yeniden kontrolden geçirilmesi aksiyon maddesi olarak açıldı.',
      aksiyonOzet:'3 aksiyon maddesinden 1\'i tamamlandı; 1 madde terminini geçti, 1 madde açık.',
      aksiyonSayac:'1 / 3 tamamlandı',
      aksiyonlar:[
        {done:true,  baslik:'Bölgenin şeritle çevrilip çalışmanın durdurulması',            kisi:'Hasan Demirci — Şantiye Şefi', meta:'29 Haz 2026\'da tamamlandı', ic:'fa-regular fa-calendar-check'},
        {done:false, late:true, baslik:'Eksik korkuluk elemanlarının temin edilip monte edilmesi', kisi:'Ramazan Kılıç — Kalıpçı',       meta:'Termin 1 Tem 2026 — gecikti', ic:'fa-solid fa-triangle-exclamation'},
        {done:false, baslik:'B Blok\'taki tüm iskele hatlarının yeniden İSG kontrolü',      kisi:'İbrahim Sönmez — Formen',      meta:'Termin 3 Tem 2026', ic:'fa-regular fa-calendar-check'}
      ],
      dosyalar:[
        {ico:'img', fa:'fa-file-image', ad:'iskele-korkuluk-bblok.jpg',     bilgi:'1,4 MB · İbrahim Sönmez tarafından eklendi'},
        {ico:'pdf', fa:'fa-file-pdf',   ad:'risk-degerlendirme-notu.pdf',   bilgi:'112 KB · Hasan Demirci tarafından eklendi'}
      ],
      not:'İskele hatlarının haftalık periyodik kontrolü Toolbox Eğitimi tutanaklarıyla (ör. ISG-2026-006) çapraz izlenir; bu kayıt kapanana kadar B Blok\'ta yükseklik çalışması sınırlandırılmıştır.'
    }
  };

  function initials(name){
    return name.split(' ').map(function(w){ return w.charAt(0); }).join('').toUpperCase();
  }
  function normalize(raw){
    if(raw === null) return DEFAULT_KEY;
    var m = String(raw).trim().match(/(\d{1,3})\s*$/);
    if(!m) return null;
    var key = ('00' + m[1]).slice(-3);
    return KAYITLAR[key] ? key : null;
  }

  var root = document.getElementById('isgRoot');

  function render(key){
    var rec = KAYITLAR[key];
    var r = RICH[key];
    var T = TUR[rec.tur];
    var santiyeAdi = SANTIYE_ADI[rec.santiye];
    var perKey = PER[rec.sorumlu];
    var sorumluLink = perKey ? '<a href="crm-personel-detay.html?per=' + perKey + '">' + rec.sorumlu + '</a>' : rec.sorumlu;

    document.title = rec.no + ' — İSG Tutanağı Detayı — Gavia CRM';

    var headHtml = ''
      + '<div class="gd-head">'
      +   '<div>'
      +     '<div class="gd-eyebrow">' + santiyeAdi + ' · İSG Tutanağı #' + rec.no + '</div>'
      +     '<h1>' + rec.konu + '</h1>'
      +     '<div class="gd-badges"><span class="gtag"><i class="fa-solid ' + T.ic + '"></i> ' + T.lbl + '</span><span class="gstat ' + rec.st + '">' + rec.durum + '</span></div>'
      +   '</div>'
      +   '<div class="ph-actions"><a class="btn btn-ghost btn-sm" href="crm-santiye-isg.html"><i class="fa-solid fa-arrow-left"></i> Listeye Dön</a></div>'
      + '</div>';

    var leftHtml;
    if(r){
      var aksItems = r.aksiyonlar.map(function(a){
        return '<div class="aks-item ' + (a.done ? 'done' : 'wait') + '">'
          +   '<span class="aks-chk">' + (a.done ? '<i class="fa-solid fa-check"></i>' : '') + '</span>'
          +   '<div class="aks-body"><b>' + a.baslik + '</b>'
          +     '<div class="aks-meta">'
          +       '<span><i class="fa-solid fa-user"></i> ' + a.kisi + '</span>'
          +       '<span' + (a.late ? ' class="late"' : '') + '><i class="' + a.ic + '"></i> ' + a.meta + '</span>'
          +     '</div>'
          +   '</div>'
          + '</div>';
      }).join('');
      var dosyaItems = r.dosyalar.map(function(d){
        return '<div class="file-row">'
          +   '<div class="file-ico ' + d.ico + '"><i class="fa-solid ' + d.fa + '"></i></div>'
          +   '<div class="file-info"><b>' + d.ad + '</b><span>' + d.bilgi + '</span></div>'
          +   '<button class="ia-btn" data-demo="İndirme hazırlanıyor (demo)" data-no-confirm aria-label="İndir"><i class="fa-solid fa-download"></i></button>'
          + '</div>';
      }).join('');
      leftHtml = ''
        + '<div class="gv-side-stack">'
        +   '<div class="gv-card gd-danger-card"><div class="gd-block"><div class="gd-danger-txt">'
        +     '<span class="dt-label"><i class="fa-solid fa-triangle-exclamation"></i> Aksiyon takibi açık</span>'
        +     '<span>' + r.aksiyonOzet + '</span></div>'
        +     '<span class="aks-summary">' + r.aksiyonSayac + '</span>'
        +   '</div></div>'
        +   '<div class="gv-card">'
        +     '<div class="gd-block"><div class="gd-label">Açıklama</div><p class="gd-desc">' + r.aciklama + '</p></div>'
        +     '<div class="gd-block"><div class="gd-label">Aksiyon Maddeleri</div><div class="aks-list">' + aksItems + '</div></div>'
        +     '<div class="gd-block"><div class="gd-label">Ek Dosyalar</div>' + dosyaItems
        +       '<div class="attach-zone" id="attachZone" tabindex="0" role="button" aria-label="Dosya ekle">'
        +         '<i class="fa-solid fa-cloud-arrow-up"></i><b>Dosya ekle</b>'
        +         '<span>PDF, JPG, PNG — sürükle bırak veya tıkla (demo)</span>'
        +       '</div>'
        +     '</div>'
        +   '</div>'
        + '</div>';
    } else {
      leftHtml = ''
        + '<div class="gv-side-stack">'
        +   '<div class="gv-card"><div class="gv-empty">'
        +     '<div class="ge-ico"><i class="fa-solid fa-clipboard-question"></i></div>'
        +     '<h4>Ek detay girilmedi</h4>'
        +     '<p>Bu tutanak ' + santiyeAdi + ' şantiyesinde ' + rec.tarih + ' tarihinde kaydedilmiştir. Aksiyon maddesi ve ek dosya detayı bu prototipte yalnızca ISG-2026-008 için girilmiştir.</p>'
        +   '</div></div>'
        + '</div>';
    }

    var rightHtml = ''
      + '<div class="gv-side-stack">'
      +   '<div class="gv-card">'
      +     '<div class="gd-block"><div class="gd-label">Tutanak Bilgileri</div>'
      +       '<div class="ctx-row"><span class="ctx-lbl">Tarih</span><span class="ctx-val">' + rec.tarih + '</span></div>'
      +       '<div class="ctx-row"><span class="ctx-lbl">Şantiye</span><span class="ctx-val"><a href="crm-santiye-detay.html?santiye=' + rec.santiye + '" style="color:var(--acc-ink);font-weight:700">' + santiyeAdi + '</a></span></div>'
      +       '<div class="ctx-row"><span class="ctx-lbl">Tür</span><span class="ctx-val">' + T.lbl + '</span></div>'
      +     '</div>'
      +     '<div class="gd-block"><div class="gd-label">Sorumlu</div>'
      +       '<div class="ctx-link"><div class="who-mark" style="background:' + (r ? r.whoBg : 'rgba(var(--acc-rgb),.14)') + ';color:' + (r ? r.whoFg : 'var(--acc-ink)') + '">' + initials(rec.sorumlu) + '</div>'
      +       '<div>' + sorumluLink + '<span>' + (r ? r.sorumluAlt : santiyeAdi) + '</span></div></div>'
      +     '</div>'
      +   '</div>'
      +   '<div class="gv-card"><div class="gd-block"><div class="gd-label">Durum</div>'
      +     '<p style="font-size:12.5px;color:var(--ink-2);line-height:1.7">Tutanak, açık aksiyon maddesi kalmadığında otomatik olarak "Kapatıldı" durumuna geçer. Bu prototipte durum değişimi simüle edilmez.</p>'
      +   '</div></div>'
      + (r && r.not ? '<div class="gv-card"><div class="gd-block"><div class="gd-label">Not</div><p style="font-size:12.5px;color:var(--ink-2);line-height:1.7">' + r.not + '</p></div></div>' : '')
      + '</div>';

    root.innerHTML = headHtml + '<div class="gd-grid">' + leftHtml + rightHtml + '</div>';
    GV.crumb(rec.no);

    if(r){
      var zone = document.getElementById('attachZone');
      function attachMock(){ gvToast('Dosya yükleme prototip kapsamında simüledir', {type:'info'}); }
      zone.addEventListener('click', attachMock);
      zone.addEventListener('keydown', function(e){ if(e.key === 'Enter' || e.key === ' '){ e.preventDefault(); attachMock(); } });
    }
  }

  var q = new URLSearchParams(location.search);
  var rawParam = q.get('isg');
  var key = normalize(rawParam);

  if(!key){
    GV.crumb('Kayıt bulunamadı');
    gvNotFound({
      mount: '#isgRoot',
      code: rawParam ? rawParam.toUpperCase() : null,
      tur: 'İSG tutanağı',
      listHref: 'crm-santiye-isg.html', listLbl: 'Tutanak listesine dön',
      defHref: 'crm-santiye-isg-detay.html', defLbl: 'ISG-2026-008\'i aç'
    });
  } else {
    var rec = KAYITLAR[key];
    /* şef budaması — yalnız kendi şantiyesini (vadi) görür; başka şantiyenin kaydına
       doğrudan URL ile gidilirse sessizce DEFAULT (008, zaten vadi) kaydına döner
       (crm-santiye-detay.html?santiye= aynı desenin emsali) */
    if(GV.role === 'sef' && rec.santiye !== 'vadi'){
      location.replace('crm-santiye-isg-detay.html?isg=008');
    } else {
      render(key);
    }
  }
})();
</script>
