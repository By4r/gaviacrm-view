   DEFAULT 004 Hasan Demirci mevcut içerik BİREBİR; zengin 4: 004/010/005/017; kalan 18
   temsili-derinlik) ============ */

/* kimlik başlık kartı */
.per-hero{display:grid;grid-template-columns:1.7fr 1fr;gap:30px;padding:26px 26px 24px;margin-bottom:22px}
.per-hero-id{display:flex;gap:18px}
.per-hero-mark{width:58px;height:58px;flex:none;border-radius:var(--r-md);display:grid;place-items:center;font-size:19px;font-weight:800;background:var(--info-tint);color:var(--info)}
.per-hero-info{flex:1;min-width:0}
.per-hero-info h1{font-size:22px;letter-spacing:-.015em;margin-bottom:6px}
.per-hero-tags{display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.per-hero-meta{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px 22px}
.per-hero-meta dt{font-size:10.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:3px}
.per-hero-meta dd{font-size:13.5px;font-weight:700;color:var(--ink)}
.per-hero-meta dd a{color:var(--acc-ink)}
.per-stats{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;align-content:start}
.pstat{background:var(--bg);border-radius:var(--r-md);padding:14px 16px;display:flex;flex-direction:column;gap:4px}
.pstat-num{font-size:19px;font-weight:800;color:var(--ink);letter-spacing:-.01em;font-variant-numeric:tabular-nums}
.pstat-lbl{font-size:11.5px;color:var(--muted);font-weight:600;line-height:1.3}
.pstat.warn .pstat-num{color:var(--warn)}
@media(max-width:980px){.per-hero{grid-template-columns:minmax(0,1fr)}}
@media(max-width:640px){
  .per-hero{padding:20px 18px}
  .per-hero-id{flex-direction:column}
  .per-hero-meta{grid-template-columns:1fr}
}

/* sekme çubuğu — santiye-detay ile aynı desen */
.gv-tabs{display:flex;border-bottom:1px solid var(--line);margin-bottom:22px;overflow-x:auto;scrollbar-width:none}
.gv-tabs::-webkit-scrollbar{display:none}
.gv-tab{display:inline-flex;align-items:center;gap:8px;padding:13px 4px;margin-right:26px;flex:none;
  font-family:inherit;font-size:13.5px;font-weight:700;color:var(--muted);background:none;border:none;
  border-bottom:2px solid transparent;white-space:nowrap;cursor:pointer;transition:.18s var(--ease)}
.gv-tab i{font-size:13px}
.gv-tab:hover{color:var(--ink)}
.gv-tab.is-active{color:var(--acc-ink);border-color:var(--acc-ink)}
.gv-tab .tb-cnt{font-size:10.5px;font-weight:700;background:var(--bg);color:var(--ink-2);padding:1px 6px;border-radius:var(--r-pill)}
.gv-tab.is-active .tb-cnt{background:rgba(var(--acc-rgb),.16);color:var(--acc-deep)}

.dash-cols{display:grid;grid-template-columns:1.4fr 1fr;gap:16px;margin-bottom:16px;align-items:start}
@media(max-width:1100px){.dash-cols{grid-template-columns:minmax(0,1fr)}}

/* özlük evrak mini liste */
.doc-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--line)}
.doc-row:last-child{border-bottom:none}
.doc-ico{width:34px;height:34px;flex:none;border-radius:9px;display:grid;place-items:center;font-size:13px;background:var(--ok-tint);color:var(--ok)}
.doc-row.warn .doc-ico{background:var(--warn-tint);color:var(--warn)}
.doc-row.danger .doc-ico{background:var(--danger-tint);color:var(--danger)}
.doc-row.info .doc-ico{background:var(--info-tint);color:var(--info)}
.doc-info{flex:1;min-width:0;line-height:1.35}
.doc-info b{display:block;font-size:13px;font-weight:700;color:var(--ink)}
.doc-info span{font-size:11.5px;color:var(--muted)}
.doc-acts{flex:none}
@media(max-width:640px){
  .doc-row{flex-wrap:wrap}
  .doc-acts{flex:1 1 100%;justify-content:flex-end;margin-top:6px}
}

.chief-row{display:flex;align-items:center;gap:14px}
.chief-row .per-hero-mark{width:44px;height:44px;font-size:14px}

/* çapraz-kayıt satırı — temsili-derinlik izin/avans tekil kart */
.cross-row{display:flex;align-items:center;gap:13px;padding:6px 0}
.cross-ico{width:40px;height:40px;flex:none;border-radius:var(--r-md);display:grid;place-items:center;font-size:15px;background:rgba(var(--acc-rgb),.1);color:var(--acc-ink)}
.cross-info{flex:1;min-width:0;line-height:1.4}
.cross-info a{font-size:13.5px;font-weight:700;color:var(--ink)}
.cross-info a:hover{color:var(--acc-ink)}
.cross-info span{display:block;font-size:12px;color:var(--muted)}
</style>

  var email = rec.ad.toLowerCase()
    .replace(/ı/g,'i').replace(/ğ/g,'g').replace(/ü/g,'u').replace(/ş/g,'s').replace(/ö/g,'o').replace(/ç/g,'c')
    .split(' ').join('.') + '@yapitas.com.tr';

  var docCount = rec.ozlukEks.length ? (12 - rec.ozlukEks.length) : 12;
  var gorevCnt = rec.gorev ? rec.gorev.length : 0;
  var zimmetCnt = rec.zimmet ? rec.zimmet.length : 0;

  /* --- hero --- */
  var statsHtml = rec.rich
    ? '<div class="per-stats">'
      + '<div class="pstat"><div class="pstat-num">' + rec.kidem + '</div><div class="pstat-lbl">Kıdem</div></div>'
      + '<div class="pstat"><div class="pstat-num">' + rec.gorevAktif + '</div><div class="pstat-lbl">Aktif atanmış görev</div></div>'
      + '<div class="pstat"><div class="pstat-num">' + rec.izinKullanilan + ' gün</div><div class="pstat-lbl">Bu yıl kullanılan izin</div></div>'
      + (rec.ekip ? '<div class="pstat"><div class="pstat-num">' + rec.ekip + '</div><div class="pstat-lbl">Yönettiği ekip (' + santiyeAd + ')</div></div>' : '<div class="pstat"><div class="pstat-num">' + docCount + '/12</div><div class="pstat-lbl">Evrak tamam</div></div>')
      + '</div>'
    : '';

  var heroHtml = ''
    + '<div class="gv-card per-hero">'
    +   '<div class="per-hero-id">'
    +     '<div class="per-hero-mark" style="' + markStyle + '">' + ini(rec.ad) + '</div>'
    +     '<div class="per-hero-info">'
    +       '<h1>' + esc(rec.ad) + '</h1>'
    +       '<div class="per-hero-tags">'
    +         '<span class="' + tagCls + '"' + (rec.kat === 'saha' ? ' style="' + markStyle + '"' : (rec.kat === 'ofis' ? ' style="background:var(--warn-tint);color:var(--warn);border-color:transparent"' : (rec.kat === 'sef' ? ' style="background:var(--info-tint);color:var(--info);border-color:transparent"' : ''))) + '>' + esc(rec.poz) + '</span>'
    +         '<span class="gstat ' + (rec.durum === 'İzinli' ? 'warn' : 'ok') + '">' + rec.durum + '</span>'
    +       '</div>'
    +       '<dl class="per-hero-meta">'
    +         '<div><dt>Şantiye</dt><dd>' + santiyeHtml + '</dd></div>'
    +         '<div><dt>Telefon</dt><dd>' + rec.tel + '</dd></div>'
    +         '<div><dt>E-posta</dt><dd>' + email + '</dd></div>'
    +         '<div><dt>İşe Başlama</dt><dd>' + rec.baslama + '</dd></div>'
    +       '</dl>'
    +     '</div>'
    +   '</div>'
    +   statsHtml
    + '</div>';

  /* --- tabs bar --- */
  var tabsHtml = ''
    + '<div class="gv-tabs" role="tablist" aria-label="Personel kartı sekmeleri">'
    +   '<button class="gv-tab is-active" data-tab="ozluk" role="tab" aria-selected="true"><i class="fa-solid fa-folder-open"></i> Özlük Özeti</button>'
    +   '<button class="gv-tab" data-tab="izin" role="tab" aria-selected="false"><i class="fa-solid fa-umbrella-beach"></i> İzin Geçmişi</button>'
    +   '<button class="gv-tab" data-tab="avans" role="tab" aria-selected="false"><i class="fa-solid fa-hand-holding-dollar"></i> Avans Geçmişi</button>'
    +   '<button class="gv-tab" data-tab="gorev" role="tab" aria-selected="false"><i class="fa-solid fa-list-check"></i> Atanmış Görevler' + (gorevCnt ? ' <span class="tb-cnt">' + gorevCnt + '</span>' : '') + '</button>'
    +   '<button class="gv-tab" data-tab="zimmet" role="tab" aria-selected="false"><i class="fa-solid fa-toolbox"></i> Zimmet' + (zimmetCnt ? ' <span class="tb-cnt">' + zimmetCnt + '</span>' : '') + '</button>'
    + '</div>';

  /* --- özlük tab --- */
  var ozlukBodyHtml;
  if(rec.rich){
    var STCLS = {ok:'', warn:'warn', danger:'danger', info:'info', expired:'danger'};
    var STICON = {ok:'fa-check', warn:'fa-clock', danger:'fa-xmark', info:'fa-hourglass-half', expired:'fa-triangle-exclamation'};
    var eksMap = {}; rec.ozlukEks.forEach(function(e){ eksMap[e.ix] = e; });
    ozlukBodyHtml = DOC_NAMES.map(function(d, i){
      var e = eksMap[i];
      var st = e ? e.durum : 'ok';
      var not = e ? e.not : 'Tamamlandı';
      var badge = e ? (e.durum === 'danger' || e.durum === 'expired' ? '<span class="gstat danger">' + e.cap + '</span>' : '<span class="gstat warn">' + e.cap + '</span>') : '<span class="gstat ok">Tamam</span>';
      return '<div class="doc-row ' + STCLS[st] + '"><div class="doc-ico"><i class="fa-solid ' + STICON[st] + '"></i></div><div class="doc-info"><b>' + d.ad + '</b><span>' + not + '</span></div>' + badge + '</div>';
    }).join('');
  } else {
    if(rec.ozlukEks.length){
      var stLbl = {warn:'Süresi doluyor', danger:'Eksik', info:'Onayda', expired:'Süresi doldu'};
      var stCls = {warn:'warn', danger:'danger', info:'info', expired:'danger'};
      ozlukBodyHtml = rec.ozlukEks.map(function(e){
        var d = DOC_NAMES[e.ix];
        return '<div class="doc-row ' + (e.durum === 'expired' ? 'danger' : e.durum) + '"><div class="doc-ico"><i class="fa-solid ' + (e.durum === 'info' ? 'fa-hourglass-half' : e.durum === 'warn' ? 'fa-clock' : 'fa-triangle-exclamation') + '"></i></div><div class="doc-info"><b>' + d.ad + '</b><span>' + e.not + '</span></div><span class="gstat ' + stCls[e.durum] + '">' + (e.cap || stLbl[e.durum]) + '</span></div>';
      }).join('');
    } else {
      ozlukBodyHtml = '<div class="doc-row"><div class="doc-ico"><i class="fa-solid fa-check"></i></div><div class="doc-info"><b>12 kanonik evrak kategorisi</b><span>Tamamı dosyalandı</span></div><span class="gstat ok">Tamam</span></div>';
    }
  }
  var evrakOzetNote = rec.rich
    ? ''
    : '<p class="gd-desc" style="padding:0 0 14px">' + docCount + '/12 evrak kategorisi tamam' + (rec.ozlukEks.length ? '; aşağıdaki ' + rec.ozlukEks.length + ' kalemde uyarı var.' : '.') + ' Tüm matris için Özlük &amp; Evrak sayfasına bakın.</p>';

  var saglikHtml = rec.saglikRaporu
    ? '<div class="cross-row"><div class="cross-ico"><i class="fa-solid fa-notes-medical"></i></div><div class="cross-info"><a href="' + rec.saglikRaporu.href + '">' + rec.saglikRaporu.kod + '</a><span>' + rec.saglikRaporu.tur + ' · ' + rec.saglikRaporu.tarih + '</span></div></div>'
    : '';

  var ozlukHtml = ''
    + '<section class="tab-panel" data-tab-panel="ozluk" role="tabpanel" aria-label="Özlük Özeti">'
    +   '<div class="dash-cols">'
    +     '<div class="gv-card">'
    +       '<div class="gc-head"><div class="gc-title"><i class="fa-solid fa-file-shield"></i> ' + (rec.rich ? 'Evrak Durumu' : 'Evrak Özeti') + '</div>'
    +         '<a class="gc-link" href="crm-personel-ozluk.html">Tüm matris <i class="fa-solid fa-arrow-right"></i></a>'
    +       '</div>'
    +       '<div class="gc-body">' + evrakOzetNote + ozlukBodyHtml + '</div>'
    +       (saglikHtml ? '<div class="gc-foot" style="display:block"><div class="gd-label" style="margin-bottom:8px">İlgili Sağlık Raporu</div>' + saglikHtml + '</div>' : '')
    +     '</div>'
    +     '<div class="gv-card">'
    +       '<div class="gc-head"><div class="gc-title"><i class="fa-solid fa-address-card"></i> İletişim &amp; Bağlam</div></div>'
    +       '<div class="gc-body">'
    +         '<dl class="per-hero-meta" style="grid-template-columns:1fr">'
    +           '<div><dt>Pozisyon</dt><dd>' + esc(rec.poz) + '</dd></div>'
    +           '<div><dt>Bağlı Olduğu Şantiye</dt><dd>' + santiyeHtml + '</dd></div>'
    +           (rec.rapor ? '<div><dt>Raporlandığı Kişi</dt><dd>' + rec.rapor + '</dd></div>' : '')
    +         '</dl>'
    +       '</div>'
    +       '<div class="gc-foot"><span><i class="fa-solid fa-circle-info"></i> Bordro hesaplaması bu ekranda yapılmaz; tutarlar sözleşme brütüdür.</span></div>'
    +     '</div>'
    +   '</div>'
    +   '<div class="gv-card" data-admin-only style="margin-bottom:16px">'
    +     '<div class="gc-head">'
    +       '<div class="gc-title"><i class="fa-solid fa-id-badge"></i> Kimlik &amp; İK Bilgileri</div>'
    +       '<span class="gtag"><i class="fa-solid fa-lock"></i> Sadece İK ve yönetim görür</span>'
    +     '</div>'
    +     '<div class="gc-body">'
    +       '<dl class="per-hero-meta">'
    +         '<div><dt>TC Kimlik No</dt><dd>' + rec.payroll.tc + '</dd></div>'
    +         '<div><dt>Doğum Tarihi</dt><dd>' + rec.payroll.dogum + '</dd></div>'
    +         '<div><dt>Medeni Durum</dt><dd>' + rec.payroll.medeni + '</dd></div>'
    +         '<div data-payroll-only><dt>Brüt Ücret</dt><dd>' + rec.payroll.brut + '</dd></div>'
    +         '<div data-payroll-only><dt>SGK Sicil No</dt><dd>' + rec.payroll.sgkNo + '</dd></div>'
    +         '<div data-payroll-only><dt>SGK Giriş Tarihi</dt><dd>' + rec.baslama + '</dd></div>'
    +       '</dl>'
    +     '</div>'
    +     '<div class="gc-foot"><span><i class="fa-solid fa-circle-info"></i> Bordro hesaplaması bu ekranda yapılmaz; tutarlar sözleşme brütüdür.</span></div>'
    +   '</div>'
    + '</section>';

  /* --- izin tab --- */
  var izinInner;
  if(rec.izin){
    var izinDurLbl = {onaylandi:'Onaylandı', bekliyor:'Bekliyor', reddedildi:'Reddedildi', revize:'Revize İstendi'};
    var izinDurCls = {onaylandi:'ok', bekliyor:'wait', reddedildi:'danger', revize:'warn'};
    izinInner = '<div class="gc-body">'
      + '<div class="cross-row"><div class="cross-ico"><i class="fa-solid fa-umbrella-beach"></i></div>'
      + '<div class="cross-info"><a href="' + rec.izin.href + '">' + rec.izin.kod + '</a><span>' + rec.izin.tur + ' · ' + rec.izin.tarih + (rec.izin.not ? ' · ' + rec.izin.not : '') + '</span></div>'
      + '<span class="gstat ' + izinDurCls[rec.izin.durum] + '" style="margin-left:auto">' + izinDurLbl[rec.izin.durum] + '</span></div>'
      + '</div>';
  } else {
    izinInner = '<div class="gv-empty">'
      + '<div class="ge-ico"><i class="fa-solid fa-calendar-check"></i></div>'
      + '<h4>Bu yıl izin talebi yok</h4>'
      + '<p>' + esc(rec.ad) + ' 2026 yılında henüz izin talebinde bulunmadı.</p>'
      + '</div>';
  }
  var izinHtml = '<section class="tab-panel" data-tab-panel="izin" role="tabpanel" aria-label="İzin Geçmişi" hidden>'
    + '<div class="gv-card"><div class="gc-head"><div class="gc-title"><i class="fa-solid fa-umbrella-beach"></i> İzin Geçmişi</div>'
    + '<a class="gc-link" href="crm-personel-izin.html">Tüm izin talepleri <i class="fa-solid fa-arrow-right"></i></a></div>'
    + izinInner + '</div></section>';

  /* --- avans tab --- */
  var avansInner;
  if(rec.avans){
    avansInner = '<div class="gc-body">'
      + '<div class="cross-row"><div class="cross-ico"><i class="fa-solid fa-hand-holding-dollar"></i></div>'
      + '<div class="cross-info"><a href="' + rec.avans.href + '">' + rec.avans.kod + (rec.avans.tutar ? ' · ' + rec.avans.tutar : '') + '</a><span>' + (rec.avans.not || 'Avans talebi kaydı') + '</span></div></div>'
      + '</div>';
  } else {
    avansInner = '<div class="gv-empty">'
      + '<div class="ge-ico"><i class="fa-solid fa-hand-holding-dollar"></i></div>'
      + '<h4>Bu yıl avans talebi yok</h4>'
      + '<p>' + esc(rec.ad) + ' 2026 yılında henüz avans talebinde bulunmadı.</p>'
      + '</div>';
  }
  var avansHtml = '<section class="tab-panel" data-tab-panel="avans" role="tabpanel" aria-label="Avans Geçmişi" hidden>'
    + '<div class="gv-card"><div class="gc-head"><div class="gc-title"><i class="fa-solid fa-hand-holding-dollar"></i> Avans Geçmişi</div>'
    + '<a class="gc-link" href="crm-personel-avans.html">Tüm avans talepleri <i class="fa-solid fa-arrow-right"></i></a></div>'
    + avansInner + '</div></section>';

  /* --- görev tab --- */
  var gorevInner;
  if(rec.gorev && rec.gorev.length){
    gorevInner = '<div class="gc-body">' + rec.gorev.map(function(g){
      return '<div class="cross-row"><div class="cross-ico"><i class="fa-solid fa-list-check"></i></div>'
        + '<div class="cross-info"><a href="' + g.href + '">' + esc(g.baslik) + '</a><span>' + g.kod + ' · ' + g.atayan + ' tarafından atandı</span></div></div>';
    }).join('') + '</div>';
  } else {
    gorevInner = '<div class="gv-empty">'
      + '<div class="ge-ico"><i class="fa-solid fa-list-check"></i></div>'
      + '<h4>Atanmış görev yok</h4>'
      + '<p>' + esc(rec.ad) + '\'a şu anda atanmış aktif görev bulunmuyor.</p>'
      + '</div>';
  }
  var gorevHtml = '<section class="tab-panel" data-tab-panel="gorev" role="tabpanel" aria-label="Atanmış Görevler" hidden>'
    + '<div class="gv-card"><div class="gc-head"><div class="gc-title"><i class="fa-solid fa-list-check"></i> Atanmış Görevler</div>'
    + '<a class="gc-link" href="crm-gorev.html">Görevler modülü <i class="fa-solid fa-arrow-right"></i></a></div>'
    + gorevInner + '</div></section>';

  /* --- zimmet tab --- */
  var zimmetInner;
  if(rec.zimmet && rec.zimmet.length){
    zimmetInner = '<div class="gc-body flush"><table class="gtable"><thead><tr><th>Zimmet No</th><th>Kalem</th><th>Teslim Tarihi</th><th>Durum</th></tr></thead><tbody>'
      + rec.zimmet.map(function(z){
          return '<tr><td class="t-strong">' + z.kod + '</td><td>' + z.kalem + '</td><td><span style="font-size:12.5px;color:var(--ink-2);font-weight:700"><i class="fa-regular fa-calendar"></i> ' + z.tarih + '</span></td><td><span class="gstat ok">' + z.durum + '</span></td></tr>';
        }).join('') + '</tbody></table></div>';
  } else {
    zimmetInner = '<div class="gv-empty">'
      + '<div class="ge-ico"><i class="fa-solid fa-toolbox"></i></div>'
      + '<h4>Zimmetli demirbaş yok</h4>'
      + '<p>' + esc(rec.ad) + ' üzerine kayıtlı demirbaş bulunmuyor.</p>'
      + '</div>';
  }
  var zimmetHtml = '<section class="tab-panel" data-tab-panel="zimmet" role="tabpanel" aria-label="Zimmet" hidden>'
    + '<div class="gv-card"><div class="gc-head"><div class="gc-title"><i class="fa-solid fa-toolbox"></i> Zimmet Kayıtları</div>'
    + '<a class="gc-link" href="crm-operasyon-demirbas.html">Demirbaş Modülü <i class="fa-solid fa-arrow-right"></i></a></div>'
    + zimmetInner + '</div></section>';

  var uyariHtml = rec.uyariNot
    ? '<div class="gv-card" style="margin-bottom:16px"><div class="gc-body" style="display:flex;gap:12px;align-items:flex-start"><i class="fa-solid fa-triangle-exclamation" style="color:var(--warn);margin-top:2px"></i><p class="gd-desc" style="margin:0">' + rec.uyariNot + '</p></div></div>'
    : '';

  root.innerHTML = heroHtml + tabsHtml + uyariHtml + ozlukHtml + izinHtml + avansHtml + gorevHtml + zimmetHtml;

  wireCommon();
  wireDocActions();
  wireTabs();

  function wireCommon(){
    if(['superadmin','sahip','yonetim','ik'].indexOf(GV.role) === -1){
      document.querySelectorAll('[data-admin-only]').forEach(function(el){ el.hidden = true; });
    }
    if(['superadmin','sahip'].indexOf(GV.role) === -1){
      document.querySelectorAll('[data-payroll-only]').forEach(function(el){ el.hidden = true; });
    }
  }

  function wireDocActions(){
    var ACT_MSG = {
      goruntule: ' görüntüleniyor (mock).', indir: ' indiriliyor (mock).',
      degistir: ' için değiştirme başlatıldı (mock).', yukle: ' yüklendi (mock).', sil: ' kaldırıldı (mock).'
    };
    root.addEventListener('click', function(e){
      var b = e.target.closest('.doc-acts .ia-btn'); if(!b) return;
      var row = b.closest('.doc-row');
      var name = row.querySelector('.doc-info b').textContent;
      var act = b.getAttribute('data-act');
      gvToast(name + (ACT_MSG[act] || ' (mock).'), {type: act === 'sil' ? 'danger' : 'info'});
    });
  }

  function wireTabs(){
    var tabs = Array.prototype.slice.call(root.querySelectorAll('.gv-tab'));
    var panels = Array.prototype.slice.call(root.querySelectorAll('.tab-panel'));
    function activate(tid){
      tabs.forEach(function(t){
        var on = t.getAttribute('data-tab') === tid;
        t.classList.toggle('is-active', on);
        t.setAttribute('aria-selected', on ? 'true' : 'false');
      });
      panels.forEach(function(p){ p.hidden = p.getAttribute('data-tab-panel') !== tid; });
    }
    tabs.forEach(function(t){
      t.addEventListener('click', function(){
        var tid = t.getAttribute('data-tab');
        activate(tid);
        history.replaceState(null, '', location.pathname + location.search + '#' + tid);
      });
    });
    var initial = (location.hash || '').replace('#', '');
    var valid = tabs.some(function(t){ return t.getAttribute('data-tab') === initial; });
    activate(valid ? initial : 'ozluk');
  }
})();
</script>
</body>
</html>
