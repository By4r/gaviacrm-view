<style>
/* ============ SAYFAYA ÖZEL — Birim Detayı (?birim=) ============ */
.gv-crumb{display:flex;align-items:center;gap:9px;font-size:12.5px;font-weight:600;color:var(--muted);margin-bottom:14px}
.gv-crumb a{color:var(--acc-ink);font-weight:700}
.gv-crumb a:hover{color:var(--acc-deep)}
.gv-crumb i{font-size:9px;color:var(--line-2)}

.gd-head{display:flex;align-items:flex-start;justify-content:space-between;gap:20px;margin-bottom:22px;flex-wrap:wrap}
.gd-head h1{font-size:22px;letter-spacing:-.015em;margin-bottom:9px}
.gd-badges{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.gd-eyebrow{font-size:11.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--acc-ink);margin-bottom:8px}

.gd-grid{display:grid;grid-template-columns:1fr 340px;gap:18px;align-items:start}
@media(max-width:980px){.gd-grid{grid-template-columns:minmax(0,1fr)}}
.gv-side-stack{display:flex;flex-direction:column;gap:16px}

.gd-block{padding:22px}
.gd-block + .gd-block{border-top:1px solid var(--line)}
.gd-label{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}

.ctx-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:9px 0;font-size:13px}
.ctx-row:not(:last-child){border-bottom:1px solid var(--line)}
.ctx-row .ctx-lbl{color:var(--muted)}
.ctx-row .ctx-val{color:var(--ink);font-weight:700;text-align:right}
.ctx-row .ctx-val a{color:var(--acc-ink)}
.ctx-link{display:flex;align-items:center;gap:11px;padding:6px 0}
.ctx-link .who-mark{width:38px;height:38px;flex:none;border-radius:var(--r-sm);display:grid;place-items:center;font-size:13px;font-weight:800}
.ctx-link a{font-size:13.5px;font-weight:700;color:var(--ink)}
.ctx-link a:hover{color:var(--acc-ink)}
.ctx-link span{display:block;font-size:11.5px;color:var(--muted)}

/* birim künyesi — 2 kolonlu meta ızgara */
.birim-meta{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px 22px}
.birim-meta dt{font-size:10.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:3px}
.birim-meta dd{font-size:14px;font-weight:700;color:var(--ink)}
.birim-meta dd.big{font-size:18px;font-weight:800;color:var(--acc-deep)}

/* opsiyon sayacı */
.opt-counter{display:flex;align-items:center;gap:16px;padding:4px 0 4px}
.opt-ring{width:64px;height:64px;flex:none;border-radius:50%;display:grid;place-items:center;position:relative}
.opt-ring b{font-size:19px;font-weight:800;color:var(--danger)}
.opt-ring span{position:absolute;bottom:-16px;left:50%;transform:translateX(-50%);font-size:9px;font-weight:700;color:var(--muted);white-space:nowrap}
.opt-info b{display:block;font-size:14px;font-weight:800;color:var(--ink);margin-bottom:2px}
.opt-info span{font-size:12.5px;color:var(--muted)}

/* ödeme ilerleme çubuğu */
.pay-progress{padding:2px 0 6px}
.pay-bar{height:10px;border-radius:999px;background:var(--bg);overflow:hidden;margin-bottom:8px}
.pay-bar-fill{height:100%;background:var(--acc-ink);border-radius:999px}
.pay-stats{display:flex;justify-content:space-between;font-size:12px;color:var(--muted)}
.pay-stats b{color:var(--ink);font-weight:800}

/* fiyat geçmişi mini tablo */
.fh-table{width:100%;border-collapse:collapse}
.fh-table td{padding:9px 0;font-size:13px;border-bottom:1px solid var(--line);vertical-align:top}
.fh-table tr:last-child td{border-bottom:none}
.fh-table .fh-date{color:var(--muted);white-space:nowrap;width:110px}
.fh-table .fh-val{text-align:right;font-weight:700;color:var(--ink);font-variant-numeric:tabular-nums;white-space:nowrap}
.fh-table .fh-desc{color:var(--ink-2)}

/* ilişkili kayıt satırı */
.rel-form{display:flex;align-items:center;gap:13px;padding:9px 0}
.rel-form:not(:last-child){border-bottom:1px solid var(--line)}
.rel-ico{width:38px;height:38px;flex:none;border-radius:var(--r-md);display:grid;place-items:center;font-size:14px;background:rgba(var(--acc-rgb),.1);color:var(--acc-ink)}
.rel-info{flex:1;min-width:0;line-height:1.4}
.rel-info a{font-size:13.5px;font-weight:700;color:var(--ink)}
.rel-info a:hover{color:var(--acc-ink)}
.rel-info span{display:block;font-size:12px;color:var(--muted)}

.dm-acts{display:flex;flex-direction:column;gap:8px;padding:18px 22px 20px}
.dm-acts .btn{justify-content:flex-start}
.dm-acts-note{font-size:12px;color:var(--muted);line-height:1.6;padding:0 22px 20px}
.dm-acts-note.danger{color:var(--danger)}
.dm-acts-note.danger i{color:var(--danger)}

.empty-note{font-size:12.5px;color:var(--muted);font-style:italic;line-height:1.6}
</style>
</head>

<script>

  var DURUM_LBL = {

        {tarih:'12 Şub 2026', desc:'Sözleşme imzalandı — SSZ-2026-003 (net bedel)', val:6120000}

      ],

        {ico:'fa-file-invoice-dollar', href:'crm-satis-teklif-detay.html?tkf=006', baslik:'TKF-2026-006', alt:'%5 indirim · Satış Müdürü onayında'},
        {ico:'fa-table-columns', href:'crm-satis-firsat-detay.html?frs=009', baslik:'FRS-2026-009', alt:'Pipeline — Teklif aşaması'}
      ],
      teklifDurum:'aktif'
    },
    'GE2-V12':{
      proje:'Göl Evleri 2. Etap', loc:'Parsel 2 sıra', tip:'Villa (bahçeli)', cephe:'Göl Manzaralı', brut:235, net:205,
      fiyat:13950000, durum:'opsiyonlu',
      uyariBanner:'Opsiyon süresi 13 Temmuz 2026\'da doluyor — 11 gün kaldı.',
      musteri:{ad:'Pınar Us', tur:'Fuar · Ham lead', href:null, ini:'PU', hamLead:true},
      surec:{tip:'opsiyon', bitis:'13 Temmuz 2026', kalanGun:11, toplamGun:14, baslangic:'29 Haziran 2026'},

      ],

  /* ---- fallback: adı geçmeyen herhangi bir kod şemadan türetilir (VK/GE2/KO) ---- */

    {kat:1,tip:'2+1',fiyat:4200000,brut:110,net:92},{kat:2,tip:'2+1',fiyat:4200000,brut:110,net:92},
    {kat:3,tip:'3+1',fiyat:6120000,brut:145,net:122},{kat:4,tip:'3+1',fiyat:6120000,brut:145,net:122},
    {kat:5,tip:'3+1',fiyat:6120000,brut:145,net:122},{kat:6,tip:'Dubleks',fiyat:9800000,brut:210,net:178}
  ];
  var CEPHE = ['Kuzey','Kuzey-Doğu','Doğu','Güney-Doğu','Güney','Güney-Batı','Batı','Kuzey-Batı'];

  function deriveFallback(kod){
    var m;
    if((m = kod.match(/^VK-([A-D])-(\d{2})$/))){
      var bl = m[1], door = parseInt(m[2], 10);
      var f = VK_FLOORS[Math.min(5, Math.floor((door - 1) / 4))];
      return {
        proje:'Vadi Konakları', loc:bl + ' Blok · Kat ' + f.kat, tip:f.tip, cephe:CEPHE[door % 8],

        surec:{tip:'yok'}, gecmis:[{tarih:'1 Oca 2026', desc:'Proje lansmanı — liste fiyatı belirlendi', val:f.fiyat}],
        iliski:[], teklifDurum:'aktif'
      };
    }
    if((m = kod.match(/^GE2-V(\d{2})$/))){
      var n = parseInt(m[1], 10);
      var fiyat = 12800000 + Math.round((16400000 - 12800000) * (n - 1) / 39 / 10000) * 10000;
      return {
        proje:'Göl Evleri 2. Etap', loc:'Parsel ' + Math.ceil(n / 8) + ' sıra', tip:'Villa (bahçeli)', cephe:CEPHE[n % 8],

        surec:{tip:'yok'}, gecmis:[{tarih:'15 Haz 2026', desc:'Ön-satış lansmanı — liste fiyatı belirlendi', val:fiyat}],

      };
    }
    if((m = kod.match(/^KO-B-(\d)(\d{2})$/))){
      var kat = parseInt(m[1], 10), no = parseInt(m[2], 10);
      var fiyatK = 2650000 + kat * 60000;
      return {
        proje:'Kule Ofis B Blok', loc:'B Blok · Kat ' + kat, tip:'Ofis (açık plan)', cephe:CEPHE[no % 8],

        surec:{tip:'teslim', tarih:'20 Mart 2026', tutanak:null},
        gecmis:[{tarih:'10 Eki 2025', desc:'Proje lansmanı — liste fiyatı belirlendi', val:fiyatK}],
        iliski:[], teklifDurum:'satildi'
      };
    }
    /* tanınmayan kod şeması — hiçbir VK/GE2/KO kalıbına uymuyor (D18 Y7: artık
       sessiz genel-varsayılana değil, gvNotFound'a düşer) */
    return null;
  }

  var q = new URLSearchParams(location.search);
  var rawBirim = q.get('birim');
  var kod = (rawBirim || 'VK-B-11').toUpperCase();
  var item = ITEMS[kod] || deriveFallback(kod);

  if(!item){
    gvNotFound({
      code: rawBirim ? rawBirim.toUpperCase() : null,
      tur: 'birim',
      listHref: 'crm-satis-birimler.html', listLbl: 'Birimlere dön',
      defHref: 'crm-satis-birim-detay.html', defLbl: 'Varsayılan kaydı aç'
    });
    return;
  }

  document.title = kod + ' — Birim Detayı — Gavia CRM';
  document.getElementById('crumbNo').textContent = kod;
  document.getElementById('gdEyebrow').textContent = item.proje + ' · ' + item.loc;
  document.getElementById('gdTitle').textContent = kod + ' — ' + item.tip;

  var badges = '<span class="gstat ' + DURUM_LBL[item.durum].tone + '">' + DURUM_LBL[item.durum].lbl + '</span>';
  if(item.uyariBanner) badges += '<span class="gstat danger"><i class="fa-solid fa-triangle-exclamation"></i> Süre Yaklaşıyor</span>';
  document.getElementById('gdBadges').innerHTML = badges;

  document.getElementById('mProje').textContent = item.proje;
  document.getElementById('mLoc').textContent = item.loc;
  document.getElementById('mTip').textContent = item.tip;
  document.getElementById('mCephe').textContent = item.cephe;
  document.getElementById('mM2').textContent = item.brut ? (item.brut + ' m² brüt / ' + item.net + ' m² net') : '—';
  document.getElementById('mFiyat').textContent = item.fiyat ? tl(item.fiyat) : '—';

  /* ---- Süreç kartı ---- */
  var sc = item.surec || {tip:'yok'};
  var surecHtml = '';
  if(sc.tip === 'opsiyon'){
    document.getElementById('surecTitle').innerHTML = '<i class="fa-solid fa-hourglass-half"></i> Opsiyon Sayacı';
    var pct = Math.max(4, Math.round((sc.kalanGun / sc.toplamGun) * 100));
    surecHtml = '<div class="opt-counter">'
      + '<div class="opt-ring" style="background:conic-gradient(var(--danger) ' + pct + '%, var(--bg) 0)"><b>' + sc.kalanGun + '</b><span>gün kaldı</span></div>'
      + '<div class="opt-info"><b>Opsiyon bitiş: ' + sc.bitis + '</b><span>Başlangıç ' + sc.baslangic + ' · toplam ' + sc.toplamGun + ' gün</span></div>'
      + '</div>'
      + '<p style="font-size:12.5px;color:var(--muted);line-height:1.6;margin-top:14px"><i class="fa-solid fa-circle-info"></i> Süre dolduğunda birim otomatik olarak Satışta durumuna döner; uzatma için Satış Müdürü onayı gerekir. <span style="color:var(--danger);font-weight:700">[MOCK-SİM]</span></p>';
  } else if(sc.tip === 'onay-zinciri'){
    document.getElementById('surecTitle').innerHTML = '<i class="fa-solid fa-stamp"></i> Rezerve — Onay Zinciri';
    surecHtml = '<div id="chainEl"></div><p style="font-size:12.5px;color:var(--muted);line-height:1.6;margin-top:14px"><i class="fa-solid fa-circle-info"></i> ' + sc.not + '</p>';
  } else if(sc.tip === 'odeme'){
    document.getElementById('surecTitle').innerHTML = '<i class="fa-solid fa-money-check-dollar"></i> Ödeme Durumu';
    var opct = Math.round((sc.odenen / sc.toplam) * 100);
    surecHtml = '<div class="pay-progress">'
      + '<div class="pay-bar"><div class="pay-bar-fill" style="width:' + opct + '%"></div></div>'
      + '<div class="pay-stats"><span><b>' + sc.odenen + '/' + sc.toplam + '</b> taksit ödendi</span><span>Aylık taksit <b>' + tl(sc.taksit) + '</b></span></div>'
      + '</div>'
      + '<div class="birim-meta" style="margin-top:16px">'
      + '<div><dt>Peşinat</dt><dd>' + tl(sc.peşinat) + '</dd></div>'
      + '<div><dt>Kalan Bakiye</dt><dd class="big">' + tl(sc.kalan) + '</dd></div>'
      + '</div>';
  } else if(sc.tip === 'teslim'){
    document.getElementById('surecTitle').innerHTML = '<i class="fa-solid fa-key"></i> Teslim Durumu';
    surecHtml = '<div class="ctx-row"><span class="ctx-lbl">Teslim tarihi</span><span class="ctx-val">' + sc.tarih + '</span></div>'
      + '<div class="ctx-row" style="border-bottom:none"><span class="ctx-lbl">Teslim tutanağı</span><span class="ctx-val">' + (sc.tutanak || '—') + '</span></div>'
      + '<p style="font-size:12.5px;color:var(--muted);line-height:1.6;margin-top:10px"><i class="fa-solid fa-circle-check" style="color:var(--ok)"></i> Teslim tutanağının 12 kalemlik kontrol listesi tamamlandı; birim kullanıma hazır.</p>';
  } else {
    document.getElementById('surecTitle').innerHTML = '<i class="fa-solid fa-route"></i> Süreç Durumu';
    surecHtml = '<p class="empty-note">Bu birim için henüz açık bir satış süreci yok — durum "' + DURUM_LBL[item.durum].lbl + '".</p>';
  }
  document.getElementById('surecBody').innerHTML = surecHtml;
  if(sc.tip === 'onay-zinciri' && sc.chain){ gvChain(document.getElementById('chainEl'), {steps:sc.chain}); }

  /* ---- Fiyat geçmişi ---- */
  document.getElementById('fhTable').innerHTML = (item.gecmis || []).map(function(g){
    return '<tr><td class="fh-date">' + g.tarih + '</td><td class="fh-desc">' + g.desc + '</td><td class="fh-val">' + tl(g.val) + '</td></tr>';
  }).join('') || '<tr><td class="empty-note" style="padding:4px 0">Fiyat geçmişi kaydı yok.</td></tr>';

  /* ---- İlgili müşteri ---- */
  var mBlock = document.getElementById('musteriBlock');
  if(item.musteri){
    var mu = item.musteri;
    var name = mu.href ? '<a href="' + mu.href + '">' + mu.ad + '</a>' : mu.ad + (mu.hamLead ? ' <span class="gtag" style="margin-left:4px">Kart açılmadı</span>' : '');
    mBlock.innerHTML = '<div class="ctx-link"><div class="who-mark" style="background:rgba(var(--acc-rgb),.14);color:var(--acc-deep)">' + mu.ini + '</div>'
      + '<div>' + name + '<span>' + mu.tur + '</span></div></div>';
  } else {
    mBlock.innerHTML = '<p class="empty-note"><i class="fa-solid fa-user-slash"></i> Bu birime bağlı bir müşteri kaydı yok.</p>';
  }

  /* ---- İlişkili kayıtlar ---- */
  var relBody = document.getElementById('relBody');
  if(item.iliski && item.iliski.length){
    relBody.innerHTML = item.iliski.map(function(r){
      return '<div class="rel-form"><div class="rel-ico"><i class="fa-solid ' + r.ico + '"></i></div>'
        + '<div class="rel-info"><a href="' + r.href + '">' + r.baslik + '</a><span>' + r.alt + '</span></div></div>';
    }).join('');
  } else {
    relBody.innerHTML = '<p class="empty-note">İlişkili teklif, sözleşme veya fırsat kaydı yok.</p>';
  }

  /* ---- Aksiyonlar — Satıldı/Teslim Edildi'de Teklif Oluştur DISABLED ---- */
  var acts = document.getElementById('aksiyonBody');
  var note = document.getElementById('aksiyonNote');
  if(item.teklifDurum === 'satildi'){
    acts.innerHTML = '<button type="button" class="btn btn-ghost btn-sm" disabled title="Bu birim satılmıştır — aynı birim iki müşteriye teklif edilemez." style="opacity:.55;cursor:not-allowed"><i class="fa-solid fa-ban"></i> Teklif Oluştur</button>';
    note.className = 'dm-acts-note danger';
    note.innerHTML = '<i class="fa-solid fa-circle-exclamation"></i> Bu birim satılmıştır — aynı birim iki müşteriye teklif edilemez.';
    acts.querySelector('button').addEventListener('click', function(){
      gvToast('Bu birim satılmıştır — aynı birim iki müşteriye teklif edilemez.', {type:'danger'});
    });
  } else {
    acts.innerHTML = '<a class="btn btn-acc btn-sm" href="crm-satis-teklif-form.html?birim=' + kod + '"><i class="fa-solid fa-file-invoice-dollar"></i> Teklif Oluştur</a>'
      + '<a class="btn btn-ghost btn-sm" href="crm-satis-birimler.html"><i class="fa-solid fa-border-all"></i> Matriste Gör</a>';
    note.innerHTML = '<i class="fa-solid fa-circle-info"></i> Bu birim için yeni bir teklif oluşturulabilir; durum "' + DURUM_LBL[item.durum].lbl + '".';
  }
})();
</script>
</body>
</html>
