<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>Şantiye Kartı — Gavia CRM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
      integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A=="
      crossorigin="anonymous" referrerpolicy="no-referrer">
<link rel="stylesheet" href="assets/css/tokens.css">
<link rel="stylesheet" href="assets/css/shell.css">
<link rel="stylesheet" href="assets/css/ui.css">
<style>
/* ============ SAYFAYA ÖZEL — Şantiye Kartı (sekmeli detay, D18 ?santiye= map) ============ */
.ph-back{display:inline-flex;align-items:center;gap:7px;font-size:12.5px;font-weight:700;color:var(--muted);margin-bottom:10px;transition:.18s var(--ease)}
.ph-back i{font-size:11px}
.ph-back:hover{color:var(--acc-ink)}

/* iki kolonlu içerik ızgarası (panel.html ile aynı desen) */
.dash-cols{display:grid;grid-template-columns:1.55fr 1fr;gap:16px;margin-bottom:16px;align-items:start}
@media(max-width:1100px){.dash-cols{grid-template-columns:minmax(0,1fr)}}

/* şantiye başlık kartı */
.site-hero{display:grid;grid-template-columns:1.7fr 1fr;gap:30px;padding:26px 26px 24px;margin-bottom:22px}
.site-hero-id{display:flex;gap:18px}
.site-hero-mark{width:58px;height:58px;flex:none;border-radius:var(--r-md);display:grid;place-items:center;font-size:19px;font-weight:800;background:rgba(var(--acc-rgb),.12);color:var(--acc-ink)}
.site-hero-info{flex:1;min-width:0}
.site-hero-tags{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.site-hero-prog{display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.site-hero-prog .gbar{min-width:180px;flex:1;max-width:280px}
.hp-lbl{font-size:12px;color:var(--muted);font-weight:600}
.site-hero-meta{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px 22px}
.site-hero-meta dt{font-size:10.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:3px}
.site-hero-meta dd{font-size:13.5px;font-weight:700;color:var(--ink)}
.hero-stats{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;align-content:start}
.hstat{background:var(--bg);border-radius:var(--r-md);padding:14px 16px;display:flex;flex-direction:column;gap:4px}
.hstat-num{font-size:19px;font-weight:800;color:var(--ink);letter-spacing:-.01em;font-variant-numeric:tabular-nums}
.hstat-lbl{font-size:11.5px;color:var(--muted);font-weight:600;line-height:1.3}
.hstat.ok .hstat-num{color:var(--ok)}
.hstat.warn .hstat-num{color:var(--warn)}
a.hstat{border:1px solid transparent;transition:.2s var(--ease)}
a.hstat:hover{border-color:var(--acc-ink);transform:translateY(-2px);box-shadow:var(--sh-sm)}
a.hstat .hstat-lbl i{font-size:10px;margin-left:3px;color:var(--acc-ink)}
.hero-note{display:flex;gap:14px;align-items:flex-start;background:var(--bg);border-radius:var(--r-md);padding:16px 18px}
.hero-note i{color:var(--acc-ink);font-size:17px;margin-top:2px;flex:none}
.hero-note b{display:block;font-size:13.5px;color:var(--ink);margin-bottom:3px}
.hero-note span{font-size:12.5px;color:var(--ink-2);line-height:1.55}
@media(max-width:980px){.site-hero{grid-template-columns:minmax(0,1fr)}}
@media(max-width:640px){
  .site-hero{padding:20px 18px}
  .site-hero-id{flex-direction:column}
  .site-hero-meta{grid-template-columns:1fr}
}

/* sekme çubuğu — alt çizgili, yoğun ERP dili (pill değil) */
.gv-tabs{display:flex;border-bottom:1px solid var(--line);margin-bottom:22px;overflow-x:auto;scrollbar-width:none}
.gv-tabs::-webkit-scrollbar{display:none}
.gv-tab{display:inline-flex;align-items:center;gap:8px;padding:13px 4px;margin-right:26px;flex:none;
  font-family:inherit;font-size:13.5px;font-weight:700;color:var(--muted);background:none;border:none;
  border-bottom:2px solid transparent;white-space:nowrap;cursor:pointer;transition:.18s var(--ease)}
.gv-tab i{font-size:13px}
.gv-tab:hover{color:var(--ink)}
.gv-tab.is-active{color:var(--acc-ink);border-color:var(--acc-ink)}
.gv-tab .tb-cnt{font-size:10.5px;font-weight:700;background:var(--bg);color:var(--ink-2);padding:1px 6px;border-radius:var(--r-pill)}
.gv-tab.is-active .tb-cnt{background:rgba(var(--acc-rgb),.16);color:var(--acc-deep)}
.tab-panel{animation:tabIn .22s var(--ease)}
@keyframes tabIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

/* Özet: kategori ilerleme satırları + kilometre taşı vurgusu */
.cat-row{display:flex;align-items:center;gap:16px;padding:12px 0}
.cat-row:first-child{padding-top:0}
.cat-label{width:150px;flex:none;font-size:13px;font-weight:700;color:var(--ink-2)}
.cat-row .gbar{flex:1}
.milestone-box{display:flex;gap:14px;align-items:flex-start;background:var(--gv-mint-glow);border:1px solid rgba(var(--acc-rgb),.25);border-radius:var(--r-md);padding:16px 18px;margin-top:18px}
.milestone-box i{color:var(--acc-ink);font-size:17px;margin-top:2px;flex:none}
.milestone-box b{display:block;font-size:13.5px;color:var(--ink);margin-bottom:3px}
.milestone-box span{font-size:12.5px;color:var(--ink-2)}

/* İş Programı: gerçek sıra taşıyan kilometre taşı zaman çizelgesi */
.ml-timeline{list-style:none;padding:22px 22px 4px;display:flex;flex-direction:column}
.ml-item{position:relative;padding-left:34px;padding-bottom:26px}
.ml-item:last-child{padding-bottom:2px}
.ml-item::before{content:"";position:absolute;left:9px;top:22px;bottom:-6px;width:2px;background:var(--line)}
.ml-item:last-child::before{display:none}
.ml-dot{position:absolute;left:0;top:2px;width:20px;height:20px;border-radius:var(--r-circle);background:var(--paper);border:2px solid var(--line-2);display:grid;place-items:center;font-size:9px;color:var(--muted)}
.ml-item.done .ml-dot{background:var(--ok);border-color:var(--ok);color:#fff}
.ml-item.active .ml-dot{border-color:var(--acc-ink);box-shadow:0 0 0 4px rgba(var(--acc-rgb),.16)}
.ml-item.active .ml-dot::after{content:"";width:8px;height:8px;border-radius:var(--r-circle);background:var(--acc-ink)}
.ml-body b{display:block;font-size:13.5px;font-weight:700;color:var(--ink)}
.ml-body span{font-size:12px;color:var(--muted)}
.ml-body .ml-sapma{display:inline-block;margin-top:5px}

/* Ekip: şef satırı (personel kartına bağlı) */
.chief-row{display:flex;align-items:center;gap:14px;border-radius:var(--r-md);transition:.18s var(--ease)}
.chief-row b{display:block;font-size:14.5px;font-weight:800;color:var(--ink);transition:.18s var(--ease)}
.chief-row span{display:block;font-size:12.5px;color:var(--muted);margin-top:2px}
.chief-row:hover b{color:var(--acc-ink)}

/* İSG: özet istatistik ızgarası */
.isg-stats{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}
@media(max-width:640px){.isg-stats{grid-template-columns:1fr}}

/* Puantaj sekmesi — haftalık grid (yalnız Vadi Konakları temsili derinlikte) */
.sp-scroll{overflow-x:auto}
#tblSpPuantaj{min-width:640px;border-collapse:separate;border-spacing:0}
#tblSpPuantaj th,#tblSpPuantaj td{border-bottom:1px solid var(--line)}
#tblSpPuantaj tbody tr:last-child td{border-bottom:none}
.col-sp-per{width:190px;text-align:left}
.col-sp-gun{width:64px;text-align:center!important}
.col-sp-gun span{display:block;font-weight:800;color:var(--ink);margin-top:1px}
.col-sp-gun.is-today{background:rgba(var(--acc-rgb),.05)}
.col-sp-gun.is-today span{color:var(--acc-ink)}
td.col-sp-gun.is-today{background:rgba(var(--acc-rgb),.05)}

.sp-cell{display:flex;align-items:center;gap:11px;min-width:0}
.sp-mark{width:32px;height:32px;flex:none;border-radius:var(--r-sm);display:grid;place-items:center;font-size:11.5px;font-weight:800;background:rgba(var(--acc-rgb),.12);color:var(--acc-ink)}
.sp-info{min-width:0;line-height:1.3}
.sp-info b{display:block;font-size:12.5px;font-weight:700;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sp-info span{font-size:10.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.sp-mark-day{width:30px;height:30px;margin:0 auto;border-radius:var(--r-sm);display:grid;place-items:center;font-size:12px;position:relative;cursor:default}
.sp-mark-day.tam{background:var(--ok-tint);color:var(--ok)}
.sp-mark-day.yarim{background:var(--warn-tint);color:var(--warn)}
.sp-mark-day.yok{background:var(--danger-tint);color:var(--danger)}
.sp-mark-day.izin{background:var(--info-tint);color:var(--info)}
.sp-mark-day.rapor{background:var(--bg);color:var(--muted);border:1px solid var(--line-2)}
.sp-mark-day.fm{background:rgba(var(--acc-rgb),.14);color:var(--acc-ink)}
.sp-mark-day.em{background:color-mix(in srgb,var(--warn) 22%,var(--warn-tint));color:color-mix(in srgb,var(--warn) 72%,black)}
.sp-mark-day.rt{background:transparent;color:var(--ink-2);border:1px dashed color-mix(in srgb,var(--danger) 45%,var(--line-2))}
.sp-mark-day.ht{background:transparent;color:var(--line-2);border:1px dashed var(--line)}

.sp-mark-day[data-tip]:hover::after,.sp-mark-day[data-tip]:focus-visible::after{opacity:1;transform:translateX(-50%) translateY(0)}
.sp-mark-day[data-tip]::after{
  content:attr(data-tip);position:absolute;bottom:calc(100% + 8px);left:50%;
  transform:translateX(-50%) translateY(3px);
  background:var(--ink);color:var(--paper);font-size:11px;font-weight:600;white-space:nowrap;
  padding:5px 9px;border-radius:7px;box-shadow:var(--sh-md);
  opacity:0;pointer-events:none;transition:opacity .15s var(--ease),transform .15s var(--ease);z-index:20;
}

.sp-legend{display:flex;flex-wrap:wrap;gap:14px;padding:14px 22px;border-top:1px solid var(--line);font-size:11.5px;color:var(--ink-2)}
.sp-legend .lg-item{display:inline-flex;align-items:center;gap:6px}
.sp-legend .lg-sw{width:17px;height:17px;border-radius:6px;flex:none;display:grid;place-items:center;font-size:8.5px}
.sp-legend .lg-sw.tam{background:var(--ok-tint);color:var(--ok)}
.sp-legend .lg-sw.yarim{background:var(--warn-tint);color:var(--warn)}
.sp-legend .lg-sw.yok{background:var(--danger-tint);color:var(--danger)}
.sp-legend .lg-sw.izin{background:var(--info-tint);color:var(--info)}
.sp-legend .lg-sw.rapor{background:var(--bg);color:var(--muted);border:1px solid var(--line-2)}
.sp-legend .lg-sw.fm{background:rgba(var(--acc-rgb),.14);color:var(--acc-ink)}
.sp-legend .lg-sw.em{background:color-mix(in srgb,var(--warn) 22%,var(--warn-tint));color:color-mix(in srgb,var(--warn) 72%,black)}
.sp-legend .lg-sw.ht{background:transparent;color:var(--line-2);border:1px dashed var(--line)}
@media(max-width:640px){
  .sp-legend{padding:12px 16px;gap:10px}
}

/* Dosyalar: dosya satırı */
.file-row{display:flex;align-items:center;gap:14px;padding:14px 22px;border-bottom:1px solid var(--line);transition:background .15s}
.file-row:last-child{border-bottom:none}
.file-row:hover{background:var(--bg)}
.file-ico{width:38px;height:38px;flex:none;border-radius:var(--r-sm);display:grid;place-items:center;font-size:15px;background:var(--info-tint);color:var(--info)}
.file-ico.xls{background:var(--ok-tint);color:var(--ok)}
.file-ico.dwg{background:var(--warn-tint);color:var(--warn)}
.file-info{flex:1;min-width:0;line-height:1.35}
.file-info b{display:block;font-size:13.5px;font-weight:700;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.file-info span{font-size:12px;color:var(--muted)}
.file-meta{flex:none;font-size:12px;color:var(--muted);text-align:right;min-width:104px}
@media(max-width:640px){.file-meta{display:none}}
</style>
</head>

        <a class="btn btn-acc btn-sm" href="#" data-demo="Foto/not paylaşımı bu prototipte simülasyondur (demo)."><i class="fa-solid fa-camera"></i> Saha Bildirimi Gönder</a>

<script src="assets/js/shell.js"></script>
<script src="assets/js/ui.js"></script>
<script>
(function(){
  if(!window.GV) return;

  /* ============ D18 Y9 — ?santiye= KAYIT MAP ============
     Kaynak: crm-santiye.html liste satırları (tür/konum/müşteri/şef/ilerleme/personel/durum)
     BİREBİR. Vadi Konakları TEMSİLİ kayıt — mevcut hardcode içerik AYNEN (D8/D9/D17
     dalgalarında üretilmiş kasa/puantaj/İSG/bildirim/talep çaprazları korunur, DEFAULT).
     Liman ve Merkez: hero + Ekip/Kasa/İSG/Saha Bildirimleri sekmeleri YALNIZ mevcut
     kanonik çapraz kayıtlardan derlendi (kasa defteri D8 bloğu, İSG KAYITLAR dizisi,
     saha bildirimleri feed'i, yemekhane taşeron eşleşmesi) — İş Programı/Puantaj/Proje
     Bilgileri/Dosyalar için çapraz kayıt YOK, temsili-derinlik kuralı gereği tasarlanmış
     boş durum gösterilir (uydurma yok). Göl Evleri (planlama) ve Kule Ofis (teslim
     edildi) için tüm sekmeler durum kartı + boş durumdur. */
  var PER = { hasan:'004', aylin:'005', omer:'006', sukru:'016', metin:'018', recep:'020' };

  function emptyCard(icon, title, text, linkHref, linkLbl){
    return '<div class="gv-card"><div class="gv-empty" style="padding:38px 24px">'
      + '<div class="ge-ico"><i class="fa-solid '+icon+'"></i></div>'
      + '<h4>'+title+'</h4><p>'+text+'</p>'
      + (linkHref ? '<a class="btn btn-ghost btn-sm" style="margin-top:14px" href="'+linkHref+'">'+linkLbl+'</a>' : '')
      + '</div></div>';
  }

  /* ---- İSG çaprazı: crm-santiye-isg.html KAYITLAR dizisiyle BİREBİR (bkz. o dosya) ---- */
  var ISG_BY_SITE = {
    liman: [
      {no:'010', tur:'Ramak Kala',   ic:'fa-triangle-exclamation', tarih:'1 Tem 2026',  konu:'Vinç yükü altından geçiş',        sorumlu:'Şükrü Aslan', durum:'İnceleniyor', st:'warn'},
      {no:'007', tur:'Kaza Raporu',  ic:'fa-kit-medical',          tarih:'27 Haz 2026', konu:'Forklift çarpması — hafif yaralanma', sorumlu:'Aylin Koç', durum:'İnceleniyor', st:'danger'},
      {no:'004', tur:'Denetim',      ic:'fa-clipboard-check',      tarih:'18 Haz 2026', konu:'Aliağa Liman İşletmeleri saha denetimi', sorumlu:'Aylin Koç', durum:'Bulgu Yok', st:'ok'}
    ],
    merkez: [
      {no:'009', tur:'Denetim',      ic:'fa-clipboard-check',      tarih:'30 Haz 2026', konu:'Aylık İSG iç denetimi',           sorumlu:'Ömer Taşkın', durum:'Bulgu Var — Takipte', st:'warn'},
      {no:'005', tur:'Ramak Kala',   ic:'fa-triangle-exclamation', tarih:'22 Haz 2026', konu:'Forklift-yaya güzergah kesişimi', sorumlu:'Recep Yaman', durum:'Kapatıldı', st:'ok'},
      {no:'002', tur:'Toolbox Eğitimi', ic:'fa-chalkboard-user',   tarih:'10 Haz 2026', konu:'Yangın güvenliği ve tahliye tatbikatı', sorumlu:'Ömer Taşkın', durum:'Tamamlandı', st:'ok'}
    ]
  };
  function isgTab(site){
    var recs = ISG_BY_SITE[site.key];
    var acik = recs.filter(function(r){ return r.st === 'warn' || r.st === 'danger'; }).length;
    var rows = recs.map(function(r){
      return '<div class="act-row"><a href="crm-santiye-isg-detay.html?isg='+r.no+'" style="display:contents">'
        + '<div class="act-ico '+(r.st==='ok'?'ok':(r.st==='danger'?'':'warn'))+'"><i class="fa-solid '+r.ic+'"></i></div>'
        + '<div class="act-info"><b>ISG-2026-'+r.no+' — '+r.konu+'</b><span>'+r.tur+' · '+r.sorumlu+' · '+r.tarih+'</span></div>'
        + '<span class="gstat '+r.st+'">'+r.durum+'</span></a></div>';
    }).join('');
    return '<div class="gv-card"><div class="gc-head"><div class="gc-title"><i class="fa-solid fa-shield-halved"></i> İSG Özeti</div>'
      + '<a class="gc-link" href="crm-santiye-isg.html">Tüm tutanakları gör <i class="fa-solid fa-arrow-right"></i></a></div>'
      + '<div class="gc-body"><div class="isg-stats">'
      + '<div class="hstat"><span class="hstat-num">'+recs.length+'</span><span class="hstat-lbl">Tutanak · son 30 gün</span></div>'
      + '<div class="hstat '+(acik?'warn':'ok')+'"><span class="hstat-num">'+acik+'</span><span class="hstat-lbl">Açık / takipte</span></div>'
      + '<div class="hstat"><span class="hstat-num">'+recs[0].tarih+'</span><span class="hstat-lbl">Son kayıt tarihi</span></div>'
      + '</div></div><div>'+rows+'</div></div>';
  }

  /* ---- Kasa çaprazı: crm-operasyon-kasa.html #tblDefter D8 bloğuyla BİREBİR ---- */
  var KASA_BY_SITE = {
    liman: { devir:'₺31.750', giris:'+₺0', cikis:'−₺13.230', mevcut:'₺18.520', tutan:'Aylin Koç',
      rows:[
        {ic:'fa-truck', ad:'Aliağa Yapı Malzemeleri — malzeme nakit alımı', kod:'KSA-2026-020', tutar:'−₺9.750'},
        {ic:'fa-droplet', ad:'Ege Su Dağıtım — içme suyu + temizlik sarfı', kod:'KSA-2026-038', tutar:'−₺3.480'}
      ] },
    merkez: { devir:'₺12.860', giris:'+₺60.000', cikis:'−₺8.170', mevcut:'₺64.690', tutan:'Ömer Taşkın',

    s.tab.puantaj = emptyCard('fa-clipboard-user', 'Puantaj grid\'i bu şantiyede yok', 'Günlük puantaj detayı bu prototipte yalnızca Vadi Konakları için girildi.', 'crm-operasyon-puantaj.html?santiye='+k, 'Puantaj sayfasını aç');
    s.tab.kasa = kasaTab(s);
    s.tab.bildirim = bildirimTab(s);
    s.tab.isg = isgTab(s);
    s.tab.dosya = emptyCard('fa-folder-open', 'Dosya yok', 'Bu şantiye için henüz yüklenmiş bir dosya bulunmuyor.', null, null);
  });

  /* ============ GÖL / KULE — durum kartı + boş sekmeler ============ */
  ['gol','kule'].forEach(function(k){
    var s = SITES[k];
    var msg = s.planlama
      ? 'Göl Evleri 2. Etap planlama aşamasındadır; şef ataması, ekip ve kasa açılışı Eylül 2026 saha mobilizasyonuyla birlikte yapılacaktır.'
      : 'Kule Ofis B Blok Mart 2026\'da Körfez GYO\'ya teslim edilmiştir; proje kaydı arşivde saklanır, aktif saha hareketi bulunmuyor.';
    s.tab.ozet = '<div class="gv-card"><div class="gc-body"><div class="hero-note">'
      + '<i class="fa-solid '+(s.planlama?'fa-compass-drafting':'fa-flag-checkered')+'"></i>'
      + '<div><b>'+(s.planlama?'Planlama aşamasında':'Proje teslim edildi')+'</b><span>'+msg+'</span></div></div></div></div>';
    s.tab.program = emptyCard('fa-calendar-days', 'İş programı yok', s.planlama ? 'Saha mobilizasyonu başlamadan iş programı oluşturulmaz.' : 'Proje teslim edildiği için iş programı arşivlenmiştir.', null, null);
    s.tab.ekip = emptyCard('fa-users', 'Ekip ataması yok', s.planlama ? 'Şantiye şefi ve saha ekibi mobilizasyonla birlikte atanacaktır.' : 'Teslim sonrası saha ekibi başka projelere yönlendirilmiştir.', null, null);
    s.tab.puantaj = emptyCard('fa-clipboard-user', 'Puantaj kaydı yok', 'Bu şantiyede aktif puantaj hareketi bulunmuyor.', null, null);
    s.tab.kasa = emptyCard('fa-cash-register', s.planlama ? 'Kasa henüz açılmadı' : 'Kasa kapandı', s.planlama ? 'Şantiye kasası, saha mobilizasyonuyla birlikte açılacaktır.' : 'Proje teslimiyle birlikte şantiye kasası kapatılmış, dönem arşivde saklanmaktadır.', null, null);
    s.tab.bildirim = emptyCard('fa-camera', 'Saha bildirimi yok', 'Bu şantiyede aktif saha kadrosu bulunmadığından paylaşılmış bir bildirim yok.', 'crm-santiye-bildirimler.html', 'Tüm bildirimleri gör');
    s.tab.isg = emptyCard('fa-shield-halved', 'İSG tutanağı yok', 'Bu şantiyede aktif saha faaliyeti bulunmadığından İSG tutanağı kaydı yok.', null, null);
    s.tab.dosya = emptyCard('fa-folder-open', 'Dosya yok', 'Bu şantiye için henüz yüklenmiş bir dosya bulunmuyor.', null, null);
  });

  var TAB_ORDER = [
    {id:'ozet',    ic:'fa-chart-simple',     lbl:'Özet'},
    {id:'program', ic:'fa-calendar-days',    lbl:'İş Programı'},
    {id:'ekip',    ic:'fa-users',            lbl:'Ekip'},
    {id:'puantaj', ic:'fa-clipboard-user',   lbl:'Puantaj'},
    {id:'kasa',    ic:'fa-cash-register',    lbl:'Kasa'},
    {id:'bildirim',ic:'fa-camera',           lbl:'Saha Bildirimleri'},
    {id:'isg',     ic:'fa-shield-halved',    lbl:'İSG'},
    {id:'dosya',   ic:'fa-folder-open',      lbl:'Dosyalar'}
  ];
  var BIL_COUNT = { vadi:3, liman:3, merkez:2, gol:0, kule:0 };

  function render(site){
    document.title = site.name + ' — Şantiye Kartı — Gavia CRM';
    document.getElementById('phEyebrow').textContent = 'Saha · ' + site.tip;
    document.getElementById('phTitle').textContent = site.name;
    document.getElementById('phSub').textContent = site.konum + ' · ' + site.musteri;
    document.getElementById('actTalepY').href = 'crm-satinalma-talep-form.html?s=' + site.key;
    document.getElementById('actTalepS').href = 'crm-satinalma-talep-form.html?s=' + site.key;

    var tabsHtml = TAB_ORDER.map(function(t, i){
      var cnt = t.id === 'bildirim' ? ' <span class="tb-cnt">'+BIL_COUNT[site.key]+'</span>' : '';
      return '<button class="gv-tab'+(i===0?' is-active':'')+'" data-tab="'+t.id+'" role="tab" aria-selected="'+(i===0?'true':'false')+'"><i class="fa-solid '+t.ic+'"></i> '+t.lbl+cnt+'</button>';
    }).join('');
    var panelsHtml = TAB_ORDER.map(function(t, i){
      return '<section class="tab-panel" data-tab-panel="'+t.id+'" role="tabpanel" aria-label="'+t.lbl+'"'+(i===0?'':' hidden')+'>'+(site.tab[t.id]||'')+'</section>';
    }).join('');

    document.getElementById('siteRoot').innerHTML = heroHtml(site)
      + '<div class="gv-tabs" role="tablist" aria-label="Şantiye detay sekmeleri">'+tabsHtml+'</div>'
      + panelsHtml;

    /* Özet sekmesi — kayıt rozetleri (yalnız Vadi'de MLZ data-badge var) */
    document.querySelectorAll('[data-badge]').forEach(function(el){
      el.innerHTML = gvChainBadge(el.getAttribute('data-badge'));
    });

    /* sekme motoru: tık + URL hash, hafif geçiş animasyonu (D13 idiyomu) */
    var tabs = Array.prototype.slice.call(document.querySelectorAll('.gv-tab'));
    var panels = Array.prototype.slice.call(document.querySelectorAll('.tab-panel'));
    function activate(id){
      tabs.forEach(function(t){
        var on = t.getAttribute('data-tab') === id;
        t.classList.toggle('is-active', on);
        t.setAttribute('aria-selected', on ? 'true' : 'false');
      });
      panels.forEach(function(p){ p.hidden = p.getAttribute('data-tab-panel') !== id; });
    }
    tabs.forEach(function(t){
      t.addEventListener('click', function(){
        var id = t.getAttribute('data-tab');
        activate(id);
        history.replaceState(null, '', '#' + id);
      });
    });
    document.querySelectorAll('[data-tab-goto]').forEach(function(el){
      el.addEventListener('click', function(e){
        e.preventDefault();
        var id = el.getAttribute('data-tab-goto');
        activate(id);
        history.replaceState(null, '', '#' + id);
        var btn = document.querySelector('.gv-tab[data-tab="' + id + '"]');
        if(btn){ btn.scrollIntoView({block:'nearest', inline:'center'}); btn.focus(); }
      });
    });
    var initial = (location.hash || '').replace('#', '');
    var valid = tabs.some(function(t){ return t.getAttribute('data-tab') === initial; });
    activate(valid ? initial : 'ozet');

    /* rol daraltması: yalnız superadmin/sahip/yonetim/teknik/sef bu bölüme erişir (shell.js ROLES.secs) */
    var MAP = { superadmin:'yonetim', sahip:'yonetim', yonetim:'yonetim', teknik:'yonetim', sef:'sef' };
    var view = MAP[GV.role] || 'yonetim';
    document.querySelectorAll('[data-view]').forEach(function(el){
      el.hidden = el.getAttribute('data-view') !== view;
    });

    if(typeof GV.crumb === 'function') GV.crumb(site.name);
  }

  var SITE_KEYS = ['vadi','liman','merkez','gol','kule'];
  var reqSite = new URLSearchParams(location.search).get('santiye');

  /* şef budaması — yalnız kendi şantiyesini görür; başka bir şantiyeye doğrudan URL ile
     gidilirse sessizce Vadi Konakları'na döner (liste sayfasındaki satır kaldırma
     davranışının detay sayfasındaki karşılığı) */
  if(GV.role === 'sef' && reqSite && reqSite !== 'vadi'){
    location.replace('crm-santiye-detay.html?santiye=vadi');
    return;
  }

  if(!reqSite){
    render(SITES.vadi);
  } else if(SITE_KEYS.indexOf(reqSite) !== -1){
    render(SITES[reqSite]);
  } else {
    gvNotFound({
      code: reqSite, tur:'şantiye',
      listHref:'crm-santiye.html', listLbl:'Şantiye listesine dön',
      defHref:'crm-santiye-detay.html?santiye=vadi', defLbl:'Vadi Konakları\'nı aç'
    });
  }
})();
</script>
</body>
</html>
