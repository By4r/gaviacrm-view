<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>Ø16 Nervürlü İnşaat Demiri — Stok Kalemi — Gavia CRM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
      integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A=="
      crossorigin="anonymous" referrerpolicy="no-referrer">
<link rel="stylesheet" href="assets/css/tokens.css">
<link rel="stylesheet" href="assets/css/shell.css">
<link rel="stylesheet" href="assets/css/ui.css">
<style>
/* ============ SAYFAYA ÖZEL — Stok Kalem Detayı (?kalem= çok-kayıt şablonu) ============ */
.gv-crumb{display:flex;align-items:center;gap:9px;font-size:12.5px;font-weight:600;color:var(--muted);margin-bottom:14px}
.gv-crumb a{color:var(--acc-ink);font-weight:700}
.gv-crumb a:hover{color:var(--acc-deep)}
.gv-crumb i{font-size:9px;color:var(--line-2)}

.gd-head{display:flex;align-items:flex-start;justify-content:space-between;gap:20px;margin-bottom:22px;flex-wrap:wrap}
.gd-head h1{font-size:22px;letter-spacing:-.015em;margin-bottom:9px;max-width:560px}
.gd-badges{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.gd-eyebrow{font-size:11.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--acc-ink);margin-bottom:8px}

.gd-grid{display:grid;grid-template-columns:minmax(0,1fr) 340px;gap:18px;align-items:start}
@media(max-width:980px){.gd-grid{grid-template-columns:minmax(0,1fr)}}

.gd-block{padding:22px}
.gd-block + .gd-block{border-top:1px solid var(--line)}
.gd-label{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}

.ctx-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:9px 0;font-size:13px}
.ctx-row:not(:last-child){border-bottom:1px solid var(--line)}
.ctx-row .ctx-lbl{color:var(--muted)}
.ctx-row .ctx-val{color:var(--ink);font-weight:700;text-align:right}
.ctx-row .ctx-val a{color:var(--acc-ink)}
.ctx-link{display:flex;align-items:center;gap:11px;padding:6px 0}
.ctx-link .who-mark{width:36px;height:36px;flex:none;border-radius:var(--r-sm);display:grid;place-items:center;font-size:13px;font-weight:800}
.ctx-link a{font-size:13.5px;font-weight:700;color:var(--ink)}
.ctx-link a:hover{color:var(--acc-ink)}
.ctx-link span{display:block;font-size:11.5px;color:var(--muted)}

/* min-stok eşik çubuğu */
.stok-bar{display:flex;align-items:center;gap:10px;margin-top:4px}
.stok-bar-track{flex:1;height:8px;border-radius:var(--r-pill);background:var(--bg);border:1px solid var(--line);overflow:hidden}
.stok-bar-fill{height:100%;border-radius:var(--r-pill);background:var(--ok)}
.stok-bar-fill.danger{background:var(--danger)}
.stok-bar-val{font-size:12px;font-weight:700;color:var(--ink-2);white-space:nowrap;flex:none}

/* uyarı bandı */
.warn-band{margin:0 0 16px;padding:16px 20px;border-radius:var(--r-md);border:1px solid var(--danger);background:var(--danger-tint);display:flex;gap:12px;align-items:flex-start}
.warn-band i{color:var(--danger);font-size:16px;margin-top:2px;flex:none}
.warn-band p{font-size:13px;line-height:1.65;color:var(--ink-2)}
.warn-band b{color:var(--ink)}

.gv-empty-mini{padding:26px 22px;text-align:center;color:var(--muted);font-size:13px}
</style>
</head>
<body data-sec="satinalma" data-screen="stok">
<div class="gv-app">
  <aside class="gv-rail" id="gvRail"></aside>
  <nav class="gv-menu" id="gvMenu"></nav>
  <div class="gv-divider" id="gvDivider" role="separator" aria-label="Menüyü daralt/genişlet"><span class="gv-grip"></span></div>
  <div class="gv-overlay" id="gvOverlay"></div>

  <header class="gv-top">
    <button class="gv-burger" id="gvBurger" aria-label="Menü"><i class="fa-solid fa-bars"></i></button>
    <div class="gv-search"><i class="fa-solid fa-magnifying-glass"></i><input type="text" placeholder="Ara"></div>
    <div class="gv-top-tools">
      <button class="gv-iconbtn" data-tip="Bildirimler" aria-label="Bildirimler"><i class="fa-regular fa-bell"></i><span class="gb-dot"></span></button>
      <div class="gv-me">
        <div class="me-ava" id="gvAva">·</div>
        <div class="me-id"><div class="me-name" id="gvName">—</div><div class="me-role" id="gvRole">—</div></div>
        <i class="fa-solid fa-chevron-down"></i>
      </div>
    </div>
  </header>

  <main class="gv-main">
    <div class="gv-crumb">
      <a href="crm-satinalma-stok.html">Stok &amp; Depo</a>
      <i class="fa-solid fa-chevron-right"></i>
      <span id="crumbAd">—</span>
    </div>

    <div class="gd-head">
      <div>
        <div class="gd-eyebrow" id="gdEyebrow">—</div>
        <h1 id="gdTitle">—</h1>
        <div class="gd-badges">
          <span class="gtag" id="catTag" style="border-color:transparent"></span>
          <span class="gstat" id="durumBadge">—</span>
        </div>
      </div>
      <div class="ph-actions">
        <a class="btn btn-ghost btn-sm" href="crm-satinalma-stok.html"><i class="fa-solid fa-arrow-left"></i> Listeye Dön</a>
      </div>
    </div>

    <div id="warnBand"></div>

    <div class="gd-grid">
      <!-- ============ SOL: içerik ============ -->
      <div class="gv-side-stack" style="display:flex;flex-direction:column;gap:16px">
        <div class="gv-card">
          <div class="gd-block">
            <div class="gd-label">Depo &amp; Stok Bilgisi</div>
            <div class="ctx-row"><span class="ctx-lbl">Depo</span><span class="ctx-val" id="stDepo">—</span></div>
            <div class="ctx-row"><span class="ctx-lbl">Sorumlu</span><span class="ctx-val" id="stSorumlu">—</span></div>
            <div class="ctx-row"><span class="ctx-lbl">Mevcut Miktar</span><span class="ctx-val" id="stMevcut">—</span></div>
            <div class="ctx-row"><span class="ctx-lbl">Birim Değer</span><span class="ctx-val" id="stBirim">—</span></div>
            <div class="ctx-row" style="border-bottom:none"><span class="ctx-lbl">Toplam Değer</span><span class="ctx-val" id="stToplam">—</span></div>
            <div style="margin-top:12px">
              <div class="gd-label" style="margin-bottom:6px">Min-Stok Eşiği</div>
              <div class="stok-bar">
                <div class="stok-bar-track"><div class="stok-bar-fill" id="stokBarFill"></div></div>
                <span class="stok-bar-val" id="stokBarVal">—</span>
              </div>
            </div>
          </div>
        </div>

        <div class="gv-card">
          <div class="gc-head"><div class="gc-title"><i class="fa-solid fa-clock-rotate-left"></i> Hareket Geçmişi</div></div>
          <div class="gc-body flush">
            <table class="gtable" id="tblGecmis" hidden>
              <thead><tr><th>Belge</th><th style="width:110px">Tarih</th><th style="width:120px">Tür</th><th>Açıklama</th></tr></thead>
              <tbody id="gecmisBody"></tbody>
            </table>
            <div class="gv-empty-mini" id="gecmisEmpty" hidden>Bu dönemde bu kalem için hareket kaydı yok.</div>
          </div>
        </div>
      </div>

      <!-- ============ SAĞ: bağlam ============ -->
      <div class="gv-side-stack" style="display:flex;flex-direction:column;gap:16px">
        <div class="gv-card">
          <div class="gd-block">
            <div class="gd-label">Bağlı Belgeler</div>
            <div id="belgeList"></div>
          </div>
        </div>
        <div class="gv-card">
          <div class="gd-block">
            <div class="gd-label">Not</div>
            <p style="font-size:12.5px;color:var(--ink-2);line-height:1.7" id="notText">—</p>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="assets/js/shell.js"></script>
<script src="assets/js/ui.js"></script>
<script>
(function(){
  if(!window.GV) return;

  function tl(n){ return '₺' + Math.round(n).toLocaleString('tr-TR'); }
  function num(n, d){ return n.toLocaleString('tr-TR', {minimumFractionDigits:d||0, maximumFractionDigits:d||2}); }

  var KAT = {
    demir:   {lbl:'Demir & Çelik',       ic:'fa-grip-lines-vertical', bg:'var(--bg)', fg:'var(--ink-2)'},
    yapi:    {lbl:'Yapı Malzemesi',      ic:'fa-trowel-bricks',       bg:'rgba(var(--acc-rgb),.12)', fg:'var(--acc-ink)'},
    elektrik:{lbl:'Elektrik Malzemesi',  ic:'fa-bolt',                bg:'var(--info-tint)', fg:'var(--info)'},
    isg:     {lbl:'İSG Malzemesi',       ic:'fa-hard-hat',            bg:'var(--danger-tint)', fg:'var(--danger)'},
    sarf:    {lbl:'Hırdavat & Sarf',     ic:'fa-toolbox',             bg:'var(--warn-tint)', fg:'var(--warn)'}
  };
  var DEPO = {
    'D-MRK':{ad:'Merkez Ana Depo', kod:'D-MRK', sorumlu:'Recep Yaman'},
    'D-VDI':{ad:'Vadi Şantiye Deposu', kod:'D-VDI', sorumlu:'İbrahim Sönmez'},
    'D-LMN':{ad:'Liman Şantiye Deposu', kod:'D-LMN', sorumlu:'Şükrü Aslan'},
    'D-ARC':{ad:'Araç Deposu (mobil — ARC-06 üstü)', kod:'D-ARC', sorumlu:'Recep Yaman'}
  };

  /* ---- ?kalem= çok-kayıt şablonu — 23 kalemin tamamı crm-satinalma-stok.html listesiyle
     BİREBİR (bkz. shell.js "DALGA 12 KANONİK TANIMLAR — STOK & DEPO"). 3 kalem zengin
     içerik (demir-o16 DEFAULT, kablo-nym, isg-kkd — üçü de min-stok altı); kalanı
     ortak şablonla render edilir. ---- */
  var ITEMS = {
    'demir-o10':{ad:'Ø10 Nervürlü İnşaat Demiri', kat:'demir', depo:'D-VDI', mevcut:9.5, olcu:'t', min:4, birim:28800, toplam:273600, sip:'SIP-2026-05', tdr:'TDR-03'},
    'demir-o12':{ad:'Ø12 Nervürlü İnşaat Demiri', kat:'demir', depo:'D-VDI', mevcut:13.0, olcu:'t', min:8, birim:28200, toplam:366600, sip:'SIP-2026-05', tdr:'TDR-03'},
    'demir-o16':{ad:'Ø16 Nervürlü İnşaat Demiri', kat:'demir', depo:'D-VDI', mevcut:1.7, olcu:'t', min:5, birim:28500, toplam:48450, altMin:true, sip:'SIP-2026-05', tdr:'TDR-03',
      uyari:'Mevcut stok (1,7 t) minimum eşiğin (5 t) altında. SIP-2026-05 sevkiyatında Ø16 kaleminde 12 t sipariş edildi, ancak irsaliyelerle yalnızca 11,6 t teslim alındı (<b>−0,4 t miktar uyuşmazlığı</b>, bkz. Marmara Demir Çelik tedarikçi kartı). Teslim alınan miktarın büyük bölümü B Blok imalatında sarf edildi; kalan stok kritik seviyede.',
      not:'Bu kalem, SIP-2026-05 (Marmara Demir Çelik, 88 ton toplam nervürlü demir) sevkiyatının Ø16 bileşenidir. İki irsaliye (IRS-2026-12 + IRS-2026-14) ile toplam 11,6 ton teslim alındı; sipariş miktarı 12 ton olduğundan 0,4 tonluk açık, tedarikçi kartındaki teslimat performansı notunda da izlenir.',
      gecmis:[
        {no:'STK-2026-041', tarih:'18 Haz 2026', tur:'giris', aciklama:'IRS-2026-12 mal kabulü — Ø16 6,4 t (Ø12 20 t + Ø20 14 t ile birlikte, aynı sevkiyat)'},
        {no:'STK-2026-047', tarih:'26 Haz 2026', tur:'giris', aciklama:'IRS-2026-14 mal kabulü — Ø16 5,2 t (Ø10 8 t + Ø12 18 t + Ø20 16 t ile birlikte, aynı sevkiyat)'},
        {no:'STK-2026-052', tarih:'2 Tem 2026', tur:'cikis', aciklama:'B Blok 3. kat demir imalatı — Ø12 4,2 t (aynı SIP-2026-05 sevkiyat kapsamı, farklı çap)'}
      ]},
    'demir-o20':{ad:'Ø20 Nervürlü İnşaat Demiri', kat:'demir', depo:'D-VDI', mevcut:13.4, olcu:'t', min:6, birim:27900, toplam:373860, sip:'SIP-2026-05', tdr:'TDR-03'},
    'sap-betonu':{ad:'Şap Betonu Kuru Karışım', kat:'yapi', depo:'D-VDI', mevcut:320, olcu:'torba', min:150, birim:185, toplam:59200, sip:'SIP-2026-07', tdr:'TDR-01'},
    'seramik':{ad:'Seramik — Yer/Duvar', kat:'yapi', depo:'D-VDI', mevcut:2000, olcu:'m²', min:600, birim:310, toplam:620000},
    'pvc-dograma':{ad:'PVC Doğrama Profil Seti', kat:'yapi', depo:'D-VDI', mevcut:60, olcu:'set', min:20, birim:9400, toplam:564000, sip:'SIP-2026-03', tdr:'TDR-04'},
    'yalitim-levhasi':{ad:'Yalıtım Levhası — XPS 5cm', kat:'yapi', depo:'D-VDI', mevcut:1050, olcu:'m²', min:350, birim:185, toplam:194250},
    'cephe-boyasi':{ad:'İç/Dış Cephe Boyası — 20L', kat:'yapi', depo:'D-VDI', mevcut:110, olcu:'kova', min:35, birim:2450, toplam:269500},
    'ic-kapi-seti':{ad:'İç Kapı Seti', kat:'yapi', depo:'D-VDI', mevcut:40, olcu:'adet', min:15, birim:4850, toplam:194000},
    'hasir-celik':{ad:'Hasır Çelik — Q131', kat:'demir', depo:'D-VDI', mevcut:1804.2, olcu:'m²', min:700, birim:245, toplam:442030, sip:'SIP-2026-05', tdr:'TDR-03'},
    'cimento':{ad:'Çimento — CEM I 42.5R (50 kg)', kat:'yapi', depo:'D-MRK', mevcut:1800, olcu:'torba', min:500, birim:215, toplam:387000},
    'tugla':{ad:'Tuğla — Delikli', kat:'yapi', depo:'D-MRK', mevcut:45000, olcu:'adet', min:15000, birim:6.4, toplam:288000},
    'elektrik-panosu':{ad:'Elektrik Dağıtım Panosu', kat:'elektrik', depo:'D-MRK', mevcut:30, olcu:'adet', min:10, birim:8200, toplam:246000, sip:'SIP-2026-04', tdr:'TDR-05'},
    'isg-kkd':{ad:'İSG KKD Seti — Baret + Yelek', kat:'isg', depo:'D-MRK', mevcut:9, olcu:'adet', min:25, birim:620, toplam:5580, altMin:true,
      uyari:'Mevcut stok (9 adet) minimum eşiğin (25 adet) çok altında. Şantiyelerde yeni personel ve taşeron girişlerinde zorunlu kişisel koruyucu donanım (KKD) teslimi aksayabilir; ikmal siparişi öncelikli görülmeli.',
      not:'Bu kalem doğrudan bir D12 sipariş kaydına bağlı değil; İSG ekipmanı genel depo alımlarından karşılanır. Merkez Ana Depo, tüm şantiyelerin KKD dağıtım noktasıdır.'},
    'hirdavat-sarf':{ad:'Hırdavat & Sarf Paketi (vida-dübel-bant)', kat:'sarf', depo:'D-MRK', mevcut:340, olcu:'paket', min:150, birim:145, toplam:49300},
    'alci-siva':{ad:'Alçı Sıva Malzemesi (30 kg)', kat:'yapi', depo:'D-MRK', mevcut:420, olcu:'torba', min:200, birim:165, toplam:69300},
    'nya-kablo':{ad:'NYA 3×4 Kablo', kat:'elektrik', depo:'D-LMN', mevcut:1400, olcu:'m', min:400, birim:48, toplam:67200, sip:'SIP-2026-04', tdr:'TDR-05'},
    'isg-eldiven-bot':{ad:'İSG KKD Seti — Eldiven + Bot', kat:'isg', depo:'D-LMN', mevcut:68, olcu:'set', min:30, birim:540, toplam:36720},
    'kaynak-teli':{ad:'Kaynak Teli / Elektrot', kat:'sarf', depo:'D-LMN', mevcut:750, olcu:'kg', min:200, birim:285, toplam:213750, sip:'SIP-2026-02', tdr:'TDR-06'},
    'kablo-nym':{ad:'NYM 3×2,5 Kablo', kat:'elektrik', depo:'D-LMN', mevcut:180, olcu:'m', min:500, birim:32, toplam:5760, altMin:true, sip:'SIP-2026-04', tdr:'TDR-05',
      uyari:'Mevcut stok (180 m) minimum eşiğin (500 m) altında. İkmal, Delta Elektrik\'in <b>SIP-2026-04</b> siparişine bağlı; sipariş termini 24 Haziran 2026 idi, 8 gündür teslimat yapılmadı. Liman elektrik tesisatı işleri bu süreçte stoktan karşılanıyor, bu da kritik seviyeyi derinleştiriyor.',
      not:'Delta Elektrik teslimatı gecikmedikçe ikmal planlanamıyor; tedarikçi kartındaki Teslimat Performansı sekmesinde aynı gecikme kaydı yer alır.',
      gecmis:[
        {no:'STK-2026-048', tarih:'28 Haz 2026', tur:'cikis', aciklama:'Liman elektrik tesisatı — 220 m (Delta SIP-04 gecikmesi nedeniyle stoktan karşılandı)'}
      ]},
    'arac-bakim-sarf':{ad:'Araç Bakım Sarf Seti (yağ/filtre)', kat:'sarf', depo:'D-ARC', mevcut:26, olcu:'set', min:10, birim:1850, toplam:48100},
    'jenerator-el-aleti':{ad:'Jeneratör Yakıt Varili + El Aleti Seti', kat:'sarf', depo:'D-ARC', mevcut:18, olcu:'adet', min:8, birim:2100, toplam:37800,
      gecmis:[
        {no:'STK-2026-049', tarih:'30 Haz 2026', tur:'transfer', aciklama:'D-MRK → D-VDI el aleti + jeneratör yakıt varili'}
      ]}
  };
  var TUR_LBL = {giris:'Giriş', cikis:'Çıkış', transfer:'Transfer', iade:'İade', fire:'Fire', sayim:'Sayım'};
  var TDR_AD = {'TDR-01':'Ege Hazır Beton','TDR-02':'Trakya Beton Santrali','TDR-03':'Marmara Demir Çelik','TDR-04':'Boğaziçi Yapı Market','TDR-05':'Delta Elektrik','TDR-06':'Anadolu Hırdavat'};

  var q = new URLSearchParams(location.search);
  var rawKalem = q.get('kalem');
  var key = rawKalem;
  if(!ITEMS[key]) key = rawKalem ? null : 'demir-o16';
  var item = key && ITEMS[key];

  if(!item){
    gvNotFound({
      code: rawKalem ? rawKalem.toUpperCase() : null,
      tur: 'stok kalemi',
      listHref: 'crm-satinalma-stok.html', listLbl: 'Stoğa dön',
      defHref: 'crm-satinalma-stok-detay.html', defLbl: 'Varsayılan kaydı aç'
    });
    return;
  }
  var K = KAT[item.kat];
  var D = DEPO[item.depo];

  document.title = item.ad + ' — Stok Kalemi — Gavia CRM';
  document.getElementById('crumbAd').textContent = item.ad;
  document.getElementById('gdEyebrow').textContent = D.ad + ' (' + D.kod + ') · Stok Kalemi #' + key;
  document.getElementById('gdTitle').textContent = item.ad;
  var catTag = document.getElementById('catTag');
  catTag.style.background = K.bg; catTag.style.color = K.fg;
  catTag.innerHTML = '<i class="fa-solid ' + K.ic + '"></i> ' + K.lbl;
  var durumBadge = document.getElementById('durumBadge');
  durumBadge.className = 'gstat ' + (item.altMin ? 'danger' : 'ok');
  durumBadge.textContent = item.altMin ? 'Min-Stok Altı' : 'Yeterli';

  if(item.uyari){
    document.getElementById('warnBand').innerHTML = '<div class="warn-band"><i class="fa-solid fa-triangle-exclamation"></i><p>' + item.uyari + '</p></div>';
  }

  document.getElementById('stDepo').innerHTML = D.ad;
  document.getElementById('stSorumlu').textContent = D.sorumlu;
  document.getElementById('stMevcut').textContent = num(item.mevcut, item.mevcut % 1 ? 1 : 0) + ' ' + item.olcu;
  document.getElementById('stBirim').textContent = tl(item.birim) + ' / ' + item.olcu;
  document.getElementById('stToplam').textContent = tl(item.toplam);

  var pct = Math.min(100, Math.round((item.mevcut / item.min) * 100));
  var fill = document.getElementById('stokBarFill');
  fill.style.width = pct + '%';
  if(item.altMin) fill.classList.add('danger');
  document.getElementById('stokBarVal').textContent = num(item.mevcut, item.mevcut % 1 ? 1 : 0) + ' / ' + num(item.min) + ' ' + item.olcu;

  /* Hareket geçmişi */
  if(item.gecmis && item.gecmis.length){
    document.getElementById('tblGecmis').hidden = false;
    document.getElementById('gecmisBody').innerHTML = item.gecmis.map(function(h){
      return '<tr><td class="t-strong">' + h.no + '</td><td class="muted">' + h.tarih + '</td>'
        + '<td><span class="mv ' + h.tur + '">' + TUR_LBL[h.tur] + '</span></td><td>' + h.aciklama + '</td></tr>';
    }).join('');
  } else {
    document.getElementById('gecmisEmpty').hidden = false;
  }

  /* Bağlı belgeler */
  var belgeHtml = '';
  if(item.sip){
    belgeHtml += '<div class="ctx-row"><span class="ctx-lbl"><i class="fa-solid fa-file-invoice" style="color:var(--acc-ink);width:16px;text-align:center;margin-right:8px"></i>Sipariş</span>'
      + '<span class="ctx-val"><a href="crm-satinalma-siparis-detay.html?sip=' + item.sip + '">' + item.sip + '</a></span></div>';
  }
  if(item.tdr){
    belgeHtml += '<div class="ctx-row"><span class="ctx-lbl"><i class="fa-solid fa-truck-ramp-box" style="color:var(--acc-ink);width:16px;text-align:center;margin-right:8px"></i>Tedarikçi</span>'
      + '<span class="ctx-val"><a href="crm-satinalma-tedarikci-detay.html?tdr=' + item.tdr + '">' + TDR_AD[item.tdr] + '</a></span></div>';
  }
  belgeHtml += '<div class="ctx-row" style="border-bottom:none"><span class="ctx-lbl"><i class="fa-solid fa-boxes-stacked" style="color:var(--acc-ink);width:16px;text-align:center;margin-right:8px"></i>İrsaliye &amp; Fatura</span>'
    + '<span class="ctx-val"><a href="crm-satinalma-irsaliye-fatura.html">Görüntüle</a></span></div>';
  if(!item.sip){
    belgeHtml = '<p style="font-size:12.5px;color:var(--muted);line-height:1.6;margin-bottom:12px">Bu kalem doğrudan bir D12 sipariş kaydına bağlı değil; genel depo alımlarından beslenir.</p>' + belgeHtml;
  }
  document.getElementById('belgeList').innerHTML = belgeHtml;

  document.getElementById('notText').innerHTML = item.not || ('Bu kalem ' + D.ad + ' envanterinde ' + K.lbl.toLocaleLowerCase('tr') + ' kategorisinde izlenir. Ayrıntılı hareket kaydı için Stok & Depo listesindeki Hareketler sekmesine bakın.');
})();
</script>
