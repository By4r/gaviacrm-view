<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>Saha Bildirimi Detayı — Gavia CRM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
      integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A=="
      crossorigin="anonymous" referrerpolicy="no-referrer">
<link rel="stylesheet" href="assets/css/tokens.css">
<link rel="stylesheet" href="assets/css/shell.css">
<link rel="stylesheet" href="assets/css/ui.css">
<style>
/* sayfaya özel: saha bildirimi detay kompozisyonu (isg-detay/rapor-detay ile aynı iskelet
   dili — gd-head/gd-grid/gd-block/ctx-row/who-mark; D18-T1 — ?bil= param map, 8 kayıt,
   DEFAULT 001 Hasan Demirci) */
.gd-head{display:flex;align-items:flex-start;justify-content:space-between;gap:20px;margin-bottom:22px;flex-wrap:wrap}
.gd-head h1{font-size:22px;letter-spacing:-.015em;margin-bottom:9px;max-width:600px}
.gd-badges{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.gd-eyebrow{font-size:11.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--acc-ink);margin-bottom:8px}

.gd-grid{display:grid;grid-template-columns:1fr 320px;gap:18px;align-items:start}
@media(max-width:980px){.gd-grid{grid-template-columns:minmax(0,1fr)}}

.gd-block{padding:22px}
.gd-block + .gd-block{border-top:1px solid var(--line)}
.gd-label{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
.gd-desc{font-size:13.5px;line-height:1.7;color:var(--ink-2)}

/* bağlam satırları */
.ctx-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:9px 0;font-size:13px}
.ctx-row .ctx-lbl{color:var(--muted)}
.ctx-row .ctx-val{color:var(--ink);font-weight:700;text-align:right}
.ctx-link{display:flex;align-items:center;gap:11px;padding:6px 0}
.ctx-link .who-mark{width:36px;height:36px;flex:none;border-radius:var(--r-circle);display:grid;place-items:center;font-size:13px;font-weight:800}
.ctx-link a{font-size:13.5px;font-weight:700;color:var(--ink)}
.ctx-link a:hover{color:var(--acc-ink)}
.ctx-link span{display:block;font-size:11.5px;color:var(--muted)}

.gv-side-stack{display:flex;flex-direction:column;gap:16px}

/* fotoğraf alanı — crm-santiye-bildirimler.html feed kartıyla AYNI desen (<img> DEĞİL,
   div + background-image cover/center; gerçek foto yok, token-türevi gradyan + tip ikonu) */
.gd-photo-card{overflow:hidden}
.gd-photo-card .gd-label{padding:18px 18px 0;margin-bottom:12px}
.post-photo{aspect-ratio:16/9;background-size:cover;background-position:center;position:relative;display:flex;align-items:center;justify-content:center}
.post-photo i{font-size:34px;color:rgba(255,255,255,.9)}
.post-photo::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(2,8,55,0) 55%,rgba(2,8,55,.34) 100%)}
.post-tag{position:absolute;left:14px;bottom:12px;z-index:1;display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;padding:5px 11px;border-radius:var(--r-pill);background:rgba(255,255,255,.92);color:var(--ink);backdrop-filter:blur(2px)}
.post-tag i{font-size:10.5px;color:inherit}
.photo-vadi{background-image:linear-gradient(135deg, color-mix(in srgb, var(--acc) 55%, var(--gv-deep)) 0%, color-mix(in srgb, var(--acc) 18%, var(--gv-deep)) 100%)}
.photo-liman{background-image:linear-gradient(135deg, color-mix(in srgb, var(--info) 60%, var(--gv-deep)) 0%, color-mix(in srgb, var(--info) 18%, var(--gv-deep)) 100%)}
.photo-merkez{background-image:linear-gradient(135deg, color-mix(in srgb, var(--warn) 55%, var(--gv-deep)) 0%, color-mix(in srgb, var(--warn) 16%, var(--gv-deep)) 100%)}

/* Gördüm aksiyonu — feed'deki post-meta/post-ack ile AYNI davranış (sayaç artırır) */
.gd-ack-row{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.gd-ack-row .eye-cnt{font-size:12.5px;color:var(--muted);display:inline-flex;align-items:center;gap:6px}
.post-ack{font-size:12.5px;font-weight:700;color:var(--acc-ink);background:none;border:none;cursor:pointer;display:inline-flex;align-items:center;gap:6px;padding:4px 2px}
.post-ack:hover{color:var(--acc-deep)}
.post-ack.is-acked{color:var(--ok)}
.post-ack.is-acked i{color:var(--ok)}
</style>
</head>
<body data-sec="santiye" data-screen="bildirimler">
<div class="gv-app">
  <aside class="gv-rail" id="gvRail"></aside>
  <nav class="gv-menu" id="gvMenu"></nav>
  <div class="gv-divider" id="gvDivider" role="separator" aria-label="Menüyü daralt/genişlet"><span class="gv-grip"></span></div>
  <div class="gv-overlay" id="gvOverlay"></div>

  <header class="gv-top">
    <button class="gv-burger" id="gvBurger" aria-label="Menü"><i class="fa-solid fa-bars"></i></button>
    <div class="gv-search"><i class="fa-solid fa-magnifying-glass"></i><input type="text" placeholder="Ara"></div>
    <div class="gv-top-tools">
      <button class="gv-iconbtn" data-tip="Bildirimler" aria-label="Bildirimler"><i class="fa-regular fa-bell"></i><span class="gb-dot"></span></button>
      <div class="gv-me">
        <div class="me-ava" id="gvAva">·</div>
        <div class="me-id"><div class="me-name" id="gvName">—</div><div class="me-role" id="gvRole">—</div></div>
        <i class="fa-solid fa-chevron-down"></i>
      </div>
    </div>
  </header>

  <main class="gv-main">
    <div id="bilRoot"></div>
  </main>
</div>

<script src="assets/js/shell.js"></script>
<script src="assets/js/ui.js"></script>
<script>
(function(){
  if(!window.GV) return;

  /* ---- SBL-2026-0## SAHA BİLDİRİM SERİSİ (D18-T1 — shell.js DALGA 18 kanoniği) —
     kaynak: crm-santiye-bildirimler.html #feedList DOM sırası 001-008 BİREBİR (kişi/
     şantiye/tarih/tür/metin/gördü sayısı). 001 Hasan Demirci DEFAULT. baslik alanı
     gövde metninin ilk tümcesinden VERBATİM alınmış kısa başlıktır (uydurma yok). ---- */
  var BIL = {
    '001':{ no:'SBL-2026-001', kisi:'Hasan Demirci', ini:'HD', per:'004', pozisyon:'Şantiye Şefi',
      siteKey:'vadi', site:'Vadi Konakları', tarih:'2 Temmuz 2026, 09:40',
      tur:'Yapı İlerlemesi', turIcon:'fa-helmet-safety',
      baslik:'B Blok temel betonu bugün tamamlandı',
      body:'B Blok temel betonu bugün tamamlandı, ekip 3. kat kalıp işine geçiyor. Döküm sırasında hava koşulları uygundu, numune küpleri laboratuvara gönderildi.',
      gordu:6, yeni:true, avaBg:'rgba(var(--acc-rgb),.14)', avaColor:'var(--acc-ink)', avaBorder:false },
    '002':{ no:'SBL-2026-002', kisi:'İbrahim Sönmez', ini:'İS', per:'011', pozisyon:'Formen',
      siteKey:'vadi', site:'Vadi Konakları', tarih:'2 Temmuz 2026, 08:15',
      tur:'Elektrik/Mekanik', turIcon:'fa-bolt',
      baslik:'Zemin kat elektrik tesisatı döşemesi başladı',
      body:'Zemin kat elektrik tesisatı döşemesi başladı, kablo kanalları B ve C aksında tamamlandı.',
      gordu:3, yeni:true, avaBg:'var(--bg)', avaColor:'var(--ink-2)', avaBorder:true },
    '003':{ no:'SBL-2026-003', kisi:'Aylin Koç', ini:'AK', per:'005', pozisyon:'Şantiye Şefi',
      siteKey:'liman', site:'Liman Lojistik Merkezi', tarih:'1 Temmuz 2026, 16:20',
      tur:'Yapı İlerlemesi', turIcon:'fa-helmet-safety',
      baslik:'Çelik konstrüksiyon montajı 3. modülde tamamlandı',
      body:'Çelik konstrüksiyon montajı 3. modülde tamamlandı; vinç operasyonu güvenlik çemberi kapatılarak yürütüldü, kaza/ramak kala kaydı yok.',
      gordu:9, yeni:true, avaBg:'var(--info-tint)', avaColor:'var(--info)', avaBorder:false },
    '004':{ no:'SBL-2026-004', kisi:'Şükrü Aslan', ini:'ŞA', per:'016', pozisyon:'Formen',
      siteKey:'liman', site:'Liman Lojistik Merkezi', tarih:'1 Temmuz 2026, 11:05',
      tur:'İSG', turIcon:'fa-shield-halved',
      baslik:'Haftalık İSG toplantısı yapıldı',
      body:'Haftalık İSG toplantısı yapıldı; baret, emniyet kemeri ve iş ayakkabısı kontrolü tüm ekipte tamamlandı, eksik ekipman yok.',
      gordu:5, yeni:true, avaBg:'var(--bg)', avaColor:'var(--ink-2)', avaBorder:true },
    '005':{ no:'SBL-2026-005', kisi:'Ömer Taşkın', ini:'ÖT', per:'006', pozisyon:'Şantiye Şefi',
      siteKey:'merkez', site:'Merkez Şantiye', tarih:'30 Haziran 2026, 14:50',
      tur:'Atölye/Depo', turIcon:'fa-warehouse',
      baslik:'Atölye çatı kaplama işi yaklaşık %80 seviyesinde',
      body:'Atölye çatı kaplama işi yaklaşık %80 seviyesinde; kalan panel siparişi bu hafta içinde tamamlanacak.',
      gordu:4, yeni:false, avaBg:'var(--warn-tint)', avaColor:'var(--warn)', avaBorder:false },
    '006':{ no:'SBL-2026-006', kisi:'Recep Yaman', ini:'RY', per:'020', pozisyon:'Formen',
      siteKey:'merkez', site:'Merkez Şantiye', tarih:'30 Haziran 2026, 10:30',
      tur:'Malzeme Teslimatı', turIcon:'fa-truck-pickup',
      baslik:'Yeni gelen kalıp kerestesi sahaya indirildi',
      body:'Yeni gelen kalıp kerestesi sahaya indirildi ve depo alanında istiflendi; irsaliye Satın Alma\'ya iletildi.',
      gordu:2, yeni:false, avaBg:'var(--bg)', avaColor:'var(--ink-2)', avaBorder:true },
    '007':{ no:'SBL-2026-007', kisi:'Metin Çetin', ini:'MÇ', per:'018', pozisyon:'Kaynakçı',
      siteKey:'liman', site:'Liman Lojistik Merkezi', tarih:'29 Haziran 2026, 09:00',
      tur:'Kalite Kontrol', turIcon:'fa-magnifying-glass',
      baslik:'Kaynak noktalarının kalite kontrolü tamamlandı',
      body:'Kaynak noktalarının kalite kontrolü tamamlandı; tutanak ve fotoğraflar ekte, revize gereken nokta çıkmadı.',
      gordu:3, yeni:false, avaBg:'var(--bg)', avaColor:'var(--ink-2)', avaBorder:true },
    '008':{ no:'SBL-2026-008', kisi:'Ramazan Kılıç', ini:'RK', per:'012', pozisyon:'Kalıpçı',
      siteKey:'vadi', site:'Vadi Konakları', tarih:'28 Haziran 2026, 15:40',
      tur:'Yapı İlerlemesi', turIcon:'fa-helmet-safety',
      baslik:'3. kat perde kalıbı kuruldu',
      body:'3. kat perde kalıbı kuruldu, demir donatı kontrolü için Teknik Müdür\'ün onayı bekleniyor.',
      gordu:4, yeni:false, avaBg:'var(--bg)', avaColor:'var(--ink-2)', avaBorder:true }
  };
  var DEFAULT_ID = '001';

  function normalize(raw){
    if(!raw) return null;
    var m = String(raw).toLowerCase().match(/(\d{3})\s*$/);
    return m ? m[1] : null;
  }

  var q = new URLSearchParams(location.search);
  var rawParam = q.get('bil');
  var id = rawParam === null ? DEFAULT_ID : normalize(rawParam);
  var rec = id ? BIL[id] : null;

  if(!rec){
    GV.crumb('Kayıt bulunamadı');
    gvNotFound({
      mount: '#bilRoot',
      code: rawParam ? rawParam.toUpperCase() : null,
      tur: 'saha bildirimi',
      listHref: 'crm-santiye-bildirimler.html', listLbl: 'Bildirim listesine dön',
      defHref: 'crm-santiye-bildirim-detay.html', defLbl: 'İlk bildirimi aç'
    });
    return;
  }

  /* şef budaması — yalnız Vadi Konakları bildirimlerini görebilir; başka şantiyenin
     kaydına doğrudan URL ile gidilirse sessizce DEFAULT'a (bil=001, Vadi) döner
     (crm-santiye-detay.html'deki aynı desen; feed'de kartlar zaten kalıcı kaldırılıyor) */
  if(GV.role === 'sef' && rec.siteKey !== 'vadi'){
    location.replace('crm-santiye-bildirim-detay.html');
    return;
  }

  GV.crumb(rec.no);
  document.title = rec.kisi + ' — Saha Bildirimi — Gavia CRM';

  var root = document.getElementById('bilRoot');
  root.innerHTML = ''
    + '<div class="gd-head">'
    +   '<div>'
    +     '<div class="gd-eyebrow">' + rec.site + ' · Saha Bildirimi #' + rec.no + '</div>'
    +     '<h1>' + rec.baslik + '</h1>'
    +     '<div class="gd-badges">'
    +       '<span class="gtag"><i class="fa-solid ' + rec.turIcon + '"></i> ' + rec.tur + '</span>'
    +       (rec.yeni ? '<span class="gstat info" id="yeniBadge">Yeni</span>' : '<span class="gstat off" id="yeniBadge">Görüldü</span>')
    +     '</div>'
    +   '</div>'
    +   '<div class="ph-actions">'
    +     '<a class="btn btn-ghost btn-sm" href="crm-santiye-bildirimler.html"><i class="fa-solid fa-arrow-left"></i> Listeye Dön</a>'
    +   '</div>'
    + '</div>'
    + '<div class="gd-grid">'
    +   '<div class="gv-side-stack">'
    +     '<div class="gv-card">'
    +       '<div class="gd-block">'
    +         '<div class="gd-label">Bildirim Metni</div>'
    +         '<p class="gd-desc">' + rec.body + '</p>'
    +       '</div>'
    +       '<div class="gd-block">'
    +         '<div class="gd-ack-row">'
    +           '<span class="eye-cnt" id="eyeCnt"><i class="fa-solid fa-eye"></i> ' + rec.gordu + ' kişi gördü</span>'
    +           '<button class="post-ack" id="ackBtn" data-no-confirm><i class="fa-regular fa-thumbs-up"></i> Gördüm</button>'
    +         '</div>'
    +       '</div>'
    +     '</div>'
    +     '<div class="gv-card gd-photo-card">'
    +       '<div class="gd-label">Fotoğraf</div>'
    +       '<div class="post-photo photo-' + rec.siteKey + '"><i class="fa-solid ' + rec.turIcon + '"></i><span class="post-tag"><i class="fa-solid ' + rec.turIcon + '"></i> ' + rec.tur + '</span></div>'
    +     '</div>'
    +   '</div>'
    +   '<div class="gv-side-stack">'
    +     '<div class="gv-card">'
    +       '<div class="gd-block">'
    +         '<div class="gd-label">Bildirim Bilgileri</div>'
    +         '<div class="ctx-row"><span class="ctx-lbl">Tarih</span><span class="ctx-val">' + rec.tarih + '</span></div>'
    +         '<div class="ctx-row"><span class="ctx-lbl">Şantiye</span><span class="ctx-val"><a href="crm-santiye-detay.html?santiye=' + rec.siteKey + '" style="color:var(--acc-ink);font-weight:700">' + rec.site + '</a></span></div>'
    +         '<div class="ctx-row"><span class="ctx-lbl">Tür</span><span class="ctx-val">' + rec.tur + '</span></div>'
    +       '</div>'
    +     '</div>'
    +     '<div class="gv-card">'
    +       '<div class="gd-block">'
    +         '<div class="gd-label">Paylaşan</div>'
    +         '<div class="ctx-link">'
    +           '<div class="who-mark" style="background:' + rec.avaBg + ';color:' + rec.avaColor + (rec.avaBorder ? ';border:1px solid var(--line)' : '') + '">' + rec.ini + '</div>'
    +           '<div><a href="crm-personel-detay.html?per=' + rec.per + '">' + rec.kisi + '</a><span>' + rec.pozisyon + ' · ' + rec.site + '</span></div>'
    +         '</div>'
    +       '</div>'
    +     '</div>'
    +   '</div>'
    + '</div>';

  /* Gördüm aksiyonu — feed'deki .post-ack ile AYNI davranış: tek seferlik, sayaç artırır */
  var ackBtn = document.getElementById('ackBtn');
  ackBtn.addEventListener('click', function(){
    if(ackBtn.classList.contains('is-acked')) return;
    ackBtn.classList.add('is-acked');
    ackBtn.innerHTML = '<i class="fa-solid fa-check"></i> Gördün';
    var eye = document.getElementById('eyeCnt');
    var n = parseInt(eye.textContent, 10) || 0;
    eye.innerHTML = '<i class="fa-solid fa-eye"></i> ' + (n + 1) + ' kişi gördü';
  });
})();
</script>
</body>
</html>
