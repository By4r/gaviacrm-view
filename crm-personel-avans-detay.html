<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>Avans Talebi Detayı — Gavia CRM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
      integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A=="
      crossorigin="anonymous" referrerpolicy="no-referrer">
<link rel="stylesheet" href="assets/css/tokens.css">
<link rel="stylesheet" href="assets/css/shell.css">
<link rel="stylesheet" href="assets/css/ui.css">
<style>
/* sayfaya özel: avans talebi detay kompozisyonu (izin-detay ile aynı iskelet dili) */

.gd-head{display:flex;align-items:flex-start;justify-content:space-between;gap:20px;margin-bottom:22px;flex-wrap:wrap}
.gd-head h1{font-size:22px;letter-spacing:-.015em;margin-bottom:9px;max-width:600px}
.gd-badges{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.gd-eyebrow{font-size:11.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--acc-ink);margin-bottom:8px}

.gd-grid{display:grid;grid-template-columns:1fr 320px;gap:18px;align-items:start}
@media(max-width:980px){.gd-grid{grid-template-columns:minmax(0,1fr)}}

.gd-block{padding:22px}
.gd-block + .gd-block{border-top:1px solid var(--line)}
.gd-label{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
.gd-desc{font-size:13.5px;line-height:1.7;color:var(--ink-2)}

/* özet şeridi — tutar + tarih + durum tek bakışta */
.avd-summary{display:grid;grid-template-columns:repeat(2,1fr);gap:0}
.avd-summary div{padding:18px 22px;border-right:1px solid var(--line)}
.avd-summary div:last-child{border-right:none}
.avd-summary .avd-lbl{font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.avd-summary .avd-val{font-size:15.5px;font-weight:800;color:var(--ink);letter-spacing:-.01em}
.avd-summary .avd-val.money{color:var(--acc-ink)}
@media(max-width:640px){.avd-summary{grid-template-columns:1fr}.avd-summary div{border-right:none;border-bottom:1px solid var(--line)}.avd-summary div:last-child{border-bottom:none}}

/* ödeme şekli notu */
.avd-note{display:flex;gap:12px;padding:16px 22px;background:rgba(var(--acc-rgb),.05);border-top:1px solid var(--line)}
.avd-note i{color:var(--acc-ink);font-size:14px;margin-top:1px}
.avd-note p{font-size:12.5px;color:var(--ink-2);line-height:1.6}
.avd-note b{color:var(--ink)}

/* bağlam satırları */
.ctx-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:9px 0;font-size:13px}
.ctx-row .ctx-lbl{color:var(--muted)}
.ctx-row .ctx-val{color:var(--ink);font-weight:700;text-align:right}
.ctx-link{display:flex;align-items:center;gap:11px;padding:6px 0}
.ctx-link .who-mark{width:38px;height:38px;flex:none;border-radius:var(--r-sm);display:grid;place-items:center;font-size:13px;font-weight:800}
.ctx-link a{font-size:13.5px;font-weight:700;color:var(--ink)}
.ctx-link a:hover{color:var(--acc-ink)}
.ctx-link span{display:block;font-size:11.5px;color:var(--muted)}

.status-acts{display:flex;flex-direction:column;gap:8px}
.status-acts .btn{justify-content:flex-start}
.no-action{font-size:12.5px;color:var(--muted);line-height:1.6}

.gv-side-stack{display:flex;flex-direction:column;gap:16px}
</style>
</head>
<body data-sec="personel" data-screen="avans">
<div class="gv-app">
  <aside class="gv-rail" id="gvRail"></aside>
  <nav class="gv-menu" id="gvMenu"></nav>
  <div class="gv-divider" id="gvDivider" role="separator" aria-label="Menüyü daralt/genişlet"><span class="gv-grip"></span></div>
  <div class="gv-overlay" id="gvOverlay"></div>

  <header class="gv-top">
    <button class="gv-burger" id="gvBurger" aria-label="Menü"><i class="fa-solid fa-bars"></i></button>
    <div class="gv-search"><i class="fa-solid fa-magnifying-glass"></i><input type="text" placeholder="Ara"></div>
    <div class="gv-top-tools">
      <button class="gv-iconbtn" data-tip="Bildirimler" aria-label="Bildirimler"><i class="fa-regular fa-bell"></i><span class="gb-dot"></span></button>
      <div class="gv-me">
        <div class="me-ava" id="gvAva">·</div>
        <div class="me-id"><div class="me-name" id="gvName">—</div><div class="me-role" id="gvRole">—</div></div>
        <i class="fa-solid fa-chevron-down"></i>
      </div>
    </div>
  </header>

  <main class="gv-main" id="gvMain">
    <!-- D18 Y16: lokal .gv-crumb kaldırıldı — kırıntı shell'den (GV.crumb ile kayıt segmenti) -->
    <div id="avdRoot"></div>
  </main>
</div>

<script src="assets/js/shell.js"></script>
<script src="assets/js/ui.js"></script>
<script>
(function(){
  /* Kayıt kaynağı: crm-personel-avans.html AVANS{} map'i — personel/tutar/tarih/durum/zincir
     BİREBİR alındı (D17 DK1). Kişi bağlamı (pozisyon/şantiye) crm-personel.html kadrosundan.
     Gerekçe + ödeme şekli metinleri, zincirdeki onay/red notlarıyla çelişmeyecek şekilde
     türetilmiş kurgusal alanlardır (her kayıtta yorumla işaretli). */
  var AVANS = {
    'avn-015':{ no:'AVN-2026-015', personel:'Musa Erdem', ini:'ME', pozisyon:'Düz İşçi', santiye:'Vadi Konakları',
      tutar:'₺3.500', tarih:'1 Temmuz 2026', status:'bekliyor', approverRole:'sef',
      gerekce:'Kira ödemesi için nakit ihtiyacı.',
      odeme:'Onaylanırsa Ağustos 2026 bordrosundan tek seferde kesilecek.',
      steps:[
        {rol:'Düz İşçi', kisi:'Musa Erdem', durum:'olusturdu', tarih:'1 Temmuz 2026 07:50'},
        {rol:'Şantiye Şefi', kisi:'Hasan Demirci', durum:'bekliyor'},
        {rol:'Muhasebe', kisi:'Nesrin Aydın', durum:'sirada'}
      ] },
    'avn-014':{ no:'AVN-2026-014', personel:'Ali Vural', ini:'AV', pozisyon:'Saha Personeli', santiye:'Vadi Konakları',
      tutar:'₺4.000', tarih:'29 Haziran 2026', status:'bekliyor', approverRole:'muhasebe',
      gerekce:'Kişisel nakit ihtiyacı (malzeme avansı değil).',
      odeme:'Onaylanırsa Temmuz 2026 bordrosundan tek seferde kesilecek.',
      steps:[
        {rol:'Saha Personeli', kisi:'Ali Vural', durum:'olusturdu', tarih:'29 Haziran 2026 08:40'},
        {rol:'Şantiye Şefi', kisi:'Hasan Demirci', durum:'onaylandi', tarih:'29 Haziran 2026 11:15', not:'Malzeme avansı değil, kişisel avans — onaylıyorum.'},
        {rol:'Muhasebe', kisi:'Nesrin Aydın', durum:'bekliyor'}
      ] },
    'avn-013':{ no:'AVN-2026-013', personel:'Hasan Demirci', ini:'HD', pozisyon:'Şantiye Şefi', santiye:'Vadi Konakları',
      tutar:'₺8.000', tarih:'18 Haziran 2026', status:'onaylandi', approverRole:null,
      gerekce:'Çocuğunun okul kayıt gideri.',
      odeme:'20 Haziran 2026’da banka listesine eklenerek ödendi; tutar Temmuz 2026 bordrosundan tek seferde kesilecek.',
      steps:[
        {rol:'Şantiye Şefi', kisi:'Hasan Demirci', durum:'olusturdu', tarih:'18 Haziran 2026 09:05'},
        {rol:'Genel Müdür', kisi:'Murat Denizli', durum:'onaylandi', tarih:'18 Haziran 2026 13:40'},
        {rol:'Muhasebe', kisi:'Nesrin Aydın', durum:'onaylandi', tarih:'20 Haziran 2026 10:00', not:'Banka listesine eklendi, 20 Haziran’da ödendi.'}
      ] },
    'avn-012':{ no:'AVN-2026-012', personel:'Baran Yıldız', ini:'BY', pozisyon:'Satın Alma Sorumlusu', santiye:'Merkez Ofis',
      tutar:'₺6.500', tarih:'10 Haziran 2026', status:'reddedildi', approverRole:null,
      gerekce:'Ev taşınma masrafları.',
      odeme:'Reddedildiği için ödeme planlanmadı.',
      steps:[
        {rol:'Satın Alma Sorumlusu', kisi:'Baran Yıldız', durum:'olusturdu', tarih:'10 Haziran 2026 09:30'},
        {rol:'Genel Müdür', kisi:'Murat Denizli', durum:'reddedildi', tarih:'11 Haziran 2026 15:10', not:'Haziran ayı kasa limiti bu tutar için yetersiz; Temmuz bordrosunda değerlendirilecek.'}
      ] },
    'avn-011':{ no:'AVN-2026-011', personel:'Aylin Koç', ini:'AK', pozisyon:'Şantiye Şefi', santiye:'Liman Lojistik Merkezi',
      tutar:'₺10.000', tarih:'3 Haziran 2026', status:'revize', approverRole:null,
      gerekce:'Kişisel ihtiyaç (harcama kalemi belirtilmedi).',
      odeme:'Revize sonrası yeniden değerlendirilecek; ödeme şekli henüz belirlenmedi.',
      steps:[
        {rol:'Şantiye Şefi', kisi:'Aylin Koç', durum:'olusturdu', tarih:'3 Haziran 2026 10:20'},
        {rol:'Genel Müdür', kisi:'Murat Denizli', durum:'revize', tarih:'4 Haziran 2026 09:00', not:'Tutar gerekçesi eksik; hangi harcama kalemi için olduğunu belirtip yeniden gönderin.'}
      ] }
  };
  var DEFAULT_ID = 'avn-014';

  function normalize(raw){
    if(!raw) return null;
    var m = String(raw).toLowerCase().match(/(\d{3})\s*$/);
    return m ? 'avn-' + m[1] : null;
  }

  var q = new URLSearchParams(location.search);
  var rawParam = q.get('avn');
  var id = rawParam === null ? DEFAULT_ID : normalize(rawParam);
  var rec = id ? AVANS[id] : null;

  if(!rec){
    GV.crumb('Kayıt bulunamadı');
    gvNotFound({
      mount: '#avdRoot',
      code: rawParam ? rawParam.toUpperCase() : null,
      tur: 'avans talebi',
      listHref: 'crm-personel-avans.html', listLbl: 'Avanslara dön',
      defHref: 'crm-personel-avans-detay.html', defLbl: 'Varsayılan kaydı aç'
    });
    return;
  }

  GV.crumb(rec.no);
  document.title = rec.no + ' — Avans Talebi Detayı — Gavia CRM';

  var root = document.getElementById('avdRoot');
  var html = ''
    + '<div class="gd-head">'
    +   '<div>'
    +     '<div class="gd-eyebrow">' + rec.santiye + ' · Avans Talebi #' + rec.no + '</div>'
    +     '<h1>' + rec.personel + ' — ' + rec.tutar + '</h1>'
    +     '<div class="gd-badges"><span id="avdBadge"></span></div>'
    +   '</div>'
    +   '<div class="ph-actions">'
    +     '<a class="btn btn-ghost btn-sm" href="crm-personel-avans.html"><i class="fa-solid fa-arrow-left"></i> Listeye Dön</a>'
    +   '</div>'
    + '</div>'
    + '<div class="gv-card" style="margin-bottom:18px">'
    +   '<div class="avd-summary">'
    +     '<div><div class="avd-lbl">Talep Edilen Tutar</div><div class="avd-val money">' + rec.tutar + '</div></div>'
    +     '<div><div class="avd-lbl">Talep Tarihi</div><div class="avd-val">' + rec.tarih + '</div></div>'
    +   '</div>'
    +   '<div class="avd-note"><i class="fa-solid fa-circle-info"></i><p><b>Ödeme şekli:</b> ' + rec.odeme + '</p></div>'
    + '</div>'
    + '<div class="gd-grid">'
    +   '<div class="gv-side-stack">'
    +     '<div class="gv-card">'
    +       '<div class="gd-block"><div class="gd-label">Talep Gerekçesi</div><p class="gd-desc">' + rec.gerekce + '</p></div>'
    +     '</div>'
    +     '<div class="gv-card">'
    +       '<div class="gc-head"><div class="gc-title"><i class="fa-solid fa-stamp"></i> Onay Akışı</div></div>'
    +       '<div class="gd-block" id="avdChain"></div>'
    +       '<div class="gd-block" id="avdActsBlock" hidden><div class="gd-label">Aksiyon</div><div class="status-acts" id="avdActs"></div></div>'
    +       '<div class="gd-block" id="avdNoteBlock" hidden><p class="no-action">Bu kayıtta sıradaki onay adımı sizde değil.</p></div>'
    +     '</div>'
    +   '</div>'
    +   '<div class="gv-side-stack">'
    +     '<div class="gv-card">'
    +       '<div class="gd-block">'
    +         '<div class="gd-label">Personel</div>'
    +         '<div class="ctx-link">'
    +           '<div class="who-mark" style="background:rgba(var(--acc-rgb),.14);color:var(--acc-ink)">' + rec.ini + '</div>'
    +           '<div><a href="crm-personel-detay.html">' + rec.personel + '</a><span>' + rec.pozisyon + ' · ' + rec.santiye + '</span></div>'
    +         '</div>'
    +       '</div>'
    +       '<div class="gd-block">'
    +         '<div class="ctx-row"><span class="ctx-lbl">Şantiye</span><span class="ctx-val">' + rec.santiye + '</span></div>'
    +       '</div>'
    +     '</div>'
    +   '</div>'
    + '</div>';
  root.innerHTML = html;

  document.getElementById('avdBadge').innerHTML = gvChainBadge(rec.status);
  gvChain(document.getElementById('avdChain'), {steps: rec.steps});

  var role = window.GV ? GV.role : null;
  var canAct = rec.status === 'bekliyor' && (role === rec.approverRole || role === 'superadmin' || role === 'sahip');
  if(canAct){
    document.getElementById('avdActsBlock').hidden = false;
    document.getElementById('avdActs').innerHTML =
      '<button class="btn btn-sm btn-acc" data-chain-act="onayla" data-chain-name="' + rec.no + '"><i class="fa-solid fa-check"></i> Onayla</button>' +
      '<button class="btn btn-sm btn-ghost" data-chain-act="revize" data-chain-name="' + rec.no + '"><i class="fa-solid fa-rotate-left"></i> Revize İste</button>' +
      '<button class="btn btn-sm btn-danger" data-chain-act="reddet" data-chain-name="' + rec.no + '"><i class="fa-solid fa-xmark"></i> Reddet</button>';
  } else if(rec.status === 'bekliyor'){
    document.getElementById('avdNoteBlock').hidden = false;
  }
})();
</script>
</body>
</html>
