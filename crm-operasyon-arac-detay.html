<style>
/* ============ SAYFAYA ÖZEL — Araç Dosyası (künye + sekmeli detay) ============ */
.gv-crumb{display:flex;align-items:center;gap:9px;font-size:12.5px;font-weight:600;color:var(--muted);margin-bottom:14px}
.gv-crumb a{color:var(--acc-ink);font-weight:700}
.gv-crumb a:hover{color:var(--acc-deep)}
.gv-crumb i{font-size:9px;color:var(--line-2)}

/* künye/hero kartı — santiye-detay.html site-hero deseninin araç için uyarlaması */
.veh-hero{display:grid;grid-template-columns:1.6fr 1fr;gap:30px;padding:26px 26px 24px;margin-bottom:22px}
.veh-hero-id{display:flex;gap:18px}
.veh-hero-mark{width:58px;height:58px;flex:none;border-radius:var(--r-md);display:grid;place-items:center;font-size:22px;background:rgba(var(--acc-rgb),.12);color:var(--acc-ink)}
.veh-hero-info{flex:1;min-width:0}
.veh-hero-tags{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.veh-hero-meta{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px 22px}
.veh-hero-meta dt{font-size:10.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:3px}
.veh-hero-meta dd{font-size:13.5px;font-weight:700;color:var(--ink)}
.veh-hero-stats{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;align-content:start}
.vh-stat{background:var(--bg);border-radius:var(--r-md);padding:14px 16px;display:flex;flex-direction:column;gap:4px}
.vh-stat-num{font-size:18px;font-weight:800;color:var(--ink);letter-spacing:-.01em;font-variant-numeric:tabular-nums}
.vh-stat-lbl{font-size:11.5px;color:var(--muted);font-weight:600;line-height:1.3}
.vh-stat.warn .vh-stat-num{color:var(--warn)}
.vh-stat.danger .vh-stat-num{color:var(--danger)}
@media(max-width:980px){.veh-hero{grid-template-columns:minmax(0,1fr)}}
@media(max-width:640px){
  .veh-hero{padding:20px 18px}
  .veh-hero-id{flex-direction:column}
  .veh-hero-meta{grid-template-columns:1fr}
}

/* sekme çubuğu — santiye-detay.html ile birebir aynı dil (sayfa-lokal kopya) */
.gv-tabs{display:flex;border-bottom:1px solid var(--line);margin-bottom:22px;overflow-x:auto;scrollbar-width:none}
.gv-tabs::-webkit-scrollbar{display:none}
.gv-tab{display:inline-flex;align-items:center;gap:8px;padding:13px 4px;margin-right:26px;flex:none;
  font-family:inherit;font-size:13.5px;font-weight:700;color:var(--muted);background:none;border:none;
  border-bottom:2px solid transparent;white-space:nowrap;cursor:pointer;transition:.18s var(--ease)}
.gv-tab i{font-size:13px}
.gv-tab:hover{color:var(--ink)}
.gv-tab.is-active{color:var(--acc-ink);border-color:var(--acc-ink)}
.gv-tab .tb-cnt{font-size:10.5px;font-weight:700;background:var(--bg);color:var(--ink-2);padding:1px 6px;border-radius:var(--r-pill)}
.gv-tab.is-active .tb-cnt{background:rgba(var(--acc-rgb),.16);color:var(--acc-deep)}
.tab-panel{animation:tabIn .22s var(--ease)}
@keyframes tabIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

/* HGS tablosu */
#tblHgs{min-width:520px}
#tblHgs .num{text-align:right;white-space:nowrap}
tr.hgs-total td{font-weight:800;color:var(--ink);border-top:2px solid var(--line-2);background:var(--bg)}

/* Trafik Cezaları / Kaza kartları */
.ceza-row{display:flex;align-items:flex-start;gap:14px;padding:16px 22px;border-bottom:1px solid var(--line)}
.ceza-row:last-child{border-bottom:none}
.ceza-ico{width:38px;height:38px;flex:none;border-radius:var(--r-sm);display:grid;place-items:center;font-size:14px}
.ceza-info{flex:1;min-width:0}
.ceza-info b{display:block;font-size:13.5px;font-weight:700;color:var(--ink)}
.ceza-info span{font-size:12px;color:var(--muted)}
.ceza-amt{flex:none;text-align:right}
.ceza-amt b{display:block;font-size:14px;font-weight:800;color:var(--ink);font-variant-numeric:tabular-nums}

/* Kaza & Hasar dökümü */
.hasar-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px;margin-top:14px}
@media(max-width:640px){.hasar-grid{grid-template-columns:1fr}}
.hasar-cell{background:var(--bg);border-radius:var(--r-md);padding:14px 16px}
.hasar-cell dt{font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.hasar-cell dd{font-size:15px;font-weight:800;color:var(--ink);font-variant-numeric:tabular-nums}

/* Bakım & Muayene — hatırlatma kartları + geçmiş listesi */
.bakim-remind{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px;padding:22px}
@media(max-width:640px){.bakim-remind{grid-template-columns:1fr}}
.br-card{border:1px solid var(--line);border-radius:var(--r-md);padding:16px 18px;display:flex;gap:14px;align-items:flex-start}
.br-card.warn{border-color:rgba(var(--warn-rgb,245,158,11),.4);background:var(--warn-tint)}
.br-card.danger{border-color:rgba(var(--danger-rgb,239,68,68),.35);background:var(--danger-tint)}
.br-ico{width:36px;height:36px;flex:none;border-radius:var(--r-sm);display:grid;place-items:center;font-size:14px;background:var(--paper);color:var(--ink-2)}
.br-card.warn .br-ico{color:var(--warn)}
.br-card.danger .br-ico{color:var(--danger)}
.br-body b{display:block;font-size:13.5px;font-weight:700;color:var(--ink);margin-bottom:3px}
.br-body span{font-size:12px;color:var(--ink-2);line-height:1.5}

.bakim-hist-row{display:flex;align-items:flex-start;gap:14px;padding:14px 22px;border-bottom:1px solid var(--line)}
.bakim-hist-row:last-child{border-bottom:none}
.bh-ico{width:34px;height:34px;flex:none;border-radius:var(--r-sm);display:grid;place-items:center;font-size:13px;background:var(--bg);color:var(--ink-2)}
.bh-info{flex:1;min-width:0}
.bh-info b{display:block;font-size:13px;font-weight:700;color:var(--ink)}
.bh-info span{font-size:12px;color:var(--muted)}
.bh-km{flex:none;font-size:12.5px;font-weight:700;color:var(--ink-2);font-variant-numeric:tabular-nums}
</style>
</head>

  var VEHICLES = {

      sonBakim:{tarih:'15.05.2026', km:40000},
      bakimGecmis:[

        {tarih:'12.11.2025', km:28500, aciklama:'Yağ + filtre değişimi, genel kontrol'}
      ],
      aylikMaliyet:9640, kasko:'15.01.2027', trafik:'15.01.2027', durum:'aktif',
      hgs:hgsRows(arc01Dates, arc01Gates, arc01Amt),
      cezalar:[

        {tarih:'03.04.2026', tur:'Park İhlali', tutar:993, durumTxt:'Firma ödedi', cls:'ok'}
      ],
      kazalar:[

      ]
    },
    'ARC-02':{
      plaka:'34 SRV 641', model:'Mercedes Sprinter 316 Servis', yil:2022, tip:'servis', santiye:'vadi',
      kisi:{name:'İbrahim Sönmez', title:'Servis Şoförü'}, zimmetNo:null,
      muayene:'14.02.2027', muayeneGun:null, sonrakiBakimKm:70000, bakimSuan:61200,

      ],
      aylikMaliyet:8120, kasko:'05.06.2027', trafik:'05.06.2027', durum:'aktif',

      ],

      hgs:hgsRows(['03.07.2026','14.07.2026','25.07.2026'], ['TEM Otoyolu Gebze Gişeleri','TEM Otoyolu Gebze Gişeleri','TEM Otoyolu Dilovası'], [210,190,190]),
      cezalar:[], kazalar:[]
    }
  };

  var q = new URLSearchParams(location.search);
  var key = q.get('arac');
  if(!VEHICLES[key]) key = 'ARC-01';
  var v = VEHICLES[key];
  var tip = TIP[v.tip];

  function render(){
    document.title = key + ' — Araç Dosyası — Gavia CRM';
    document.getElementById('crumbNo').textContent = key;
    document.getElementById('vhEyebrow').textContent = SANTIYE_ADI[v.santiye] + ' · Araç #' + key;
    document.getElementById('vhTitle').textContent = v.plaka + ' — ' + v.model + ' (' + v.yil + ')';
    var mkTint = SANTIYE_TINT[v.santiye];
    var mkEl = document.getElementById('vhMark');
    mkEl.style.background = mkTint.bg; mkEl.style.color = mkTint.fg;
    mkEl.innerHTML = '<i class="fa-solid ' + tip.ic + '"></i>';
    document.getElementById('vhTipTag').textContent = tip.lbl;
    var db = document.getElementById('vhDurumBadge');
    if(v.durum === 'serviste'){ db.className = 'gstat warn'; db.textContent = 'Serviste'; }
    else { db.className = 'gstat ok'; db.textContent = 'Aktif'; }

    var meta = '';
    meta += '<div><dt>Şantiye</dt><dd>' + SANTIYE_ADI[v.santiye] + '</dd></div>';
    meta += '<div><dt>Zimmetli</dt><dd>' + (v.kisi ? v.kisi.name + ' — ' + v.kisi.title : 'Zimmetsiz (depo havuz aracı)') + '</dd></div>';
    if(v.zimmetNo){
      meta += '<div><dt>Zimmet Kaydı</dt><dd><a href="crm-operasyon-demirbas-detay.html?zmt='+v.zimmetNo.replace('ZMT-2026-','')+'" style="color:var(--acc-ink)">'+v.zimmetNo+'</a></dd></div>';
    } else {
      meta += '<div><dt>Zimmet Kaydı</dt><dd class="muted" style="font-weight:600">Demirbaş modülünde ayrı kayıt yok</dd></div>';
    }
    meta += '<div><dt>Kasko Bitiş</dt><dd>' + v.kasko + '</dd></div>';
    meta += '<div><dt>Trafik Sigortası Bitiş</dt><dd>' + v.trafik + '</dd></div>';
    meta += '<div><dt>Güncel Kilometre</dt><dd>' + km(v.bakimSuan) + '</dd></div>';
    document.getElementById('vhMeta').innerHTML = meta;

    var stats = '';
    stats += '<div class="vh-stat' + (v.muayeneGun ? ' warn' : '') + '"><div class="vh-stat-num">' + v.muayene + '</div><div class="vh-stat-lbl">Muayene' + (v.muayeneGun ? ' — ' + v.muayeneGun + ' gün kaldı' : '') + '</div></div>';
    var kalanKm = v.sonrakiBakimKm - v.bakimSuan;
    stats += '<div class="vh-stat' + (v.bakimAsildi ? ' danger' : '') + '"><div class="vh-stat-num">' + (v.bakimAsildi ? km(v.bakimSuan - v.sonrakiBakimKm) + ' aşıldı' : km(kalanKm) + ' kaldı') + '</div><div class="vh-stat-lbl">Sonraki bakım — hedef ' + km(v.sonrakiBakimKm) + '</div></div>';
    stats += '<div class="vh-stat"><div class="vh-stat-num">' + tl(v.aylikMaliyet) + '</div><div class="vh-stat-lbl">Aylık maliyet</div></div>';
    var hgsToplam = v.hgs.reduce(function(s,r){ return s + r[2]; }, 0);
    stats += '<div class="vh-stat"><div class="vh-stat-num">' + (hgsToplam ? tl(hgsToplam) : '—') + '</div><div class="vh-stat-lbl">Temmuz HGS' + (v.hgs.length ? ' — ' + v.hgs.length + ' geçiş' : ' — geçiş yok') + '</div></div>';
    document.getElementById('vhStats').innerHTML = stats;

    /* ---- HGS Geçişleri ---- */
    var hgsWrap = document.getElementById('hgsWrap');
    if(v.hgs.length){
      var h = '<table class="gtable" id="tblHgs"><thead><tr><th>Tarih</th><th>Gişe</th><th class="num">Tutar</th></tr></thead><tbody>';
      v.hgs.forEach(function(r){ h += '<tr><td>' + r[0] + '</td><td>' + r[1] + '</td><td class="num">' + tl(r[2]) + '</td></tr>'; });
      h += '<tr class="hgs-total"><td colspan="2">Temmuz Toplamı</td><td class="num">' + tl(hgsToplam) + '</td></tr></tbody></table>';
      hgsWrap.innerHTML = h;
    } else {
      hgsWrap.innerHTML = '<div class="gv-empty"><div class="ge-ico"><i class="fa-solid fa-road"></i></div><h4>HGS geçişi yok</h4><p>Bu araç için Temmuz 2026 döneminde kayıtlı bir geçiş bulunmuyor.</p></div>';
    }

    /* ---- Trafik Cezaları ---- */
    var cezaWrap = document.getElementById('cezaWrap');
    if(v.cezalar.length){
      var c = '';
      v.cezalar.forEach(function(z){
        c += '<div class="ceza-row"><div class="ceza-ico" style="background:var(--'+z.cls+'-tint,var(--bg));color:var(--'+z.cls+')"><i class="fa-solid fa-triangle-exclamation"></i></div>'
           + '<div class="ceza-info"><b>' + z.tur + '</b><span>' + z.tarih + ' · <span class="gstat ' + z.cls + '" style="margin-left:2px">' + z.durumTxt + '</span></span></div>'
           + '<div class="ceza-amt"><b>' + tl(z.tutar) + '</b></div></div>';
      });
      cezaWrap.innerHTML = c;
    } else {
      cezaWrap.innerHTML = '<div class="gv-empty"><div class="ge-ico" style="'+(v.temizDosya?'color:var(--ok)':'')+'"><i class="fa-solid '+(v.temizDosya?'fa-circle-check':'fa-gavel')+'"></i></div><h4>' + (v.temizDosya ? 'Temiz dosya' : 'Ceza kaydı yok') + '</h4><p>' + (v.temizDosya ? 'Bu araç için hiçbir trafik cezası kaydı bulunmuyor.' : 'Bu araç için kayıtlı bir trafik cezası yok.') + '</p></div>';
    }

    /* ---- Kaza & Hasar ---- */
    var kazaWrap = document.getElementById('kazaWrap');
    if(v.kazalar.length){
      var k = '';
      v.kazalar.forEach(function(kz){
        k += '<div class="gd-block" style="padding:20px 22px">'
           + '<b style="display:block;font-size:13.5px;font-weight:700;color:var(--ink);margin-bottom:4px">' + kz.aciklama + '</b>'
           + '<span style="font-size:12px;color:var(--muted)">' + kz.tarih + '</span>'
           + '<div class="hasar-grid">'
           +   '<div class="hasar-cell"><dt>Hasar Bedeli</dt><dd>' + tl(kz.hasar) + '</dd></div>'
           +   '<div class="hasar-cell"><dt>Sigorta Karşılığı (%' + kz.sigortaOran + ')</dt><dd style="color:var(--ok)">' + tl(kz.sigortaTutar) + '</dd></div>'
           +   '<div class="hasar-cell"><dt>Firma Payı</dt><dd style="color:var(--danger)">' + tl(kz.firmaPay) + '</dd></div>'
           + '</div></div>';
      });
      kazaWrap.innerHTML = k;
    } else {
      kazaWrap.innerHTML = '<div class="gv-empty"><div class="ge-ico"><i class="fa-solid fa-car-burst"></i></div><h4>Kaza/hasar kaydı yok</h4><p>Bu araç için kayıtlı bir kaza veya hasar bulunmuyor.</p></div>';
    }

    /* ---- Bakım & Muayene ---- */
    var remind = '';
    remind += '<div class="br-card' + (v.muayeneGun ? ' warn' : '') + '"><div class="br-ico"><i class="fa-solid fa-clipboard-check"></i></div>'
      + '<div class="br-body"><b>Muayene — ' + v.muayene + '</b><span>' + (v.muayeneGun ? v.muayeneGun + ' gün kaldı, planlayın.' : 'Yaklaşan bir muayene uyarısı yok.') + '</span></div></div>';
    remind += '<div class="br-card' + (v.bakimAsildi ? ' danger' : '') + '"><div class="br-ico"><i class="fa-solid fa-oil-can"></i></div>'
      + '<div class="br-body"><b>Sonraki Bakım — hedef ' + km(v.sonrakiBakimKm) + '</b><span>Güncel km ' + km(v.bakimSuan) + ' — ' + (v.bakimAsildi ? km(v.bakimSuan - v.sonrakiBakimKm) + ' hedef aşıldı, servise alın.' : km(v.sonrakiBakimKm - v.bakimSuan) + ' kaldı.') + '</span></div></div>';
    if(v.durumNot){
      remind += '<div class="br-card danger" style="grid-column:1/-1"><div class="br-ico"><i class="fa-solid fa-screwdriver-wrench"></i></div>'
        + '<div class="br-body"><b>Serviste</b><span>' + v.durumNot + '.</span></div></div>';
    }
    document.getElementById('bakimRemindWrap').innerHTML = remind;

    var hist = '';
    v.bakimGecmis.forEach(function(b){
      hist += '<div class="bakim-hist-row"><div class="bh-ico"><i class="fa-solid fa-wrench"></i></div>'
        + '<div class="bh-info"><b>' + b.aciklama + '</b><span>' + b.tarih + '</span></div>'
        + '<div class="bh-km">' + km(b.km) + '</div></div>';
    });
    document.getElementById('bakimHistWrap').innerHTML = hist;
  }

  render();

  /* sekme motoru — santiye-detay.html ile aynı desen */
  (function(){
    var tabs = Array.prototype.slice.call(document.querySelectorAll('.gv-tab'));
    var panels = Array.prototype.slice.call(document.querySelectorAll('.tab-panel'));
    function activate(id){
      tabs.forEach(function(t){
        var on = t.getAttribute('data-tab') === id;
        t.classList.toggle('is-active', on);
        t.setAttribute('aria-selected', on ? 'true' : 'false');
      });
      panels.forEach(function(p){ p.hidden = p.getAttribute('data-tab-panel') !== id; });
    }
    tabs.forEach(function(t){
      t.addEventListener('click', function(){
        var id = t.getAttribute('data-tab');
        activate(id);
        history.replaceState(null, '', '?arac=' + key + '#' + id);
      });
    });
    var initial = (location.hash || '').replace('#', '');
    var valid = tabs.some(function(t){ return t.getAttribute('data-tab') === initial; });
    activate(valid ? initial : 'hgs');
  })();
})();
</script>
</body>
</html>
