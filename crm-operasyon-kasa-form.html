<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>Yeni Kasa Raporu — Gavia CRM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
      integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A=="
      crossorigin="anonymous" referrerpolicy="no-referrer">
<link rel="stylesheet" href="assets/css/tokens.css">
<link rel="stylesheet" href="assets/css/shell.css">
<link rel="stylesheet" href="assets/css/ui.css">
<style>
/* sayfaya özel: yeni kasa raporu formu */
.gv-crumb{display:flex;align-items:center;gap:9px;font-size:12.5px;font-weight:600;color:var(--muted);margin-bottom:14px}
.gv-crumb a{color:var(--acc-ink);font-weight:700}
.gv-crumb a:hover{color:var(--acc-deep)}
.gv-crumb i{font-size:9px;color:var(--line-2)}

.frm-grid{display:grid;grid-template-columns:1fr 300px;gap:18px;align-items:start}
@media(max-width:980px){.frm-grid{grid-template-columns:minmax(0,1fr)}}

.gd-block{padding:22px}
.gd-block + .gd-block{border-top:1px solid var(--line)}
.gd-label{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}

/* kalem satırları — dinamik ekle/çıkar */
.kal-row{display:grid;grid-template-columns:1fr 150px 130px 34px;gap:10px;align-items:center;margin-bottom:10px}
.kal-row input,.kal-row select{font-family:inherit;font-size:13px;font-weight:500;color:var(--ink);background:var(--bg);border:1px solid var(--line);border-radius:var(--r-sm);padding:9px 11px;outline:none;transition:.2s var(--ease);width:100%}
.kal-row input:focus,.kal-row select:focus{border-color:var(--acc);background:var(--paper);box-shadow:0 0 0 3px rgba(var(--acc-rgb),.12)}
.kal-row .kal-tutar-inp{text-align:right;font-variant-numeric:tabular-nums}
.kal-remove{width:34px;height:34px;flex:none;border-radius:var(--r-sm);border:1px solid var(--line);background:var(--paper);color:var(--muted);display:inline-flex;align-items:center;justify-content:center;cursor:pointer;transition:.18s var(--ease)}
.kal-remove:hover{border-color:var(--danger);color:var(--danger);background:var(--danger-tint)}
.kal-add{margin-top:2px}
@media(max-width:640px){
  .kal-row{grid-template-columns:1fr;gap:8px;padding-bottom:12px;margin-bottom:12px;border-bottom:1px dashed var(--line)}
  .kal-remove{justify-self:end;width:34px}
}

/* toplam özeti — sağ sütun */
.tot-card{background:var(--bg);border-radius:var(--r-md);padding:16px 18px;display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:4px}
.tot-card b{font-size:20px;font-weight:800;color:var(--ink);font-variant-numeric:tabular-nums;letter-spacing:-.01em}
.tot-card span{font-size:11.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;font-weight:700}

.sub-note{font-size:12.5px;color:var(--muted);line-height:1.6;margin-top:14px}
.sub-note i{color:var(--acc-ink);margin-right:5px}

.frm-acts{display:flex;flex-direction:column;gap:10px}
.frm-acts .btn{width:100%;justify-content:center}
</style>
</head>
<body data-sec="operasyon" data-screen="kasa">
<div class="gv-app">
  <aside class="gv-rail" id="gvRail"></aside>
  <nav class="gv-menu" id="gvMenu"></nav>
  <div class="gv-divider" id="gvDivider" role="separator" aria-label="Menüyü daralt/genişlet"><span class="gv-grip"></span></div>
  <div class="gv-overlay" id="gvOverlay"></div>

  <header class="gv-top">
    <button class="gv-burger" id="gvBurger" aria-label="Menü"><i class="fa-solid fa-bars"></i></button>
    <div class="gv-search"><i class="fa-solid fa-magnifying-glass"></i><input type="text" placeholder="Ara"></div>
    <div class="gv-top-tools">
      <button class="gv-iconbtn" data-tip="Bildirimler" aria-label="Bildirimler"><i class="fa-regular fa-bell"></i><span class="gb-dot"></span></button>
      <div class="gv-me">
        <div class="me-ava" id="gvAva">·</div>
        <div class="me-id"><div class="me-name" id="gvName">—</div><div class="me-role" id="gvRole">—</div></div>
        <i class="fa-solid fa-chevron-down"></i>
      </div>
    </div>
  </header>

  <main class="gv-main">
    <div class="gv-crumb">
      <a href="crm-operasyon-kasa.html">Kasa Raporu</a>
      <i class="fa-solid fa-chevron-right"></i>
      <span>Yeni Rapor</span>
    </div>

    <div class="gv-page-head">
      <div>
        <div class="ph-eyebrow">Günlük Kayıt</div>
        <h1>Yeni Kasa Raporu</h1>
        <div class="ph-sub">Şantiyenizin nakit harcamalarını kalem kalem girin, onaya gönderin.</div>
      </div>
    </div>

    <div class="frm-grid">
      <!-- ============ SOL: form ============ -->
      <div class="gv-card">
        <div class="gd-block">
          <div class="gd-label">Rapor Bilgileri</div>
          <form class="gform" id="kasaForm" onsubmit="return false">
            <div class="gfield">
              <label for="fSantiye">Şantiye</label>
              <select id="fSantiye">
                <option>Vadi Konakları</option>
                <option>Liman Lojistik Merkezi</option>
                <option>Merkez Şantiye</option>
              </select>
            </div>
            <div class="gfield">
              <label for="fTarih">Tarih</label>
              <input id="fTarih" type="date" value="2026-07-02">
            </div>
            <div class="gfield">
              <label for="fOdeme">Ödeme yöntemi</label>
              <select id="fOdeme">
                <option>Nakit</option>
                <option>Kasa avansından</option>
              </select>
            </div>
            <div class="gfield">
              <label for="fDonem">Kasa dönemi</label>
              <input id="fDonem" type="text" value="Temmuz 2026" disabled>
            </div>
          </form>
        </div>

        <div class="gd-block">
          <div class="gd-label">Kalem Dökümü</div>
          <div id="kalWrap">
            <div class="kal-row">
              <input type="text" placeholder="Açıklama" value="Hazır beton nakit teslimi">
              <select>
                <option>Nakliye</option>
                <option>İşçilik</option>
                <option selected>Malzeme</option>
                <option>Akaryakıt</option>
                <option>Diğer</option>
              </select>
              <input type="text" class="kal-tutar-inp num-inp" placeholder="₺0" value="₺7.200">
              <button type="button" class="kal-remove" aria-label="Satırı kaldır" data-no-confirm><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="kal-row">
              <input type="text" placeholder="Açıklama" value="Saha işçileri yol/yemek">
              <select>
                <option>Nakliye</option>
                <option selected>İşçilik</option>
                <option>Malzeme</option>
                <option>Akaryakıt</option>
                <option>Diğer</option>
              </select>
              <input type="text" class="kal-tutar-inp num-inp" placeholder="₺0" value="₺2.150">
              <button type="button" class="kal-remove" aria-label="Satırı kaldır" data-no-confirm><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="kal-row">
              <input type="text" placeholder="Açıklama" value="">
              <select>
                <option>Nakliye</option>
                <option>İşçilik</option>
                <option>Malzeme</option>
                <option selected>Akaryakıt</option>
                <option>Diğer</option>
              </select>
              <input type="text" class="kal-tutar-inp num-inp" placeholder="₺0" value="">
              <button type="button" class="kal-remove" aria-label="Satırı kaldır" data-no-confirm><i class="fa-solid fa-xmark"></i></button>
            </div>
          </div>
          <button type="button" class="btn btn-ghost btn-sm kal-add" id="kalAdd" data-no-confirm><i class="fa-solid fa-plus"></i> Kalem Ekle</button>
        </div>

        <div class="gd-block">
          <div class="gd-label">Not</div>
          <div class="gfield full" style="margin:0">
            <textarea id="fNot" rows="3" placeholder="Onaycıya iletmek istediğiniz açıklama (opsiyonel)"></textarea>
          </div>
        </div>
      </div>

      <!-- ============ SAĞ: özet + gönder ============ -->
      <div class="gv-side-stack" style="display:flex;flex-direction:column;gap:16px">
        <div class="gv-card">
          <div class="gd-block">
            <div class="gd-label">Toplam</div>
            <div class="tot-card"><span>Rapor tutarı</span><b id="totTutar">₺9.350</b></div>
            <p class="sub-note"><i class="fa-solid fa-circle-info"></i>Gönderdiğinizde rapor Teknik Müdür onayına düşer; onay zinciri rapor detayında görüntülenir.</p>
          </div>
          <div class="gd-block frm-acts">
            <button type="button" class="btn btn-acc btn-sm" id="btnSend"><i class="fa-solid fa-paper-plane"></i> Onaya Gönder</button>
            <button type="button" class="btn btn-ghost btn-sm" id="btnDraft" data-no-confirm><i class="fa-solid fa-floppy-disk"></i> Taslak Olarak Kaydet</button>
            <a class="btn btn-ghost btn-sm" href="crm-operasyon-kasa.html" data-no-confirm>Vazgeç</a>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="assets/js/shell.js"></script>
<script src="assets/js/ui.js"></script>
<script>
(function(){
  if(!window.GV) return;

  /* sef ise şantiye seçici kendi sahasına sabitlenir */
  var santiyeSel = document.getElementById('fSantiye');
  if(GV.role === 'sef'){ santiyeSel.value = 'Vadi Konakları'; santiyeSel.disabled = true; }

  var wrap = document.getElementById('kalWrap');
  var totEl = document.getElementById('totTutar');

  function parseTL(v){
    var n = parseFloat((v || '').replace(/[₺.\s]/g,'').replace(',', '.'));
    return isNaN(n) ? 0 : n;
  }
  function fmtTL(n){
    return '₺' + n.toLocaleString('tr-TR', {maximumFractionDigits:0});
  }
  function recalc(){
    var sum = 0;
    wrap.querySelectorAll('.kal-tutar-inp').forEach(function(inp){ sum += parseTL(inp.value); });
    totEl.textContent = fmtTL(sum);
  }
  wrap.addEventListener('input', function(e){
    if(e.target.classList.contains('kal-tutar-inp')) recalc();
  });
  wrap.addEventListener('click', function(e){
    var btn = e.target.closest('.kal-remove'); if(!btn) return;
    var rows = wrap.querySelectorAll('.kal-row');
    if(rows.length <= 1){ gvToast('En az bir kalem satırı kalmalı.', {type:'info'}); return; }
    btn.closest('.kal-row').remove();
    recalc();
  });
  document.getElementById('kalAdd').addEventListener('click', function(){
    var row = wrap.querySelector('.kal-row').cloneNode(true);
    row.querySelectorAll('input').forEach(function(i){ i.value = ''; });
    row.querySelector('select').selectedIndex = 0;
    wrap.appendChild(row);
    row.querySelector('input').focus();
  });

  document.getElementById('btnDraft').addEventListener('click', function(){
    gvToast('Rapor taslak olarak kaydedildi.', {type:'info'});
  });
  document.getElementById('btnSend').addEventListener('click', function(){
    var anyDesc = Array.prototype.some.call(wrap.querySelectorAll('.kal-row input[type="text"]'), function(i){ return i.value.trim(); });
    if(!anyDesc){ gvToast('En az bir kalem açıklaması girin.', {type:'danger'}); return; }
    gvToast('Rapor onaya gönderildi. Teknik Müdür onayı bekleniyor.');
    setTimeout(function(){ location.href = 'crm-operasyon-kasa.html'; }, 900);
  });

  recalc();
})();
</script>
</body>
</html>
