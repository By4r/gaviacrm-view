<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>İş Programı Raporu — Gavia CRM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
      integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A=="
      crossorigin="anonymous" referrerpolicy="no-referrer">
<link rel="stylesheet" href="assets/css/tokens.css">
<link rel="stylesheet" href="assets/css/shell.css">
<link rel="stylesheet" href="assets/css/ui.css">
<style>
/* ============ SAYFAYA ÖZEL — İş Programı Raporu (plan vs gerçek çift bar) ============ */
.rp-back{display:inline-flex;align-items:center;gap:7px}

.santiye-row{display:flex;align-items:center;gap:10px;margin-bottom:18px;flex-wrap:wrap}
.santiye-row .frow-lbl{font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--muted)}

#tblProgram{min-width:840px}
.pg-kalem{font-weight:700;color:var(--ink);font-size:13.5px}
.pg-dates{font-size:11.5px;color:var(--muted);margin-top:2px;line-height:1.5}
.pg-dates b{color:var(--ink-2);font-weight:600}

.prog-cell{display:flex;flex-direction:column;gap:6px;min-width:190px}
.prog-cell .pc-row{display:flex;align-items:center;gap:8px}
.prog-cell .pc-lbl{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);width:38px;flex:none}
.prog-cell .gbar{flex:1;min-width:0}
.gbar-fill.plan{background:var(--line-2)}

.sapma-val{font-size:13px;font-weight:800;white-space:nowrap;display:inline-flex;align-items:center;gap:5px}
.sapma-val.ok{color:var(--ok)}
.sapma-val.warn{color:var(--warn)}
.sapma-val.danger{color:var(--danger)}
.sapma-val.flat{color:var(--muted);font-weight:700}

.crit-row{display:flex;align-items:flex-start;gap:14px;padding:15px 22px;border-bottom:1px solid var(--line)}
.crit-row:last-child{border-bottom:none}
.crit-ico{width:36px;height:36px;flex:none;border-radius:var(--r-sm);display:grid;place-items:center;font-size:14px}
.crit-info{flex:1;min-width:0}
.crit-info b{display:block;font-size:13.5px;font-weight:700;color:var(--ink)}
.crit-info span{font-size:12px;color:var(--muted)}
.crit-amt{flex:none;font-size:14px;font-weight:800}

@media(max-width:640px){
  .prog-cell{min-width:150px}
}
</style>
</head>
<body data-sec="panel" data-screen="raporlar">
<div class="gv-app">
  <aside class="gv-rail" id="gvRail"></aside>
  <nav class="gv-menu" id="gvMenu"></nav>
  <div class="gv-divider" id="gvDivider" role="separator" aria-label="Menüyü daralt/genişlet"><span class="gv-grip"></span></div>
  <div class="gv-overlay" id="gvOverlay"></div>

  <header class="gv-top">
    <button class="gv-burger" id="gvBurger" aria-label="Menü"><i class="fa-solid fa-bars"></i></button>
    <div class="gv-search"><i class="fa-solid fa-magnifying-glass"></i><input type="text" placeholder="Ara"></div>
    <div class="gv-top-tools">
      <button class="gv-iconbtn" data-tip="Bildirimler" aria-label="Bildirimler"><i class="fa-regular fa-bell"></i><span class="gb-dot"></span></button>
      <div class="gv-me">
        <div class="me-ava" id="gvAva">·</div>
        <div class="me-id"><div class="me-name" id="gvName">—</div><div class="me-role" id="gvRole">—</div></div>
        <i class="fa-solid fa-chevron-down"></i>
      </div>
    </div>
  </header>

  <main class="gv-main">
    <div class="gv-page-head">
      <div>
        <div class="ph-eyebrow">Analiz</div>
        <h1>İş Programı Raporu</h1>
        <div class="ph-sub" id="ipSub">Yükleniyor…</div>
      </div>
      <div class="ph-actions">
        <a class="btn btn-ghost btn-sm rp-back" href="crm-panel-raporlar.html"><i class="fa-solid fa-arrow-left"></i> Rapor Merkezi</a>
        <button class="btn btn-ghost btn-sm" data-export="İş programı raporu"><i class="fa-solid fa-download"></i> Dışa Aktar</button>
      </div>
    </div>

    <div class="santiye-row">
      <span class="frow-lbl">Şantiye</span>
      <div class="chips" id="ipChips">
        <button class="chip" data-santiye="vadi">Vadi Konakları</button>
        <button class="chip" data-santiye="liman">Liman Lojistik Merkezi</button>
        <button class="chip" data-santiye="merkez">Merkez Şantiye</button>
      </div>
    </div>

    <div class="kpi-grid">
      <div class="kpi-card">
        <div class="kpi-ico"><i class="fa-solid fa-list-check"></i></div>
        <div><div class="kpi-num num" id="kpiToplam">—</div><div class="kpi-lbl">Toplam kalem</div>
        <div class="kpi-delta flat"><i class="fa-solid fa-calendar-days"></i> İş programı ana kalemleri</div></div>
      </div>
      <div class="kpi-card" id="kpiGecikenCard">
        <div class="kpi-ico"><i class="fa-solid fa-triangle-exclamation"></i></div>
        <div><div class="kpi-num num" id="kpiGeciken">—</div><div class="kpi-lbl">Geciken kalem</div>
        <div class="kpi-delta flat"><i class="fa-solid fa-hourglass-half"></i> Sapma negatif olan kalemler</div></div>
      </div>
      <div class="kpi-card" id="kpiSapmaCard">
        <div class="kpi-ico"><i class="fa-solid fa-arrow-trend-down"></i></div>
        <div><div class="kpi-num num" id="kpiSapma" style="font-size:19px">—</div><div class="kpi-lbl">En büyük sapma</div>
        <div class="kpi-delta flat" id="kpiSapmaSub"><i class="fa-solid fa-circle-info"></i> —</div></div>
      </div>
      <div class="kpi-card">
        <div class="kpi-ico" style="background:rgba(var(--acc-rgb),.12);color:var(--acc-ink)"><i class="fa-solid fa-flag-checkered"></i></div>
        <div><div class="kpi-num num compact" id="kpiGenel" style="font-size:19px">—</div><div class="kpi-lbl">Genel ilerleme</div>
        <div class="kpi-delta flat" id="kpiGenelSub"><i class="fa-solid fa-circle-info"></i> —</div></div>
      </div>
    </div>

    <div class="gv-card">
      <div class="gc-head"><div class="gc-title"><i class="fa-solid fa-table-cells"></i> İş Programı — Ana Kalemler</div></div>
      <div class="gc-body flush">
        <table class="gtable" id="tblProgram">
          <thead>
            <tr>
              <th>Kalem</th>
              <th>Planlanan / Gerçekleşen</th>
              <th>İlerleme</th>
              <th class="num">Sapma</th>
              <th>Durum</th>
            </tr>
          </thead>
          <tbody id="ipBody"></tbody>
        </table>
      </div>
    </div>

    <div class="gv-card" style="margin-top:20px">
      <div class="gc-head"><div class="gc-title"><i class="fa-solid fa-triangle-exclamation"></i> Kritik Gecikmeler</div></div>
      <div id="ipCrit"></div>
    </div>

    <div class="gv-card" style="margin-top:20px">
      <div class="gc-body" id="ipBackWrap"></div>
    </div>
  </main>
</div>

<script src="assets/js/shell.js"></script>
<script src="assets/js/ui.js"></script>
<script>
(function(){
  if(!window.GV) return;

  /* ---- mock iş programı raporu — shell.js kanonik listesinden BİREBİR (Dalga 9,
     "İŞ PROGRAMI RAPORU" maddesi). Vadi kalemleri santiye-detay.html Özet/İş Programı
     sekmeleriyle senkron tutulur (kaba %94, ince %58, elektrik&tesisat %41, çevre %12,
     genel %68, kaba inşaat +2 gün önde). ---- */
  var SANTIYE_ADI = {vadi:'Vadi Konakları', liman:'Liman Lojistik Merkezi', merkez:'Merkez Şantiye'};

  function sapmaTxt(g){
    if(g === 0) return {cls:'flat', ic:'fa-minus', lbl:'Sapma yok'};
    if(g > 0) return {cls:'ok', ic:'fa-arrow-trend-up', lbl:'+' + g + ' gün'};
    return {cls:'danger', ic:'fa-arrow-trend-down', lbl:g + ' gün'};
  }

  var RAPOR = {
    vadi:{
      genelPct:68, genelDurum:'Programında — kaba inşaat 2 gün önde',
      backLbl:'Şantiye Kartını Gör', backHref:'crm-santiye-detay.html',
      kalemler:[
        {ad:'Temel ve Bodrum Betonu', plan:'04.03.2024 – 12.09.2024', gercek:'Tamamlandı · 12.09.2024', planPct:100, gercekPct:100, sapma:0, durum:{cls:'ok', lbl:'Tamamlandı — planında bitti'}},
        {ad:'Kaba İnşaat — A, B, C Blok', plan:'16.09.2024 – 15.08.2026', gercek:'Devam ediyor · tahmini 13.08.2026', planPct:90, gercekPct:94, sapma:2, durum:{cls:'ok', lbl:'Programın önünde'}},
        {ad:'Çatı ve Cephe İmalatı', plan:'01.09.2026 – 31.10.2026', gercek:'Henüz başlamadı', planPct:0, gercekPct:0, sapma:0, durum:{cls:'off', lbl:'Planlandı'}},
        {ad:'İnce İşler ve Tesisat', plan:'01.06.2026 – 30.11.2026', gercek:'Devam ediyor', planPct:55, gercekPct:58, sapma:0, durum:{cls:'info', lbl:'Programında'}},
        {ad:'Elektrik &amp; Tesisat', plan:'01.07.2026 – 15.12.2026', gercek:'Devam ediyor', planPct:40, gercekPct:41, sapma:0, durum:{cls:'info', lbl:'Programında'}},
        {ad:'Çevre Düzenleme', plan:'01.10.2026 – 31.12.2026', gercek:'Erken hazırlık aşaması', planPct:10, gercekPct:12, sapma:0, durum:{cls:'info', lbl:'Programında'}},
        {ad:'Teslim', plan:'Aralık 2026', gercek:'—', planPct:0, gercekPct:0, sapma:0, durum:{cls:'off', lbl:'Planlandı'}}
      ]
    },
    liman:{
      genelPct:41, genelDurum:'Programın gerisinde — kaba yapı kritik gecikmede',
      backLbl:'Şantiye Listesi', backHref:'crm-santiye.html',
      kalemler:[
        {ad:'Temel ve Zemin İyileştirme', plan:'10.01.2025 – 20.06.2025', gercek:'Tamamlandı · 18.06.2025', planPct:100, gercekPct:100, sapma:2, durum:{cls:'ok', lbl:'Tamamlandı — planından önde'}},
        {ad:'Kaba Yapı — Çelik Konstrüksiyon + Betonarme', plan:'21.06.2025 – 10.06.2026', gercek:'Devam ediyor · tahmini 22.06.2026', planPct:70, gercekPct:55, sapma:-12, durum:{cls:'danger', lbl:'Gecikiyor'}},
        {ad:'Mekanik Tesisat', plan:'01.03.2026 – 15.08.2026', gercek:'Devam ediyor · planından önde', planPct:60, gercekPct:68, sapma:3, durum:{cls:'ok', lbl:'Programın önünde'}},
        {ad:'Elektrik Tesisatı', plan:'01.04.2026 – 15.09.2026', gercek:'Devam ediyor · hafif gecikmeli', planPct:38, gercekPct:35, sapma:-2, durum:{cls:'warn', lbl:'Hafif gecikme'}},
        {ad:'Çevre &amp; Saha Düzenlemesi', plan:'01.11.2026 – 28.02.2027', gercek:'Henüz başlamadı', planPct:10, gercekPct:10, sapma:0, durum:{cls:'off', lbl:'Planlandı'}},
        {ad:'Teslim (tahmini)', plan:'15.03.2027', gercek:'Tahmini 27.03.2027', planPct:0, gercekPct:0, sapma:-12, durum:{cls:'danger', lbl:'Gecikme riski'}}
      ]
    },
    merkez:{
      genelPct:86, genelDurum:'Programında',
      backLbl:'Şantiye Listesi', backHref:'crm-santiye.html',
      kalemler:[
        {ad:'Temel &amp; Çelik Konstrüksiyon', plan:'05.01.2025 – 20.05.2025', gercek:'Tamamlandı · 19.05.2025', planPct:100, gercekPct:100, sapma:1, durum:{cls:'ok', lbl:'Tamamlandı'}},
        {ad:'Kaba Yapı — Atölye + Depo Binası', plan:'21.05.2025 – 10.03.2026', gercek:'Tamamlandı · 09.03.2026', planPct:100, gercekPct:100, sapma:1, durum:{cls:'ok', lbl:'Tamamlandı — planından önde'}},
        {ad:'Mekanik &amp; Elektrik Tesisat', plan:'15.01.2026 – 30.06.2026', gercek:'Devam ediyor', planPct:76, gercekPct:78, sapma:0, durum:{cls:'info', lbl:'Programında'}},
        {ad:'İç Mekan &amp; Saha Düzenleme', plan:'01.04.2026 – 15.08.2026', gercek:'Devam ediyor', planPct:58, gercekPct:60, sapma:0, durum:{cls:'info', lbl:'Programında'}},
        {ad:'Teslim / Devreye Alma', plan:'Eylül 2026', gercek:'—', planPct:0, gercekPct:0, sapma:0, durum:{cls:'off', lbl:'Planlandı'}}
      ]
    }
  };

  var q = new URLSearchParams(location.search);
  var key = q.get('santiye');
  if(!RAPOR[key]) key = 'vadi';
  if(GV.role === 'sef') key = 'vadi';

  function render(k){
    var R = RAPOR[k];
    document.querySelectorAll('#ipChips .chip').forEach(function(ch){ ch.classList.toggle('is-on', ch.getAttribute('data-santiye') === k); });
    document.title = SANTIYE_ADI[k] + ' — İş Programı Raporu — Gavia CRM';

    var geciken = R.kalemler.filter(function(x){ return x.sapma < 0; });
    var enBuyuk = R.kalemler.reduce(function(a,b){ return Math.abs(b.sapma) > Math.abs(a.sapma) ? b : a; }, R.kalemler[0]);

    document.getElementById('ipSub').textContent = SANTIYE_ADI[k] + ' · ' + R.kalemler.length + ' ana kalem · genel ilerleme %' + R.genelPct;
    document.getElementById('kpiToplam').textContent = R.kalemler.length;
    document.getElementById('kpiGeciken').textContent = geciken.length;
    document.getElementById('kpiGecikenCard').className = 'kpi-card' + (geciken.length ? ' danger' : '');
    var sv = sapmaTxt(enBuyuk.sapma);
    document.getElementById('kpiSapma').textContent = sv.lbl;
    document.getElementById('kpiSapma').style.color = sv.cls === 'danger' ? 'var(--danger)' : (sv.cls === 'ok' ? 'var(--ok)' : 'var(--ink)');
    document.getElementById('kpiSapmaSub').innerHTML = '<i class="fa-solid fa-circle-info"></i> ' + enBuyuk.ad;
    document.getElementById('kpiSapmaCard').className = 'kpi-card' + (enBuyuk.sapma < 0 ? ' danger' : '');
    document.getElementById('kpiGenel').textContent = '%' + R.genelPct;
    document.getElementById('kpiGenelSub').innerHTML = '<i class="fa-solid fa-circle-info"></i> ' + R.genelDurum;

    var body = '';
    R.kalemler.forEach(function(x){
      var gCls = x.sapma < 0 ? 'danger' : (x.sapma > 0 ? '' : '');
      body += '<tr>'
        + '<td><div class="pg-kalem">' + x.ad + '</div></td>'
        + '<td><div class="pg-dates"><b>Planlanan:</b> ' + x.plan + '<br><b>Gerçekleşen:</b> ' + x.gercek + '</div></td>'
        + '<td><div class="prog-cell">'
        +   '<div class="pc-row"><span class="pc-lbl">Plan</span><div class="gbar"><div class="gbar-track"><div class="gbar-fill plan" style="width:' + x.planPct + '%"></div></div><span class="gbar-val">%' + x.planPct + '</span></div></div>'
        +   '<div class="pc-row"><span class="pc-lbl">Gerçek</span><div class="gbar"><div class="gbar-track"><div class="gbar-fill ' + gCls + '" style="width:' + x.gercekPct + '%"></div></div><span class="gbar-val">%' + x.gercekPct + '</span></div></div>'
        + '</div></td>'
        + '<td class="num"><span class="sapma-val ' + sapmaTxt(x.sapma).cls + '"><i class="fa-solid ' + sapmaTxt(x.sapma).ic + '"></i> ' + sapmaTxt(x.sapma).lbl + '</span></td>'
        + '<td><span class="gstat ' + x.durum.cls + '">' + x.durum.lbl + '</span></td>'
        + '</tr>';
    });
    document.getElementById('ipBody').innerHTML = body;

    var crit = '';
    if(geciken.length){
      geciken.sort(function(a,b){ return a.sapma - b.sapma; }).forEach(function(x){
        crit += '<div class="crit-row"><div class="crit-ico" style="background:var(--'+x.durum.cls+'-tint,var(--warn-tint));color:var(--'+x.durum.cls+',var(--warn))"><i class="fa-solid fa-triangle-exclamation"></i></div>'
          + '<div class="crit-info"><b>' + SANTIYE_ADI[k] + ' — ' + x.ad + '</b><span>' + x.durum.lbl + ' · Gerçekleşen ' + x.gercek + '</span></div>'
          + '<div class="crit-amt" style="color:var(--danger)">' + x.sapma + ' gün</div></div>';
      });
    } else {
      crit = '<div class="gv-empty"><div class="ge-ico"><i class="fa-solid fa-circle-check"></i></div><h4>Kritik gecikme yok</h4><p>' + SANTIYE_ADI[k] + ' iş programı takviminde şu anda gecikmiş bir kalem bulunmuyor.</p></div>';
    }
    document.getElementById('ipCrit').innerHTML = crit;

    document.getElementById('ipBackWrap').innerHTML = '<a class="gc-link" href="' + R.backHref + '"><i class="fa-solid fa-arrow-right"></i> ' + R.backLbl + '</a>';
  }

  render(key);

  var chipsEl = document.getElementById('ipChips');
  if(GV.role === 'sef'){
    chipsEl.querySelectorAll('.chip').forEach(function(ch){ if(ch.getAttribute('data-santiye') !== 'vadi') ch.remove(); });
  }
  chipsEl.addEventListener('click', function(e){
    var ch = e.target.closest('.chip[data-santiye]'); if(!ch) return;
    var k = ch.getAttribute('data-santiye');
    history.replaceState(null, '', 'crm-panel-rapor-isprogrami.html?santiye=' + k);
    render(k);
  });
})();
</script>
</body>
</html>
