<style>
/* ============ SAYFAYA ÖZEL — Kişisel Ajanda haftalık grid'i ============
   santiye-ajanda.html .ajd-* pattern'inin sayfa-lokal kopyası; kişisel ajandaya
   özgü fark: 6 kanonik olay türü, tıklanabilir kart (href), tür-filtre chip'leri
   (legend'i de üstlenir), rol bazlı daraltma. */
.ajd-toolbar{display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;padding:16px 22px;border-bottom:1px solid var(--line)}
.ajd-weeknav{display:flex;align-items:center;gap:12px}
.ajd-week-lbl{font-size:13.5px;font-weight:700;color:var(--ink);white-space:nowrap}

/* ---- "Etkinlik Ekle" split menü + kart işlem menüsü — ikisi de .gv-pop'u
   <button> varyantıyla yeniden kullanır (ui.js'in .gv-pop a stili sadece <a>
   hedefliyor; burada sayfa-lokal <button> stili eklenir, ui.js'e DOKUNULMADI) ---- */
.ajd-add-wrap{position:relative;display:inline-flex}
.ajd-add-wrap .gv-pop{min-width:228px}
.gv-pop button{
  all:unset;box-sizing:border-box;display:flex;align-items:center;gap:11px;width:100%;
  padding:9px 12px;border-radius:var(--r-sm);font-size:13.5px;font-weight:600;color:var(--ink-2);
  cursor:pointer;transition:.15s var(--ease);font-family:inherit;
}
.gv-pop button i{width:16px;text-align:center;font-size:13px;color:var(--muted);transition:.15s var(--ease)}
.gv-pop button:hover,.gv-pop button:focus-visible{background:var(--bg);color:var(--ink)}
.gv-pop button:hover i,.gv-pop button:focus-visible i{color:var(--acc-ink)}
.gv-pop button.danger{color:var(--danger)}
.gv-pop button.danger i{color:var(--danger)}
.gv-pop button.danger:hover,.gv-pop button.danger:focus-visible{background:var(--danger-tint)}
.ajd-add-wrap .gv-pop a{font-weight:700;color:var(--acc-ink)}
.ajd-add-wrap .gv-pop a i{color:var(--acc-ink)}

.ajd-typebar{display:flex;flex-wrap:wrap;gap:8px;padding:14px 22px;border-bottom:1px solid var(--line)}
.chip-dot{width:8px;height:8px;border-radius:50%;flex:none}

.ajd-grid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:1px;background:var(--line)}
.ajd-day{background:var(--paper);min-width:0;display:flex;flex-direction:column}
.ajd-day.is-today{background:rgba(var(--acc-rgb),.045)}
.ajd-dhead{padding:14px 12px 12px;border-bottom:1px solid var(--line);text-align:center}
.ajd-day.is-today .ajd-dhead{border-bottom-color:rgba(var(--acc-rgb),.3)}
.ajd-dname{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--muted)}
.ajd-day.is-today .ajd-dname{color:var(--acc-ink)}
.ajd-ddate{font-size:17px;font-weight:800;color:var(--ink);margin-top:2px;line-height:1}
.ajd-day.is-today .ajd-ddate{color:var(--acc-ink)}
.ajd-today-badge{display:inline-block;margin-top:6px;font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--acc-ink);background:rgba(var(--acc-rgb),.14);padding:2px 8px;border-radius:var(--r-pill)}

.ajd-list{flex:1;display:flex;flex-direction:column;gap:8px;padding:10px}
.ajd-card-wrap{position:relative}
.ajd-card{background:var(--bg);border:1px solid var(--line);border-left:3px solid var(--line-2);border-radius:var(--r-sm);padding:10px 34px 10px 11px;transition:.18s var(--ease);display:block;text-decoration:none}
.ajd-card:hover{border-color:var(--line-2);transform:translateY(-1px);box-shadow:var(--sh-sm)}
.ajd-card:not(a){cursor:default}

/* ---- kart işlem (⋯) menüsü — KASITLI olarak kartın <a>'sının DIŞINDA, kendi
   overlay wrapper'ında durur (sibling, nested değil). Neden: kart <a> ise ve
   ⋯ menüsü (Sil dahil) o <a>'nın İÇİNDE olsaydı, ui.js'in global yıkıcı-aksiyon
   interceptor'ı (destrKind → el.querySelector('.fa-trash')/textContent regex)
   TÜM kartın closest('button,a') = <a class="ajd-card"> olduğunu görüp kartın
   HERHANGİ bir yerine tıklamayı "Sil" sanıp confirm modalı açıyordu (doğrulandı).
   Overlay + preventDefault/stopPropagation bu çakışmayı da, link tetiklenmesini
   de önler. ---- */
.ajd-kebab-wrap{position:absolute;top:7px;right:7px;z-index:5}
.ajd-kebab{
  flex:none;width:26px;height:26px;border-radius:var(--r-sm);border:1px solid transparent;background:transparent;
  color:var(--muted);font-size:12px;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;
  transition:.15s var(--ease);opacity:0;position:relative;
}
.ajd-card-wrap:hover .ajd-kebab,.ajd-kebab:focus-visible,.ajd-kebab.is-open{opacity:1}
.ajd-kebab:hover,.ajd-kebab:focus-visible{border-color:var(--line-2);background:var(--paper);color:var(--acc-ink)}
.ajd-card-pop{top:calc(100% + 4px);right:0;min-width:208px}
@media(max-width:640px){
  .ajd-kebab{opacity:1;width:44px;height:44px}
  .ajd-kebab-wrap{top:2px;right:2px}
  .ajd-card{padding-right:56px}
}
.ajd-card.toplanti{border-left-color:var(--ink-2)}
.ajd-card.gorev{border-left-color:var(--acc-ink)}
.ajd-card.ziyaret{border-left-color:var(--info)}
.ajd-card.izin{border-left-color:var(--warn)}
.ajd-card.odeme{border-left-color:var(--ok)}
.ajd-card.termin{border-left-color:var(--danger)}
.ajd-time{font-size:11px;font-weight:700;color:var(--muted);font-variant-numeric:tabular-nums}
.ajd-type{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:700;margin-left:7px}
.ajd-card.toplanti .ajd-type{color:var(--ink-2)}
.ajd-card.gorev .ajd-type{color:var(--acc-ink)}
.ajd-card.ziyaret .ajd-type{color:var(--info)}
.ajd-card.izin .ajd-type{color:var(--warn)}
.ajd-card.odeme .ajd-type{color:var(--ok)}
.ajd-card.termin .ajd-type{color:var(--danger)}
.ajd-title{font-size:12.5px;font-weight:700;color:var(--ink);line-height:1.35;margin-top:6px}
.ajd-card:hover .ajd-title{color:var(--acc-ink)}
.ajd-meta{margin-top:7px;display:flex;flex-direction:column;gap:3px}
.ajd-meta span{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ajd-meta i{width:12px;flex:none;font-size:10px}

.ajd-empty{flex:1;display:flex;align-items:center;justify-content:center;padding:20px 10px;text-align:center}
.ajd-empty span{font-size:11.5px;color:var(--line-2);font-weight:600}

@media(max-width:980px){
  .ajd-grid{grid-template-columns:repeat(4,minmax(0,1fr))}
  .ajd-day:nth-child(n+5){border-top:1px solid var(--line)}
}
@media(max-width:640px){
  .ajd-toolbar{padding:14px 16px}
  .ajd-typebar{padding:12px 16px}
  .ajd-grid{grid-template-columns:1fr}
  .ajd-day{border-top:1px solid var(--line)}
  .ajd-day:first-child{border-top:none}
  .ajd-dhead{display:flex;align-items:baseline;gap:9px;text-align:left;padding:12px 16px}
  .ajd-ddate{margin-top:0}
  .ajd-today-badge{margin-top:0;margin-left:auto}
  .ajd-list{padding:0 16px 14px}
}

/* ---- Dalga 6D — eklenen (demo) kayıt rozeti + CRUD modalı form alanları ---- */
.ajd-demo-tag{display:inline-block;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);background:var(--bg);border:1px solid var(--line-2);border-radius:var(--r-pill);padding:1px 7px;margin-left:7px;vertical-align:1px}
.gv-field{margin-bottom:14px}
.gv-field label{display:block;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px}
.gv-field input[type="text"],.gv-field input[type="time"],.gv-field select{
  width:100%;font-family:inherit;font-size:13.5px;font-weight:500;color:var(--ink);
  background:var(--bg);border:1px solid var(--line);border-radius:var(--r-sm);
  padding:9px 12px;outline:none;transition:.2s var(--ease);
}
.gv-field input:focus,.gv-field select:focus{border-color:var(--acc);background:var(--paper);box-shadow:0 0 0 3px rgba(var(--acc-rgb),.12)}
.gv-field-row{display:flex;gap:12px}
.gv-field-row .gv-field{flex:1;min-width:0}
</style>
</head>
<body data-sec="panel" data-screen="ajanda">
<div class="gv-app">
  <aside class="gv-rail" id="gvRail"></aside>
  <nav class="gv-menu" id="gvMenu"></nav>
  <div class="gv-divider" id="gvDivider" role="separator" aria-label="Menüyü daralt/genişlet"><span class="gv-grip"></span></div>
  <div class="gv-overlay" id="gvOverlay"></div>

  <header class="gv-top">
    <button class="gv-burger" id="gvBurger" aria-label="Menü"><i class="fa-solid fa-bars"></i></button>
    <div class="gv-search"><i class="fa-solid fa-magnifying-glass"></i><input type="text" placeholder="Ara"></div>
    <div class="gv-top-tools">
      <button class="gv-iconbtn" data-tip="Bildirimler" aria-label="Bildirimler"><i class="fa-regular fa-bell"></i><span class="gb-dot"></span></button>
      <div class="gv-me">
        <div class="me-ava" id="gvAva">·</div>
        <div class="me-id"><div class="me-name" id="gvName">—</div><div class="me-role" id="gvRole">—</div></div>
        <i class="fa-solid fa-chevron-down"></i>
      </div>
    </div>
  </header>

  <main class="gv-main">
    <div class="gv-page-head">
      <div>
        <div class="ph-eyebrow">Panel</div>
        <h1>Ajandam</h1>
        <div class="ph-sub" id="ajdSub">Yükleniyor…</div>
      </div>
      <div class="ph-actions">
        <div class="ajd-add-wrap">
          <button type="button" class="btn btn-acc btn-sm" id="ajdAddBtn" aria-haspopup="true" aria-expanded="false">
            <i class="fa-solid fa-plus"></i> Etkinlik Ekle <i class="fa-solid fa-chevron-down" style="font-size:9px;margin-left:1px"></i>
          </button>
          <div class="gv-pop" id="ajdAddPop">
            <button type="button" data-add="program"><i class="fa-solid fa-calendar-plus"></i> Program Ekle</button>
            <button type="button" data-add="isprogrami"><i class="fa-solid fa-diagram-project"></i> İş Programı Ekle</button>
            <button type="button" data-add="not"><i class="fa-solid fa-note-sticky"></i> Ajandaya Not Ekle</button>
            <button type="button" data-add="toplanti"><i class="fa-solid fa-people-arrows"></i> Toplantı Ekle</button>
            <div class="gp-div"></div>
            <a href="crm-gorev-form.html"><i class="fa-solid fa-list-check"></i> Görev Hatırlatması Ekle</a>
          </div>
        </div>
      </div>
    </div>

    <div class="gv-card">
      <div class="ajd-toolbar">
        <div class="ajd-weeknav">
          <button class="ia-btn" id="ajdPrev" aria-label="Önceki hafta" data-no-confirm><i class="fa-solid fa-chevron-left"></i></button>
          <span class="ajd-week-lbl">29 Haziran – 5 Temmuz 2026</span>
          <button class="ia-btn" id="ajdNext" aria-label="Sonraki hafta" data-no-confirm><i class="fa-solid fa-chevron-right"></i></button>
        </div>
      </div>
      <div class="ajd-typebar chips" id="ajdChips">
        <button class="chip is-on" data-etype="hepsi"><i class="fa-solid fa-calendar-days"></i> Tümü</button>
        <button class="chip" data-etype="toplanti"><span class="chip-dot" style="background:var(--ink-2)"></span> Toplantı</button>
        <button class="chip" data-etype="gorev"><span class="chip-dot" style="background:var(--acc-ink)"></span> Görev</button>
        <button class="chip" data-etype="ziyaret"><span class="chip-dot" style="background:var(--info)"></span> Şantiye Ziyareti</button>
        <button class="chip" data-etype="izin"><span class="chip-dot" style="background:var(--warn)"></span> İzin</button>
        <button class="chip" data-etype="odeme"><span class="chip-dot" style="background:var(--ok)"></span> Ödeme/Hakediş</button>
        <button class="chip" data-etype="termin"><span class="chip-dot" style="background:var(--danger)"></span> Malzeme Teslim</button>
      </div>
      <div class="ajd-grid" id="ajdGrid"></div>
    </div>
  </main>

  <!-- ---- Dalga 6D — sayfa-lokal CRUD modalı (gv-modal idiyomu, ui.js'e dokunulmadı) ---- -->
  <div class="gv-modal-ov" id="gvAjdModalOv">
    <div class="gv-modal" style="width:min(460px,100%)" role="dialog" aria-modal="true" aria-labelledby="gvAjdModalTitle">
      <h3 id="gvAjdModalTitle">Etkinlik Ekle</h3>
      <div class="gv-field">
        <label for="gvAjdBaslik">Başlık</label>
        <input type="text" id="gvAjdBaslik" placeholder="Etkinlik başlığı">
      </div>
      <div class="gv-field-row">
        <div class="gv-field">
          <label for="gvAjdGun">Gün</label>
          <select id="gvAjdGun"></select>
        </div>
        <div class="gv-field">
          <label for="gvAjdSaat">Saat</label>
          <input type="time" id="gvAjdSaat" value="09:00">
        </div>
      </div>
      <div class="gv-field">
        <label for="gvAjdTip">Tür</label>
        <select id="gvAjdTip"></select>
      </div>
      <div class="gv-field">
        <label for="gvAjdSantiye">Şantiye (opsiyonel)</label>
        <input type="text" id="gvAjdSantiye" placeholder="Örn. Vadi Konakları">
      </div>
      <div class="gv-field">
        <label for="gvAjdKisi">Not / Kişi (opsiyonel)</label>
        <input type="text" id="gvAjdKisi" placeholder="Kısa not">
      </div>
      <div class="gv-modal-acts" style="margin-top:18px">
        <button type="button" class="btn btn-ghost btn-sm" id="gvAjdModalCancel">Vazgeç</button>
        <button type="button" class="btn btn-acc btn-sm" id="gvAjdModalSave">Kaydet</button>
      </div>
    </div>
  </div>
</div>

  function renderDay(gun, gunIdx){
    var isToday = weekIdx === 0 && !!gun.bugun;
    var h = '<div class="ajd-day'+(isToday?' is-today':'')+'" data-day="'+gun.d+gun.ay+'">';
    h += '<div class="ajd-dhead"><div class="ajd-dname">'+gun.g+'</div><div class="ajd-ddate">'+gun.d+' '+gun.ay+'</div>'
       + (isToday ? '<span class="ajd-today-badge">Bugün</span>' : '') + '</div>';
    var demoItems = weekIdx === 0 ? demoStore.filter(function(r){ return r.gun === gunIdx; }) : [];
    if(gun.olay.length || demoItems.length){
      h += '<div class="ajd-list">';
      gun.olay.forEach(function(o){ h += canonicalCardHTML(o); });
      demoItems.forEach(function(r){ h += demoCardHTML(r); });
      h += '</div>';
    } else {
      h += '<div class="ajd-empty"><span>Planlı etkinlik yok</span></div>';
    }
    h += '</div>';
    return h;
  }

  /* rol daraltması — şef=saha (kendi şantiyesi + kendine bağlı görev/ziyaret),

  var WIDE = ['superadmin','sahip','yonetim'];

  function applyRoleScope(){
    if(WIDE.indexOf(GV.role) !== -1) return;

    document.querySelectorAll('.ajd-card-wrap:not(.is-demo)').forEach(function(wrap){
      var card = wrap.querySelector('.ajd-card');
      var rel = (card.getAttribute('data-rel')||'').split(' ').filter(Boolean);
      var santiye = card.getAttribute('data-santiye');
      var keep = rel.indexOf(GV.role) !== -1 || (home && santiye === home);
      if(!keep) wrap.remove();
    });
    document.querySelectorAll('.ajd-day').forEach(function(day){
      var list = day.querySelector('.ajd-list');
      if(list && !list.children.length){
        list.outerHTML = '<div class="ajd-empty"><span>Planlı etkinlik yok</span></div>';
      }
    });
  }

  var ROLE_SCOPE_LBL = { sef:'Vadi Konakları saha programınız', muhasebe:'Ödeme ve hakediş takviminiz', ik:'İzin takviminiz', satinalma:'Malzeme teslim takviminiz', personel:'Size ait görevler' };

  /* tür filtresi — ui.js'in chip primitifi tablo satırlarına bağlı (tbody tr); burada
     tablo yok, bu yüzden sayfa-lokal filtre yazıldı (ui.js YENİDEN YAZILMADI, sadece
     bu görsel bileşene uygulanmadığı için ayrı bir küçük handler eklendi). Hafta değişince
     veya CRUD sonrası yeniden render'da da uygulanabilsin diye fonksiyona çıkarıldı. */
  function applyFilter(f){
    currentFilter = f;
    document.querySelectorAll('#ajdChips .chip[data-etype]').forEach(function(c){
      c.classList.toggle('is-on', c.getAttribute('data-etype') === f);
    });
    var shown = 0;
    document.querySelectorAll('.ajd-day').forEach(function(day){
      var vis = 0;
      day.querySelectorAll('.ajd-card-wrap').forEach(function(wrap){
        var card = wrap.querySelector('.ajd-card');
        var ok = (f === 'hepsi') || card.getAttribute('data-etype') === f;
        wrap.hidden = !ok;
        if(ok){ vis++; shown++; }
      });
      var list = day.querySelector('.ajd-list');
      var empty = day.querySelector('.ajd-empty');
      if(vis === 0){
        if(list) list.hidden = true;
        if(!empty){
          empty = document.createElement('div');
          empty.className = 'ajd-empty';
          empty.innerHTML = '<span></span>';
          day.appendChild(empty);
        }
        empty.hidden = false;
        empty.querySelector('span').textContent = list ? 'Bu türde etkinlik yok' : 'Planlı etkinlik yok';
      } else {
        if(list) list.hidden = false;
        if(empty && list) empty.hidden = true;
      }
    });
    var scope = ROLE_SCOPE_LBL[GV.role];
    var chipEl = document.querySelector('#ajdChips .chip[data-etype="'+f+'"]');
    var lbl = chipEl ? chipEl.textContent.trim() : f;
    document.getElementById('ajdSub').textContent = shown + ' etkinlik · ' + (f === 'hepsi' ? (scope || 'Tüm ekip programı') : lbl + ' filtresi') + ' · ' + WEEK_LABELS[String(weekIdx)];
  }

  function renderAll(){
    document.querySelector('.ajd-week-lbl').textContent = WEEK_LABELS[String(weekIdx)];
    var gh = '';
    WEEKS[String(weekIdx)].forEach(function(gun, i){ gh += renderDay(gun, i); });
    grid.innerHTML = gh;
    applyRoleScope();
    applyFilter(currentFilter);
  }
  renderAll();

  var chips = document.querySelectorAll('#ajdChips .chip[data-etype]');

  function fillGunSelect(selectedIdx){
    gunSel.innerHTML = GUNLER_0.map(function(g, i){
      return '<option value="'+i+'"'+(i === selectedIdx ? ' selected' : '')+'>'+g.g+' ('+g.d+' '+g.ay+')</option>';

  function fillTipSelect(selectedTip){
    tipSel.innerHTML = Object.keys(TIP).map(function(k){
      return '<option value="'+k+'"'+(k === selectedTip ? ' selected' : '')+'>'+TIP[k].lbl+'</option>';
    }).join('');
  }
  function openModal(){
    modalOv.classList.add('open');
    document.addEventListener('keydown', onModalEsc);
  }
  function closeModal(){
    modalOv.classList.remove('open');
    document.removeEventListener('keydown', onModalEsc);
  }
  function onModalEsc(e){ if(e.key === 'Escape') closeModal(); }
  modalOv.addEventListener('click', function(e){ if(e.target === modalOv) closeModal(); });
  document.getElementById('gvAjdModalCancel').addEventListener('click', closeModal);
  baslikInp.addEventListener('input', function(){ baslikInp.style.borderColor = ''; });

  function openAddModal(kind){
    editingId = null;
    modalTitleEl.textContent = ADD_TITLE_MAP[kind] || 'Etkinlik Ekle';
    baslikInp.value = ''; baslikInp.style.borderColor = '';
    fillGunSelect(TODAY_IDX);
    saatInp.value = '09:00';

    kisiInp.value = '';

  function openEditModal(id){

    fillGunSelect(rec.gun);
    saatInp.value = rec.saat || '09:00';

    santiyeInp.value = rec.santiye || '';
    kisiInp.value = rec.kisi || '';

  document.getElementById('gvAjdModalSave').addEventListener('click', function(){
    var baslik = baslikInp.value.trim();
    if(!baslik){ baslikInp.style.borderColor = 'var(--danger)'; baslikInp.focus(); return; }
    var gun = parseInt(gunSel.value, 10);
    var saat = saatInp.value || '09:00';

    var santiye = santiyeInp.value.trim();
    var kisi = kisiInp.value.trim();
    if(editingId){
      var rec = demoStore.filter(function(r){ return r.id === editingId; })[0];
      if(rec){ rec.baslik = baslik; rec.gun = gun; rec.saat = saat; rec.tip = tip; rec.santiye = santiye; rec.kisi = kisi; }
    } else {
      demoStore.push({id:genId(), gun:gun, saat:saat, tip:tip, baslik:baslik, santiye:santiye, kisi:kisi});

  /* ---- "Taşı" mini gün-seçici popover (data-export desenindeki fixed-konum yaklaşımı) ---- */
  function closeMovePopover(){

    var pop = document.createElement('div');
    pop.className = 'gv-pop ajd-move-pop open';
    var html = '<div class="gp-head"><b>Taşı</b><span>Yeni gün seçin</span></div>';
    GUNLER_0.forEach(function(g, i){
      html += '<button type="button" data-move-day="'+i+'"><i class="fa-solid '+(i === rec.gun ? 'fa-check' : 'fa-calendar-day')+'"></i> '+g.g+' ('+g.d+' '+g.ay+')</button>';
    });
    pop.innerHTML = html;
    document.body.appendChild(pop);   /* önce ekle: gerçek yükseklik ölçülür (data-export deseni, ui.js) */
    var r = anchorBtn.getBoundingClientRect();
    pop.style.position = 'fixed';
    pop.style.minWidth = '208px';
    pop.style.right = Math.max(8, window.innerWidth - r.right) + 'px';
    var h = pop.offsetHeight || 260;
    var top = r.bottom + 6;
    if(top + h > window.innerHeight - 8){         /* aşağı sığmıyor → yukarı dene (data-export flip mantığı) */
      var upTop = r.top - 6 - h;
      top = upTop >= 8 ? upTop : Math.max(8, window.innerHeight - h - 8);
    }
    pop.style.top = top + 'px';
    pop.querySelectorAll('button[data-move-day]').forEach(function(b){
      b.addEventListener('click', function(e){
        e.stopPropagation();
        var newGun = parseInt(b.getAttribute('data-move-day'), 10);
        var gunAd = GUNLER_0[newGun].g;
        rec.gun = newGun;
        saveStore();
        closeMovePopover();
        renderAll();
        gvToast('“'+rec.baslik+'” '+gunAd+' gününe taşındı.', {type:'ok'});
      });
    });
    document.addEventListener('click', onDocClickCloseMove, true);
    document.addEventListener('keydown', onEscCloseMove);
  }

  /* ---- "Etkinlik Ekle" split menü — weekIdx≠0'da açılmaz (info toast); weekIdx=0'da
     4 sim seçeneği artık GERÇEK ekleme modalı açar. "Görev Hatırlatması Ekle" tek GERÇEK
     href (crm-gorev-form.html) AYNEN kalır. ---- */
  (function(){
    var addBtn = document.getElementById('ajdAddBtn');
    var addPop = document.getElementById('ajdAddPop');
    if(!addBtn || !addPop) return;
    function setAddOpen(o){ addPop.classList.toggle('open', o); addBtn.setAttribute('aria-expanded', o ? 'true' : 'false'); }
    addBtn.addEventListener('click', function(e){
      e.stopPropagation();
      if(weekIdx !== 0){
        gvToast('Yalnız güncel haftaya etkinlik eklenebilir (demo).', {type:'info'});
        return;
      }
      setAddOpen(!addPop.classList.contains('open'));
    });
    document.addEventListener('click', function(e){ if(!addPop.contains(e.target) && e.target !== addBtn) setAddOpen(false); });
    document.addEventListener('keydown', function(e){ if(e.key === 'Escape') setAddOpen(false); });
    addPop.querySelectorAll('button[data-add]').forEach(function(b){
      b.addEventListener('click', function(){
        setAddOpen(false);
        openAddModal(b.getAttribute('data-add'));
      });
    });
  })();

  /* ---- kart işlem menüsü (⋯) [MOCK-SİM] — kart <a> olabildiği için tıklama
     preventDefault+stopPropagation ile linki TETİKLEMEZ. Kanonik kartlarda "Sil" ui.js'in
     global yıkıcı-aksiyon interceptor'ına (fa-trash ikonu → destrKind) düşer ve KENDİ
     confirm akışını kullanır (data-no-confirm YOK, kasıtlı). Eklenen (demo) kartlarda
     Düzenle/Taşı/Sil bu handler içinde GERÇEK CRUD yapar; Sil'de data-no-confirm VAR
     (global interceptor'ı bypass eder) + sayfa-lokal gvConfirm çağrılır — ikisi ÜST ÜSTE
     BİNMEZ (geçmişte 2 kez yaşanan tuzak).
     BONUS FIX: başlık artık item.closest('.ajd-card-wrap').querySelector('.ajd-card') ile
     bulunuyor — eski `item.closest('.ajd-card')` kebab-wrap kart <a>'sının SIBLING'i
     olduğu için hep null dönüyordu (kanonik toast'larda başlık hiç basılmıyordu). ---- */
  (function(){
    function closeAllCardMenus(){
      document.querySelectorAll('.ajd-card-pop.open').forEach(function(p){
        p.classList.remove('open');
        var btn = p.parentElement.querySelector('.ajd-kebab');
        if(btn){ btn.classList.remove('is-open'); btn.setAttribute('aria-expanded','false'); }
      });
    }
    var CACT_MSG = {
      duzenle:{msg:'düzenleme ekranı bu prototipte simülasyondur (demo).', type:'info'},
      tamamla:{msg:'tamamlandı olarak işaretlendi.', type:'ok'},
      ertele:{msg:'ertelendi (demo).', type:'info'},
      hatirlatma:{msg:'için hatırlatma eklendi.', type:'ok'},
      ata:{msg:'ilgili personele atandı (demo).', type:'info'}
    };
    document.addEventListener('click', function(e){
      var kb = e.target.closest('.ajd-kebab');
      if(kb){
        e.preventDefault(); e.stopPropagation();
        var pop = kb.parentElement.querySelector('.ajd-card-pop');
        var willOpen = !pop.classList.contains('open');
        closeAllCardMenus();
        closeMovePopover();
        pop.classList.toggle('open', willOpen);
        kb.classList.toggle('is-open', willOpen);
        kb.setAttribute('aria-expanded', willOpen ? 'true' : 'false');
        return;
      }
      var item = e.target.closest('.ajd-card-pop [data-cact]');
      if(item){
        e.preventDefault(); e.stopPropagation();
        var wrap = item.closest('.ajd-card-wrap');
        var isDemo = !!(wrap && wrap.classList.contains('is-demo'));
        var card = wrap ? wrap.querySelector('.ajd-card') : null;
        var title = card ? (card.querySelector('.ajd-title') || {}).textContent : '';
        var kind = item.getAttribute('data-cact');
        if(isDemo){
          var id = item.getAttribute('data-demo-id');
          closeAllCardMenus();
          if(kind === 'duzenle'){ openEditModal(id); return; }
          if(kind === 'tasi'){ openMovePopover(id, item); return; }
          if(kind === 'sil'){
            var rec = demoStore.filter(function(r){ return r.id === id; })[0];
            gvConfirm({
              danger:true, icon:'fa-trash', ok:'Sil', cancel:'Vazgeç', title:'Silinsin mi?',
              message: rec ? ('“'+rec.baslik+'” kalıcı olarak silinecek. Bu işlem geri alınamaz.') : 'Bu kayıt kalıcı olarak silinecek.',
              onConfirm:function(){
                demoStore = demoStore.filter(function(x){ return x.id !== id; });
                saveStore();
                renderAll();
                gvToast((rec ? ('“'+rec.baslik+'” ') : 'Kayıt ') + 'silindi.', {type:'danger'});
              }
            });
            return;
          }
          return;
        }
        closeAllCardMenus();
        var V = CACT_MSG[kind];
        if(V) gvToast((title ? '“' + title + '” ' : 'Etkinlik ') + V.msg, {type:V.type});
        return;
      }
      if(!e.target.closest('.ajd-card-pop') && !e.target.closest('.ajd-move-pop')) closeAllCardMenus();
    });
    document.addEventListener('keydown', function(e){ if(e.key === 'Escape'){ closeAllCardMenus(); closeMovePopover(); } });
  })();
})();
</script>
</body>
</html>
