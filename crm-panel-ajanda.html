<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>Ajandam — Gavia CRM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
      integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A=="
      crossorigin="anonymous" referrerpolicy="no-referrer">
<link rel="stylesheet" href="assets/css/tokens.css">
<link rel="stylesheet" href="assets/css/shell.css">
<link rel="stylesheet" href="assets/css/ui.css">
<style>
/* ============ SAYFAYA ÖZEL — Kişisel Ajanda: Gün/Hafta/Ay takvimi ============
   Dalga 7B rebuild — kart-liste ajandası gerçek zamana-konumlu takvime dönüştü.
   BİLİNÇLİ KARARLAR (sayfa-lokal, mock):
   · Olay kayıtlarında süre alanı yok → HER zamanlı blok VARSAYILAN 1 SAAT çizilir
     (tek kural; farklı süre uydurulmaz).
   · "Şu an" çizgisi STATİK 10:30'a çizilir (prototipte canlı saat yok; 09:00
     teslim geçmiş, 14:00 takip gelecek okunacak şekilde seçildi). Yalnız kanonik
     haftada (weekIdx 0) ve bugün sütununda görünür.
   · Görünüm state'i (Gün/Hafta/Ay + gün imleci) BELLEK-ONLY — localStorage'a
     yazılmaz (weekIdx emsali). Tek localStorage anahtarı: gvAjandaPanel.
   · Ay görünümü SALT GÖRÜNTÜLEME: Temmuz 2026 ızgarası; olay havuzu yalnız
     29 Haz – 12 Tem'i kapsar, havuz dışı günler doğal olarak boştur (dolgu
     verisi uydurulmaz). Güne tıklayınca o günün Gün görünümü açılır.
   · Sürükle-bırak yalnız kullanıcı eklediği (demo) kayıtlarda, yalnız kanonik
     haftada, 30 dk snap ile; fare/kalem işaretçisiyle çalışır. Dokunmatikte ve
     ≤640px'te kapalıdır — kebab menüsündeki "Taşı" popover'ı fallback'tir. */

/* ---- yerleşim: takvim kartı + sağ yardımcı ray (mini-ay + katmanlar) ---- */
.ajd-layout{display:flex;gap:18px;align-items:flex-start}
.ajd-main{flex:1;min-width:0}
.ajd-side{width:250px;flex:none;display:flex;flex-direction:column;gap:14px;position:sticky;top:14px}
.ajd-sidehead{display:flex;align-items:center;gap:9px;width:100%;box-sizing:border-box;padding:13px 16px;font-family:inherit;font-size:12.5px;font-weight:800;color:var(--ink);letter-spacing:-.005em;border-bottom:1px solid var(--line);text-align:left}
.ajd-sidehead i{color:var(--acc-ink);font-size:12px}
button.ajd-sidehead{all:unset;box-sizing:border-box;display:flex;align-items:center;gap:9px;width:100%;padding:13px 16px;font-family:inherit;font-size:12.5px;font-weight:800;color:var(--ink);border-bottom:1px solid var(--line);pointer-events:none}
button.ajd-sidehead i:first-child{color:var(--acc-ink);font-size:12px}
.lyr-chev{display:none;margin-left:auto;color:var(--muted);font-size:10px;transition:.2s var(--ease)}

/* ---- toolbar ---- */
.ajd-toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding:14px 18px;border-bottom:1px solid var(--line)}
.ajd-tt{display:flex;flex-direction:column;margin-left:4px;min-width:0}
.ajd-tt b{font-size:16px;font-weight:800;letter-spacing:-.012em;color:var(--ink);line-height:1.15;white-space:nowrap}
.ajd-tt span{font-size:11.5px;color:var(--muted);font-weight:600;margin-top:1px;white-space:nowrap}
.ajd-seg{margin-left:auto;display:inline-flex;background:var(--bg);border:1px solid var(--line);border-radius:var(--r-pill);padding:3px;gap:2px}
.ajd-seg button{all:unset;font-family:inherit;font-size:12.5px;font-weight:700;color:var(--muted);padding:6px 14px;border-radius:var(--r-pill);cursor:pointer;transition:.18s var(--ease)}
.ajd-seg button:hover{color:var(--ink)}
.ajd-seg button.is-on{background:var(--paper);color:var(--acc-ink);box-shadow:var(--sh-sm)}
.ajd-seg button:focus-visible{outline:2px solid var(--acc);outline-offset:1px}

/* ---- zaman ızgarası (Hafta + Gün ortak; --cols 7 ya da 1) ---- */
.tg-outer{overflow-x:auto}
.tg-inner{--axw:56px;--hh:52px}
.tg-inner[data-cols="7"]{min-width:730px}
.tg-hrow,.tg-adrow,.tg-brow{display:grid;grid-template-columns:var(--axw) repeat(var(--cols,7),minmax(0,1fr))}
.tg-hrow{border-bottom:1px solid var(--line)}
.tg-gut{border-right:1px solid var(--line)}
.tg-hcell{all:unset;box-sizing:border-box;font-family:inherit;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 4px 9px;cursor:pointer;border-left:1px solid var(--line);min-width:0}
.tg-hcell:first-of-type{border-left:none}
.hc-dn{font-size:10px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
.hc-dd{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14.5px;font-weight:800;color:var(--ink);font-variant-numeric:tabular-nums;transition:.15s var(--ease)}
.tg-hcell:hover .hc-dd{background:var(--bg)}
.tg-hcell:focus-visible .hc-dd{outline:2px solid var(--acc);outline-offset:1px}
.tg-hcell.is-today .hc-dn{color:var(--acc-ink)}
.tg-hcell.is-today .hc-dd,.tg-hcell.is-today:hover .hc-dd{background:var(--acc-ink);color:#fff}
.tg-hcell.is-today{background:rgba(var(--acc-rgb),.05)}

.tg-adrow{border-bottom:1px solid var(--line)}
.tg-adlbl{display:flex;align-items:center;justify-content:flex-end;padding:7px 8px;font-size:9.5px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);border-right:1px solid var(--line)}
.tg-adcell{padding:5px 4px;display:flex;flex-direction:column;gap:4px;border-left:1px solid var(--line);min-width:0}
.tg-adcell:first-of-type{border-left:none}
.tg-adcell.is-today{background:rgba(var(--acc-rgb),.05)}
.adp{display:flex;align-items:center;gap:6px;min-width:0;font-size:11px;font-weight:700;color:var(--ink);background:var(--evt);border-left:3px solid var(--evc);border-radius:6px;padding:4px 24px 4px 7px;text-decoration:none;transition:.15s var(--ease)}
a.adp:hover{box-shadow:var(--sh-sm);transform:translateY(-1px)}
.adp i{font-size:9.5px;color:var(--evc);flex:none}
.adp .tg-ttl{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}

.tg-brow{position:relative}
.tg-axis{position:relative;border-right:1px solid var(--line)}
.tg-hlbl{position:absolute;right:8px;transform:translateY(-50%);font-size:10.5px;font-weight:700;color:var(--muted);font-variant-numeric:tabular-nums;background:var(--paper);padding:1px 2px;line-height:1}
.tg-col{position:relative;border-left:1px solid var(--line);min-width:0;
  background-image:
    repeating-linear-gradient(to bottom, var(--line) 0 1px, transparent 1px var(--hh)),
    repeating-linear-gradient(to bottom, transparent 0 calc(var(--hh)/2), color-mix(in srgb,var(--line) 45%,transparent) calc(var(--hh)/2) calc(var(--hh)/2 + 1px), transparent calc(var(--hh)/2 + 1px) var(--hh));
}
.tg-col:first-of-type{border-left:none}
.tg-col.is-today{background-color:rgba(var(--acc-rgb),.05)}
.tg-now{position:absolute;left:0;right:0;height:2px;background:var(--danger);z-index:4;pointer-events:none}
.tg-now::before{content:"";position:absolute;left:-4px;top:-3px;width:8px;height:8px;border-radius:50%;background:var(--danger)}
.tg-empty{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:11.5px;font-weight:600;color:var(--line-2);pointer-events:none}

/* olay bloğu — evw konumlu sarmalayıcı; kebab kartın <a>'sının SIBLING'i (aşağıda) */
.evw{position:absolute;z-index:2}
.evw:hover,.evw.has-open{z-index:8}
.tg-ev{display:block;box-sizing:border-box;height:100%;overflow:hidden;border-radius:7px;background:var(--evt);border-left:3px solid var(--evc);padding:5px 22px 4px 8px;text-decoration:none;transition:box-shadow .18s var(--ease),transform .18s var(--ease)}
a.tg-ev:hover{box-shadow:var(--sh-md);transform:translateY(-1px)}
.tg-ev:focus-visible{outline:2px solid var(--acc);outline-offset:1px}
.tg-evtop{display:flex;align-items:center;gap:5px;min-width:0}
.tg-ico{font-size:9px;color:var(--evc);flex:none}
.tg-time{font-size:10.5px;font-weight:800;color:var(--evc);font-variant-numeric:tabular-nums;line-height:1.2}
.tg-ttl{display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;font-size:11.5px;font-weight:700;color:var(--ink);line-height:1.28;margin-top:1px}
.tg-meta{display:none}
.tg-inner[data-cols="1"] .tg-ttl{-webkit-line-clamp:1}
.tg-inner[data-cols="1"] .tg-meta{display:block;font-size:10.5px;font-weight:600;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.ajd-demo-tag{display:inline-block;font-size:8.5px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);background:var(--paper);border:1px solid var(--line-2);border-radius:var(--r-pill);padding:0 6px;margin-left:auto;flex:none}

/* sürükle-bırak (yalnız demo kayıtlar) */
.evw.is-demo .tg-ev{cursor:grab}
.evw.is-demo.is-dragging{opacity:.9;z-index:30}
.evw.is-demo.is-dragging .tg-ev{box-shadow:var(--sh-lg);cursor:grabbing}
@media(min-width:641px){.evw.is-demo .tg-ev{touch-action:none}}
body.gv-dragging,body.gv-dragging *{user-select:none;-webkit-user-select:none}

/* ---- kart işlem (⋯) düğmesi — KASITLI olarak kart <a>'sının DIŞINDA, kendi
   overlay wrapper'ında SIBLING durur. Neden: menü (Sil dahil) <a>'nın İÇİNDE
   olsaydı ui.js'in global yıkıcı-aksiyon interceptor'ı (destrKind →
   el.querySelector('.fa-trash')) tüm kartı "Sil" sanıp confirm açıyordu
   (geçmişte doğrulanan tuzak). Menü içeriği, yatay-kaydırmalı ızgara içinde
   kırpılmamak için body'ye FIXED .gv-pop olarak açılır (data-export deseni). */
.ajd-kebab-wrap{position:absolute;top:3px;right:3px;z-index:5}
.tg-adcell .ajd-kebab-wrap{position:absolute}
.evw .ajd-kebab-wrap{top:3px;right:3px}
.ajd-kebab{flex:none;width:20px;height:20px;border-radius:6px;border:1px solid transparent;background:transparent;color:var(--muted);font-size:11px;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;transition:.15s var(--ease);opacity:0}
.evw:hover .ajd-kebab,.adw:hover .ajd-kebab,.ajd-kebab:focus-visible,.ajd-kebab.is-open{opacity:1}
.ajd-kebab:hover,.ajd-kebab:focus-visible{border-color:var(--line-2);background:var(--paper);color:var(--acc-ink)}
.adw{position:relative}
.adw .ajd-kebab-wrap{top:2px;right:2px}
@media(max-width:640px){
  .ajd-kebab{opacity:1;width:26px;height:26px}
}
/* fixed kart menüsü — .gv-pop <button> varyantı (ui.js'in .gv-pop a stili yalnız
   <a> hedefliyor; sayfa-lokal <button> stili burada, ui.js'e DOKUNULMADI) */
.gv-pop button{all:unset;box-sizing:border-box;display:flex;align-items:center;gap:11px;width:100%;padding:9px 12px;border-radius:var(--r-sm);font-size:13.5px;font-weight:600;color:var(--ink-2);cursor:pointer;transition:.15s var(--ease);font-family:inherit}
.gv-pop button i{width:16px;text-align:center;font-size:13px;color:var(--muted);transition:.15s var(--ease)}
.gv-pop button:hover,.gv-pop button:focus-visible{background:var(--bg);color:var(--ink)}
.gv-pop button:hover i,.gv-pop button:focus-visible i{color:var(--acc-ink)}
.gv-pop button.danger{color:var(--danger)}
.gv-pop button.danger i{color:var(--danger)}
.gv-pop button.danger:hover,.gv-pop button.danger:focus-visible{background:var(--danger-tint)}
.ajd-add-wrap{position:relative;display:inline-flex}
.ajd-add-wrap .gv-pop{min-width:228px}
.ajd-add-wrap .gv-pop a{font-weight:700;color:var(--acc-ink)}
.ajd-add-wrap .gv-pop a i{color:var(--acc-ink)}

/* ---- Ay görünümü — salt görüntüleme ---- */
.mn-grid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:1px;background:var(--line)}
.mn-dow{background:var(--paper);text-align:center;padding:9px 4px;font-size:10px;font-weight:800;letter-spacing:.07em;text-transform:uppercase;color:var(--muted)}
.mn-cell{background:var(--paper);min-height:110px;padding:7px 7px 6px;display:flex;flex-direction:column;gap:4px;min-width:0}
.mn-cell.is-pool{cursor:pointer;transition:background .15s var(--ease)}
.mn-cell.is-pool:hover{background:var(--bg)}
.mn-d{font-size:12px;font-weight:800;color:var(--ink-2);width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-variant-numeric:tabular-nums;flex:none}
.mn-dmon{font-size:9.5px;font-weight:700;color:var(--muted);align-self:center;margin-left:2px}
.mn-drow{display:flex;align-items:center}
.mn-cell.is-out .mn-d{color:var(--muted);opacity:.55}
.mn-cell.is-today .mn-d{background:var(--acc-ink);color:#fff;opacity:1}
.mn-bars{display:flex;flex-direction:column;gap:2px;min-width:0}
.mn-bar{display:flex;align-items:center;gap:5px;min-width:0;font-size:10.5px;font-weight:700;color:var(--ink);background:var(--evt);border-left:3px solid var(--evc);border-radius:5px;padding:2px 6px;text-decoration:none;transition:.15s var(--ease)}
a.mn-bar:hover{box-shadow:var(--sh-sm)}
.mn-bar .mn-time{font-size:9.5px;font-weight:800;color:var(--evc);font-variant-numeric:tabular-nums;flex:none}
.mn-bar .mn-btl{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.mn-more{all:unset;font-family:inherit;font-size:10.5px;font-weight:800;color:var(--acc-ink);cursor:pointer;padding:1px 6px;border-radius:5px;align-self:flex-start}
.mn-more:hover{background:rgba(var(--acc-rgb),.1)}
@media(max-width:640px){
  .mn-cell{min-height:62px;padding:5px}
  .mn-bars{flex-direction:row;flex-wrap:wrap;gap:3px;padding-left:3px}
  .mn-bar{width:7px;height:7px;padding:0;border:none;border-radius:50%;background:var(--evc)}
  .mn-bar .mn-time,.mn-bar .mn-btl{display:none}
  .mn-more{font-size:9.5px;padding:0 3px}
}

/* ---- mini-ay (sağ ray) ---- */
.mini-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;padding:10px 12px 13px}
.mini-dow{font-size:9px;font-weight:800;color:var(--muted);text-align:center;padding:3px 0 5px;text-transform:uppercase;letter-spacing:.05em}
.mini-d{all:unset;box-sizing:border-box;font-family:inherit;width:26px;height:26px;margin:0 auto;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--ink-2);cursor:pointer;transition:.15s var(--ease);font-variant-numeric:tabular-nums}
.mini-d:hover{background:var(--bg)}
.mini-d:focus-visible{outline:2px solid var(--acc);outline-offset:1px}
.mini-d.is-out{color:var(--muted)}
.mini-d.is-off{color:var(--line-2);cursor:default;pointer-events:none}
.mini-d.in-week{background:rgba(var(--acc-rgb),.12)}
.mini-d.is-sel{box-shadow:inset 0 0 0 2px var(--acc-ink);color:var(--acc-ink)}
.mini-d.is-today,.mini-d.is-today:hover{background:var(--acc-ink);color:#fff;box-shadow:none}

/* ---- katman filtreleri (renkli checkbox) ---- */
.lyr-list{padding:9px 12px 12px;display:flex;flex-direction:column;gap:1px}
.lyr{position:relative;display:flex;align-items:center;gap:10px;padding:7px 9px;border-radius:var(--r-sm);font-size:13px;font-weight:600;color:var(--ink-2);cursor:pointer;transition:.15s var(--ease)}
.lyr:hover{background:var(--bg)}
.lyr input{position:absolute;opacity:0;pointer-events:none}
.lyr-box{width:16px;height:16px;border-radius:5px;border:2px solid var(--evc,var(--acc-ink));display:flex;align-items:center;justify-content:center;flex:none;color:transparent;font-size:8.5px;transition:.15s var(--ease)}
.lyr input:checked + .lyr-box{background:var(--evc,var(--acc-ink));color:#fff}
.lyr input:focus-visible + .lyr-box{outline:2px solid var(--acc);outline-offset:2px}
.lyr-div{height:1px;background:var(--line);margin:6px 2px}

/* ---- responsive ---- */
@media(max-width:1100px){
  .ajd-layout{flex-direction:column;align-items:stretch}
  .ajd-main{width:100%;min-width:0}
  .ajd-side{order:-1;width:100%;position:static}
  .ajd-mini{display:none}
  .lyr-list{flex-direction:row;flex-wrap:wrap;gap:7px;padding:12px 14px}
  .lyr{border:1px solid var(--line);border-radius:var(--r-pill);padding:6px 13px 6px 9px;font-size:12.5px;background:var(--paper)}
  .lyr:hover{border-color:var(--line-2)}
  .lyr-div{display:none}
}
@media(max-width:640px){
  .ajd-toolbar{padding:12px 14px;gap:8px}
  .ajd-tt b{font-size:14.5px}
  .ajd-tt span{font-size:10.5px}
  .ajd-seg{margin-left:0;width:100%;justify-content:stretch}
  .ajd-seg button{flex:1;text-align:center;padding:7px 0}
  button.ajd-sidehead{pointer-events:auto;cursor:pointer}
  .lyr-chev{display:inline-block}
  .ajd-layers.is-open .lyr-chev{transform:rotate(180deg)}
  .lyr-list{display:none}
  .ajd-layers.is-open .lyr-list{display:flex}
}
@media(prefers-reduced-motion:reduce){
  .tg-ev,.adp,.mn-bar,.evw,.ajd-seg button,.mini-d{transition:none}
}

/* ---- CRUD modal form alanları (6D'den korunan idiyom) ---- */
.gv-field{margin-bottom:14px}
.gv-field label{display:block;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px}
.gv-field input[type="text"],.gv-field input[type="time"],.gv-field select{
  width:100%;font-family:inherit;font-size:13.5px;font-weight:500;color:var(--ink);
  background:var(--bg);border:1px solid var(--line);border-radius:var(--r-sm);
  padding:9px 12px;outline:none;transition:.2s var(--ease);
}
.gv-field input:focus,.gv-field select:focus{border-color:var(--acc);background:var(--paper);box-shadow:0 0 0 3px rgba(var(--acc-rgb),.12)}
.gv-field-row{display:flex;gap:12px}
.gv-field-row .gv-field{flex:1;min-width:0}
</style>
</head>
<body data-sec="panel" data-screen="ajanda">
<div class="gv-app">
  <aside class="gv-rail" id="gvRail"></aside>
  <nav class="gv-menu" id="gvMenu"></nav>
  <div class="gv-divider" id="gvDivider" role="separator" aria-label="Menüyü daralt/genişlet"><span class="gv-grip"></span></div>
  <div class="gv-overlay" id="gvOverlay"></div>

  <header class="gv-top">
    <button class="gv-burger" id="gvBurger" aria-label="Menü"><i class="fa-solid fa-bars"></i></button>
    <div class="gv-search"><i class="fa-solid fa-magnifying-glass"></i><input type="text" placeholder="Ara"></div>
    <div class="gv-top-tools">
      <button class="gv-iconbtn" data-tip="Bildirimler" aria-label="Bildirimler"><i class="fa-regular fa-bell"></i><span class="gb-dot"></span></button>
      <div class="gv-me">
        <div class="me-ava" id="gvAva">·</div>
        <div class="me-id"><div class="me-name" id="gvName">—</div><div class="me-role" id="gvRole">—</div></div>
        <i class="fa-solid fa-chevron-down"></i>
      </div>
    </div>
  </header>

  <main class="gv-main">
    <div class="gv-page-head">
      <div>
        <div class="ph-eyebrow">Panel</div>
        <h1>Ajandam</h1>
        <div class="ph-sub" id="ajdSub">Yükleniyor…</div>
      </div>
      <div class="ph-actions">
        <div class="ajd-add-wrap">
          <button type="button" class="btn btn-acc btn-sm" id="ajdAddBtn" aria-haspopup="true" aria-expanded="false">
            <i class="fa-solid fa-plus"></i> Etkinlik Ekle <i class="fa-solid fa-chevron-down" style="font-size:9px;margin-left:1px"></i>
          </button>

  }

  /* ---- tür katman filtreleri (Tümü + 6 tür) — tüm görünümlerde çalışır;
     hafta değişince filtre RESET (6D davranışı korunur) ---- */
  var LAYER_KEYS = Object.keys(TIP);
  var layers = {};
  LAYER_KEYS.forEach(function(k){ layers[k] = true; });
  function layersAllOn(){ return LAYER_KEYS.every(function(k){ return layers[k]; }); }
  function layersOnCount(){ return LAYER_KEYS.filter(function(k){ return layers[k]; }).length; }
  function setAllLayers(v){ LAYER_KEYS.forEach(function(k){ layers[k] = v; }); syncLayerBoxes(); }
  function syncLayerBoxes(){
    document.querySelectorAll('#lyrList input[data-lyr]').forEach(function(inp){
      var k = inp.getAttribute('data-lyr');
      inp.checked = (k === 'ALL') ? layersAllOn() : !!layers[k];
    });
  }

  /* günün görünür olayları — {ad:[tüm gün], tm:[zamanlı]}; kanonik + (W0'da) demo */
  function collectDay(wi, gi){
    var out = {ad:[], tm:[]};
    (WEEKS[String(wi)][gi].olay || []).forEach(function(o){
      if(!canonVisible(o) || !layers[o.tip]) return;
      var m = toMin(o.saat);
      if(m === null) out.ad.push({demo:false, o:o});
      else out.tm.push({demo:false, o:o, start:m});
    });
    if(wi === 0){
      demoStore.forEach(function(r){
        if(r.gun !== gi || !layers[r.tip]) return;
        out.tm.push({demo:true, o:r, start:toMin(r.saat) === null ? DAY_START : toMin(r.saat)});
      });
    }
    out.tm.sort(function(a,b){ return a.start - b.start; });
    return out;
  }

  /* çakışan bloklar sütun paylaşır (klasik takvim kümeleme) */
  function layoutTimed(list){
    var cluster = [], clusterEnd = -1;
    function flush(){
      var ends = [];
      cluster.forEach(function(it){
        var c = 0; while(c < ends.length && ends[c] > it.start) c++;
        it.col = c; ends[c] = it.end;
      });
      cluster.forEach(function(it){ it.cols = ends.length; });
      cluster = []; clusterEnd = -1;
    }
    list.forEach(function(it){
      it.end = it.start + DEF_DUR;
      if(cluster.length && it.start >= clusterEnd) flush();
      cluster.push(it);
      clusterEnd = Math.max(clusterEnd, it.end);
    });
    if(cluster.length) flush();
  }

  var viewEl = document.getElementById('ajdView');
  var shownCount = 0;

  function kebabHTML(){
    return '<div class="ajd-kebab-wrap">'
      + '<button type="button" class="ajd-kebab" aria-haspopup="true" aria-expanded="false" aria-label="İşlemler" data-no-confirm><i class="fa-solid fa-ellipsis-vertical"></i></button>'
      + '</div>';
  }
  function tipStyle(tip){ var c = TIPC[tip] || TIPC.gorev; return '--evc:'+c[0]+';--evt:'+c[1]; }

  function timedBlockHTML(it, showMeta){
    var o = it.o, T = TIP[o.tip] || TIP.gorev;
    var start = Math.max(DAY_START, Math.min(it.start, DAY_END - DEF_DUR));
    var top = (start - DAY_START)/60*HOUR_H;
    var h = DEF_DUR/60*HOUR_H - 2;
    var l = (it.col/it.cols*100), w = (100/it.cols);
    var pos = 'top:'+top.toFixed(1)+'px;height:'+h+'px;left:calc('+l.toFixed(3)+'% + 2px);width:calc('+w.toFixed(3)+'% - 4px);';
    var tag = (!it.demo && o.href) ? 'a' : 'div';
    var tt = esc(o.saat + ' · ' + T.lbl + ' — ' + o.baslik + (o.santiye ? ' — ' + o.santiye : '') + (o.kisi ? ' — ' + o.kisi : ''));
    var meta = showMeta ? ((o.santiye ? o.santiye : '') + (o.santiye && o.kisi ? ' · ' : '') + (o.kisi ? o.kisi : '')) : '';
    return '<div class="evw'+(it.demo?' is-demo':'')+'" style="'+pos+'"'+(it.demo?' data-demo-id="'+o.id+'"':'')+'>'
      + '<'+tag+' class="tg-ev" style="'+tipStyle(o.tip)+'"'+(tag==='a'?' href="'+o.href+'"':'')+' title="'+tt+'">'
      +   '<span class="tg-evtop"><i class="fa-solid '+T.ic+' tg-ico"></i><span class="tg-time">'+esc(o.saat)+'</span>'
      +   (it.demo ? '<span class="ajd-demo-tag">demo</span>' : '') + '</span>'
      +   '<span class="tg-ttl">'+esc(o.baslik)+'</span>'
      +   (meta ? '<span class="tg-meta">'+esc(meta)+'</span>' : '')
      + '</'+tag+'>'
      + kebabHTML()
      + '</div>';
  }
  function alldayChipHTML(it){
    var o = it.o, T = TIP[o.tip] || TIP.izin;
    var tag = o.href ? 'a' : 'div';
    return '<div class="adw">'
      + '<'+tag+' class="adp" style="'+tipStyle(o.tip)+'"'+(o.href?' href="'+o.href+'"':'')+' title="'+esc('Tüm gün · '+T.lbl+' — '+o.baslik)+'">'
      +   '<i class="fa-solid '+T.ic+'"></i><span class="tg-ttl">'+esc(o.baslik)+'</span>'
      + '</'+tag+'>'
      + kebabHTML()
      + '</div>';
  }

  /* ---- Hafta + Gün görünümü (ortak zaman ızgarası) ---- */
  function buildTimeGrid(dayIdxList){
    var wk = WEEKS[String(weekIdx)];
    var cols = dayIdxList.length;
    var days = dayIdxList.map(function(gi){ return {gi:gi, gun:wk[gi], ev:collectDay(weekIdx, gi)}; });
    var anyAd = days.some(function(d){ return d.ev.ad.length; });
    shownCount = 0;
    days.forEach(function(d){ shownCount += d.ev.ad.length + d.ev.tm.length; });

    var h = '<div class="tg-outer"><div class="tg-inner" data-cols="'+cols+'" style="--cols:'+cols+'">';
    /* gün başlıkları */
    h += '<div class="tg-hrow"><div class="tg-gut"></div>';
    days.forEach(function(d){
      var isToday = weekIdx === 0 && !!d.gun.bugun;
      h += '<button type="button" class="tg-hcell'+(isToday?' is-today':'')+'" data-gi="'+d.gi+'" data-no-confirm title="Gün görünümünü aç">'
        + '<span class="hc-dn">'+d.gun.k+'</span><span class="hc-dd">'+d.gun.d+'</span></button>';
    });
    h += '</div>';
    /* tüm-gün şeridi */
    if(anyAd){
      h += '<div class="tg-adrow"><div class="tg-adlbl">Tüm gün</div>';
      days.forEach(function(d){
        var isToday = weekIdx === 0 && !!d.gun.bugun;
        h += '<div class="tg-adcell'+(isToday?' is-today':'')+'">';
        d.ev.ad.forEach(function(it){ h += alldayChipHTML(it); });
        h += '</div>';
      });
      h += '</div>';
    }
    /* saat gövdesi */
    h += '<div class="tg-brow" style="height:'+(BODY_H+16)+'px">';
    h += '<div class="tg-axis">';
    for(var hr = 8; hr <= 19; hr++){
      h += '<span class="tg-hlbl" style="top:'+((hr*60-DAY_START)/60*HOUR_H)+'px">'+(hr<10?'0':'')+hr+':00</span>';
    }
    h += '</div>';
    days.forEach(function(d){
      var isToday = weekIdx === 0 && !!d.gun.bugun;
      layoutTimed(d.ev.tm);
      h += '<div class="tg-col'+(isToday?' is-today':'')+'" data-gi="'+d.gi+'" style="height:'+BODY_H+'px">';
      d.ev.tm.forEach(function(it){ h += timedBlockHTML(it, cols === 1); });
      if(isToday){
        h += '<div class="tg-now" style="top:'+((NOW_MIN-DAY_START)/60*HOUR_H)+'px" title="Şu an (10:30)"></div>';
      }
      if(cols === 1 && !d.ev.tm.length && !d.ev.ad.length){
        h += '<div class="tg-empty">Planlı etkinlik yok</div>';
      }
      h += '</div>';
    });
    h += '</div></div></div>';
    return h;
  }

  /* ---- Ay görünümü (SALT GÖRÜNTÜLEME) — Temmuz 2026 ızgarası; havuz: 29 Haz–12 Tem ---- */
  var MONTH_CELLS = (function(){
    var cells = [];
    cells.push({d:29, mon:'Haz', out:true,  wk:0, gi:0}, {d:30, mon:'Haz', out:true, wk:0, gi:1});
    for(var d = 1; d <= 31; d++){
      var wk = null, gi = null;
      if(d >= 1 && d <= 5){ wk = 0; gi = d + 1; }
      else if(d >= 6 && d <= 12){ wk = 1; gi = d - 6; }
      cells.push({d:d, mon:'Tem', out:false, wk:wk, gi:gi, today:(d === 2)});
    }
    cells.push({d:1, mon:'Agu', out:true, wk:null, gi:null}, {d:2, mon:'Agu', out:true, wk:null, gi:null});
    return cells;
  })();
  var DOW_LBL = ['Pzt','Sal','Çar','Per','Cum','Cmt','Paz'];

  function monthBarHTML(it){
    var o = it.o;
    var tag = (!it.demo && o.href) ? 'a' : 'div';
    var time = toMin(o.saat) === null ? '' : '<span class="mn-time">'+esc(o.saat)+'</span>';
    return '<'+tag+' class="mn-bar" style="'+tipStyle(o.tip)+'"'+(tag==='a'?' href="'+o.href+'"':'')
      + ' title="'+esc(o.saat+' · '+(TIP[o.tip]||TIP.gorev).lbl+' — '+o.baslik)+'">'
      + time + '<span class="mn-btl">'+esc(o.baslik)+'</span></'+tag+'>';
  }
  function buildMonth(){
    shownCount = 0;
    var h = '<div class="mn-grid">';
    DOW_LBL.forEach(function(d){ h += '<div class="mn-dow">'+d+'</div>'; });
    MONTH_CELLS.forEach(function(c){
      var pool = c.wk !== null;
      var items = [];
      if(pool){
        var ev = collectDay(c.wk, c.gi);
        items = ev.ad.concat(ev.tm);
        shownCount += items.length;
      }
      h += '<div class="mn-cell'+(pool?' is-pool':'')+(c.out?' is-out':'')+(c.today?' is-today':'')+'"'
        + (pool ? ' data-wk="'+c.wk+'" data-gi="'+c.gi+'" title="Gün görünümünü aç"' : '') + '>';
      h += '<div class="mn-drow"><span class="mn-d">'+c.d+'</span>'+((c.d === 1 || (c.d === 29 && c.mon === 'Haz')) ? '<span class="mn-dmon">'+c.mon+'</span>' : '')+'</div>';
      if(items.length){
        var max = items.length > 3 ? 2 : 3;
        h += '<div class="mn-bars">';
        items.slice(0, max).forEach(function(it){ h += monthBarHTML(it); });
        h += '</div>';
        if(items.length > max) h += '<button type="button" class="mn-more" data-no-confirm>+'+(items.length - max)+' daha</button>';
      }
      h += '</div>';
    });
    h += '</div>';
    return h;
  }

  /* ---- mini-ay (sağ ray) — Temmuz 2026; havuz dışı günler pasif ---- */
  var miniGrid = document.getElementById('miniGrid');
  (function buildMini(){
    var h = '';
    ['Pt','Sa','Ça','Pe','Cu','Ct','Pa'].forEach(function(d){ h += '<div class="mini-dow">'+d+'</div>'; });
    MONTH_CELLS.forEach(function(c){
      var pool = c.wk !== null;
      h += '<button type="button" class="mini-d'+(c.out?' is-out':'')+(pool?'':' is-off')+(c.today?' is-today':'')+'"'
        + (pool ? ' data-wk="'+c.wk+'" data-gi="'+c.gi+'"' : ' disabled') + ' data-no-confirm>'+c.d+'</button>';
    });
    miniGrid.innerHTML = h;
  })();
  function syncMini(){
    miniGrid.querySelectorAll('.mini-d').forEach(function(b){
      b.classList.remove('is-sel','in-week');
      if(b.disabled) return;
      var wk = +b.getAttribute('data-wk'), gi = +b.getAttribute('data-gi');
      if(view === 'gun' && wk === weekIdx && gi === dayIdx) b.classList.add('is-sel');
      if(view === 'hafta' && wk === weekIdx) b.classList.add('in-week');
    });
  }

  /* ---- başlık + alt-başlık ---- */
  function renderTitles(){
    var big = '', sub = '';
    if(view === 'hafta'){ big = WEEK_MONTH[String(weekIdx)]; sub = WEEK_LABELS[String(weekIdx)]; }
    else if(view === 'gun'){
      var g = WEEKS[String(weekIdx)][dayIdx];
      big = (AY_FULL[g.ay] || g.ay) + ' 2026';
      sub = g.g + ', ' + g.d + ' ' + (AY_FULL[g.ay] || g.ay);
    } else { big = 'Temmuz 2026'; sub = '1 – 31 Temmuz'; }
    document.getElementById('ajdTitleBig').textContent = big;
    document.getElementById('ajdTitleSub').textContent = sub;
  }
  function renderSub(){
    var scope = ROLE_SCOPE_LBL[GV.role] || 'Tüm ekip programı';
    var rng = view === 'hafta' ? WEEK_LABELS[String(weekIdx)]
            : view === 'gun' ? (function(){ var g = WEEKS[String(weekIdx)][dayIdx]; return g.d + ' ' + (AY_FULL[g.ay] || g.ay) + ' 2026'; })()
            : 'Temmuz 2026';
    var lyr = layersAllOn() ? '' : ' · ' + layersOnCount() + '/6 katman';
    document.getElementById('ajdSub').textContent = shownCount + ' etkinlik · ' + scope + lyr + ' · ' + rng;
  }

  function renderAll(){
    closeCardPop(); closeMovePopover();
    if(view === 'hafta') viewEl.innerHTML = buildTimeGrid([0,1,2,3,4,5,6]);
    else if(view === 'gun') viewEl.innerHTML = buildTimeGrid([dayIdx]);
    else viewEl.innerHTML = buildMonth();
    document.querySelectorAll('.ajd-seg button').forEach(function(b){
      b.classList.toggle('is-on', b.getAttribute('data-view') === view);
    });
    renderTitles();
    renderSub();
    syncMini();
  }

  /* ---- hafta/gün gezinme — ±1 hafta sınırı + sınır toast'ları (6D metinleri) ---- */
  var TOAST_OLD = 'Daha eski kayıtlar arşivde — prototip son iki haftayı gösteriyor.';
  var TOAST_NEW = 'Sonraki haftaların programı henüz planlanmadı.';
  function setWeek(t){
    if(t === weekIdx) return;
    weekIdx = t;
    setAllLayers(true);   /* hafta değişince filtre reset (6D davranışı) */
  }
  function nav(dir){
    if(view === 'ay'){ gvToast('Aylık görünüm bu prototipte Temmuz 2026 ile sınırlı.', {type:'info'}); return; }
    if(view === 'hafta'){
      var t = weekIdx + dir;
      if(t < -1){ gvToast(TOAST_OLD, {type:'info'}); return; }
      if(t > 1){ gvToast(TOAST_NEW, {type:'info'}); return; }
      setWeek(t); renderAll(); return;
    }
    var d = dayIdx + dir;
    if(d < 0){
      if(weekIdx <= -1){ gvToast(TOAST_OLD, {type:'info'}); return; }
      setWeek(weekIdx - 1); dayIdx = 6;
    } else if(d > 6){
      if(weekIdx >= 1){ gvToast(TOAST_NEW, {type:'info'}); return; }
      setWeek(weekIdx + 1); dayIdx = 0;
    } else dayIdx = d;
    renderAll();
  }
  document.getElementById('ajdPrev').addEventListener('click', function(){ nav(-1); });
  document.getElementById('ajdNext').addEventListener('click', function(){ nav(1); });
  document.getElementById('ajdToday').addEventListener('click', function(){
    setWeek(0); dayIdx = TODAY_IDX; renderAll();
  });
  document.querySelectorAll('.ajd-seg button').forEach(function(b){
    b.addEventListener('click', function(){ view = b.getAttribute('data-view'); renderAll(); });
  });

  /* katman checkbox'ları */
  document.querySelectorAll('#lyrList input[data-lyr]').forEach(function(inp){
    inp.addEventListener('change', function(){
      var k = inp.getAttribute('data-lyr');
      if(k === 'ALL') setAllLayers(inp.checked);
      else { layers[k] = inp.checked; syncLayerBoxes(); }
      renderAll();
    });
  });
  /* ≤640: katman kartı katlanır */
  document.getElementById('lyrToggle').addEventListener('click', function(){
    var card = document.getElementById('lyrCard');
    var open = card.classList.toggle('is-open');
    this.setAttribute('aria-expanded', open ? 'true' : 'false');
  });

  /* mini-ay: havuz günü → Gün görünümü (hafta görünümündeyse o haftaya gider) */
  miniGrid.addEventListener('click', function(e){
    var b = e.target.closest('.mini-d'); if(!b || b.disabled) return;
    var wk = +b.getAttribute('data-wk'), gi = +b.getAttribute('data-gi');
    setWeek(wk); dayIdx = gi;
    if(view === 'ay') view = 'gun';
    renderAll();
  });

  /* görünüm-içi tıklamalar: gün başlığı → Gün; ay hücresi → Gün */
  viewEl.addEventListener('click', function(e){
    var hc = e.target.closest('.tg-hcell');
    if(hc){ dayIdx = +hc.getAttribute('data-gi'); view = 'gun'; renderAll(); return; }
    if(e.target.closest('a')) return;   /* kanonik bar/blok linki kendi sayfasına gider */
    if(e.target.closest('.ajd-kebab-wrap')) return;
    var cell = e.target.closest('.mn-cell.is-pool');
    if(cell){ setWeek(+cell.getAttribute('data-wk')); dayIdx = +cell.getAttribute('data-gi'); view = 'gun'; renderAll(); }
  });

  /* ---- R3+R4 — CRUD modalı (ekle/düzenle) — 6D akışı AYNEN ---- */
  var ADD_TYPE_MAP = { program:'gorev', isprogrami:'ziyaret', not:'gorev', toplanti:'toplanti' };
  var ADD_TITLE_MAP = { program:'Program Ekle', isprogrami:'İş Programı Ekle', not:'Ajandaya Not Ekle', toplanti:'Toplantı Ekle' };
  var modalOv = document.getElementById('gvAjdModalOv');
  var modalTitleEl = document.getElementById('gvAjdModalTitle');
  var baslikInp = document.getElementById('gvAjdBaslik');
  var gunSel = document.getElementById('gvAjdGun');
  var saatInp = document.getElementById('gvAjdSaat');
  var tipSel = document.getElementById('gvAjdTip');
  var santiyeInp = document.getElementById('gvAjdSantiye');
  var kisiInp = document.getElementById('gvAjdKisi');
  var editingId = null;

  function fillGunSelect(selectedIdx){
    gunSel.innerHTML = GUNLER_0.map(function(g, i){
      return '<option value="'+i+'"'+(i === selectedIdx ? ' selected' : '')+'>'+g.g+' ('+g.d+' '+g.ay+')</option>';
    }).join('');
  }
  function fillTipSelect(selectedTip){
    tipSel.innerHTML = Object.keys(TIP).map(function(k){

    }).join('');
  }
  function openModal(){
    modalOv.classList.add('open');
    document.addEventListener('keydown', onModalEsc);

  function closeModal(){

    document.removeEventListener('keydown', onModalEsc);

  function onModalEsc(e){ if(e.key === 'Escape') closeModal(); }
  modalOv.addEventListener('click', function(e){ if(e.target === modalOv) closeModal(); });
  document.getElementById('gvAjdModalCancel').addEventListener('click', closeModal);
  baslikInp.addEventListener('input', function(){ baslikInp.style.borderColor = ''; });

  function openAddModal(kind){
    editingId = null;
    modalTitleEl.textContent = ADD_TITLE_MAP[kind] || 'Etkinlik Ekle';

  function openEditModal(id){
    var rec = demoStore.filter(function(r){ return r.id === id; })[0];
    if(!rec) return;
    editingId = id;
    modalTitleEl.textContent = 'Etkinliği Düzenle';
    baslikInp.value = rec.baslik; baslikInp.style.borderColor = '';

  document.getElementById('gvAjdModalSave').addEventListener('click', function(){
    var baslik = baslikInp.value.trim();
    if(!baslik){ baslikInp.style.borderColor = 'var(--danger)'; baslikInp.focus(); return; }
    var gun = parseInt(gunSel.value, 10);

    var santiye = santiyeInp.value.trim();
    var kisi = kisiInp.value.trim();

      var rec = demoStore.filter(function(r){ return r.id === editingId; })[0];
      if(rec){ rec.baslik = baslik; rec.gun = gun; rec.saat = saat; rec.tip = tip; rec.santiye = santiye; rec.kisi = kisi; }
    } else {
      demoStore.push({id:genId(), gun:gun, saat:saat, tip:tip, baslik:baslik, santiye:santiye, kisi:kisi});
    }
    saveStore();

    renderAll();

  });

  /* ---- "Taşı" mini gün-seçici popover (fixed + viewport-flip; ≤640 DnD kapalıyken
     tek taşıma yolu — K4 fallback) ---- */
  function closeMovePopover(){
    document.querySelectorAll('.ajd-move-pop').forEach(function(p){ p.remove(); });
    document.removeEventListener('click', onDocClickCloseMove, true);
    document.removeEventListener('keydown', onEscCloseMove);
  }
  function onDocClickCloseMove(e){ if(!e.target.closest('.ajd-move-pop')) closeMovePopover(); }
  function onEscCloseMove(e){ if(e.key === 'Escape') closeMovePopover(); }
  function openMovePopover(id, anchorBtn){
    closeMovePopover();
    var rec = demoStore.filter(function(r){ return r.id === id; })[0];
    if(!rec) return;
    var pop = document.createElement('div');
    pop.className = 'gv-pop ajd-move-pop open';
    var html = '<div class="gp-head"><b>Taşı</b><span>Yeni gün seçin</span></div>';
    GUNLER_0.forEach(function(g, i){
      html += '<button type="button" data-move-day="'+i+'"><i class="fa-solid '+(i === rec.gun ? 'fa-check' : 'fa-calendar-day')+'"></i> '+g.g+' ('+g.d+' '+g.ay+')</button>';
    });
    pop.innerHTML = html;
    document.body.appendChild(pop);   /* önce ekle: gerçek yükseklik ölçülür (data-export deseni, ui.js) */
    var r = anchorBtn.getBoundingClientRect();
    pop.style.position = 'fixed';
    pop.style.minWidth = '208px';
    pop.style.right = Math.max(8, window.innerWidth - r.right) + 'px';
    var h = pop.offsetHeight || 260;
    var top = r.bottom + 6;
    if(top + h > window.innerHeight - 8){         /* aşağı sığmıyor → yukarı dene (flip) */
      var upTop = r.top - 6 - h;
      top = upTop >= 8 ? upTop : Math.max(8, window.innerHeight - h - 8);
    }
    pop.style.top = top + 'px';
    popGuardTs = Date.now();
    pop.querySelectorAll('button[data-move-day]').forEach(function(b){
      b.addEventListener('click', function(e){
        e.stopPropagation();
        var newGun = parseInt(b.getAttribute('data-move-day'), 10);
        var gunAd = GUNLER_0[newGun].g;
        rec.gun = newGun;
        saveStore();
        closeMovePopover();
        renderAll();
        gvToast('“'+rec.baslik+'” '+gunAd+' gününe taşındı.', {type:'ok'});
      });
    });
    document.addEventListener('click', onDocClickCloseMove, true);
    document.addEventListener('keydown', onEscCloseMove);
  }

  /* ---- "Etkinlik Ekle" split menü — weekIdx≠0'da açılmaz (info toast); weekIdx=0'da
     4 sim seçeneği GERÇEK ekleme modalı açar. "Görev Hatırlatması Ekle" tek GERÇEK
     href (crm-gorev-form.html) AYNEN kalır. ---- */
  (function(){
    var addBtn = document.getElementById('ajdAddBtn');
    var addPop = document.getElementById('ajdAddPop');
    if(!addBtn || !addPop) return;
    function setAddOpen(o){ addPop.classList.toggle('open', o); addBtn.setAttribute('aria-expanded', o ? 'true' : 'false'); }
    addBtn.addEventListener('click', function(e){
      e.stopPropagation();
      if(weekIdx !== 0){
        gvToast('Yalnız güncel haftaya etkinlik eklenebilir (demo).', {type:'info'});
        return;
      }
      setAddOpen(!addPop.classList.contains('open'));
    });
    document.addEventListener('click', function(e){ if(!addPop.contains(e.target) && e.target !== addBtn) setAddOpen(false); });
    document.addEventListener('keydown', function(e){ if(e.key === 'Escape') setAddOpen(false); });
    addPop.querySelectorAll('button[data-add]').forEach(function(b){
      b.addEventListener('click', function(){
        setAddOpen(false);
        openAddModal(b.getAttribute('data-add'));
      });
    });
  })();

  /* ---- kart işlem menüsü (⋯) [MOCK-SİM] — kebab düğmesi kart <a>'sının SIBLING
     overlay'i (üstteki CSS yorumundaki interceptor gerekçesi). Menü, kaydırmalı
     ızgarada kırpılmamak için body'ye FIXED .gv-pop olarak açılır. Kanonik kartlarda
     "Sil" ui.js'in global yıkıcı-aksiyon interceptor'ına (fa-trash → destrKind) düşer
     ve KENDİ confirm akışını kullanır (data-no-confirm YOK, kasıtlı). Demo kartlarda
     Düzenle/Taşı/Sil GERÇEK CRUD yapar; Sil'de data-no-confirm VAR (interceptor bypass)
     + sayfa-lokal gvConfirm — ikisi üst üste binmez (bilinen tuzak). ---- */
  var cardPop = null;
  var popGuardTs = 0;   /* açılış anındaki buton fokus-scroll'unun pop'u anında kapatmasını önler */
  function closeCardPop(){
    if(cardPop){ cardPop.remove(); cardPop = null; }
    document.querySelectorAll('.ajd-kebab.is-open').forEach(function(b){
      b.classList.remove('is-open'); b.setAttribute('aria-expanded','false');
    });
    document.querySelectorAll('.evw.has-open').forEach(function(w){ w.classList.remove('has-open'); });
  }
  function openCardPop(kb){
    closeCardPop(); closeMovePopover();
    var wrap = kb.closest('.evw, .adw');
    if(!wrap) return;
    var isDemo = wrap.classList.contains('is-demo');
    var demoId = wrap.getAttribute('data-demo-id') || '';
    var ttlEl = wrap.querySelector('.tg-ttl');
    var title = ttlEl ? ttlEl.textContent : '';
    var pop = document.createElement('div');
    pop.className = 'gv-pop ajd-card-pop open';
    pop.setAttribute('role','menu');
    pop.dataset.title = title;
    if(isDemo){
      pop.innerHTML =
        '<button type="button" data-cact="duzenle" data-demo-id="'+demoId+'"><i class="fa-solid fa-pen"></i> Düzenle</button>'
      + '<button type="button" data-cact="tasi" data-demo-id="'+demoId+'"><i class="fa-solid fa-arrows-up-down-left-right"></i> Taşı</button>'
      + '<div class="gp-div"></div>'
      + '<button type="button" class="danger" data-cact="sil" data-demo-id="'+demoId+'" data-no-confirm><i class="fa-solid fa-trash"></i> Sil</button>';
    } else {
      pop.innerHTML =
        '<button type="button" data-cact="duzenle"><i class="fa-solid fa-pen"></i> Düzenle</button>'
      + '<button type="button" data-cact="tamamla"><i class="fa-solid fa-check"></i> Tamamlandı İşaretle</button>'
      + '<button type="button" data-cact="ertele"><i class="fa-solid fa-clock-rotate-left"></i> Ertele</button>'
      + '<button type="button" data-cact="hatirlatma"><i class="fa-solid fa-bell"></i> Hatırlatma Ekle</button>'
      + '<button type="button" data-cact="ata"><i class="fa-solid fa-user-plus"></i> İlgili Personele Ata</button>'
      + '<div class="gp-div"></div>'
      + '<button type="button" class="danger" data-cact="sil"><i class="fa-solid fa-trash"></i> Sil</button>';
    }
    document.body.appendChild(pop);
    var r = kb.getBoundingClientRect();
    pop.style.position = 'fixed';
    pop.style.minWidth = '208px';
    pop.style.right = Math.max(8, window.innerWidth - r.right) + 'px';
    var h = pop.offsetHeight || 240;
    var top = r.bottom + 4;
    if(top + h > window.innerHeight - 8){
      var upTop = r.top - 4 - h;
      top = upTop >= 8 ? upTop : Math.max(8, window.innerHeight - h - 8);
    }
    pop.style.top = top + 'px';
    cardPop = pop;
    popGuardTs = Date.now();
    kb.classList.add('is-open');
    kb.setAttribute('aria-expanded','true');
    if(wrap.classList.contains('evw')) wrap.classList.add('has-open');
  }
  var CACT_MSG = {
    duzenle:{msg:'düzenleme ekranı bu prototipte simülasyondur (demo).', type:'info'},
    tamamla:{msg:'tamamlandı olarak işaretlendi.', type:'ok'},
    ertele:{msg:'ertelendi (demo).', type:'info'},
    hatirlatma:{msg:'için hatırlatma eklendi.', type:'ok'},
    ata:{msg:'ilgili personele atandı (demo).', type:'info'}
  };
  document.addEventListener('click', function(e){
    var kb = e.target.closest('.ajd-kebab');
    if(kb){
      e.preventDefault(); e.stopPropagation();
      if(kb.classList.contains('is-open')) closeCardPop();
      else openCardPop(kb);
      return;
    }
    var item = e.target.closest('.ajd-card-pop [data-cact]');
    if(item){
      e.preventDefault(); e.stopPropagation();
      var pop = item.closest('.ajd-card-pop');
      var title = pop ? (pop.dataset.title || '') : '';
      var kind = item.getAttribute('data-cact');
      var id = item.getAttribute('data-demo-id');
      /* anchor'ı menü kapanmadan ÖNCE al — kapatınca pop DOM'dan kalkar, rect sıfırlanır */
      var anchorEl = document.querySelector('.ajd-kebab.is-open') || item;
      closeCardPop();
      if(id){
        if(kind === 'duzenle'){ openEditModal(id); return; }
        if(kind === 'tasi'){ openMovePopover(id, anchorEl); return; }
        if(kind === 'sil'){
          var rec = demoStore.filter(function(r){ return r.id === id; })[0];
          gvConfirm({
            danger:true, icon:'fa-trash', ok:'Sil', cancel:'Vazgeç', title:'Silinsin mi?',
            message: rec ? ('“'+rec.baslik+'” kalıcı olarak silinecek. Bu işlem geri alınamaz.') : 'Bu kayıt kalıcı olarak silinecek.',
            onConfirm:function(){
              demoStore = demoStore.filter(function(x){ return x.id !== id; });
              saveStore();
              renderAll();
              gvToast((rec ? ('“'+rec.baslik+'” ') : 'Kayıt ') + 'silindi.', {type:'danger'});
            }
          });
          return;
        }
        return;
      }
      var V = CACT_MSG[kind];
      if(V) gvToast((title ? '“' + title + '” ' : 'Etkinlik ') + V.msg, {type:V.type});
      return;
    }
    if(!e.target.closest('.ajd-card-pop') && !e.target.closest('.ajd-move-pop')) closeCardPop();
  });
  document.addEventListener('keydown', function(e){ if(e.key === 'Escape'){ closeCardPop(); closeMovePopover(); } });
  /* fixed popover'lar kaydırmada demirinden kopar → kapat (açılış fokus-scroll'u hariç) */
  document.addEventListener('scroll', function(){
    if(Date.now() - popGuardTs < 250) return;
    closeCardPop(); closeMovePopover();
  }, true);
  window.addEventListener('resize', function(){ closeCardPop(); closeMovePopover(); });

  /* ---- K4 — sürükle-bırak (YALNIZ demo kayıtlar, yalnız weekIdx 0, Hafta/Gün) ----
     30 dk snap'li dikey taşıma + gün sütunları arası yatay taşıma. Fare/kalem ile
     çalışır; dokunmatik ve ≤640px'te devre dışı (fallback: kebab → Taşı popover).
     Kanonik kartlar sürüklenemez (kebab aksiyonları toast — 6D davranışı). */
  (function(){
    var drag = null;
    viewEl.addEventListener('pointerdown', function(e){
      if(e.pointerType === 'touch' || window.innerWidth <= 640) return;
      if(view === 'ay' || weekIdx !== 0) return;
      if(e.button !== 0) return;
      var ev = e.target.closest('.evw.is-demo .tg-ev');
      if(!ev || e.target.closest('.ajd-kebab-wrap')) return;
      var wrap = ev.closest('.evw');
      var id = wrap.getAttribute('data-demo-id');
      var rec = demoStore.filter(function(r){ return r.id === id; })[0];
      if(!rec) return;
      var cols = Array.prototype.slice.call(viewEl.querySelectorAll('.tg-col'));
      drag = {
        wrap:wrap, rec:rec, cols:cols, started:false,
        sx:e.clientX, sy:e.clientY,
        grabY:e.clientY - wrap.getBoundingClientRect().top,
        min:toMin(rec.saat) || DAY_START, gi:rec.gun
      };
      e.preventDefault();
      document.addEventListener('pointermove', onMove);
      document.addEventListener('pointerup', onUp);
      document.addEventListener('pointercancel', onUp);
    });
    function onMove(e){
      if(!drag) return;
      if(!drag.started){
        if(Math.abs(e.clientX - drag.sx) + Math.abs(e.clientY - drag.sy) < 5) return;
        drag.started = true;
        drag.wrap.classList.add('is-dragging');
        document.body.classList.add('gv-dragging');
        closeCardPop();
      }
      e.preventDefault();
      var col = null;
      for(var i = 0; i < drag.cols.length; i++){
        var r = drag.cols[i].getBoundingClientRect();
        if(e.clientX >= r.left && e.clientX < r.right){ col = drag.cols[i]; break; }
      }
      if(!col) col = drag.cols[drag.cols.length - 1];
      var cr = col.getBoundingClientRect();
      var rawMin = DAY_START + (e.clientY - cr.top - drag.grabY)/HOUR_H*60;
      var m = Math.round(rawMin/SNAP)*SNAP;
      m = Math.max(DAY_START, Math.min(m, DAY_END - DEF_DUR));
      drag.min = m;
      drag.gi = +col.getAttribute('data-gi');
      if(drag.wrap.parentElement !== col) col.appendChild(drag.wrap);
      drag.wrap.style.top = ((m - DAY_START)/60*HOUR_H).toFixed(1) + 'px';
      var tEl = drag.wrap.querySelector('.tg-time');
      if(tEl) tEl.textContent = fmtMin(m);
    }
    function onUp(){
      document.removeEventListener('pointermove', onMove);
      document.removeEventListener('pointerup', onUp);
      document.removeEventListener('pointercancel', onUp);
      if(!drag) return;
      var d = drag; drag = null;
      document.body.classList.remove('gv-dragging');
      if(!d.started) return;
      d.wrap.classList.remove('is-dragging');
      var saat = fmtMin(d.min);
      var g = GUNLER_0[d.gi];
      d.rec.saat = saat;
      d.rec.gun = d.gi;
      saveStore();
      renderAll();
      gvToast('“'+d.rec.baslik+'” taşındı: '+g.g+' '+g.d+' '+g.ay+' · '+saat, {type:'ok'});
    }
  })();

  renderAll();
})();
</script>
</body>
