<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>Ajandam — Gavia CRM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
      integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A=="
      crossorigin="anonymous" referrerpolicy="no-referrer">
<link rel="stylesheet" href="assets/css/tokens.css">
<link rel="stylesheet" href="assets/css/shell.css">
<link rel="stylesheet" href="assets/css/ui.css">
<style>
/* ============ SAYFAYA ÖZEL — Kişisel Ajanda haftalık grid'i ============
   santiye-ajanda.html .ajd-* pattern'inin sayfa-lokal kopyası; kişisel ajandaya
   özgü fark: 6 kanonik olay türü, tıklanabilir kart (href), tür-filtre chip'leri
   (legend'i de üstlenir), rol bazlı daraltma. */
.ajd-toolbar{display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;padding:16px 22px;border-bottom:1px solid var(--line)}
.ajd-weeknav{display:flex;align-items:center;gap:12px}
.ajd-week-lbl{font-size:13.5px;font-weight:700;color:var(--ink);white-space:nowrap}

.ajd-typebar{display:flex;flex-wrap:wrap;gap:8px;padding:14px 22px;border-bottom:1px solid var(--line)}
.chip-dot{width:8px;height:8px;border-radius:50%;flex:none}

.ajd-grid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:1px;background:var(--line)}
.ajd-day{background:var(--paper);min-width:0;display:flex;flex-direction:column}
.ajd-day.is-today{background:rgba(var(--acc-rgb),.045)}
.ajd-dhead{padding:14px 12px 12px;border-bottom:1px solid var(--line);text-align:center}
.ajd-day.is-today .ajd-dhead{border-bottom-color:rgba(var(--acc-rgb),.3)}
.ajd-dname{font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--muted)}
.ajd-day.is-today .ajd-dname{color:var(--acc-ink)}
.ajd-ddate{font-size:17px;font-weight:800;color:var(--ink);margin-top:2px;line-height:1}
.ajd-day.is-today .ajd-ddate{color:var(--acc-ink)}
.ajd-today-badge{display:inline-block;margin-top:6px;font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--acc-ink);background:rgba(var(--acc-rgb),.14);padding:2px 8px;border-radius:var(--r-pill)}

.ajd-list{flex:1;display:flex;flex-direction:column;gap:8px;padding:10px}
.ajd-card{background:var(--bg);border:1px solid var(--line);border-left:3px solid var(--line-2);border-radius:var(--r-sm);padding:10px 11px;transition:.18s var(--ease);display:block;text-decoration:none}
.ajd-card:hover{border-color:var(--line-2);transform:translateY(-1px);box-shadow:var(--sh-sm)}
.ajd-card:not(a){cursor:default}
.ajd-card.toplanti{border-left-color:var(--ink-2)}
.ajd-card.gorev{border-left-color:var(--acc-ink)}
.ajd-card.ziyaret{border-left-color:var(--info)}
.ajd-card.izin{border-left-color:var(--warn)}
.ajd-card.odeme{border-left-color:var(--ok)}
.ajd-card.termin{border-left-color:var(--danger)}
.ajd-time{font-size:11px;font-weight:700;color:var(--muted);font-variant-numeric:tabular-nums}
.ajd-type{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:700;margin-left:7px}
.ajd-card.toplanti .ajd-type{color:var(--ink-2)}
.ajd-card.gorev .ajd-type{color:var(--acc-ink)}
.ajd-card.ziyaret .ajd-type{color:var(--info)}
.ajd-card.izin .ajd-type{color:var(--warn)}
.ajd-card.odeme .ajd-type{color:var(--ok)}
.ajd-card.termin .ajd-type{color:var(--danger)}
.ajd-title{font-size:12.5px;font-weight:700;color:var(--ink);line-height:1.35;margin-top:6px}
.ajd-card:hover .ajd-title{color:var(--acc-ink)}
.ajd-meta{margin-top:7px;display:flex;flex-direction:column;gap:3px}
.ajd-meta span{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ajd-meta i{width:12px;flex:none;font-size:10px}

.ajd-empty{flex:1;display:flex;align-items:center;justify-content:center;padding:20px 10px;text-align:center}
.ajd-empty span{font-size:11.5px;color:var(--line-2);font-weight:600}

@media(max-width:980px){
  .ajd-grid{grid-template-columns:repeat(4,minmax(0,1fr))}
  .ajd-day:nth-child(n+5){border-top:1px solid var(--line)}
}
@media(max-width:640px){
  .ajd-toolbar{padding:14px 16px}
  .ajd-typebar{padding:12px 16px}
  .ajd-grid{grid-template-columns:1fr}
  .ajd-day{border-top:1px solid var(--line)}
  .ajd-day:first-child{border-top:none}
  .ajd-dhead{display:flex;align-items:baseline;gap:9px;text-align:left;padding:12px 16px}
  .ajd-ddate{margin-top:0}
  .ajd-today-badge{margin-top:0;margin-left:auto}
  .ajd-list{padding:0 16px 14px}
}
</style>
</head>
<body data-sec="panel" data-screen="ajanda">
<div class="gv-app">
  <aside class="gv-rail" id="gvRail"></aside>
  <nav class="gv-menu" id="gvMenu"></nav>
  <div class="gv-divider" id="gvDivider" role="separator" aria-label="Menüyü daralt/genişlet"><span class="gv-grip"></span></div>
  <div class="gv-overlay" id="gvOverlay"></div>

  <header class="gv-top">
    <button class="gv-burger" id="gvBurger" aria-label="Menü"><i class="fa-solid fa-bars"></i></button>
    <div class="gv-search"><i class="fa-solid fa-magnifying-glass"></i><input type="text" placeholder="Ara"></div>
    <div class="gv-top-tools">
      <button class="gv-iconbtn" data-tip="Bildirimler" aria-label="Bildirimler"><i class="fa-regular fa-bell"></i><span class="gb-dot"></span></button>
      <div class="gv-me">
        <div class="me-ava" id="gvAva">·</div>
        <div class="me-id"><div class="me-name" id="gvName">—</div><div class="me-role" id="gvRole">—</div></div>
        <i class="fa-solid fa-chevron-down"></i>
      </div>
    </div>
  </header>

  <main class="gv-main">
    <div class="gv-page-head">
      <div>
        <div class="ph-eyebrow">Panel</div>
        <h1>Ajandam</h1>
        <div class="ph-sub" id="ajdSub">Yükleniyor…</div>
      </div>
      <div class="ph-actions">
        <a class="btn btn-acc btn-sm" href="#" data-wip="1"><i class="fa-solid fa-plus"></i> Etkinlik Ekle</a>
      </div>
    </div>

    <div class="gv-card">
      <div class="ajd-toolbar">
        <div class="ajd-weeknav">
          <button class="ia-btn" id="ajdPrev" aria-label="Önceki hafta" data-no-confirm><i class="fa-solid fa-chevron-left"></i></button>
          <span class="ajd-week-lbl">29 Haziran – 5 Temmuz 2026</span>
          <button class="ia-btn" id="ajdNext" aria-label="Sonraki hafta" data-no-confirm><i class="fa-solid fa-chevron-right"></i></button>
        </div>
      </div>
      <div class="ajd-typebar chips" id="ajdChips">
        <button class="chip is-on" data-etype="hepsi"><i class="fa-solid fa-calendar-days"></i> Tümü</button>
        <button class="chip" data-etype="toplanti"><span class="chip-dot" style="background:var(--ink-2)"></span> Toplantı</button>
        <button class="chip" data-etype="gorev"><span class="chip-dot" style="background:var(--acc-ink)"></span> Görev</button>
        <button class="chip" data-etype="ziyaret"><span class="chip-dot" style="background:var(--info)"></span> Şantiye Ziyareti</button>
        <button class="chip" data-etype="izin"><span class="chip-dot" style="background:var(--warn)"></span> İzin</button>
        <button class="chip" data-etype="odeme"><span class="chip-dot" style="background:var(--ok)"></span> Ödeme/Hakediş</button>
        <button class="chip" data-etype="termin"><span class="chip-dot" style="background:var(--danger)"></span> Malzeme Teslim</button>
      </div>
      <div class="ajd-grid" id="ajdGrid"></div>
    </div>
  </main>
</div>

<script src="assets/js/shell.js"></script>
<script src="assets/js/ui.js"></script>
<script>
(function(){
  if(!window.GV) return;

  /* ---- mock hafta programı — kanonik şantiye/kişi/belge adları (shell.js üst yorum bloğu,
     DALGA 4A KANONİK TANIMLAR). Her olay MEVCUT bir kayda bağlı ve href'li (toplantı/ziyaret
     hariç — bunların ayrı bir detay sayfası yok, ilgili şantiye/program sayfasına yönlendirir).
     Tür renkleri kanonik: toplanti=ink-2, gorev=acc-ink, ziyaret=info, izin=warn, odeme=ok,
     termin=danger — santiye-ajanda'nın tür renkleriyle KARIŞTIRILMAZ (orada beton/denetim/
     hakediş/İSG/toplantı vardı; burada kişisel ajandanın kendi 6 türü var). ---- */
  var TIP = {
    toplanti:{ic:'fa-people-arrows',        lbl:'Toplantı'},
    gorev:   {ic:'fa-list-check',           lbl:'Görev'},
    ziyaret: {ic:'fa-helmet-safety',        lbl:'Şantiye Ziyareti'},
    izin:    {ic:'fa-umbrella-beach',       lbl:'İzin'},
    odeme:   {ic:'fa-file-invoice-dollar',  lbl:'Ödeme/Hakediş'},
    termin:  {ic:'fa-truck-ramp-box',       lbl:'Malzeme Teslim'}
  };

  var GUNLER = [
    {g:'Pazartesi', k:'Pzt', d:29, ay:'Haz', olay:[]},
    {g:'Salı', k:'Sal', d:30, ay:'Haz', olay:[
      {saat:'09:00', tip:'gorev', baslik:'Kalıp iskelesi söküm onayını al', santiye:'Liman Lojistik Merkezi', kisi:'Murat Denizli → Aylin Koç', href:'crm-gorev-detay.html', rel:[]},
      {saat:'11:00', tip:'gorev', baslik:'Haziran kasa mutabakatını tamamla', kisi:'Murat Denizli → Nesrin Aydın', href:'crm-gorev-detay.html', rel:['muhasebe']},
      {saat:'15:00', tip:'odeme', baslik:'TH-2026-008 onaylandı — Yalıtım Kardeşler', santiye:'Liman Lojistik Merkezi', kisi:'₺128.500 · kesinti sonrası net', href:'crm-finans-hakedis-detay.html', rel:['muhasebe']},
      {saat:'15:30', tip:'toplanti', baslik:'Yönetim haftalık değerlendirme toplantısı', kisi:'Murat Denizli, Kemal Yapıcıoğlu', rel:[]}
    ]},
    {g:'Çarşamba', k:'Çar', d:1, ay:'Tem', olay:[
      {saat:'Tüm gün', tip:'izin', baslik:'Aylin Koç — Yıllık İzni başlıyor', santiye:'Liman Lojistik Merkezi', kisi:'İZN-2026-030 · 1–3 Temmuz', href:'crm-personel-izin.html', rel:['ik']},
      {saat:'09:00', tip:'gorev', baslik:'Perde betonu kür takibini raporla', santiye:'Vadi Konakları', kisi:'Murat Denizli → Hasan Demirci', href:'crm-gorev-detay.html', rel:['sef']},
      {saat:'11:00', tip:'odeme', baslik:'TH-2026-009 gönderildi — ElektroMek Taahhüt', santiye:'Vadi Konakları', kisi:'₺76.200 · kesinti sonrası net', href:'crm-finans-hakedis-detay.html', rel:['muhasebe']},
      {saat:'13:00', tip:'ziyaret', baslik:'Merkez Şantiye saha ziyareti', santiye:'Merkez Şantiye', kisi:'Kemal Yapıcıoğlu', href:'crm-santiye-detay.html', rel:[]}
    ]},
    {g:'Perşembe', k:'Per', d:2, ay:'Tem', bugun:true, olay:[
      {saat:'09:00', tip:'termin', baslik:'SAT-2026-016 · Kalıp kerestesi teslimi', santiye:'Vadi Konakları', kisi:'Ege Hazır Beton · bugün teslim', href:'crm-satinalma-form-detay.html', rel:['satinalma']},
      {saat:'14:00', tip:'odeme', baslik:'HKD-2026-006 işveren onay takibi — Körfez GYO', santiye:'Vadi Konakları', kisi:'Gönderildi 20 Haz · Elif Sarıkaya, Selin Aydemir', href:'crm-finans-hakedis-detay.html', rel:['muhasebe']},
      {saat:'16:00', tip:'toplanti', baslik:'Haftalık saha koordinasyon toplantısı', santiye:'Liman Lojistik Merkezi', kisi:'Murat Denizli', href:'crm-santiye-ajanda.html', rel:[]}
    ]},
    {g:'Cuma', k:'Cum', d:3, ay:'Tem', olay:[
      {saat:'09:00', tip:'gorev', baslik:'A Blok elektrik şaft kontrolü — ElektroMek ile', santiye:'Vadi Konakları', kisi:'Murat Denizli → Hasan Demirci', href:'crm-gorev-detay.html', rel:['sef']},
      {saat:'10:00', tip:'gorev', baslik:'Puantaj defterini güncelle', santiye:'Vadi Konakları', kisi:'Hasan Demirci → Ali Vural', href:'crm-gorev-detay.html', rel:['personel']},
      {saat:'14:00', tip:'termin', baslik:'SAT-2026-012 · Elektrik kablosu NYY teslimi', santiye:'Merkez Şantiye', kisi:'Anadolu Hırdavat · 1 gün kaldı', href:'crm-satinalma-form-detay.html', rel:['satinalma']},
      {saat:'Tüm gün', tip:'izin', baslik:'Aylin Koç — Yıllık İzni bitiyor', santiye:'Liman Lojistik Merkezi', kisi:'İZN-2026-030 · 1–3 Temmuz', href:'crm-personel-izin.html', rel:['ik']}
    ]},
    {g:'Cumartesi', k:'Cmt', d:4, ay:'Tem', olay:[
      {saat:'09:00', tip:'gorev', baslik:'Haftalık İSG turu', santiye:'Merkez Şantiye', kisi:'Murat Denizli → Ömer Taşkın', href:'crm-gorev-detay.html', rel:[]},
      {saat:'10:00', tip:'ziyaret', baslik:'Vadi Konakları saha ziyareti', santiye:'Vadi Konakları', kisi:'Murat Denizli', href:'crm-santiye-detay.html', rel:[]}
    ]},
    {g:'Pazar', k:'Paz', d:5, ay:'Tem', olay:[
      {saat:'11:00', tip:'gorev', baslik:'Vinç bakım planını revize et', santiye:'Liman Lojistik Merkezi', kisi:'Murat Denizli → Aylin Koç', href:'crm-gorev-detay.html', rel:[]}
    ]}
  ];

  var grid = document.getElementById('ajdGrid');

  function renderDay(gun){
    var h = '<div class="ajd-day'+(gun.bugun?' is-today':'')+'" data-day="'+gun.d+gun.ay+'">';
    h += '<div class="ajd-dhead"><div class="ajd-dname">'+gun.g+'</div><div class="ajd-ddate">'+gun.d+' '+gun.ay+'</div>'
       + (gun.bugun ? '<span class="ajd-today-badge">Bugün</span>' : '') + '</div>';
    if(gun.olay.length){
      h += '<div class="ajd-list">';
      gun.olay.forEach(function(o){
        var T = TIP[o.tip];
        var tag = o.href ? 'a' : 'div';
        h += '<'+tag+' class="ajd-card '+o.tip+'" data-etype="'+o.tip+'" data-santiye="'+(o.santiye||'')+'" data-rel="'+o.rel.join(' ')+'"'+(o.href?' href="'+o.href+'"':'')+'>'
           + '<span class="ajd-time">'+o.saat+'</span><span class="ajd-type"><i class="fa-solid '+T.ic+'"></i>'+T.lbl+'</span>'
           + '<div class="ajd-title">'+o.baslik+'</div>'
           + '<div class="ajd-meta">'
           + (o.santiye ? '<span><i class="fa-solid fa-helmet-safety"></i>'+o.santiye+'</span>' : '')
           + '<span><i class="fa-solid fa-user"></i>'+o.kisi+'</span></div>'
           + '</'+tag+'>';
      });
      h += '</div>';
    } else {
      h += '<div class="ajd-empty"><span>Planlı etkinlik yok</span></div>';
    }
    h += '</div>';
    return h;
  }

  function renderAll(){
    var gh = '';
    GUNLER.forEach(function(gun){ gh += renderDay(gun); });
    grid.innerHTML = gh;
  }
  renderAll();

  /* rol daraltması — şef=saha (kendi şantiyesi + kendine bağlı görev/ziyaret),
     muhasebe/ik/satinalma=kendi işlevine bağlı kayıtlar, superadmin/sahip/yönetim=geniş görünüm */
  var WIDE = ['superadmin','sahip','yonetim'];
  var ROLE_HOME = { sef:'Vadi Konakları' };

  function applyRoleScope(){
    if(WIDE.indexOf(GV.role) !== -1) return;
    var home = ROLE_HOME[GV.role];
    document.querySelectorAll('.ajd-card').forEach(function(card){
      var rel = (card.getAttribute('data-rel')||'').split(' ').filter(Boolean);
      var santiye = card.getAttribute('data-santiye');
      var keep = rel.indexOf(GV.role) !== -1 || (home && santiye === home);
      if(!keep) card.remove();
    });
    document.querySelectorAll('.ajd-day').forEach(function(day){
      var list = day.querySelector('.ajd-list');
      if(list && !list.children.length){
        list.outerHTML = '<div class="ajd-empty"><span>Planlı etkinlik yok</span></div>';
      }
    });
  }
  applyRoleScope();

  var ROLE_SCOPE_LBL = { sef:'Vadi Konakları saha programınız', muhasebe:'Ödeme ve hakediş takviminiz', ik:'İzin takviminiz', satinalma:'Malzeme teslim takviminiz', personel:'Size ait görevler' };

  function updateSub(){
    var visible = document.querySelectorAll('.ajd-card').length;
    var scope = ROLE_SCOPE_LBL[GV.role];
    document.getElementById('ajdSub').textContent = visible + ' etkinlik · ' + (scope || 'Tüm ekip programı') + ' · 29 Haziran – 5 Temmuz 2026';
  }
  updateSub();

  /* tür filtresi — ui.js'in chip primitifi tablo satırlarına bağlı (tbody tr); burada
     tablo yok, bu yüzden sayfa-lokal filtre yazıldı (ui.js YENİDEN YAZILMADI, sadece
     bu görsel bileşene uygulanmadığı için ayrı bir küçük handler eklendi). */
  var chips = document.querySelectorAll('#ajdChips .chip[data-etype]');
  chips.forEach(function(ch){
    ch.addEventListener('click', function(){
      chips.forEach(function(x){ x.classList.remove('is-on'); });
      ch.classList.add('is-on');
      var f = ch.getAttribute('data-etype');
      var shown = 0;
      document.querySelectorAll('.ajd-day').forEach(function(day){
        var vis = 0;
        day.querySelectorAll('.ajd-card').forEach(function(card){
          var ok = (f === 'hepsi') || card.getAttribute('data-etype') === f;
          card.hidden = !ok;
          if(ok){ vis++; shown++; }
        });
        var list = day.querySelector('.ajd-list');
        var empty = day.querySelector('.ajd-empty');
        if(vis === 0){
          if(list) list.hidden = true;
          if(!empty){
            empty = document.createElement('div');
            empty.className = 'ajd-empty';
            empty.innerHTML = '<span></span>';
            day.appendChild(empty);
          }
          empty.hidden = false;
          empty.querySelector('span').textContent = list ? 'Bu türde etkinlik yok' : 'Planlı etkinlik yok';
        } else {
          if(list) list.hidden = false;
          if(empty && list) empty.hidden = true;
        }
      });
      var scope = ROLE_SCOPE_LBL[GV.role];
      var lbl = ch.textContent.trim();
      document.getElementById('ajdSub').textContent = shown + ' etkinlik · ' + (f === 'hepsi' ? (scope || 'Tüm ekip programı') : lbl + ' filtresi') + ' · 29 Haziran – 5 Temmuz 2026';
    });
  });

  document.getElementById('ajdPrev').addEventListener('click', function(){
    gvToast('Önceki haftaların programı bu prototipte gösterilmiyor.', {type:'info'});
  });
  document.getElementById('ajdNext').addEventListener('click', function(){
    gvToast('Gelecek haftanın programı henüz planlanmadı.', {type:'info'});
  });
})();
</script>
</body>
</html>
