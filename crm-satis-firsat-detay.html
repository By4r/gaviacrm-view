/* ============ SAYFAYA ÖZEL — Fırsat Detayı (?frs= çok-kayıt şablonu) ============ */
.gv-crumb{display:flex;align-items:center;gap:9px;font-size:12.5px;font-weight:600;color:var(--muted);margin-bottom:14px}
.gv-crumb a{color:var(--acc-ink);font-weight:700}
.gv-crumb a:hover{color:var(--acc-deep)}
.gv-crumb i{font-size:9px;color:var(--line-2)}

.gd-head{display:flex;align-items:flex-start;justify-content:space-between;gap:20px;margin-bottom:22px;flex-wrap:wrap}
.gd-head h1{font-size:22px;letter-spacing:-.015em;margin-bottom:9px;max-width:600px}
.gd-badges{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.gd-eyebrow{font-size:11.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--acc-ink);margin-bottom:8px}

.gd-grid{display:grid;grid-template-columns:1fr 340px;gap:18px;align-items:start}
@media(max-width:980px){.gd-grid{grid-template-columns:minmax(0,1fr)}}

.gd-block{padding:22px}
.gd-block + .gd-block{border-top:1px solid var(--line)}
.gd-label{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin-bottom:12px}

/* gvChain aşama geçmişi (ui.js primitifi) — steps için üstteki gd-label aşama etiketi */
.gv-chain{display:flex;flex-direction:column;padding:0 22px 22px;list-style:none}

.ctx-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:9px 0;font-size:13px}
.ctx-row:not(:last-child){border-bottom:1px solid var(--line)}
.ctx-row .ctx-lbl{color:var(--muted)}
.ctx-row .ctx-val{color:var(--ink);font-weight:700;text-align:right}
.ctx-row .ctx-val a{color:var(--acc-ink)}

/* görüşme notları */
.note-item{padding:15px 22px;display:flex;gap:12px}
.note-item:not(:last-child){border-bottom:1px solid var(--line)}
.note-dot{width:30px;height:30px;flex:none;border-radius:var(--r-circle);background:rgba(var(--acc-rgb),.12);color:var(--acc-ink);display:grid;place-items:center;font-size:11px}
.note-body{min-width:0;flex:1}
.note-head{display:flex;align-items:baseline;justify-content:space-between;gap:10px;margin-bottom:3px;flex-wrap:wrap}
.note-who{font-size:12.5px;font-weight:800;color:var(--ink)}
.note-date{font-size:11px;color:var(--muted);font-weight:600}
.note-txt{font-size:12.5px;color:var(--ink-2);line-height:1.6}

/* sağ: ilişkili kayıt kartları */
.rel-link{display:flex;align-items:center;gap:12px;padding:16px 22px}
.rel-mark{width:42px;height:42px;flex:none;border-radius:var(--r-md);display:grid;place-items:center;font-size:14px;font-weight:800}
.rel-info{min-width:0;flex:1}
.rel-info a{font-size:13.5px;font-weight:800;color:var(--ink);display:block}
.rel-info a:hover{color:var(--acc-ink)}
.rel-info span{font-size:11.5px;color:var(--muted)}

.warn-card{margin:0 22px 22px;padding:13px 15px;border-radius:var(--r-md);background:var(--warn-tint);color:var(--warn);font-size:12.5px;font-weight:700;display:flex;align-items:flex-start;gap:9px;line-height:1.6}
.warn-card i{margin-top:1px}
.danger-note{margin:0 22px 22px;padding:13px 15px;border-radius:var(--r-md);background:var(--danger-tint);color:var(--danger);font-size:12.5px;font-weight:700;display:flex;align-items:flex-start;gap:9px;line-height:1.6}
.danger-note i{margin-top:1px}

.frm-acts{display:flex;flex-direction:column;gap:8px;padding:18px 22px 22px}
.frm-acts .btn{justify-content:flex-start}

.lead-tag{display:inline-flex;align-items:center;gap:6px;font-size:10.5px;font-weight:700;color:var(--muted);background:var(--bg);border:1px dashed var(--line-2);padding:3px 9px;border-radius:7px}
</style>

  var q = new URLSearchParams(location.search);
  var rawFrs = q.get('frs');
  var key = rawFrs;
  if(!ITEMS[key]) key = rawFrs ? null : '005';
  var item = key && ITEMS[key];

  if(!item){
    gvNotFound({
      code: rawFrs ? rawFrs.toUpperCase() : null,
      tur: 'fırsat',
      listHref: 'crm-satis-pipeline.html', listLbl: 'Fırsatlara dön',
      defHref: 'crm-satis-firsat-detay.html', defLbl: 'Varsayılan kaydı aç'
    });
    return;
  }

  function render(){
    document.title = item.no + ' — Fırsat Detayı — Gavia CRM';
    document.getElementById('crumbNo').textContent = item.no;
    document.getElementById('gdEyebrow').textContent = 'Satış · ' + item.no + (item.tems ? (' · ' + item.tems) : '');
    document.getElementById('gdTitle').textContent = item.musteri.ad.replace(/&amp;/g,'&') + ' — ' + item.birim.kod;

    var kolonStyle = item.kolonStyle ? (' style="' + item.kolonStyle + '"') : '';
    var kolonCls = item.kolonCls ? (' ' + item.kolonCls) : '';
    var badges = '<span class="gstat' + kolonCls + '"' + kolonStyle + '>' + item.kolonLbl + '</span>'
      + '<span class="gtag">' + item.tutarLbl + '</span>';
    if(item.lead) badges += '<span class="lead-tag"><i class="fa-solid fa-user-clock"></i> Kart açılmadı</span>';
    if(item.closed === 'kaybedildi') badges += '<span class="gtag" style="background:var(--danger-tint);color:var(--danger);border-color:transparent">Neden: ' + item.neden + '</span>';
    document.getElementById('gdBadges').innerHTML = badges;

    /* opsiyon bitiş uyarısı */
    var warnWrap = document.getElementById('warnWrap');
    if(item.warn){
      warnWrap.hidden = false;
      warnWrap.innerHTML = '<div class="gc-head"><div class="gc-title" style="color:var(--warn)"><i class="fa-solid fa-hourglass-half" style="color:var(--warn)"></i> Opsiyon Bitiş Uyarısı</div></div>'
        + '<div class="gc-body" style="padding-top:12px"><p style="font-size:13px;color:var(--ink-2);line-height:1.7"><b style="color:var(--warn)">' + item.warn.tarih + ' (' + item.warn.kalan + ')</b> — ' + item.warn.metin + '</p></div>';
    } else {
      warnWrap.hidden = true;
      warnWrap.innerHTML = '';
    }

    /* gvChain aşama geçmişi */
    var chainSteps = item.history.map(function(h, i){
      var isLast = i === item.history.length - 1;
      /* varsayılan: geçmiş aşamalar tamamlandı (yeşil onay), son aşama —
         kayıt kapalıysa sonucuna göre, açıksa "şu an burada" (bekliyor) gösterilir */
      var durum = h.durum || (isLast ? 'bekliyor' : 'onaylandi');
      if(item.closed === 'kaybedildi' && isLast && !h.durum) durum = 'reddedildi';
      return {rol:'Aşama', kisi:h.stage, durum:durum, tarih:h.tarih, not:h.not};
    });
    window.gvChain(document.getElementById('chainMount'), {steps: chainSteps});

    /* görüşme notları */
    document.getElementById('notlarList').innerHTML = item.notlar.map(function(n){
      return '<div class="note-item"><div class="note-dot"><i class="fa-solid fa-comment"></i></div>'
        + '<div class="note-body"><div class="note-head"><span class="note-who">' + n.yazan + '</span><span class="note-date">' + n.tarih + '</span></div>'
        + '<p class="note-txt">' + n.metin + '</p></div></div>';
    }).join('');

    /* müşteri ilişki kartı */
    var m = item.musteri;
    document.getElementById('musteriRel').innerHTML =
        '<div class="rel-mark" style="' + m.style + '">' + m.ini + '</div>'
      + '<div class="rel-info">' + (m.href ? ('<a href="' + m.href + '">' + m.ad.replace(/&amp;/g,'&amp;') + '</a>') : ('<span style="display:block;font-size:13.5px;font-weight:800;color:var(--ink)">' + m.ad + '</span>'))
      + '<span>' + m.sub + '</span></div>';

    /* birim ilişki kartı */
    var b = item.birim;
    document.getElementById('birimRel').innerHTML =
        '<div class="rel-mark" style="background:var(--ok-tint);color:var(--ok)"><i class="fa-solid fa-building"></i></div>'
      + '<div class="rel-info">' + (b.href ? ('<a href="' + b.href + '">' + b.kod + '</a>') : ('<span style="display:block;font-size:13.5px;font-weight:800;color:var(--ink)">' + b.kod + '</span>'))
      + '<span>' + b.tip + '</span></div>';
    document.getElementById('birimCtx').innerHTML =
        '<div class="ctx-row" style="padding:0 22px 12px"><span class="ctx-lbl">Liste fiyatı</span><span class="ctx-val">' + tl(b.fiyat) + '</span></div>'
      + '<div class="ctx-row" style="padding:0 22px 18px;border-bottom:none"><span class="ctx-lbl">Birim durumu</span><span class="ctx-val">' + b.durum + '</span></div>';

    /* teklif ilişki kartı */
    var teklifCard = document.getElementById('teklifCard');
    if(item.teklif){
      teklifCard.hidden = false;
      var t = item.teklif;
      document.getElementById('teklifRel').innerHTML =
          '<div class="rel-mark" style="background:rgba(var(--acc-rgb),.12);color:var(--acc-ink)"><i class="fa-solid fa-file-invoice-dollar"></i></div>'
        + '<div class="rel-info"><a href="' + t.href + '">' + t.no + '</a><span>' + t.durum.lbl + (t.tutar ? (' · ' + tl(t.tutar)) : '') + '</span></div>';
    } else {
      teklifCard.hidden = true;
    }

    /* aksiyon kartı — kaybedilen kayıtta "yeniden aç" ghost buton */
    var actCard = document.getElementById('actCard');
    if(item.closed === 'kaybedildi'){
      actCard.hidden = false;
      document.getElementById('actBody').innerHTML =
        '<button type="button" class="btn btn-ghost btn-sm" id="btnReopen" data-no-confirm><i class="fa-solid fa-rotate-left"></i> Fırsatı Yeniden Aç</button>'
        + '<p style="font-size:11.5px;color:var(--muted);line-height:1.6;margin-top:4px">Fırsat “Yeni” aşamasına geri döner, müşteriyle yeniden temas kurulabilir.</p>';
      document.getElementById('btnReopen').addEventListener('click', function(){
        gvConfirm({
          icon:'fa-rotate-left', ok:'Yeniden Aç', cancel:'Vazgeç',
          title:'Fırsat yeniden açılsın mı?',
          message:'"' + item.no + '" fırsatı "Yeni" aşamasına geri alınacak. [MOCK-SİM]',
          onConfirm:function(){ gvToast(item.no + ' yeniden açıldı, pipeline "Yeni" kolonuna eklendi. [MOCK-SİM]'); }
        });
      });
    } else if(item.sozlesme){
      actCard.hidden = false;
      document.getElementById('actBody').innerHTML =
        '<a class="btn btn-acc btn-sm" href="' + item.sozlesme.href + '"><i class="fa-solid fa-file-signature"></i> ' + item.sozlesme.no + ' — Sözleşmeyi Aç</a>';
    } else {
      actCard.hidden = true;
    }
  }

  render();
})();
